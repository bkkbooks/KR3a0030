front:
  text: 欽定四庫全書子部一
  hash: sha256:0cca43e587e9c707aa7b5087f084e976ac80456101f009f4c0e78ad8fcc2f097
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0030_WYG_000-1a, image: WYG0698/WYG0698-0001a.png}
body:
  text: 二程遺書儒家類提要臣等謹案二程遺書二十五卷附録一卷宋二程子門人所記而朱子復次録之者也程子既殁以後所傳語録有李籲吕大臨謝良佐遊酢蘇昞劉絢劉安節楊迪周孚先張繹唐棣鮑若雨鄒炳暢大隱諸家頗多散亂失次且各隨學者之意其記録往往不同觀尹焞以朱光庭所鈔伊川語質諸伊川伊川有若不得某之心所記者徒彼意耳之語則程子在時所傳已頗失其真案此事見朱子後序中故朱子語録謂遊録語慢上蔡語險劉質夫語簡李端伯語宏肆永嘉諸公語絮也是編成於乾道四年戊子乃因家藏舊本復以類訪求附益略據所聞嵗月先後編次為二十五卷又以行狀之屬八篇為附録一卷語録載陳淳問第九卷介甫言律一條何意曰伯恭以凡事皆具惟律不説偶有此條遂漫載之又鄭可學問遺書有古言乾坤不用六子一假如何曰此一假却主張是自然之理又有一假却不取又晦廉集內有答吕伯恭書曰遺書節本已寫出愚意所刪去者亦須用草紙抄出逐條略注刪去之意方見不草草處若暗地刪却久逺却惑人云云今觀書內如劉安節所録謹禮者不透須莊子一條語涉偏矯則注云别本所增又暢大隱所記道豈有可離而不可離一條純入於禪則注云多非先生語其去取亦深為不苟矣故文獻通考載遺書卷目與此本同而黃震日抄所載則至十七卷而止與此互異又震所載遺書卷目吕與叔東見録及附東見録均次為第二卷而此本則次附東見録為第三卷殆傳本有異同歟至附録中年譜一篇朱子自謂實録所書文集內外書所載與凡他書之可證者震則謂朱子訪其事於張繹范域孟厚尹焞而成蓋朱子舉其引證之書震則舉其恭考之人各述一端似矛盾而非矛盾也乾隆四十六年十月恭校上總綦官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書二程遺書目録卷一端伯傳師説李類字端伯洛人伊川先生曰語録只有李籲得其意不拘言語無錯編者故今以為首篇卷二上元豐己未吕與叔東見二先生語吕大臨字與叔藍田人學於橫渠張先生之門先生卒乃入洛己未元豐二年然亦有己未後事卷二下附東見録後别本云亦與叔所記故附於後卷三謝顯道記憶平日語謝良佐字顯道上蔡人元豐中從學謝嘗言昔在二先生之門學者皆有語録惟良佐未嘗録然則此書蓋追記云卷四遊定夫所録遊酢字定夫建州人元豐中從學卷五此四篇本無篇名不知何人所記以其不分二先生語故附於此卷六同上篇此與下一篇間有疑誤不可曉處今悉存之不敢刪去以俟知者卷七同上篇卷八本自為一篇專説論孟似諸别録然不與諸篇相雜故附於此卷九少日所聞諸師友説元本在端伯傳師説之後不知何人所記以其不分二先生語故附於此卷十洛陽議論熙寧十年橫渠先生過洛與二先生議論此最在諸録之前以雜有橫渠議論故附於此卷十一師訓卷十二戌冬見伯淳先生洛中所聞元豐五年壬戌卷十三亥八月見先生於洛所聞元豐六年癸亥卷十四亥九月過汝所聞時先生監汝州酒稅卷十五入關語録關中學者所記按集先生元豐庚申元祐辛未皆嘗至關中但辛未年吕與叔己卒此篇尚有與叔名字疑庚申年也卷十六己巳冬所聞不知何人所記己巳元祐四年也本在少日所聞諸師友説後卷十七本無篇名不知何人所記或曰永嘉周行己恭叔或云永嘉劉安節元承或云關中學者所記皆不能明也故存其篇而闕其目按元祐三年劉質夫卒此篇有質夫名字則三年前語也卷十八劉元承手編劉安節字元承永嘉人所記有元祐五年遭喪後妱聖四年遷謫前事延平陳淵幾叟得之於元承之子有題志在後卷十九楊遵道録楊迪字遵道延平人文靖公之長子也所記有元符末歸自涪陵後事卷二十周伯忱録周孚先字伯忱毗陵人建中靖國初從學卷二十一上師説卷二十一下附師説後胡文定公家本除復重得此數章以其辭意類師説故以附其後卷二十二上伊川雜録卷二十二下附雜録後延平陳氏本自為一篇無名氏問與雜録相出入故以附之卷二十三鮑若雨録永嘉人字汝霖一云商霖卷二十四鄒德久本毗陵鄒柄道鄉公之子未嘗親見先生不知其所傳授舊附東見録後卷二十五暢潛道録暢大隱字潛道名見東見録此篇見朝氏客語中不云何人之言亦不云何人所記獨聞見於延平羅氏别録則注云暢本然則潛道所記與胡氏本亦有之而題其上云張杲晹叔所傳識者疑其間多非先生語今考之信然故附於此附録明道先生行狀見伊川先生文集門人朋友敘述劉立之邢恕朱光庭范祖禹書行狀後遊酢哀詞吕大臨墓表見伊川先生文集伊川先生年譜祭文張繹奏狀胡安國右程氏遺書二十五篇二先生門人記其所見聞答問之書也始諸公各自為書先生沒而其傳寖廣然散出並行無所統一傳者頗以己意私竊竄易厯時既久殆無全篇熹家有先人舊藏數篇皆著當時記録主名語意相承首尾通貫蓋未更後人之手故其書最為精善後益以類訪求得凡二十五篇因稍以所聞歲月先後第為此書篇目皆因其舊而又别為之録如此以見分别次序之所以然者然嘗竊聞之伊川先生無恙時門人尹焞得朱光庭所抄先生語奉而質諸先生先生曰某在何必讀此書若不得某之心所記者徒彼意耳尹公自是不敢復讀夫以二先生唱明道學於孔孟既沒千載不傳之後可謂盛矣而當時從逰之士蓋亦莫非天下之英材其於先生之嘉言善行又皆耳聞目見而手記之宜其親切不差可以行遠而先生之戒猶且丁寧若是豈不以學者未知心傳之要而滯於言語之間或者失之毫釐則其謬將有不可勝言者乎又况後此且數十年區區掇拾於殘編墜簡之餘傳誦道説玉石不分而謂真足以盡得其精微嚴密之旨其亦誤矣雖然先生之學其大要則可知已讀是書者誠能主敬以立其本窮理以進其知使本立而知益明知精而本益固則日用之間且將有以得乎先生之心而於疑信之傳可坐判矣此外諸家所抄尚衆率皆割裂補綴非復本篇異時得其所自來當復出之以附今録無則亦將去其重復别為外書以待後之君子云爾右附録一卷明道先生行狀之屬凡八篇伊川先生祭文一篇奏狀一篇皆其本文無可議者獨伊川行事本末當時無所論著熹嘗竊取實録所書文集內外書所載與凡他書之可證者次其後先以為年譜既不敢以意形容又不能保無謬誤故於每事之下各系其所從得者今亦輒取以著於篇合為一卷以附於二十五篇之後嗚呼學者察言以求其心考迹以觀其用而有以自得之則斯道之傳也其庶幾乎乾道四年嵗在著雍困敦夏四月壬子新安朱熹謹記
