body:
  text: 二程遺書卷七宋朱子編此卷間有不可曉處今悉存之不敢刪去與人為善始初便去性分上立晦叔獵自謂今無此好周茂叔曰何言之易也但此心潛隱未發一日萌動復如前矣後十二年因見果知未一本注云明道年十六七時好田獵十二年暮歸在田野間見田獵者不覺有喜心周公不作膳夫庖人匠人事只會兼衆有司之所能有田即有民有民即有兵鄉遂皆起兵禪學只到止處無用處無禮義稿鞂大羮鸞刀須用誠相副介甫致一堯舜知他幾千年其心至今在心要在腔子裏體道少能體即賢盡能體即聖孔子門人善形容聖人堯夫道雖偏駁然卷舒作用極熟又一作可能謹細行虛而不屈動而愈出只外面有些隙罅便走了只學顔子不二過忠恕違道不逺可謂仁之方力行近乎仁求仁莫近焉仁道難言故止曰近不逺而已苟以力行便為仁則失之矣施諸已而不願亦勿施於人夫子之道忠恕非曽子不能知道之要捨此則不可言聖人之明猶日月不可過也過則不明愚者指東為東指西為西隨衆所見而已知者知東不必為東西不必為西唯聖人明於定分須以東為東以西為西邵堯夫猶空中樓閣兵法逺交近攻須是審行此道知崇禮卑之意只是論得規矩準繩巧則在人莊子有大底意思無禮無本體須要大外面事不患不知只患不見自己雍也仁而不佞晦叔人當審已如何不必恤浮議志在浮議則心不在內不可私一本無私字别有應卒處事四字三命是律星辰是厯靜坐獨處不難居廣居應天下為難保民而王今之城郭不為保民行兵須不失家計遊兵夾持夾一作挾事往往急便壞與奪翕張固有此理老子説著便不是誠神不可語見之非易見不可及孔子弟子少有會問者只顔子能問又却終日如愚只理會生是如何靜中便有動動中自有靜灑掃應對與佛家默然處合喪事人所不勉處酒人所困處孔子於中間處之得宜玩心神明上下同流敬下驢不起世人所謂髙者却是小作陳先生大分守不足足一定堯舜極聖生朱均瞽鯀極愚生舜禹無所不用其極開物成務有濟時之才禹不矜不伐至柔也然乃見剛以誠意幾楪子何不可若有為果子係在他上便不是信得及便是也九德最好不學便老而衰應卒處事不見其大便大職事不可以巧免雍置師內郡養耕外郡禦守兵能聚散為上把得地一作性分定做事直是不得放過韓信多多益辦只是分數明微仲焚禁山契書義勇也是拘束太急便性軼輕劣大几長育人材且須緩緩兵陳須先立定家計然後以遊騎旋旋量力分外而與敵人合此便是合內外之道若遊騎太逺則却歸不得至如聽金鼓聲亦不忘却自家如何如苻堅養民一敗便不可支持無本故也坐井觀天非天小只被自家入井中被井筒拘束了然井何罪亦何可廢但出井中便見天大已見天如此大不為井所拘却入井中也不害致知但知止於至善為人子止於孝為人父止於慈之類不須外面只務觀物理泛然正如遊騎無所歸也即目所學便持吾斯之未能信道著信便是止也晉書謂吾家書籍當盡與之豈止與之當再拜而獻之病昏不為他物所奪只有正氣然猶有力知識逺過於人况吾合天地之道安有不可須是無終食之間違仁即道日益明矣陳本有此兩假不偏之謂中不易之謂庸中者天下之正道庸者天下之定理二程遺書卷七
