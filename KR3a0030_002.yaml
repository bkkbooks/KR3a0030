body:
  text: 二程䢱書卷二上宋朱子編元豐己未吕與叔東見二先生語古不必驗今之所患止患不得為不患不能為正居處恭執事敬與人忠此是徹上徹下語聖人元無二語明一人之心即天地之心心一作體一物之理即萬物之理一日之運即一歲之運正志道懇切固是誠意若迫切不中理則反為不誠蓋實理中自有緩急不容如是之迫觀天地之化乃可知正聖人用意深處全在繫辭詩書乃格言明古之學者皆有傳授如聖人作經本欲明道今人若不先明義理不可治經蓋不得傳授之意云爾如繫辭本欲明易若不先求卦義則看繫辭不得觀易須看時然後觀逐爻之才一爻之間常包涵數意聖人常取其重者為之辭亦有易中言之已多取其未嘗言者亦不必重事又有且言其時不及其爻之才皆臨時參考須先看卦乃看得繫辭有德者得天理而用之既有諸已所用莫非中理知巧之士雖不自得然才知稍髙亦能窺測見其一二得而用之乃自謂泄天機若平心用之亦莫不中理但不有諸已須用知巧亦有元本無有宇反失之如蘇張之類教人之術若童牛之牿當其未能觸時已先制之善之大者其次則豶豕之牙豕之有牙既已難制以百方制之終不能使之改惟豶其勢則性自調伏雖有牙亦不能為害如有不率教之人却須置其檟楚别以道格其心則不須檟楚將自化矣事君須體納約自牖之意人君有過以理開諭之既不肯聽雖當救止於此終不能回却須求人君開納處進說牖乃開明處如漢祖欲廢太子叔孫通言嫡庶根本彼皆知之既不肯聽矣縱使能言無以易此惟張良知四皓素為漢祖所敬招之使事太子漢祖知人心歸太子乃無廢立意及左師觸龍事亦相類天下善惡皆天理謂之惡者非本惡但或過或不及便如此如楊墨之類明仁義禮智信五者性也仁者全體四者四支仁體也義宜也禮别也智知也信實也學者全體此心學雖未盡若事物之來不可不應但隨分限應之雖不中不逺矣學者須敬守此心不可急迫當栽培深厚涵泳於其間然後可以自得但急迫求之只是私己終不足以逹道學者全要識時若不識時不足以言學顔子陋巷自樂以有孔子在焉若孟子之時世既無人安可不以道自任訂頑一篇意極完備乃仁之體也學者其體此意令有諸已其地位已髙到此地位自别有見處不可窮髙極遠恐於道無補也明醫書言手足痿痺為不仁此言最善名狀仁者以天地萬物為一體莫非己也認得為己何所不至若不有諸己自不與己相干如手足不仁氣已不貫皆不屬己故博施濟衆乃聖人之功用仁至難言故止曰己欲立而立人己欲達而達人能近取譬可謂仁之方也己欲令如是觀仁可以得仁之體明博施濟衆云必也聖乎者非謂仁不足以及此言博施濟衆者乃功用也明嘗喻以心知天猶居京師往長安但知出西門便可到長安此猶是言作兩處若要誠實只在京師便是到長安更不可别求長安只心便是天盡之便知性知性便知天一作性便是天當處便認取更不可外求窮理盡性以至於命三事一時並了元無次序不可將窮理作知之事若實窮得理即性命亦可了明學者識得仁體實有諸己只要義理栽培如求經義皆栽培之意世間有鬼神馮依言語者蓋屢見之未可全不信此亦有理莫見乎隱莫顯乎微而已嘗以所求語劉絢其後以其思索相示但言與不是元未嘗告之近來求得稍親昔受學於周茂叔每令尋顔子仲尼樂處所樂何事真知與常知異常見一田夫曾被虎傷有人說虎傷人衆莫不驚獨田夫色動異於衆若虎能傷人雖三尺童子莫不知之然未嘗真知真知須如田夫乃是故人知不善而猶為不善是亦未嘗真知若真知决不為矣蒲人要盟事知者所不為况聖人乎果要之止不之衛可也盟而背之若再遇蒲人其將何辭以對嘗言鄭戩作縣定民陳氏為里正既暮有姓陳人乞分居戩立笞之曰安有朝定里正而夕乞分居既而察之乞分居者非定里正也今夫赤子未能言其志意嗜欲人所未知其母必不能知之然不至誤認其意者何也誠心愛敬而已若使愛敬其民如其赤子何錯繆之有故心誠求之雖不中不逺矣欲知得與不得於心氣上驗之思慮有得中心悅豫沛然有裕者實得也思慮有得心氣勞耗者實未得也强揣度耳嘗有人言比因學道思慮心虛曰人之血氣固有虛實疾病之來聖賢所不免然未聞自古聖賢因學而致心疾者學者須先識仁仁者渾然與物同體義禮知信皆仁也識得此理以誠敬存之而已不須防檢不須窮索若心懈則有防心苟不懈何防之有理有未得故須窮索存久自明安待窮索此道與物無對大不足以名之天地之用皆我之用孟子言萬物皆備於我須反身而誠乃為大樂若反身未誠則猶是二物有對以已合彼終未有之一本下更有未有之三字又安得樂訂頑意思乃備言此體以此意存之更有何事必有事焉而勿正心勿忘勿助長未嘗致纖毫之力此其存之之道若存得便合有得蓋良知良能元不喪失以昔日習心未除却須存習此心久則可奪舊習此理至約惟患不能守既能體之而樂亦不患不能守也明事有善有惡皆天理也天理中物須有美惡蓋物之不齊物之情也但當察之不可自入於惡流於一物明昔見上稱介甫之學對曰王安石之學不是上愕然問曰何故對曰臣不敢逺引止以近事明之臣嘗讀詩言周公之德云公孫碩膚赤舄几几周公盛德形容如是之盛如王安石其身猶不能自治何足以及此明安一本此下云又嘗稱介甫皓對曰王石博學多聞斯有之守約則未也聖人即天地也天地中何物不有天地豈嘗有心揀别善惡一切涵容覆載但處之有道爾若善者親之不善者逺之則物不與者多矣安得為天地故聖人之志止欲老者安之朋友信之少者懷之死生存亡皆知所從來胸中瑩然無疑止此理爾孔子言未知生焉知死蓋略言之死之事即生是也更無别理明言體天地之化已剩一體字只此便是天地之化不可對此箇别有天地明胡安定在湖州置治道齊學者有欲明治道者講之於中如治兵治民水利算數之類嘗言劉彝善治水利後果為政皆興水利有功晬面盎背皆積盛致然四體不言而喻惟有德者能之大學乃孔氏遺書須從此學則不差明孔子之列國答聘而已若有用我者則從之居今之時不安今之法令非義也若論為治不為則已如復為之須於今之法度內處得其當方為合義若須更改而後為則何義之有孟子言養心莫善於寡欲寡欲則心自誠荀子言養心莫善於誠既誠矣又何養此已不識誠又不知所以養賢者惟知義而已命在其中中人以下乃以命處義如言求之有道得之有命是求無益於得知命之不可求故自處以不求若賢者則求之以道得之以義不必言命克己則私心去自然能復禮雖不學文而禮意已得明今之監司多不與州縣一體監司専欲伺察州縣専欲掩蔽不若推誠心與之共治有所不逮可教者教之可督者督之至於不聽擇其甚者去一二使足以警衆可也詩書載道之文春秋聖人之用一夲此下云五經之有春秋揂法律之有斷例也律令惟言其法至於斷例則始見其法之用也詩書如藥方春秋如用藥治疾聖人之用全在此書所謂不如載之行事深切著明者也有重疊言者如征伐盟會之類蓋欲成書勢須如此不可事事各求異義但一字有異或上下文異則義須别君實修資治通鑑至唐事正叔問曰敢與太宗肅宗正篡名乎曰然又曰敢辨魏徴之罪乎曰何罪魏徴事皇太子太子死遂忘戴天之讐而反事之此王法所當誅後世特以其後來立朝風節而掩其罪有善有惡安得相掩曰管仲不死子紏之難而事桓公孔子稱其能不死曰豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也與徴何異曰管仲之事與徴異齊侯死公子皆出小白長而當立子紏少亦欲立管仲奉子紏奔魯小白入齊既立仲納子紏以抗小白以少犯長又所不當立義已不順既而小白殺子紏管仲以所事言之則可死以義言之則未可死故春秋書齊小白入於齊以國繫齊明當立也又書公伐齊納紏二傳無子字紏去子明不當立也至齊人取子紏殺之此復繫子者罪齊大夫既盟而殺之也與徴之事全異知仁勇三者天下之達德所以行之者一一則誠也止是誠實此三者三者之外更别無誠孟子才髙學之無可依據學者當學顔子入聖人為近有用力處明若季氏則吾不能以季孟之間待之季氏强臣君待之之禮極隆然非所以待孔子季孟之間則待之之禮為至矣然復曰吾老矣不能用也此孔子不繫待之輕重特以不用而去談經論道則有之少有及治體者如有用我者正心以正身正身以正家正家以正朝廷百官至於天下此其序也其間則又繫用之淺深臨時裁酌而應之難執一意天地之道常垂象以示人故曰貞觀日月常明而不息故曰貞明學者不必逺求近取諸身只明人理敬而已矣便是約處易之乾卦言聖人之學坤卦言賢人之學惟言敬以直內義以方外敬義立而德不孤至於聖人亦止如是更無别途穿鑿繫纍自非道理故有道有理天人一也更不分别浩然之氣乃吾氣也養而不害則塞乎天地一為私心所蔽則欿然而餒知其小也思無邪無不敬只此二句循而行之安得有差有差者皆由不敬不正也明良知良能皆無所由乃出於天不繫於人德性謂天賦天資才之美者也凡立言欲涵蓄意思不使知德者厭無德者惑且省外事但明乎善惟進誠心其文章雖不中不逺矣所守不約泛濫無功明學者須學文知道者進德而已有德則不習無不利未有學養子而后嫁蓋先得是道矣學文之功學得一事是一事二事是二事觸類至於百千至於窮盡亦只是學不是德有德者不如是故此言可為知道者言不可為學者言如心得之則施於四體四體不言而喻譬如學書若未得者須心手相須而學苟得矣下筆便能書不必積學有有德之言有造道之言有述事之言有德者止言已分事造道之言如顔子言孔子孟子言堯舜止是造道之深所見如是所見所期不可不遠且大然行之亦須量力有漸志大心勞力小任重恐終敗事某接人多矣不雜者三人張子厚邵堯夫司馬君實聖不可知謂聖之至妙人所不能測立宗非朝廷之所禁但患人自不能行之立情虛一大為萬物之源恐未安須兼清濁虛實乃可言神道體物不遺不應有方所教人未見意趣必不樂學欲且教之歌舞如古詩三百篇皆古人作之如關雎之類正家之始故用之鄉人用之邦國日使人聞之此等詩其言簡奧今人未易曉别欲作詩略言教童子灑掃應對事長之節令朝夕歌之似當有助致知在格物格至也窮理而至於物則物理盡今之學者惟有義理以養其心若威儀辭讓以養其體文章物采以養其目聲者以養其耳舞蹈以養其血脉皆所未備孟子之於道若溫淳淵懿未有如顔子者於聖人幾矣後世謂之亞聖容有取焉如盍各言爾志子路顔子孔子皆一意但有小大之差皆與物共者也顔子不自私已故無伐善知同於人故無施勞若聖人則如天地如老者安之之類孟子疑誤大學在明明德先明此道在新民者使人用此道以自新在止於至善者見知所止得而後動與慮而後動異得在己如自使手舉物無不從慮則未在己如手中持物以取物知其不利聖人於文章不講而學蓋講者有可否之疑須問辨而後明學者有所不知問而知之則可否自决不待講論如孔子之盛德惟官名禮文有所未知故問於郯子老子既知則遂行而已更不須講正叔言不當以體會為非心以體會為非心故有心小性大之說聖人之神與天一有地字為一安得有二至於不勉而中不思而得莫不在此此心即與天地無異不可小了他不可一作若或將心滯在知識上故反以心為小時本注云橫渠云心禦見聞不宏於性鼓舞萬物不與聖人同憂此天與人異處聖人有不能為天之所為處行禮不可全泥古須當視時之風氣自不同故所處不得不與古異如今人面貌自與古人不同若全用古物亦不相稱雖聖人作須有損益交神明之意當在事生之後則可以盡孝愛而得其饗全用古事恐神不享訂頑之言極純無雜秦漢以來學者所未到君與夫人當異廟故自無配明禘王者之大祭祫諸侯之大祭明伯淳言學者須守下學上達之語乃學之要㛮叔無服先王之權後聖有作雖復制服可矣師不立服不可立也當以情之厚薄事之大小處之如顔閔於孔子雖斬衰三年可也其成已之功與君父並其次各有淺深稱其情而已下至曲藝莫不有師豈可一槩制服子厚以禮教學者最善使學先有所據守斟酌去取古今恐未易言須尺度權衡在胸中無疑乃可處之無差學禮者考文必求先王之意得意乃可以㳂革凡學之雜者終只是未有所止內不自足也譬之一物懸在空中苟無所倚著則不之東則之西故須著模他别道理只為自家不內足也譬之家藏良金不索外求貧者見人說金須借他底看朋友講習更莫如相觀而善工夫多昨日之會大率談禪使人情思不樂歸而悵恨者久之此說天下已成風其何能救古亦有釋氏盛時尚只是崇設像教其害至小今日之風便先言性命道德先驅了知者才愈髙明則陷溺愈深在某則才卑德薄無可奈何他然據今日次第便有數孟子亦無如之何只看孟子時楊墨之害能有甚况之今日殊不足言此事蓋亦繫時之汚隆清談盛而晉室衰然清談為害却只是間言談又豈若今日之害道今雖故人有一初本無一字為此學而陷溺其中者則既不可回今初本無今字只有望於諸君爾直須置而不論更休曰且待嘗試若嘗試則已化而自為之矣要之决無取初本無此上二十九字其術初本作佛學大槩且是絶倫類初本卷末注云昨日之會大率談禪章內一本云云上下皆同版本已定不可增益今附於此異時有别鋟版者則當以此為正今從之世上不容有此理又其言待要出世出那裏去又其迹須要出家然則家者不過君臣父子夫婦兄弟處此等事皆以為寄寓故其為忠孝仁義者皆以為不得已爾又要得脫世網至愚速者也畢竟學之者不過至似佛佛者一􅀈胡爾他本是箇自私獨善枯槁山林自適而已若只如是亦不過世上少這一箇人又却要周遍謂既得本則不患不周遍要之决無此理一本此下云然為其學者詰之理雖有屈時又却亂說卒不可憑考之今日所患者患在引取了中人以上者其力有以自立故不可回若只中人以下自不至此亦有甚執持今彼言世網者只為些秉彝又殄滅不得故當忠孝仁義之際皆處於不得已直欲和這些秉彝都消殺得盡然後以為至道也然而畢竟消殺不得如人之有耳目口鼻既有此氣則須有此識所見者色所聞者聲所食者味人之有喜怒哀樂者亦其性之自然今强曰必盡絶為得天真是所謂喪天真也持國之為此學者三十年矣其所得者儘說得知有這道理然至於反身而誠却竟無得處他有一箇覺之理可以敬以直內矣然無義以方外其直內者要之其本亦不是譬之贊易前後貫穿都說得是有此道理然須默而成之不言而信存乎德行一再有德行字處是所謂自得也談禪者雖說得蓋未之有得其徒亦有肯道佛卒不可以治天下國家者然又須道得本則可以周遍有問若使天下盡為佛可乎其徒言為其道則可其迹則不可伯淳言若盡為佛則是無倫類天下却都沒人去理然自亦以天下國家為不足治要逃世網其說至於不可窮處他又有一箇鬼神為說立人之道曰仁與義據今日合人道廢則是今尚不廢者猶只是有那些秉彝卒殄滅不得以此思之天壤間可謂孤立其將誰告耶今日卓然不為此學者惟范景仁與君實爾然其所執理有出於禪學之下者一日做身主不得為人驅過去裏君實嘗患思慮紛亂有時中夜而作達旦不寐可謂良自苦人都來多少血氣若此則幾何而不摧殘以盡也其後告人曰近得一術常以中為念則又是為中所亂中又何形如何念得他只是於名言之中揀得一箇好字與其為中所亂却不如與一串數珠及與他數珠他又不受殊不知中之無益於治心不如數珠之愈也夜以安身睡則合眼不知苦苦思量箇甚只是不與心為主三更常有人喚醒也諸本無此八字學者於釋氏之說直須如淫聲美色以逺之不爾則駸駸然入於其中矣顔淵問為邦孔子既告之以五帝三王之事而復戒以放鄭聲逺佞人曰鄭聲淫佞人殆彼佞人者是他一邊佞耳然而於已則危只是能使人移故危也至於禹之言曰何畏乎巧言令色巧言令色直消言畏只是須著如此戒慎猶恐不免釋氏之學更不消言常戒到自家自信後便不能亂得以書傳道與口相傳煞不相干相見而言因事發明則並意思一時傳了書雖言多其實不盡顴秦中氣豓衰邊事所困纍歲不稔昨來餽邊喪亡今日事未可知大有可憂者以至士人相繼淪喪為足粧㸃關中者則遂化去吁可怪也凡言王氣者實有此理生一物須有此氣不論豓惡須有許大氣美故生是人至如闕里有許多氣豓故此道之流以至今日昔橫渠說出此道理至此幾乎衰矣只介父一箇氣豓大小大伯伯淳嘗與子厚在興國事曾講論終日而曰不知舊日曾有甚人於此處講此事與叔所問今日宜不在有疑今尚差池者蓋為昔亦有雜學故今日疑所進有相似處則遂疑養氣為有助便休信此說蓋為前日思慮紛擾今要虛靜故以為有助前日思慮紛擾又非義理又非事故如是則只是狂妄人耳懲此以為病故要得虛靜其極欲得如槁木死灰又却不是蓋人活物也又安得為槁木死灰既活則須有動作須有思慮必欲為槁木死灰除是死也忠信所以進德者何也間邪則誠自存誠存斯為忠信也如何是間邪非禮而勿視聽言動邪斯間矣以此言之又幾時要身如枯木心如死灰又如絶四後畢竟如何又幾時須如枯木死灰敬以直內則須君則是君臣則是臣凡事如此大小大直截也有言養氣可以為養心之助曰敬則只是敬敬字上更添不得譬之敬父矣又豈須得道更將敬兄助之又如今端坐附火是敬於向火矣又豈須道更將敬於水以助之猶之有人曾到東京又曾到西京又曾到長安若一處上心來則他處不容參然則人心裏著兩件物不得飲酒不可使醉不及亂者不獨不可亂志只血氣亦不可使亂但使浹洽而已可也邢和叔後來亦染禪學其為人明辨有才後更曉練世事其於學亦日月至焉者也尹子曰明辨有才而復染禪學何所不為也伯淳自謂只得他人待做惡人敬而逺之嘗有一朝士久不見謂伯淳曰以伯淳如此聰明因何許多時終不肯回頭來伯淳答以蓋恐回頭後錯也㢲之凡相見須室礙蓋有先定之意和叔一作與叔據理却合滯礙而不然者只是他至誠便相信心直篤信理則須窮性則須盡命則不可言窮與盡只是至於命也橫渠昔常譬命是源窮理與盡性如穿渠引源然則渠與源是兩物後來此議必改來今語道則須待要寂滅湛靜形便如槁木心便如死灰豈有直做牆壁木石而謂之道所貴乎智周天地萬物而不遺又幾時要如死灰所貴乎動容周旋中禮又幾時要如槁木論心術無如孟子也只謂必有事焉一本有而勿正心字今既如槁木死灰則却於何處有事君實之能忠孝誠實只是天資學則元不知學堯夫之坦夷無思慮紛擾之患亦只是天資自美爾皆非學之功也持國嘗論克己復禮以謂克却不是道伯淳言克便是克之道持國又言道則不須克伯淳言道則不消克却不是持國事在聖人則無事可克今日持國須克得已便然後復禮遊酢楊時是學得靈利髙才也楊時於新學極精今日一有所問能盡知其短而持之介父之學大扺支離伯淳嘗與楊時讀了數篇其後盡能推類以通之有問詩三百非一人之作難以一法推之伯淳曰不然三百三千中所擇不特合於雅頌之音亦是擇其合於教化者取之篇中亦有次第淺深者亦有元無次序者新政之改亦是吾黨爭之有太過成就今日之事塗炭天下亦須兩分其罪可也當時天下岌岌乎殆哉介父欲去數矣其時介父直以數事上前卜去就若青苗之議不行則决其去伯淳於上前與孫萃老同得上意要了當此事大抵上意不欲抑介父要得人擔當了而介父之意尚亦無必伯淳嘗言管仲猶能言出令當如流水以順人心今參政須要做不順人心事何故介父之意只恐始為人所沮其後行不得伯淳却道但做順人心事人誰不願從也介父道此則感賢誠意却為天祺其日於中書大悖緣是介父大怒遂以死力爭於上前上為之一以聼用從此黨分矣莘老受約束而不肯行遂坐貶而伯淳遂待罪既而除以京西提刑伯淳復求對遂見上上言有甚文字伯淳云今咫只天顔尚不能少回天意文字更復何用欲去而上問者數四伯淳每以陛下不宜輕用兵為言朝廷羣臣無能任陛下事者以今日之患觀之猶是自家不善從容至如青苖且放過又且何妨伯淳當言職苦不曾使文字大綱只是於上前說了其他些小文字只是備禮而已大抵自仁祖朝優容諫臣當言職者必以詆訐而去為賢習以成風惟恐人言不稱職以去為落便宜昨來諸君蓋未免此苟如是為則是為己尚有私意在却不在朝廷不干事理今日朝廷所以特惡忌伯淳者以其可理會事只是理會學這裹動則於他輩有所不便也故特惡之深以吾自處猶是自家當初學未至意未誠其德尚薄無以感動他天意此自思則如此然據今日許大氣豓當時欲一二人動之誠如河濵之人捧土以塞孟津誠可笑也據當時事勢又至於今日豈不是命只著一箇私意便是餒便是缺了他浩然之氣處誠者物之終始不誠無物這裏缺了他則便這裏沒這物浩然之氣又不待外至是集義所生者這一箇道理不為堯存不為桀亡只是人不到他這裏知此便是明善生生之謂易是天之所以為道也天只是以生為道繼此生理者即是善也善便有一箇元底意思元者善之長萬物皆有春意便是繼之者善也成之者性也成却待他萬物自成其一作甚性須得告子云生之謂性則可凡天地所生之物須是謂之性皆謂之性則可於中却須分别牛之性馬之性是他便只道一般如釋氏說蠢動含靈皆有佛性如此則不可天命之謂性率性之謂道者天降是於下萬物流行各正性命者是所謂性也循其性一作各正性命而不失是所謂道也此亦通人物而言循性者馬則為馬之性又不做牛底性牛則為牛之性又不為馬底性此所謂率性也人在天地之間與萬物同流天幾時分别出是人是物修道之謂教此則専在人事以失其本性故修而求復之則入於學若元不失則何修之有是由仁義行也則是性已失故修之成性存存道義之門亦是萬物各有成性存存亦是生生不已之意天只是以生為道萬物皆只是一箇天理已何與焉至如言天討有罪五刑五用哉天命有德五服五章哉此都只是天理自然當如此人幾時與與則便是私意有善有惡善則理當喜如五服自有一箇次第以章顯之惡則理當惡一作怒彼自絶於理故五刑五用曷嘗容心喜怒於其間哉舜舉十六相堯豈不知只以他善未著故不自舉舜誅四凶堯豈不察只為他惡未著那誅得他舉與誅曷嘗有毫髮厠於其間哉只有一箇義理義之與比人能放這一箇身公共放在天地萬物中一般看則有甚妨礙雖萬身曾何傷乃知釋氏苦根塵者皆是自私者也要修持他這天理則在德須有不言而信者言難為形狀養之則須直不愧屋漏與慎獨這是箇持養底氣象也知止則自定萬物撓不動非是别將箇定來助知止也詩書中凡有箇主宰底意思者皆言帝有一箇包涵遍覆底意思則言天有一箇公共無私底意思則言王上下千百歲中若合符契如天理底意思誠只是誠此者也敬只是敬此者也非是别有一箇誠更有一箇敬也天理云者這一箇道理更有甚窮已不為堯存不為桀亡人得之者故大行不加窮居不損這上頭來更怎生說得存亡加減是他元無少缺百理具備胡本此下云得這箇天理是謂大人以其道變通無窮故謂之聖不疾而速不行而至須默而識之處故謂之神天地設位而易行乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣易是箇甚易又不只是這一部書是易之道也不要將易又是一箇事即事一作只是盡天理便是易也天地之化既是二物必動已不齊譬之兩扇磨行便其齒齊不得齒齊既動則物之出者何可得齊轉則齒更不復得齊從此參差萬變巧厯不能窮也天地之間有者只是有譬之人之知識聞見經厯數十年一日念之了然胸中這一箇道理在那裏放著來養心者且須是教他寡欲又差有功中心斯須不和不樂則鄙詐之心入之矣此與敬以直內同理謂敬為和樂則不可然敬須和樂只是中心沒事也大凡利害禍福亦須致命須得致之為言直如人以力自致之謂也得之不得命固已定君子須知他命方得不知命無以為君子蓋命苟不知無所不至故君子於困窮之時須致命便遂得志其得禍得福皆已自致只要申其志而已求之有道得之有命是求無益於得言求得不濟事元本無不字此言猶只為中人言之若為中人以上而言却只道求之有道非道則不求更不消言命也堯夫豪傑之士根本不帖帖地伯淳嘗戲以亂世之姦雄中道學之有所得者然無禮不恭極甚又嘗戒以不仁已猶不認以為人不曾來學伯淳言堯夫自是悠悠自言須如我與李之才方得道天民之先覺譬之皆睡他人未覺來以我先覺故搖擺其未覺者亦使之覺及其覺也元無少缺蓋亦未嘗有所增加也適一般爾天民云者蓋是全盡得天生斯民底事業天之生斯民也將以道覺斯民蓋言天生此民將以此道覺此民則元無少缺亦無增加未嘗不足達可行於天下者謂其全盡天之生民之理其術亦足以治天下國家故也可欲之謂善便與元者善之長同理禮樂不可斯須去身不能反躬天理滅矣天理云者百理具備元無少缺故反身而誠只是言得已上更不可道甚道元本道字屬下文命之曰易便有理一本無此七字但云道理皆自然若安排定則更有甚理天地隂陽之變便如二扇磨升降盈虛剛柔初未嘗停息陽常盈隂常虧故便不齊譬如磨既行齒都不齊既不齊便生出萬變故物之不齊物之情也而莊周强要齊物然而物終不齊也堯夫有言泥空終是著齊物到頭爭此其肅如秋其和如春如秋便是義以方外也如春觀萬物皆有春意堯夫有詩云拍拍滿懷都是春又曰芙蓉月向懷中照楊栁風來面上吹不止風月言皆有理又曰卷舒萬古興亡手出入幾重雲水身若莊周大抵寓言要入他放蕩之場堯夫却皆有理萬事皆出於理自以為皆有理故要得縱心妄行總不妨一本此下云堯夫詩云聖人喫緊些兒事其言太急迫此道理平鋪地放著裏何必如此觀天理亦須放開意思開濶得心胸便可見打揲了習心兩漏三漏子今如此混然說做一體猶二本那堪更二本三本今雖知可欲之為善亦須實有諸己便可言誠誠便合內外之道今看得不一只是心生除了身只是理便說合天人合天人已是為不知者引而致之天人無間夫不充塞則不能化育言贊化育已是離人而言之須是大其心使開濶譬如為九層之臺須大做腳須得元亨者只是始而亨者也此通人物而言通元本作詠字謂始初發生大概一例亨通也及到利貞便是各正性命後屬人而言也利貞者分在性與情只性為本情是性之動處情又幾時惡故者以利為本只是順利處為性若情則須是正也醫家以不認痛癢謂之不仁人以不知覺不認義理為不仁譬最近所以謂萬物一體者皆有此理只為從那裏來生生之謂易生則一時生皆完此理人則能推物則氣昏推不得不可道他物不與有也人只為自私將自家軀殼上頭起意故看得道理小了他底放這身來都在萬物中一例看大小大快活釋氏以不知此去他身上起意思奈何那身不得故却厭惡要得去盡根塵為心源不定故要得如枯木死灰然沒此理要有此理除是死也釋氏其實是愛身放不得故說許多譬如負販之蟲已載不起猶自更取物在身又如抱石沉河以其重愈沉終不道放下石頭惟嫌重也孟子論四端處則欲擴而充之說約處則博學詳說而反說約此內外交相養之道也萬物皆備於我不獨人爾物皆然都自這裏出去只是物不能推人則能推之雖能推之幾時添得一分不能推之幾時減得一分百理具在平鋪放著幾時道堯盡君道添得些君道多舜盡子道添得些孝道多元來依舊橫渠教人本只是謂世學膠固故說一箇清虛一大只圖得人稍損得沒去就道理來然而人又更别處走今日且只道敬聖人之德行固不可得而名狀若顔子底一箇氣象吾曹亦心知之欲學聖人且須學顔子後來曾子子夏煞學得到上面也今學者敬而不見得元本有未字又不安者只是心生亦是太以敬來做事得重此恭而無禮則勞也恭者私為恭之恭也禮者非體之禮是自然底道理也只恭而不為自然底道理故不自在也須是恭而安今容貌必端言語必正者非是道獨善其身要人道如何只是天理合如此本無私意只是箇循理而已堯夫解他山之石可以攻玉玉者溫潤之物若將兩塊玉來相磨必磨不成須是得他箇粗礪底物方磨得出譬如君子與小人處為小人侵陵則修省畏避動心忍性增益預防如此便道理出來公掞昨在洛有書室兩旁各一牖牖各三十六隔一書天道之要一書仁義之道中以一榜書毋不敬思無邪中處之此意亦好古人雖胎教與保傅之教猶勝今日庠序鄉黨之教古人自幼學耳目遊處所見皆善至長而不見異物故易以成就今人自少所見皆不善才能言便習穢惡日日消鑠更有甚天理須人理皆盡然尚以些秉彝消鑠盡不得故且恁過一日之中起多少巧僞萌多少機穽據此箇薰蒸以氣動氣宜乎聖賢之不生和氣之不兆也尋常問或有些時和歲豐亦出於幸也不然何以古者或同時或同家並生聖人及至後世乃數千歲寂寥人多言天地外不知天地如何說內外外面畢竟是箇甚若言著外則須似有箇規模凡言充塞云者却似箇有規模底體面將這氣充實之然此只是指而示之近耳氣則只是氣更說甚充塞如化育則只是化育更說甚贊贊與充塞又早却是别一件事也理之盛衰之說與釋氏初劫之言如何到他說便亂道又去窺測得些彼其言成住壞空曰成壞則可住與空則非也如小兒既生亦日日長行元不曾住是他本理只是一箇消長盈虧耳更沒别事極為天地中是也然論地中儘有說據測景以三萬里為中若有窮然有至一邊已及一萬五千里而天地之運蓋如初也然則中者亦時中耳地形有髙下無適而不為中故其中不可定下譬如楊氏為我墨氏兼愛子莫於此二者以執其中則中者適未足為中也故曰執中無權猶執一也若是因地形髙下無適而不為中則天地之化不可窮也若定下不易之中則須有左有右有前有後四隅既定則各有逺近之限便至百千萬億亦猶是有數蓋有數則終有盡處不知如何為盡也日之形人莫不見似輪似餅其形若有限則其灮亦須有限若只在三萬里中升降出沒則須有灮所不到處又安有此理今天之蒼蒼豈是天之形視下也亦須如是日固陽精也然不如舊說周回而行中心是須彌山日無適而不為精也地既無適而不為中則日無適而不為精也氣行滿天地之中然氣須有精處故其見如輪如餅譬之鋪一溜柴薪從頭爇著火到處其光皆一般非是有一塊物推著行將去氣行到寅則寅上有光行到卯則卯上有光氣充塞無所不到若這上頭得箇意思便知得生物之理觀書者亦須要知得隨文害義如書曰湯既勝夏欲遷其社不可既處湯為聖人聖人不容有妄舉若湯始欲遷社衆議以為不可而不遷則是湯先有妄舉也不可者湯不可之也湯以為國既亡則社自當遷以為遷之不若不遷之愈故但屋之屋之則與遷之無以異既為亡國之社則自王城至國都皆有之使為戒也故春秋書亳社災然則魯有亳社屋之故有火災此制計之必始於湯也長安西風而雨終未曉此理須是自東自北而風則雨自南自西則不雨何者自東自北皆屬陽坎卦本陽陽唱而隂和故雨自西自南隂也隂唱而陽不和蝃蝀之詩曰朝隮于西崇朝其雨是陽來唱也故雨蝃蝀在東則是隂先唱也莫之敢指者非謂手指莫敢指陳也猶言不可道也易言密雲不雨自我西郊言自西則是隂先唱也故雲雖密而不雨今西風而雨恐是山勢使然學者用了許多工夫下頭須落道了是入異教只為自家這下元未曾得箇安泊處那下說得成熟世人所惑者鬼神轉化他總有說又費力說道理又打入箇無底之壑故一生出不得今日須是自家這下照得理分明則不走作形而下形而上者亦須更分明須得雖則心有一作存默識有難名狀處然須說盡心知性知天亦須於此留意此章一無落道了是四字學則與他窮理盡性以至於命則不失異教之書雖小道必有可觀者焉然其流必乖故不可以一事遂都取之若楊墨亦同是堯舜同非桀紂是非則可也其就上所說則是成就他說也非桀是堯是吾依本分事就上過說則是他私意說箇要之只有箇理講學本不消得理㑹然每與剔撥出只是如今雜亂膠固須著說破孟子論王道便實徒善不足為政徒法不能自行便先從養生一作道上說將去既庶既富然後以飽食暖衣而無教為不可故教之也孟子而後却只有原道一篇其間語固多病然要之大意儘近理若西銘則是原道之宗祖也原道却只說到道元未到得西銘意思據子厚之文醇然無出此文也自孟子後蓋未見此書聖人之教以所貴率人釋氏以所賤率人初本無此十六字卷末注云又學佛者難吾言章一本章首有云云下同餘見昨日之㑹章學佛者難聲去吾言謂人皆可以為堯舜則無僕隸正叔言人皆可以為堯舜聖人所願也其不為堯舜是所可賤也故以為僕隸遊酢楊時先知學禪已知向裏沒安泊處故來此却恐不變也暢大隱許多時學乃方學禪是於此蓋未有所得也吕進伯可愛老而好學理㑹直是到底天祺自然有德氣似箇貴人氣象只是却有氣短處規規太以事為重傷於周至却是氣局小景庸則只是才敏須是天祺與景庸相濟乃為得中也子厚則髙才其學更先從雜博中過來理則天下只是一箇理故推至四海而凖須是質諸天地考諸三王不易之理故敬則只是敬此者也仁是仁此者也信是信此者也又曰顛沛造次必於是又言吾斯之未能信只是道得如此更難為名狀今異教之害道家之說則更沒可闢唯釋氏之說衍蔓迷溺至深今日今日一作自是釋氏盛而道家蕭索方其盛時天下之士往往一作又自從其學自難與之力爭惟當自明吾理吾理自立則彼不必與爭然在今日釋氏却未消理㑹大患者却是介甫之學譬之盧從史在潞州知朝廷將討之當時便使一處逐其節度使朝廷之議要討逐節度者而李文饒之意要先討潞州則不必治彼而自敗矣如今日却要先整頓介甫之學壞了後生學者異教之說其盛如此其久又如是亦須是有命然吾輩不謂之命也人之於患難只有一箇處置盡人謀之後却須泰然處之有人遇一事則心心念念不肯捨畢竟何益若不㑹處置了放下便是無義無命也道之不明也賢者過之不肖者不及也賢者則只過當不肖又却都休冬至一陽生却須斗寒正如欲曉而反暗也隂陽之際亦不可截然不相接厮侵過便是道理天地之間如是者極多艮之為義終萬物始萬物此理最妙須玩索這箇理古言乾坤退處不用之地而用六子若人則便分君道無為臣道有為若天則誰與他安排他如是須有道理故如八卦之義須要玩索早梅冬至已前發方一陽未生然則發生者何也其榮其枯此萬物一箇隂陽升降大節也然逐枝自有一箇榮枯分限不齊此各有一乾坤也各自有箇消長只是箇消息惟其消息此所以不窮至如松柏亦不是不雕只是後雕雕得不覺怎少得消息方夏生長時却有夏枯者則冬寒之際有發生之物何足怪也物理最好玩隂陽於天地間雖無截然為隂為陽之理須去參差然一箇升降生殺之分不可無也動植之分有得天氣多者有得地氣多者本乎天者親上本乎地者親下然要之雖木植亦兼有五行之性在其中只是偏得土之氣故重濁也伯淳言西銘某得此意只是須得他子厚有如此筆力他人無緣做得孟子以後未有人及此得此文字省多少言語且教他人讀書要之仁孝之理備於此須臾而不於此則便不仁不孝也詩前序必是當時人所傳國史明乎得失之迹者是也不得此則何緣知得此篇是甚意思大序則是仲尼所作其餘則未必然要之皆得大意只是後之觀詩者亦添入詩有六體須篇篇求之或有兼備者或有偏得一二者今之解詩者風則分付與國風矣雅則分付與大小雅矣頌即分付與頌矣詩中且沒却這三般體如何看得詩風之為言便有風動之意興便有一興喻之意比則直比之而已蛾眉瓠犀是也賦則賦陳其事如齊侯之子衛侯之妻是也雅則正言其事頌則稱美之言也如于嗟乎騶虞之類是也關雎之詩如言樂得淑女以配君子憂在進賢不淫其色非后妃之事明知此意是作詩者之意也如此類推之詩言后妃夫人者非必謂文王之妻也特陳后妃夫人之事如斯而已然其後亦有當時詩附入之者汝墳是也且二南之詩必是周公所作他人恐不及此以其為教於衽席之上閨門之內上下貴賤之所同也故用之鄉人邦國而謂之國風也化天下只是一箇風至如鹿鳴之詩數篇如燕羣臣遣戍役勞還率之類皆是為國之常政其詩亦恐是周公所作如後人之為樂章是也論語中言唐棣之華者因權而言逸詩也孔子刪詩豈只取合於雅頌之音而已亦是謂合此義理也如皇矣蒸民文王大明之類其義理非人人學至於此安能及此作詩者又非一人上下數千年若合符節只為合這一箇理若不合義理孔子必不取也夫子言興於詩觀其言是興起人善意汪洋浩大皆是此意如言秉心塞淵騋牝三千須是塞淵然後騋牝三千塞淵有義理又如駉之詩坰牧是賤事其中却言思無邪詩三百一言以蔽之者在此一句坰牧而必要思無邪者蓋為非此則不能坰牧又如考槃之詩解者謂賢人永誓不復告君不復見君又自誓不詐而實如此也據此安得有賢者氣象孟子之於齊是甚君臣然其去未嘗不遲遲顧戀今此君才不用便躁忿如此是不可磯也乃知此詩解者之誤此詩是賢者退而窮處心不忘君怨慕之深者也君臣猶父子安得不怨故直至於寤寐弗忘永陳其不得見君與告君又陳其此誠之不詐也此章注塞淵有義理一作塞淵於義理堯與舜更無優劣及至湯武便别孟子言性之反之自古無人如此說只孟子分别出來便知得堯舜是生而知之湯武是學而能之文王之德則似堯舜禹之德則似湯武要之皆是聖人詩云上天之載無聲無臭儀刑文王萬邦作孚上天又無聲臭之可聞只看文王便萬邦取信也又曰維天之命於穆不已蓋曰天之所以為天也文王之德之純蓋曰文王之所以為文也然則文王之德直是似天吳天曰明及爾出王昊天曰旦及爾遊衍只為常是這箇道理此箇一作理亦須待他心熟便自然别樂則生生則烏可已也須是熟方能如此苟為不熟不如稊稗是集義所生非義襲而取之也須集義這上頭莫非義也仁義禮智根於心其生色言四者本於心而生色也睟於面盎於背施於四體四體不言而喻孟子非自及此焉能道得到此今志於義理而心不安樂者何也此則正是剩一箇助之長雖則心操之則存捨之則亡然而持之大甚便是必有事焉而正之也亦須且恁去如此者只是德孤德不孤必有鄰到德盛後自無窒礙左右逢其原也中庸言禮儀三百威儀三千方是說優優大哉又却非如異教之說須得如枯木死灰以為得也得此義理在此甚事不盡更有甚事出得視世之功名事業真譬如間視世之仁義者真煦煦孑孑如匹夫匹婦之為諒也自是天來大事處以此理又曾何足論若知得這箇義理便有進處若不知得則何緣仰髙鑽堅在前在後也竭吾才則又見其卓爾德者得也須是實到這裏須得言反身而誠樂莫大焉却是著人上說邵堯夫於物理上儘說得亦大段漏泄他天機人於天理昏者是只為嗜欲亂著他莊子言其嗜欲深者其天機淺此言却最是這箇義理仁者又看做仁了也知者又看做知了也百姓又日用而不知此所以君子之道鮮矣此箇亦不少亦不剩只是人看他不見今天下之士人在朝者又不能言退者遂忘之又不肯言此非朝廷吉祥雖未見從又不曾有大橫見加便豈可自絶也君臣父子也父子之義不可絶豈有身為侍從尚食其祿視其危亡曾不論列君臣之義固如此乎寂然不動感而遂通者天理具備元無缺少不為堯存不為桀亡父子君臣常理不易何曾動來因不動故言寂然雖不動感便通感非自外也若不一本則安得先天而天不違後天而奉天時所務於窮理者非道須盡窮了天下萬物之理又不道是窮得一理便到只是要積纍多後自然見去天地安有內外言天地之外便是不識天地也人之在天地如魚在水不知有水直待出水方知動不得禮一失則為夷狄再失則為禽獸聖人初恐人入於禽獸也故於春秋之法極謹嚴元本無故字中國而用夷狄禮則便夷狄之韓愈言春秋謹嚴深得其㫖韓愈道他不知又不得其言曰易竒而法詩正而葩春秋謹嚴左氏浮誇其名理皆善當春秋戰國之際天下小國介於大國奔命不暇然足以自維持數百年此勢却似稻塍各有界分約束後世遂有土崩之勢道壞便一時壞元本無此一壞字陳涉一叛天下遂不支梧今日堂堂天下只西方一敗朝廷遂震何也蓋天下之勢正如稻塍各有限隔則卒不能壞今天下却似一箇萬頃陂要起卒起不得及一起則汹湧遂奈何不得以祖宗德澤仁厚涵養百餘年間一時柔了人心雖有豪傑無箇端倪起得便只要安靜不宜使搖動雖夷狄亦散兵却鬬恃一本無恃字此中國之福也一本此字下有非字賈誼有五餌之說當時笑其迂踈今日朝廷正使著故得許多時寧息天地動靜之理天圓則須轉地方則須安靜南北之位豈可不定下所以定南北者在坎離也坎離又不是人安排得來莫非自然也論語為書傳道立言深得聖人之學者矣如鄉黨形容聖人不知者豈能及是正不愧屋漏便是箇持養氣象孔孟之分只是要别箇聖人賢人如孟子若為孔子事業則儘做得只是難似聖人譬如剪綵以為花花則無不似處只是無他造化功綏斯來動斯和此是不可及處只是這箇理以上却難言也如言吾斯之未能信皆是古人此理已明故也敬而無失便是喜怒哀樂未發之謂中也敬不可謂之中但敬而無失即所以中也微仲之學雜其愷悌嚴重寬大處多惟心艱於取人自以才髙故爾語近學則不過入於禪談不常議論則以苟為有詰難亦不克易其言不必信心自以才髙也和叔常言及相見則不復有疑既相别則不能無疑然亦未知果能終不疑不知他既已不疑而終復有疑何故伯淳言何不問他疑甚不如劇論和叔任道擔當其風力甚徑然深潛縝密有所不逮於與叔蔡州謝良佐雖時學中因議州舉學試得失便不復計較建州遊酢非昔日之遊酢也固是穎然資質溫厚南劒州楊時雖不逮酢然煞穎悟林大節雖差魯然所問便能躬行劉質夫久於其事自小來便在此李端伯相聚雖不久未見他操履然才識穎悟自是不能已也介父當初只是要行已志恐天下有異同故只去上心上把得定他人不能搖以是拒絶言路進用柔佞之人使之奉行新法今則是他已去不知今日却留下害事昨春邊事權罷是皆李舜舉之力也今不幸適喪此人亦深足憐也此等事皆是重不幸李憲本意他只是要固蘭㑹恐覆其功必不肯主這下事元豐四年取興靈事新進遊楊輩數人入太學不惟議論須異且動作亦必有異故為學中以異類待之又皆學春秋愈駭俗矣堯夫之學先從理上推意言象數言天下之理須出於四者推到理處曰處曰添二字我得此大者則萬事由我無有不定然未必有術要之亦難以治天下國家其為人則直是無禮不恭惟是侮玩雖天理一作地亦為之侮玩如無名公傳言問諸天地天地不對弄丸餘暇時往時來之類堯夫詩雪月風花未品題他便把這些事便與堯舜三代一般此等語自孟子後無人曾敢如此言來直是無端又如言文字呈上堯夫皆不恭之甚須信畫前元有易自從刪後更無詩這箇意思古元未有人道來行已須行誠盡處正叔謂意則善矣然言誠盡則誠之為道非能盡也堯夫戲謂且就平側司馬子微嘗作坐忘論是所謂坐馳也微一作綦伯淳昔在長安倉中間坐後見長廊柱以意數之已尚不疑再數之不合不免令人一一聲言而數之乃與初數者無差則知越著心把捉越不定吕與叔以氣不足而養之此猶只是自養求無疾如道家修養亦何傷若須要存想飛升此則不可徐禧奴才也善兵者有二萬人未必死彼雖十萬人亦未必能勝二萬人古者以少擊衆而取勝者多蓋兵多亦不足恃昔者袁紹以十萬阻官渡而曹操只以萬卒取之王莽百萬之衆而光武昆陽之衆有八千仍有在城中者然則只是數千人取之符堅下淮百萬而謝元才二萬人一麾而亂以此觀之兵衆則易老適足以資敵人一敗不支則自相蹂踐至如聞風聲鶴唳皆以為晉軍之至則是自相殘也譬之一人軀幹極大一人輕捷兩人相當則擁腫者遲鈍為輕捷者出入左右之則必困矣自古師旅勝敗不能無之然今日邊事至號踈曠前古未之聞也其源在不任將帥將帥不慎任人閫外之事將軍處之一一中覆皆受廟算上下相狥安得不如此元豐五年永樂城事楊定鬼神之說只是道人心有感通如有人平生不識一字一日病作却念得一部杜甫詩却有此理天地間事只是一箇有一箇無既有即有無即無如杜甫詩者是世界上實有杜甫詩故人之心病及至精一有箇道理自相感通以至人心在此託夢在彼亦有是理只是心之感通也死者託夢亦容有此理有人過江其妻墮水意其為必死矣故過金山寺為作佛事方追薦次忽其婢子通傳墮水之妻意度在某處作甚事是誠死也及三二日有漁人撐舟以其妻還之乃未嘗死也蓋旋於急流中救活之然則其婢子之通傳是何也亦是心相感通既說有感通更說甚生死古今之别天祺自然有德氣望之有貴人之象只是氣局小太規規於事為重也昔在司竹常愛用一卒長及將代自見其人盜筍皮遂治之無少貸罪已正待之復如初略不介意人觀其德量如此正叔謂子厚越獄以謂卿監已上不追攝之者以其貴朝廷有㫖追攝可也又請枷項非也不已太辱矣貴貴以其近於君子厚謂若終不伏則將奈何正叔謂寧使公事勘不成則休朝廷大義不可虧也子厚以為然俗人酷畏鬼神久亦不復敬畏冬至一陽生而每遇至後則倍寒何也隂陽消長之際無截然斷絶之理故相攙掩過如天將曉復至隂黑亦是理也大抵終始萬物莫盛乎艮此儘神妙須儘研窮此理今尺長於古尺欲尺度權衡之正須起於律律取黃鍾黃鍾之聲亦不難定世自有知音者將上下聲考之須一作既得其正便將黍以實其管看管實幾粒然後推而定法可也古法律管當實千二百粒黍今羊頭山黍不相應則將數等驗之看如何大小者方應其數然後為正昔胡先生定樂取羊頭山黍用三等篩子篩之取中等者用之此特未為定也此尺是器上所定更有因人而制如言深衣之袂一尺二寸若古人身材只用一尺二寸豈可運肘即知因人身而定既是為人後者便須將所後者呼之以為父以為母不如是則不正也却當甚為人後後之立疑義者只見禮不杖期內有為人後者為其父母報便道須是稱親禮文蓋言出為人後則本父母反呼之以為叔為伯也故須著道為其父母以别之非謂却將本父母亦稱父母也哲廟取孟后詔云孟元孫女后孟在女也而以孟元孫女詔者伊川云自古天子不娶小國蓋孟元將校曾隨文潞公貝州獲功官至團練使而在是時止是小使臣耳此一段非元豐時事疑後人記二程遺書卷二上欽定四庫全書二程遺書卷二下宋朱子編附東見録後今許大西事無一人敢議者自古舉事不能無可否是非亦須有議論如符堅夀春之役其朝廷宗室固多有言者以至宫女有張夫人者猶上書諫西晉平吳當取也主之者惟張華一人而已然當時雖羊叔子建議而朝廷亦不能無言又如唐師取蔡州此則在中國容其數十年恣睢然當時以為不宜取者固無義理然亦是有議論今則廟堂之上無一人言者幾何不一言而喪邦也元豐四年用种諤沈括之謀伐西夏今日西師正惟事本不正更說甚去就君子於任事之際須成敗之由一作責在己則自當生死以之今致其身使禍福死生利害由人處之是不可也如昨軍興事務繁夥是亦學也但恐只了他紛紛底則又何益如從軍者之行必竟是為利祿為功名由今之舉便使得人一城一國又是甚功名君子恥之今日從宦苟有軍事不能免此是復蹈前事也然則既如此曷為而不已也胎息之說謂之愈疾則可謂之道則與聖人之學不干事聖人未嘗說著若言神住則氣住則是浮屠入定之法雖謂養氣猶是第二節事亦須以心為主其心欲慈惠安一作虛靜故於道為有助亦不然孟子說浩然之氣又不如此今若言存心養氣只是専為此氣又所為者小捨大務小捨本趨末又濟甚事今言有助於道者只為奈何心不下故要得寂湛而已又不似釋氏攝心之術論學若如是則大段雜也亦不須得道只閉目靜坐為可以養心坐如尸立如齊只是要養其志豈只待為養這些氣來又不如是也浮屠之術最善化誘故人多向之然其術所以化衆人也故人亦有向有不向者如介甫之學他便只是去人主心術處加功故今日靡然而同無有異者所謂一正君而國定也此學極有害以介甫才辨遽施之學者誰能出其右始則且以利而從其說久而遂安其學今天下之新法害事處但只消一日除了便沒事其學化革了人心為害最甚其如之何故天下只是一箇風風如是則靡然無不向也今日西事要已亦有甚難前事亦何足恥只朝廷推一寬大天地之量許之自新莫須相從然此恐未易朝廷之意今日不得已須著如此但夏人更重有所要以堅吾約則邊患未已也一本通下章為一段范希文前日西舉以虛聲而走敵人今日又不知誰能為希文者關中學者以今日觀之師死而遂倍之却未見其人只是更不復講餽運之術雖自古亦無不煩民不動搖而足者然於古則有兵車其中載糗糧百人破二十五人然古者行兵在中國又不遠敵若是深入遠處則决無省力且如秦運海隅之粟以饋邊率三十鍾而致一石是二百倍以來今日師行一兵行一夫饋只可供七日其餘日必俱乏食也且計之須三夫而助一兵仍須十五日便回一日不回則一日乏食以此校之無善術故兵也者古人必不得已而後用者知此耳目畏尖物此事不得放過便與克下室中率置尖物須以理勝他尖必不刺人也何畏之有橫渠墓祭為一位恐難推同几之義同几唯設一位祭之謂夫婦同牢而祭也吕氏定一歲疏數之節有所不及恐未合人情一本作吕氏成時失之疏雨露既濡霜露既降皆有所感若四時之祭有所未及則不得契感之意一本作疏則不契感之情今祭祀其敬齊禮文之類尚皆可緩且是要大者先正始得今程氏之家祭只是男女異位及大有害義者稍變得一二他所未遑也吾曹所急正在此凡祭祀須是及祖知母而不知父狗彘是也知父而不知祖飛鳥是也人須去上面立一等求所以自異始得自古治亂相承亦常事君子多而小人少則治小人多而君子少則亂然在古亦須朝廷之中君子小人雜進不似今日剪截得直是齊整不惟不得進用更直憔悴善類略去近道則須憔悴舊日交逰只改節者便於世事差遂此道理不知為甚正叔近病人有言之曰在他人則有追駁斥放正叔無此等事故只有病耳介甫今日亦不必誅殺人人靡然自從蓋只消除盡在朝異己者在古雖大惡在上一面誅殺亦斷不得人議論今便都無異者卜筮之能應祭祀之能享亦只是一箇理蓍龜雖無情然所以為卦而卦有吉凶莫非有此理以其有是理也故以是問一作心向焉其應也如響若以私心及錯卦象而問之便不應蓋沒此理今日之理與前日已定之理只是一箇理故應也至如祭祀之享亦同鬼神之理在彼我以此理向之故享也不容有二三只是一理也如處藥治病亦只是一箇理此藥治箇如何氣有此病服之即應若理不契則藥不應古之言鬼神不過著於祭祀亦只是言如聞歎息之聲亦不曾道聞如何言語亦不曾道見如何形狀如漢武帝之見李夫人只為道士先說與在甚處使端目其地故想出也然武帝作詩亦曰是耶非耶嘗問好談鬼神者皆所未曾聞見皆是見說燭理不明便傳以為信也假使實所聞見亦未足信或是心病或是目病如孔子言人之所信者目目亦有不足信者耶此言極善今日雜信鬼怪異說者只是不先燭理若於事上一一理㑹則有甚盡期須只於學上理㑹師巫在此降言在彼只是拋得逺决無此理又言留下藥尤知其不然生氣盡則死死則謂之鬼可也但不知世俗所謂鬼神何也聰明如邵堯夫猶不免致疑在此嘗言有人家若虛空中聞人馬之聲某謂既是人馬須有鞍韉之類皆全這箇是何處得來堯夫言天地之間亦有一般不有不無底物某謂如此說則須有不有不無底人馬凡百皆爾深不然也風肅然起於人心恐怖要之風是天地間氣非土偶人所能為也漢時神君今日二郎廟皆有之人心作主不定正如一箇翻車流轉動搖無須臾停所感萬端又如懸鏡空中無物不入其中有甚定形不學則却都不察及有所學便覺察得是為害著一箇意思則與人成就得箇甚好見識一作無意於學則皆不之察暨用心自觀即覺其為害存此紛雜竟與人成何見識心若不做一箇主怎生奈何張天祺昔常言自約數年自上著牀便不得思量事不思量事後須强把他這心來制縳亦須寄寓在一箇形象皆非自然君實自謂吾得術矣只管念箇中字此則又為中繫縳且中字亦何形象若愚夫不思慮冥然無知此又過與不及之分也有人胸中常若有兩人焉欲為善如有惡以為之間欲為不善又若有羞惡之心者本無二人此正交戰之驗也持其志便氣不能亂此大可驗要之聖賢必不害心疾其他疾却未可知他藏府只為元不曾養養之却在修養家一作持其志使氣不能亂此大可驗要之聖賢必不病心疾他藏府有患則不嘗専志於養焉仁祖時北使進言髙麗自來臣屬北朝近來職貢全缺殊失臣禮今欲加兵又聞臣屬南朝今來報知仁祖不答及將去也召而前語之曰適議髙麗事朕思之只是王子罪不干百姓事今既加兵王子未必能誅得且是屠戮百姓北使遂屈無答不覺汗流浹背俯伏於地歸而寢兵他都不言彼兵事勢只看這一箇天地之量亦至誠有以格他也人心緣境出入無時人亦不覺人夢不惟聞見思想亦有五藏所感者天下之或寒或燠只緣他地形髙下如屋隂則寒屋陽則燠不可言於此所寒於此所熱且以尺五之表定日中一萬五千里就外觀未必然人有夀考者其氣血脈息自深便有一般深根固蒂底道理一作氣象人脈起於陽明周旋而下至於兩氣口自然勻長故於此視脈又一道自頭而下至足大衝亦如氣口此等事最切於身然而人安然恬於不知至如人為人問你身上有幾條骨頭血脈如何行動腹中有多少藏府皆冥然莫曉今人於家裏有多少家活屋舍被人問著已不能知却知為不智於此不知曾不介意只道是皮包裹不到少缺大小大不察近取諸身一身之上百理具備甚物是沒底背在上故為陽胸在下故為隂至如男女之生已有此象天有五行人有五藏心火也著些天地間風氣乘之便須發燥肝木也著些天地間風氣乘之便須發怒推之五藏皆然孟子將四端便為四體仁便是一箇木氣象惻隱之心便是一箇生物春底氣象羞惡之心便是一箇秋底氣象只有一箇去就斷割底氣象便是義也推之四端皆然此箇事又著箇甚安排得也此箇道理雖牛馬血氣之類亦然都恁備具只是流形不同各隨形氣後便昏了他氣如其子愛其母母愛其子亦有木底氣象又豈無羞惡之心如避害就利别所愛惡一一理完更如獮猴尤似人故於獸中最為智巧童昏之人見解不及者多矣然而唯人氣最清可以輔相裁成天地設位聖人成能直行乎天地之中所以為三才天地本一物地亦天也只是人為天地心是心之動則分了天為上地為下兼三才而兩之故六也天地之氣遠近異像則知愈逺則愈異至如人形有異曾何足論如史册有鬼國狗國百種怪異固亦有之要之這箇理則一般其必一作有異者譬如海中之蟲魚鳥獸不啻百千萬億卒無有同於陸上之物雖極其異要之只是水族而已天地之中理必相直則四邊當有空闕處空闕處如何地之下豈無天今所謂地者特於一作為天中一物爾如雲氣之聚以其久而不散也故為對凡地動者只是氣動凡所指地者一作損缺處只是土土亦一物爾不可言地更須要知坤元承天是地之道也古者百畝今四十一畝餘若以土地計之所收似不足以供九人之食曰百畝九人固不足通天下計之則亦可家有九人只十六已别受田其餘皆老少也故可供有不足者又有補助之政又有鄉黨賙救之義故亦可足後世雖有作者虞帝不可及也猶之田也其初開荒蒔種甚盛以次遂漸薄虞帝當其盛時故也其間有如夏衰殷衰周衰有盛則有衰又是其間之盛衰推之後世皆若是也如一樹方其榮時亦有發生亦有雕謝桑榆既衰矣亦有發生亦有雕謝又如一歲之中四時之氣已有盛衰一時之中又有盛衰推之至如一辰須有辰初辰正辰末之差也今言天下之盛衰又且只據書傳所有聞見所及天地之廣其氣不齊又安可計譬之一國有幾家一家有幾人人之盛衰休戚未有齊者姓之所以蕃庶者由受姓之祖其流之盛也內則謂請靧請浴之類雖古人謹禮恐不如是之煩古人乘車車中不內顧不親指不遠視行則鳴環佩在車則聞和鸞式則視馬尾自然有箇君子大人氣象自五胡亂華以來惟知鞍馬為便利雖萬乘之尊猶執鞭上馬執鞭非貴人事使人謂之啞御史猶可且只是格君心正叔嘗為葬說有五事相地須使異日决不為路不置城郭不為溝渠不為貴人所奪不致耕犂所及此大要也其穴之次設如尊穴南向北首陪葬者前為兩列亦須北首各於其穴安夫婦之位坐於堂上則男東而女西卧於室中則男外而女內也推此為法觀之葬須為坎室為安若直下便以土實之則許大一塊虛土壓底四向流水必趨土虛處大不便也且棺椁雖堅恐不能勝許多土頭有失比化者無使土親膚之義心所感通者只是理也知天下事有即有無即無無古今前後至如夢寐皆無形只是有此理若言涉於形聲之類則是氣也物生則氣聚死則散而歸盡有聲則須是口既觸則須是身其質既壞又安得有此乃知無此理便不可信草木土在下因升降而食土氣動物却土在中脾在內也非土則無由生禮言惟天地之祭為越紼而行事此事難行既言越紼則是猶在殯宫於時無由致得齊又安能脫喪服衣祭服此皆難行縱天地之祀為不可廢只消使冡宰攝爾昔者英宗初即位有人以此問先生答曰古人居喪百事皆此有闕字如常特於祭祀廢之則不若無廢為愈也子厚正之曰父在為母喪則不敢見其父不敢以非禮見也今天子為父之喪以此見上帝是以非禮見上帝也故不如無祭萬物皆備於我此通人物而言禽獸與人絶相似只是不能推然禽獸之性却自然不待學不待教如營巢養子之類是也人雖是靈却椓喪處極多只有一件嬰兒飲乳是自然非學也其他皆誘之也欲得人家嬰兒善且自小不要引他留他真性待他自然亦須完得些本性須别也勿謂小兒無記性所厯事皆能不忘故善養子者當其嬰孩鞠之使得所養全其和氣乃至長而性美教之示以好惡有常至如養犬者不欲其升堂則時其升堂而朴之若既朴其升堂又復食之於堂則使孰從雖日撻而求其不升不可得也養異類且爾况人乎故養正者聖人也極須為天下之中天地之中理必相直今人所定天體只是且以眼定視所極處不見遂以為盡然向曾有於海上見南極下有大星十則今所見天體蓋未定雖似不可窮然以土圭之法驗之日月升降不過三萬里中故以尺五之表測之每一寸當一千里然而中國只到鄯善莎車已是一萬五千里若就彼觀日尚只是三萬里中也天下之或寒或暖只緣地形髙下如屋隂則寒屋陽則燠不可言於此所寒矣屋之西北又益寒伯淳在澤州嘗三次食韭黃始食懷州韭次食澤州又次食并州則知數百里間氣候爭三月矣若都以此差之則須爭半嵗如是則有在此冬至在彼夏至者雖然又沒此事只是一般為冬為夏而已貴姓子弟於飲食玩好之物之類直是一生將身伏事不懈如管城之陳醋瓶洛中之史畫匣是也更有甚事伯淳與君實嘗問觀史畫猶能題品奈煩伯淳問君實能如此與他畫否君實曰自家一箇身猶不能事持得更有甚工夫到此電者隂陽相軋雷者隂陽相擊也軋者如石相磨而火光出者電便有雷擊者是一作甚也或傳京師少聞雷恐是地有髙下也神農作本草古傳一日食藥七十死非也若小毒亦不當嘗若大毒一嘗而死矣安得生其所以得知者自然視色嗅味知得是甚氣作此藥便可攻此病須是學至此則知自至此或以謂原壤之為人敢慢聖人及母死而歌疑是莊周非也只是一箇鄉里粗鄙人不識義理觀夫子責之辭可以見其為人也一本此下云若是莊周夫子亦不敢叩之責之適足以啓其不遜爾彼亦必須有答古人適異方死不必歸葬故里如季子是也其言骨肉歸於土若夫魄氣則無不之也然觀季子所處要之非知禮者也古人之法必犯大惡則焚其尸今風俗之弊遂以為禮雖孝子慈孫亦不以為異更是公方明立條貫元不為禁如言軍人出戍許令燒焚將骨殖歸又言郊壇須三里外方得燒人則是别有焚尸之法此事只是習慣便不以為事今有狂夫醉人妄以其先人棺櫬一彈則便以為深讐巨怨及親拽其親而納之火中則略不以為怪可不哀哉英宗欲改葬西陵當是時潞公對以禍福遂止其語雖若詭對要之却濟事父子異宫者為命士以上愈貴則愈嚴故父子異宫猶今有逐位非如異居也二程遺書卷二下
