body:
  text: 二程遺書卷二十二上宋朱子編伊川語録棣初見先生問初學如何曰入德之門無如大學今之學者賴有此一篇書存其他莫如論孟先生曰古人有聲音以養其耳采色以養其目舞蹈以養其血脉威儀以養其四體今之人只有理義以養心又不知求又問如何是格物先生曰格至也言窮至物理也又問如何可以格物曰但立誠意去格物其遲速却在人明暗也明者格物速暗者格物遲先生曰孔子弟子顔子而下子貢伯温問子貢後人多以貨殖短之曰子貢之貨殖非若後世之豐財但此心未去耳周恭先字伯温潘子文問由之瑟奚為於丘之門如何曰此為子路於聖人之門有不和處伯温問子路既於聖人之門有不和處何故學能至於升堂曰子路未見聖人時乃暴悍之人雖學至於升堂終有不和處潘旻字子文先生曰古人有言曰共君一夜話勝讀十年書若一日有所得何止勝讀十年書也嘗見李初平問周茂叔云某欲讀書如何茂叔曰公老矣無及也待某只說與公初平遂聽說話二年乃覺悟先生語子良曰納拜之禮不可容易非巳所尊敬有德義服人者不可余平生只拜二人其一吕申公其一張景觀奉議也昔有數人同坐說一人短其間有二人不說問其故其一曰某曽拜他其一曰某曽受他拜王拱辰君貺初見周茂叔為與茂叔世契便受拜及坐上大風起說大畜卦一作說風天小畜卦君貺乃起曰某適來不知受却公拜今某却當納拜茂叔走避君貺此一事亦過人謝用休問當受拜不當受拜曰分已定不受乃是謝天申字用休温州人先生曰曽見韓持國說有一僧甚有所得遂招來相見語甚可愛一日謁之其僧出暫憇其室見一老行遂問其徒曰為誰曰乃僧之父今則師孫也因問僧如何待之曰待之甚厚凡晩參時必曰此人老也休來以此遂更不見之父子之分尚已顛倒矣先生曰祭祀之禮難盡如古制但以義起之可也富公問配享先生曰合葬用元妃配享用宗子之所出又問祭用三獻何如曰公是上公之家三獻大薄右之樂九變乃是九獻曰兄弟可為昭穆否曰國家弟繼兄則是繼位故可為昭穆士大夫則不可棣問禮記言有忿􅓰憂患恐懼好樂則心不得其正如何得無此數端曰非言無只言有此數端則不能以正心矣又問聖人之言可踐否曰苟不可踐何足以垂教萬世伯温問學者如何可以有所得曰但將聖人言語玩味久則自有所得當深求於論語將諸弟子問處便作已問將聖人答處便作今日耳聞自然有得孔孟復生不過以此教人耳若能於論孟中深求玩味將來涵養成甚生氣質又問顔子如何學孔子到此深邃曰顔子所以大過人者只是得一善則拳拳服膺與能屢空耳棣問去驕吝可以為屢空否曰然驕吝最是不善之總名驕只為有已吝如不能改過亦是吝伯温又問心術最難如何執持曰敬棣問㸔春秋如何㸔先生曰某年二十時㸔春秋黄贅隅問某如何㸔某答曰以傳考經之事迹以經别傳之真偽先生曰史記載宰予被殺孔子羞之嘗疑田氏不敗無縁被殺若為齊君而死是乃忠義孔子何羞之有及觀左氏乃是闞止為陳常所殺亦字子我謬誤如此用休問夫子賢於堯舜如何子曰此是說功堯舜治天下孔子又推堯舜之道而垂教萬世門人推尊不得不然伯温又問堯舜非孔子其道能傳後世否曰無孔子有甚憑據子文問師也過商也不及如論交可見否曰氣象間亦可見又曰子夏子張皆論交子張所言是成人之交子夏是小子之交又問主忠信毋友不如已者如何曰無友不忠信之人棣問使孔孟同時將與孔子並駕其說於天下邪將學孔子邪曰安能並駕雖顔子亦未達一間耳顔孟雖無大優劣觀其立言孟子終未及顔子昔孫莘老嘗問顔孟優劣答之曰不必問但㸔其立言如何凡學者讀其言便可以知其人若不知其人是不知言也又問大學知本止說聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志何也曰且舉此一事其他皆要知本聽訟則必使無訟是本也李嘉仲問裁成天地之道輔相天地之宜如何曰天地之道不能自成須聖人裁成輔相之如嵗有四時聖人春則教民播種秋則教民收穫是裁成也教民鋤耘灌溉是輔相也又問以左右民如何古之盛時未嘗不教民故立之君師設官以治之周公師保萬民與㤗卦言左右民皆是也後世未嘗教民任其自生自育只治其闘而已李處遯字嘉仲張思叔問賢賢易色如何曰見賢即變易顔色愈加恭敬棣問春秋書王如何曰聖人以王道作經故書王范文甫問杜預以謂周王如何曰聖人假周王以見意棣又問漢儒以謂王加正月上是正朔出於天子如何曰此乃自然之理不書春王正月將如何書此漢儒之惑也先生將傷寒藥與兵士因曰在墳所與莊上常合藥與人有時自笑以此濟人何其狹也然只做得這箇事思叔告先生曰前日見教授夏侯旄甚歎服曰前時來相見問後極說與他既問却不管他好惡須與盡說與之學之久染習深不是盡說力詆介甫無緣得他覺悟亦曽說介甫不知事君道理觀他意思只是要樂子之無知如上表言秋水既至因知海若之無窮大明既升豈有爝火之不熄皆是意思常要巳在人主上自右主聖臣賢乃常理何至如此又觀其說魯用天子禮樂云周公有人臣所不能為之功故得用人臣所不得用之禮樂此乃大叚不知事君大凡人臣身上豈有過分之事凡有所為皆是臣職所當為之事也介甫平居事親最孝觀其言如此其事親之際想亦洋洋自得以為孝有餘也臣子身上皆無過分事惟是孟子知之如說曽子只言事親若曽子可矣不言有餘只言可矣唐子方作一事後無聞焉亦自以為報君足矣當時所為蓋不誠意嘉仲曰陳瓘亦可謂難得矣先生曰陳瓘却未見其已夏侯旄字節夫伯温問西狩獲麟已後又有二年經不知如何曰是孔門弟子所續當時以謂必能盡得聖人作經之意及再三考䆒極有失作經意處亨仲問表記言仁右也道左也仁者人也道者義也如何曰本不可如此分别然亦有些子意思又問莫是有輕重否曰却是有隂陽也此却是儒者說語如經解只是弄文墨之士為之又問如臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣曰須是合四人之能又文之以禮樂亦可以為成人矣然而論大成則不止此如今之成人則又其次也又問介甫言堯行天道以治人舜行人道以事天如何曰介甫自不識道字道未始有天人之别但在天則為天道在地則為地道在人則為人道如言堯典於舜丹朱共工驩兠之事皆論之未及乎升黜之政至舜典然後禪舜以位四罪而天下服之類皆堯所以在天下舜所以治是何義理四凶在堯時亦皆高才職事皆脩堯如何誅之然堯已知其惡非堯亦不能知也及堯一旦舉舜於側微使四凶北面而臣之四凶不能堪遂逆命鯀功又不成故舜然後遠放之如呂刑言遏絶苖民亦只是舜孔安國誤以為堯又問伯夷叔齊逃是否曰讓不立則可何必逃父邪叔齊承父命尤不可逃也又問中子之立是否曰安得是只合招叔一作夷齊歸立則善伯温曰孔子稱之曰仁何也曰如讓國亦是清節故稱之曰仁如與季札是也札讓不立又不為立賢而去卒有殺僚之亂故聖人於其來聘書曰吴子使札來聘去其公子言其不得為公子也嘉仲問否之匪人曰㤗之時天地交㤗而萬物生凡生於天地之間者皆人道也至否之時天地不交萬物不生無人道故曰否之匪人亨仲問自反而縮如何曰縮只是直又問曰北宫黝似子夏孟施舎似曽子如何曰北宫黝之養勇也必為而已未若舎之能無懼也無懼則能守約也子夏之學雖博然不若曽子之守禮為約故以黝為似子夏舎似曽子也棣問考仲子之宫非與曰聖人之意又在下句見其初獻六羽也言初獻則見前此八羽也春秋之書百王不易之法三王以後相因既備周道衰而聖人慮後世聖人不作大道遂墜故作此一書此義門人皆不得聞惟顔子得聞嘗語之曰行夏之時乘殷之輅服周之冕樂則韶舞是也此書乃文質之中寛猛之宜是非之公也范季平問博學而篤志切問而近思仁在其中如何曰仁即道也百善之首也苟能學道則仁在其中矣亨仲問如何是近思曰以類而推亨仲問吾與汝弗如也之與比吾與㸃也之與如何曰與字則一般用處不同孔子以為吾與汝弗如也勉進學者之言使子貢喻聖人之言則勉進已也不喻其言則以為聖人尚不可及不能勉進則謬矣棣問紀裂須為君逆女如何曰逆夫人是國之重事使卿逆亦無妨先儒說親逆甚可笑且如秦君娶於楚豈可越國親迎耶所謂親迎者迎於舘耳文王迎於渭亦不是出疆遠迎周國自在渭傍先儒以此遂泥於親迎之說直至謂天子須親迎况文王親迎之時乃為公子未為君也貴一問齊王謂時子欲養弟子以萬鍾而使國人有所矜式孟子何故拒之曰王之意非尊孟子乃欲賂之爾故拒之用休問温故而知新如何可以為師曰不然只此一事可師如此等處學者極要理㑹得若只指認温故知新便可為人師則窄狹却氣象也凡㸔文字非只是要理會語言要識得聖賢氣象如孔子曰盍各言爾志而由曰願車馬衣輕裘與朋友共敝之而無憾顔子曰願無伐善無施勞孔子曰老者安之朋友信之少者懐之觀此數句便見聖賢氣象大叚不同若讀此不得見聖賢氣象他處也難見學者須要理㑹得聖賢氣象嘉仲問韶盡羙又盡善也先生曰非是言武王之樂未盡善言當時傳舜之樂則盡善盡羙傳武王之樂則未盡善耳先生曰子在齊聞韶三月不知肉味非是三月本是音字文勝質則史史乃周官府史胥徒之史史管文籍之官故曰史掌官書以贊治文雖多而不知其意文勝正如此也又曰學者須要知言周伯温問回也三月不違仁如何曰不違處只是無纖毫私意一作欲下同有少私意便是不仁又問博施濟衆何故仁不足以盡之曰既謂之博施濟衆則無盡也堯之治非不欲四海之外皆被其澤遠近有間勢或不能及以此觀之能博施濟衆則是聖也又問孔子稱管仲如其仁何也曰但稱其有仁之功也管仲其初事子紏所事非正春秋書公伐齊納紏稱紏而不稱子紏不當立者也不當立而事之失於初也及其敗也可以死亦可以無死與人同事而死之理也知始事之為非而改之義也召忽之死正也管仲之不死權其宜可以無死矣故仲尼稱之曰如其仁謂其有仁之功也使管仲所事子紏正而不死後雖有大功聖人豈復稱之耶若以聖人不觀其死不死之是非而止稱其後來之是非則甚害義理也又問如何是仁曰只是一箇公字學者問仁則常教他將公字思量又問鄭人來輸平曰更成也國君而輕變其平反復可罪又問終隱之世何以不相侵伐曰不相侵伐固足稱然輕欲變平是甚國君之道又問宋穆公立與夷是否曰大不是左氏之言甚非穆公却是知人但不立公子憑是其知人處若以其子享之為知人則非也後來卒至宋亂宣公行私惠之過也一作罪先生曰凡㸔語孟且須熟玩味將聖人之言語切已不可只作一塲話說人只㸔得此二書切已終身儘多也棣問退而省其私亦足以發如何曰孔子退省其心中亦足以開發也又問豈非顔子見聖人之道無疑歟曰然也孔子曰一以貫之曽子便理㑹得遂曰唯其他門人便須辨問也又問祭如在祭神如神在曰祭如在言祭祖宗祭神如神在則言祭神也祭先主於孝祭神主於恭敬又問祭起於聖人之制作以教人否曰非也祭先本天性如豺有祭獺有祭鷹有祭皆是天性豈有人而不如鳥乎聖人因而裁成禮法以教人耳又問今人不祭高祖如何曰高祖自有服不祭甚非某家却祭高祖又問天子七廟諸侯五廟大夫三士二如何曰此亦只是禮家如此說又問今士庶家不可立廟當如何也庶人祭於寢今之正㕔是也凡禮以義起之可也如富家及士置一影堂亦可但祭時不可用影又問用主如何曰白屋之家不可用只用牌子可矣如某家主式是殺諸侯之制也大凡影不可用祭若用影祭須無一毫差方可若多一莖鬚便是别人棣又問克已復禮如何是仁曰非禮處便是私意既是私意如何得仁凡人須是克盡已私後只有禮始是仁處謝用休問入太廟每事問曰雖知亦問敬謹之至又問旅祭之名如何曰古之祭名皆有義如旅亦不可得而知棣問如儀禮中禮制可考而信否曰信其可信如言昏禮云問名納吉納幣皆須卜豈有問名了而又卜苟卜不吉事可已邪若此等處難信也又嘗疑卜郊亦非不知果如何曰春秋却有卜郊但卜上辛不吉則當卜中辛中辛又不吉則當便用下辛不可更卜也如魯郊三卜四卜五卜至於不郊非禮又問三年一郊與古制如何曰古者一年之間祭天甚多春則因民播種而祈榖夏則恐旱暵而大雩以至秋則明堂冬則圓丘皆人君為民之心也凡人子不可一日不見父母國君不可一嵗不祭天豈有三年一親郊之禮用休問北郊之禮曰北郊不可廢元祐時朝廷議行只為五月間天子不可服大裘皆以為難行不知郊天郊地禮制自不同天是資始故凡用物皆尚純藉用藁秸器用陶匏服用大裘是也地則資生安可亦用大裘當時諸公知大裘不可服不知别用一服向日宣仁山陵吕汲公作大使某與坐說話次吕相責云先生不可如此聖人當時不曽如此今先生教朝廷怎生則是答曰相公見聖人不如此處怎生聖人固不可跂及然學聖人者不可輕易㸔了聖人只如今朝廷一北郊禮不能行得又無一人道西京有程某復問一句也吕公及其壻王某等便問北郊之禮當如何答曰朝廷不曽來問今日豈當對諸公說邪是時蘇子瞻便據昊天有成命之詩謂郊祀同文潞公便謂譬如祭父母作一處何害曰此詩冬至夏至皆歌豈不可邪郊天地又與共祭父母不同也此是報本之祭須各以類祭豈得同時邪又問六天之說曰此起於讖書鄭𤣥之徒從而廣之甚可笑也帝者氣之主也東則謂之青帝南則謂之赤帝西則謂之白帝北則謂之黒帝中則謂之黄帝豈有上帝而别有五帝之理此因周禮言祀昊天上帝而後又言祀五帝亦如之故諸儒附此說又問周禮之說果如何曰周禮中說祭祀更不可考證六天之說正與今人說六子是乾坤退居不用之時同也不知乾坤外甚底是六子譬如人之四肢只是一體爾學者大惑也又問郊天冬至當卜邪曰冬至祭天夏至祭地此何待卜邪又曰天與上帝之說如何曰以形體言之謂之天以主宰言之謂之帝以功用言之謂之鬼神以妙用言之謂之神以性情言之謂之乾又問易言知鬼神之情狀果有情狀否曰有之又問既有情狀必有鬼神矣曰易說鬼神便是造化也又問名山大川能興雲致雨何也曰氣之蒸成耳又問既有祭則莫須有神否曰只氣便是神也今人不知此理纔有水旱便去廟中祈禱不知雨露是甚物從何處出復於廟中求耶名山大川能興雲致雨却都不說著却於山川外木土人身上討雨露木土人身上有雨露耶又問莫是人自興妖曰只妖亦無皆人心興之也世人只因祈禱而有雨遂指為靈驗耳豈知適然某常至泗州恰值大聖見及問人曰如何形狀一人曰如此一人曰如彼只此可騐其妄興妖之人皆若此也昔有朱定亦嘗來問學但非信道篤者曽在泗州守官值城中火定遂使兵士舁僧伽避火某後語定曰何不舁僧伽在火中若為火所焚即是無靈驗遂可解天下之惑若火遂滅因使天下人尊敬可也此時不做事待何時邪惜乎定識不至此貴一問日月有明容光必照曰日月之明有本故凡容光必照君子之道有本故無不及也用休問老者安之少者懐之朋友信之曰此數句最好先觀子路顔淵之言後觀聖人之言分明聖人是天地氣象孟敦夫問莊子齊物論如何曰莊子之意欲齊物理耶物理從來齊何待莊子而後齊若齊物形物形從來不齊如何齊得此意是莊子見道淺不柰胸中所得何遂著此論也伯温問祭用祝文否曰某家自來相承不用今待用也又問有五祀否曰否祭此全無義理釋氏與道家說鬼神甚可笑道家狂妄尤甚以至說人身上耳目口鼻皆有神周伯温問至大至剛以直以此三者養氣否曰不然是氣之體如此又問養氣以義否曰然又問配義與道如何曰配道言其體配義言其用又問我知言我善養吾浩然之氣如何曰知言然後可以養氣蓋不知言無以知道也此是答公孫丑夫子烏乎長之問不欲言我知道故以知言養氣答之又問夜氣如何曰此只是言休息時氣清耳至平旦之氣未與事接亦清只如小兒讀書早晨便記得也又問孔子言血氣如何曰此只是大凡言血氣如禮記說南方之强是也南方人柔弱所謂强者是理義之强君子居之北方人强悍所謂强者是血氣之强故小人居之凡人血氣須要理義勝之又問吾不復夢見周公如何曰孔子初欲行周公之道至於夢寐不忘及晚年不遇哲人將萎之時自謂不復夢見周公矣因此說夢便可致思思聖人與衆人之夢如何夢是何物高宗夢得說如何曰此是誠意所感故形於夢又問金縢周公欲代武王死如何曰此只是周公之意又問有此理否曰不問有此理無此理只是周公人臣之意其辭則不可信只是本有此事後人自作文足此一篇此事與舜喜象意一般須詳㸔舜周公用心處尚書文顛倒處多如金縢尤不可信高宗好賢之意與易姤卦同九五以杞包𤓰含章有隕自天杞生於最高處𤓰羙物生低處以杞包𤓰則至尊逮下之意也既能如此自然有賢者出故有隕自天也後人遂有天祐生賢佐之說棣問福善禍滛如何曰此自然之理善則有福滛則有禍又問天道如何曰只是理理便是天道也且如說皇天震怒終不是有人在上震怒只是理如此又問今人善惡之報如何曰幸不幸也知者樂水仁者樂山言其體動靜如此知者樂所一作凡運用處皆樂仁者壽以静而壽仁可以兼知知不可以兼仁如人之身統而言之則只謂之身别而言之則有四支世間術數多惟地理之書最無義理祖父葬時亦用地理人尊長皆信惟先兄與某不然後來只用昭穆法或問憑何文字擇地曰只昭穆兩字作眼是地理書也但風調地厚處足矣某用昭穆法葬一穴既而尊長召地理人到葬處曰此是商音絶處何故如此下穴某應之曰固知是絶處且試㸔如何某家至今人已數倍之矣在講筵時曽說與温公云更得范純夫在筵中尤好温公彼時一言亦失却道他見修史自有門路某應之曰不問有無門路但筵中須得他温公問何故某曰自度少温潤之氣純夫色温而氣和尤可以開陳是非道人主之意後來遂除侍講用休問井田今可行否曰豈有古可行而今不可行者或謂今人多地少不然譬諸草木上上著得許多便生許多天地生物常相稱豈有人多地少之理嘉仲問封建可行否曰封建之法本出於不得已桞子厚有論亦窺測得分數秦法固不善亦有不可變者罷侯置守是也伯温問夢帝與我九齡曰與齡之說不可信安有壽數而與人移易之理棣問孔子夢坐奠於兩楹之間如何曰於理有之陳貴一問人之壽數可以力移否曰蓋有之棣問如今人有養形者是否曰然但甚難世間有三件事至難可以奪造化之力為國而至於祈天永命養形而至於長生學而至於聖人此三事功夫一般分明人力可以勝造化自是人不為耳故闗朗有周能過歴秦止二世之說誠有此理棣問孔孟言性不同如何曰孟子言性之善是性之本孔子言性相近謂其禀受處不相遠也人性皆善所以善者於四端之情可見故孟子曰是豈人之情也哉至於不能順其情而悖天理則流而至於惡故曰乃若其情則可以為善矣若順也又問才出於氣否曰氣清則才善氣濁則才惡禀得至清之氣生者為聖人禀得至濁之氣生者為惡人如韓愈所言公都子所問之人是也然此論生知之聖人若夫學而知之氣無清濁皆可至於善而復性之本所謂堯舜性之是生知也湯武反之是學而知之也孔子所言上智下愚不移亦無不移之理所以不移只有二自暴自棄是也又問如何是才曰如材植是也譬如木曲直者性也可以為輪轅可以為梁棟可以為榱桷者才也今人說有才乃是言才之羙者才乃人之資質循性修之雖至惡可勝而為善又問性如何曰性即理也所謂理性是也天下之理原其所自未有不善喜怒哀樂未發何嘗不善發而中節則無往而不善凡言善惡皆先善而後惡言吉凶皆先吉而後凶言是非皆先是而後非又問佛說性如何曰佛亦是說本善只不合將才做縁習又問說生死如何曰譬如水漚亦有些意思又問佛言死生輪回可否曰此事說有說無皆難須自見得聖人只一句盡斷了故對子路曰未知生焉知死佛亦是西方賢者方外山林之士但為愛脇持人說利害其實為利耳其學譬如以管窺天謂他不見天不得只是不廣大問䘮止於三年何義曰嵗一周則天道一變人心亦隨以變惟人子孝於親至此猶未忘故必至於再變猶未忘又繼之以一時伯温問盡其心則知其性知其性則知天矣如何曰盡其心者我自盡其心能盡心則自然知性知天矣如言窮理盡性以至於命以序言之不得不然其實只能窮理便盡性至命也又問事天曰奉順之一本無之字而已富公嘗語先生曰先生最天下閑人曰某做不得天下閑人相公將誰作天下最忙人曰先生試為我言之曰禪伯是也曰禪伯行住坐卧無不在道何謂最忙曰相公所言乃忙也今市井賈販人至夜亦息若禪伯之心何時休息先生嘗與一官貟一僧同㑹一官貟說條貫既退先生問僧曰曉之否邪僧曰吾釋子不知條貫曰賢將竟一作作三界外事邪天下豈有二理貴一問興於詩如何曰古人自小諷誦如今謳唱自然善心生而興起今人不同雖老師宿儒不知詩也人而不為周南召南此乃為伯魚而言蓋恐其未盡治家之道爾欲治國治天下須先從修身齊家來不然則猶正墻面而立或問伯夷叔齊不念舊惡如何曰觀其清處其衣冠不正便望望然去之可謂隘矣疑若有惡矣然却能不念舊惡故孔子特發明其情武王伐紂伯夷只知君臣之分不可不知武王順夭命誅獨夫也問武王果殺紂否曰武王不曽殺紂人只見洪範有殺紂字爾武王伐紂而紂自殺亦須言殺紂也向使紂曽殺帝乙則武王却須殺紂也石曼卿有詩言伯夷恥居湯武干戈地來死唐虞揖讓墟亦有是理首陽乃在河中府虞鄉也問不食周粟如何曰不食禄耳用休問陳文子之清令尹子文之忠使聖人為之則是仁否曰不然聖人為之亦是清忠鄉黨分明畫出一箇聖人出降一等是自堂而出降階當此時放氣不屏故逞顔色復其位復班位之序過位是過君之虚位享禮有容色此享燕賓客之時有容色者蓋一在於莊則情不通也私覿則又和悅矣皆孔子為大夫出入起居之節緇衣羔裘素衣麑裘黄衣狐裘各有用不必云緇衣是朝服素衣是䘮服黄衣是蜡服麑是鹿兒齊必有明衣布欲其潔明衣如今凉衫之類緇衣明衣皆惡其文之著而為之也非帷裳必殺之帷裳固不殺矣其他衣裳亦殺也吉月必朝服而朝者子在魯致仕時月朔朝也鄉人儺古人以驅厲氣亦有此理天地有厲氣而至誠作威嚴以驅之式凶服負版盖在車中居敬則自然簡居簡而行簡則似乎簡矣然乃所以不簡蓋先有心於簡則多却一簡矣居敬則心中無物是乃簡也仁者先難而後獲何如曰有為而作皆先獲也如利仁是也古人惟知為仁而已今人皆先獲也又問述而不作如何曰此聖人不得位止能述而已公山弗擾佛肸召子欲往者聖人以天下無不可與有為之人亦無不可改過之人故往然終不往者知其必不能故也子路遂引親於其身為不善為問孔子以堅白匏𤓰為對繫而不食者匏𤓰繫而不為用之物不食不用之義也匏𤓰亦不食之物故因此取義也唐棣之華乃千葉郁李本不偏反喻如兄弟今乃偏反則喻兄弟相失也兄弟相失豈不爾思但居處相遠耳孔子曰未之思也夫何遠之有蓋言權實不相遠耳權之為義猶稱錘也能用權乃知道亦不可言權便是道也自漢以下更無人識權字我不欲人之加諸我吾亦欲無加諸人正中庸所謂施諸已不願亦勿施於人蓋有不知而作之者凡人作事皆不知惟聖人作事無不知或問善人之為邦如何可勝殘去殺曰只是能使人不為不善善人不踐迹亦不入於室之人也不踐迹是不踐已前為惡之迹然未入道也又問王者必世而後仁何如曰三十曰壯有室之時父子相繼為一世王者之効則速矣又問善人教民七年亦可以即戎矣曰教民戰至七年則可以即戎矣凡㸔文字如七年一世百年之事皆當思其如何作為乃有益問小畜曰小畜是所畜小及所畜雖大而少皆小畜也不必專言君畜臣臣畜君問大德不踰閑小德出入可也曰大德是大處小徳是小處出入如可以取可以無取之類是也又問言不必信行不必果是出入之事否曰亦是也然不信乃所以為信不果乃所以為果范公甫將赴河清尉問到官三日例須謁廟如何曰正者謁之如社稷及先聖是也其他古先賢哲亦當謁之又問城隍當謁否曰城隍不典土地之神社稷而已何得更有土地邪又問只恐駭衆爾曰唐狄仁傑廢江浙間滛祠千七百處所存惟吴大伯伍子胥二廟爾今人做不得以謂時不同是誠不然只是無狄仁傑耳當時子胥廟存之亦無謂暢中伯問宻雲不雨自我西郊曰西郊隂所凡雨須陽倡乃成隂倡則不成矣今雲過西則雨過東則否是其義也所謂尚往者隂自西而徃不待陽矣凡㸔文字先須曉其文義然後可求其意未有文義不曉而見意者也學者㸔一部論語見聖人所以與弟子許多議論而無所得是不易得也讀書雖多亦奚以為子文問民可使由之不可使知之曰不可使知之者非民不足與知也不能使知之爾或問諸葛孔明亦無足取大凡殺一不辜而得天下則君子不為亮殺戮甚多也先生曰不然所謂殺一不辜非此之謂亮以天子之命誅天下之賊雖多何害周伯温見先生先生曰從來覺有所得否學者要自得六經浩眇乍來難盡曉且見得路逕後各自立得一箇門庭歸而求之可矣伯温問如何可以自得曰思思曰睿睿作聖須是於思慮間得之大抵只是一箇明理棣問學者見得這道理後篤信力行時亦有見否曰見亦不一果有所見後和信也不要矣又問莫是既見道理皆是當然否曰然凡理之所在東便是東西便是西何待信凡言信只是為彼不信故見此是信爾孟子於四端不言信亦可見矣伯温又問孟子言心性天只是一理否曰然自理言之謂之天自禀受言之謂之性自存諸人言之謂之心又問凡運用處是心否曰是意也棣問意是心之所發否曰有心而後有意又問孟子言心出入無時如何曰心本無出入孟子只是據操舎言之伯温又問人有逐物是心逐之否曰心則無出入矣逐物是欲二程遺書卷二十二上欽定四庫全書二程遺書卷二十二下宋朱子編附雜録後問鄭伯以璧假許田左氏以謂易祊田黎淳以隱十一年入許之事破左氏謂許田是許之田如何曰左氏說是也既是許之田如何却假之於魯十一年雖入許許未嘗滅許叔已奉祀也問桓四年無秋冬如何曰聖人作經備四時也如桓不道背逆天理故不書秋冬春秋只有兩處如此皆言其無天理用休問哀公問社於宰我之事曰社字本是主字文誤也宰我不合道使民戰慄故仲尼有後來言語先生曰誠不以富亦祗以異本不在是惑也之後乃在齊景公有馬千駟之上文誤也問揖讓而升下而飲是下堂飲否曰古之制罰爵皆在堂下又問唯不勝下飲否曰恐皆下堂但勝者飲不勝者也思叔問荀彧如何曰彧才高識不足孟純問何顒常稱其有王佐才曰不是王佐才嘉仲問如霍光蕭曹之徒如何曰此可為漢時王佐才棣問史稱董仲舒是王佐才如何曰仲舒是言其學術若論至王佐才須是伊周其次莫如張良諸葛亮陸宣公問夏逆婦姜於齊何故便書婦曰此是文公在䘮服將滿之時納幣故聖人於其逆時便成之為婦罪其居䘮而取也春秋微顯闡幽乃在如此處凡事分明可見者聖人更不微文以見意只直書而已如桓三年及宣元年逆女皆分明在䘮服中成昏故只書逆女也文公則但在䘮服納幣至逆女却在四年聖人欲顯其居䘮納幣之罪故書婦姜便成之為婦也其意言雖至四年方逆女其實與䘮昏同也先生曰周公之於兄舜之於弟皆一類觀其用心為如何哉推此心以待人亦只如此然有差等矣問春秋書日食如何曰日食有定數聖人必書者蓋欲人君因此恐懼修省如治世而有此變則不能為灾亂世則為灾矣人血氣盛雖遇寒暑邪穢不能為害其氣血衰則為害必矣問熒惑退舎果然否曰觀宋景公不能至是問反風如何曰亦未必然成王一中才之主聖人為之臣尚幾不能保金縢書成王亦安知只是二公知之因此以示王弭變非有動天之德不能至也問四岳一人否曰然以二十二人數考之固然觀對堯言衆則曰僉四岳則曰岳亦可見也晉侯之執曹伯是否曰曹伯有弑逆之罪即執之是也晉與之同盟而後執之故書曹伯而不去其爵晉侯不奪爵未至於奪爵也歸自京師則言若無罪而歸罪天王不能行爵賞也凡言歸者易辭歸之者强歸之辭問龍能有能無如何曰安能無但能隱見耳所以能隱見者為能屈伸爾非特龍凡小物甚有能屈伸者問書至如何曰告廟而書亦有不縁告廟而書者又問還復曰還只是歸復如今所謂倒廻又問隱皆不書至曰告廟之禮不行先生指庭下羣雀示諸弟子曰地上原有物則羣雀集而食之人故與之則不即來食須是久乃集蓋人有意在爾若負粟者適遺下則便集而食矣問禘於太廟用致夫人是哀姜否曰文姜也文姜與桓公如齊終啓弑桓之惡其罪大矣故聖人於其遜於齊致於廟皆止曰夫人而去其姜氏以見大義與國人已絶矣然弑桓之惡文姜實不知但縁文姜而啓爾莊公母子之情則不絶故書夫人焉文姜遜齊止稱夫人此禘致於廟亦只稱夫人則是文姜明矣此最是聖人用法致嚴處可以見大義又以見子母之義本朝太祖皇帝立法極合春秋之義法中有夫因婦而被殺者以婦為首正與此合問禘是如何曰禘是天子之祭五年一禘祭其祖之所自出也又問祫曰祫合祭也諸侯亦祭祫只是祠禴嘗烝之祭為廟禮煩故每年於四祭中三祭合食於祖廟惟春則徧祭諸廟也問祧廟如何曰祖有功宗有德文武之廟永不祧也所祧者文武以下廟曰兄弟相繼如何曰此皆自立廟然如吴太伯兄弟四人相繼如何若上更有二廟不祧則遂不祭祖矣故廟雖多亦不妨祧只祧得服絶者以義起之可也如本朝太祖太宗皆萬世不祧之廟河東閩浙諸處皆太宗取之無可祧之理問孀婦於理似不可取如何曰然凡取以配身也若取失節者以配身是已失節也又問或有孤孀貧窮無託者可再嫁否曰只是後世怕寒餓死故有是說然餓死事極小失節事極大或問漢高祖可比太祖否曰漢高祖安能比太祖太祖仁愛能保全諸節度使極有術天下既定皆召歸京師節度使竭土地而還所畜不貲多財亦可患也太祖逐人賜地一方蓋第所費皆數萬又嘗賜宴酒酣乃宣各人子弟一人扶歸太祖送至殿門謂其子弟曰汝父各許朝廷十萬緡矣諸節度使醒問所以歸不失禮於上前否子弟各以緡事對翌日各以表進如數此皆英雄御臣之術宣仁山陵時㑹吕汲公於陵下公曰國家飬兵乃良䇿凡四方有警百姓皆不知先生曰相公豈不見景德中事耶驅良民刺面以至及士人蓋有限之兵忽損三五千人將何自而補要知兵須是出於民可也太祖初有天下士卒人許賞二百緡及即位以無錢久不賜士卒至有題詩於後苑太祖一日遊後苑見詩乃曰好詩遂索筆和之以故每於郊時各賜賞給至今因以為例不能去或問今欲新兵不給郊賞數十年後可革否曰新兵本無此望不與可也不數十年可革思叔問孟子言善推其所為是歟曰聖人則不待推霍光廢昌邑其始乃光之罪當時不合立之只被見是武帝孫擔當不過須立之也此又與伊尹立太甲不同也伊尹知太甲必能思庸故放之桐三年當時湯既崩太丁未立而死外丙方二嵗仲壬方四嵗故須立太甲也太甲又有思庸之資若無是質伊尹亦不立也史記以孟子二年四年之言遂言湯崩六年之後太甲方立不知年只是嵗字頃吕望之曽問及此亦曽說與他後來又㸔禮見王廵狩問百年者益知書傳亦稱嵗為年二年四年之說縱别無可證理亦必然且㸔尚書分明說成湯既沒太甲元年又㸔王徂桐宫居憂三年終能思庸伊尹以服冕奉嗣王可知凡文字理是後不必引證問東向西向以南方為上南向北向以西方為上如何曰此言坐位非祭祀昭穆之位昭穆之位太祖面東左昭右穆自内以及外古之坐位皆以右為尊范文甫問韓信得廣武君使東向坐而西面師事之是否曰今則以左為尊是或一道也問僑如以夫人姜氏至書以如何曰當然此却言公子能主其事以夫人至也如書公與夫人如齊只書與而不書及却有意蓋言及則主在公也言與則公不能制明矣孔子願乘桴浮於海居九夷皆以天下無一賢君道不行故言及此爾子路不知其意便謂聖人行矣無所取材言其不能斟酌也問肆大眚如何曰大眚而肆之其失可知書言眚灾肆赦者言眚則肆之眚是自作之罪也灾則赦之灾是過失之事故也凡赦何嘗及得善人諸葛亮在蜀十年不赦審此爾兵强弱亦有時徃時陳許號勁兵今陳許最近畿亦不聞勁今河東最盛學者不可不通世務天下事譬如一家非我為則彼為非甲為則乙為子路片言可以折獄故魯願與小邾射盟而射止願得季路一言乃其證也曰予欲無言蓋為子貢多言故告之以此問務民之義曰如項梁立義帝謂從民望者是也棣問天王使宰咺來歸惠公仲子之賵如何答曰書天王者以春秋之始周方書此一件事且存天王之號以正名分非謂此事當理而書也故書宰之名以示貶仲子是惠公冄娶之夫人諸侯無再娶理故只書惠公仲子不稱夫人也又問左氏以為未薨預凶事非禮也曰不然豈有此理夫人子氏自是隱公之妻不干仲子事又問再娶皆不合禮否曰大夫以上無再娶禮凡人為夫婦時豈有一人先死一人再娶一人再嫁之約只約終身夫婦也但自大夫以下有不得已再娶者蓋縁奉公姑或主内事爾如大夫以上至諸侯天子自有嬪妃可以供祀禮所以不許再娶也春秋書盟如何先王之時有盟否或疑周官司盟者曰先王之時所以有盟者亦因民而為之未可非司盟也但春秋時信義皆亡日以盟詛為事上不遵周王之命春秋書皆貶也唯胥命之事稍為近正故終齊衞二君之世不相侵伐亦可喜也紀子伯莒子盟于宻此是伯上脫一字也必是三人同盟若不是脫字别無義禮齊高固來逆叔姬公榖有子字如何曰子者言是公女其他則姊妹之類也又問丁丑夫人姜氏入何故獨書曰入曰此娶仇女故書入言宗廟不受也又問公子結媵陳人之婦于鄄遂及齊侯宋公盟曰此是本去媵婦却遂及諸侯盟聖人罪之之意在遂事也又問祭公來遂逆王后于紀如何曰此祭公受命逆后却因過魯遂行朝㑹之禮聖人深罪之故先書其來使若以朝魯為主而逆后為遂也曰或說逆王后亦使魯為主如何曰築王姬之舘單伯送王姬之類皆是魯為主蓋只是王姬下嫁則同姓諸侯為主如逆王后無使諸侯為主之理問獨宋共姬書首尾最詳何故曰賢伯姬故詳録之昔胡先生常說伯姬是婦人中伯夷為其不下堂而死也曰如成八年九年十年三書來媵皆以伯姬之故書否曰然媵之禮如何曰古有之又問漢儒談春秋灾異如何曰自漢以來無人如此董仲舒說天人相與之際亦略見些模様只被漢儒推得大過亦何必說某事有某應二程遺書卷二十二下
