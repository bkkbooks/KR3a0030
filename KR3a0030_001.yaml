body:
  text: 二程遺書卷一宋朱子編端伯𫝊師說伯淳先生嘗語韓持國曰如說妄說幻為不好底性則請别尋一箇好底性來換了此不好底性著道即性也若道外尋性性外尋道便不是聖賢諭天徳葢謂自家元是天然完全自足之物若無所汚壊即當直而行之若小有汚壊即敬以治之使復如舊所以能使如舊者葢為自家本質元是完足之物若合修治而修治之是義也若不消修治而不修治亦是義也故常簡易明白而易行禪學者總是强生事至如山河大地之說是他山河大地又干你何事至如孔子道如日星之明猶患門人未能盡曉故曰予欲無言如顔子則便黙識其他未免疑問故曰小子何述又曰天何言哉四時行焉百物生焉可謂明白矣若能於此言上看得破便信是會禪也非是未尋得葢實是無去處說此理本無二故也王彦霖問立徳進徳先後曰此有二有立而後進有進而至於立立而後進則是卓然一作立定後有所進立則是三十而立進則是吾見其進也有進而至於立則進而至於立道處也此進是可與適道者也立是可與立者也王彦霖以為人之為善須是他自肯為時方有所得亦難强曰此言雖是人須是自為善然又不可為如此却都不管他葢有教焉修道之謂教豈可不修王彦霖問道者一心也有曰仁者不憂有曰知者不惑有曰勇者不懼何也曰此只是名其徳爾其理一也得此道而不憂者仁者之事也因其不憂故曰此仁也知勇亦然不成却以不憂謂之知不惑謂之仁也凡名其徳千百皆然但此三者逹道之大也蘇季明嘗以治經為𫝊道居業之實居常講習只是空言無益質之兩先生伯淳先生曰修辭立其誠不可不子細理會言能修省言辭便是要立誠若只是修飾言辭為心只是為偽也若修其言辭正為立己之誠意却是體當自家敬以直内義以方外之實事道之浩浩何處下手惟立誠才一作方有可居之處有可居之處則可以修業也終日乾乾大小大事却只是忠信所以進徳為實下手處修辭立其誠為實修業處正叔先生曰治經實學也譬諸草木區以别矣道之在經大小遠近髙下精粗森列於其中譬諸日月在上有人不見者一人指之不如衆人指之自見也如中庸一卷書自至理便推之於事如國家有九經及厯代聖人之迹莫非實學也如登九層之臺自下而上者為是人患居常講習空言無實者葢不自得也為學治經最好苟不自得則盡治五經亦是空言今有人心得識逹所得多矣有雖好讀書却患在空虚者未免此弊天地生一世人自足了一世事但恨人不能盡用天下之才此其不能大治天地生物各無不足之理常思天下君臣父子兄弟夫婦有多少不盡分處先生常論克己復禮韓持國曰道上更有甚克莫錯否曰如公之言只是說道也克己復禮乃所以為道也更無别處克己復禮之為道亦何傷乎公之所謂道也如公之言即是一人自指其前一物曰此道也他本無可克者若知道與己未嘗相離則若不克己復禮何以體道道在已不是與已各為一物可跳身而入者也克己復禮非道而何至如公言克不是道亦是道也實未嘗離得故曰可離非道也理甚分明又曰道無真無假曰既無真又無假却是都無物也到底須是是者為真不是者為假便是道大小大分明古人見道分明故曰吾斯之未能信從事於斯無是餒也立之斯立佛學一作氏只是以生死恐動人可怪二千年來無一人覺此是被他恐動也聖賢以生死為本分事無可懼故不論死生佛之學為怕死生故只管說不休下俗之人固多懼易以利動至如禪學者雖自曰異此然要之只是此箇意見皆利心也籲曰此學不知是本來以公心求之後有此蔽或本只以利心上得之曰本是利心上得來故學者亦以利心信之莊生云不怛化者意亦如此也如楊墨之害在今世則已無之如道家之說其害終小惟佛學今則人人談之瀰漫滔天其害無涯舊嘗問學佛者傳燈録㡬人云千七百人某曰敢道此千七百人無一人達者果有一人見得聖人朝聞道夕死可矣與曾子易簀之理臨死須尋一尺布帛裹頭而死必不肯削髪胡服而終是誠無一人逹者禪者曰此迹也何不論其心曰心迹一也豈有迹非而心是者也正如兩脚方行指其心曰我本不欲行他兩脚自行豈有此理葢上下本末内外都是一理也方是道莊子曰遊方之内遊方之外者方何嘗有内外如此則是道有隔斷内面是一處外面又别是一處豈有此理學禪者曰草木鳥獸之生亦皆是幻曰子以為生息於春夏及至秋冬便却變壊便以為幻故亦以人生為幻何不付與他物生死成壊自有此理何者為幻天地之間非獨人為至靈自家心便是草木鳥獸之心也但人受天地之中以生爾一本此下云人與物但氣有偏正耳獨隂不成獨陽不生得隂陽之偏者為鳥獸草本夷狄受正氣者人也後漢人之名節成於風俗未必自得也然一變可以至道先王之世以道治天下後世只是以法把持天下語仁而曰可謂仁之方也巳者何也葢若便以為仁則反使不識仁只以所言為仁也故但曰仁之方則使自得之以為仁也忠信所以進徳終日乾乾君子當終日對越在天也葢上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神其命於人則謂之性率性則謂之道修道則謂之教孟子去其中又發揮出浩然之氣可謂盡矣一作性故說神如在其上如在其左右大小大事而只曰誠之不可揜如此夫徹上徹下不過如此形而上為道形而下為器須著如此說器亦道道亦器但得道在不繋今與後己與人富貴驕人固不善學問驕人害亦不細義理與客氣常相勝又看消長分數多少為君子小人之别義理所得漸多則自然知得客氣消散得漸少消盡者是大賢興於詩立於禮自然見有著力處至成於樂自然見無所用力一本云興於詩便須見有著力處立於禮便須見有得力處成於樂便須見有無所用力處若不能存養只是說話韓愈亦近世豪傑之士如原道中言語雖有病然自孟子而後能將許大見識尋求者才見此人至如斷曰孟氏醇乎醇又曰荀與楊擇焉而不精語焉而不詳若不是佗見得豈千餘年後便能斷得如此分明也如楊子看老子則謂言道徳則有取至如槌提仁義絶滅禮學則無取若以老子剖斗折衡聖人不死大盗不止為救時反本之言為可取却尚可恕如老子言失道而後徳失徳而後仁失仁而後義失義而後禮則自不識道已不成言語却言其道徳有取則葢自是楊子已不見道豈得如愈也予天民之先覺者謂我乃天生此民中盡得民道而先覺者也既為先覺之民豈可不覺未覺者及彼之覺亦非分我之所有以予之皆彼自有此義理我但能覺之而已聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上逹也先生嘗語王介甫曰公之談道正如説十三級墖上相輪對望而談曰相輪者如此如此極是分明如某則戅直不能如此直入墖中上尋相輪辛勤登攀邐迤而上直至十三級時雖猶未見相輪能如公之言然某却實在墖中去相輪漸近要之須可以至也至相輪中坐時依舊見公對墖談説此相輪如此如此介甫只是説道云我知有箇道如此如此只佗説道時已與道離佗不知道只説道時便不是道也有道者亦一作言自分明只作尋常本分事説了孟子言堯舜性之舜由仁義行豈不是尋常説話至於易只道箇立人之道曰仁與義則和性字由字也不消道自己分明隂陽剛柔仁義只是此一箇道理嘉禮不野合野合則秕稗也故生不野合則死不墓祭葢燕饗祭祀乃宫室中事後世習俗廢禮有踏青藉草飲食故墓亦有祭如禮望墓為壇並墓人為墓祭之尸亦有時為之非經禮也後世在上者未能制禮則隨俗未免墓祭既有墓祭則祠堂之類亦且為之可也禮經中既不説墓祭即是無墓祭之文也張横渠於墓祭合一分食而祭之故告墓之文有曰奔走荆棘殽亂桮盤之列之語此亦未盡也如獻尸則可合而為一鬼神如何可合而為一墓人墓祭則為尸舊説為祭后土則為尸者非也葢古人祭社之外更無所在有祭后土之禮如今城隍神之類皆不當祭家祭凡拜皆當以兩拜為禮今人事生以四拜為再拜之禮者葢中間有問安之事故也事死如事生誠意則當如此至如死而問安却是瀆神若祭祀有祝有告謝神等事則自當有四拜六拜之禮古人祭祀用尸極有深意不可不深思葢人之魂氣既散孝子求神而祭無尸則不饗無主則不依故易於渙萃皆言王假有廟即渙散之時事也魂氣必求其類而依之人與人既為類骨肉又為一家之類已與尸各既已潔齊至誠相通以此求神宜其饗之後世不知此一本有道字直以尊卑之勢遂不肯行爾古人為尸者亦自處如何三代之末已是不得已而廢宗子繼别為宗言别則非一也如别子五人五人各為大宗所謂兄弟宗之者謂别子之子繼襧者之兄弟宗其小宗子也凡人家法須令毎有族人遠来則為一會以合族雖無事亦當毎月一為之古人有花樹韋家宗會法可取也然族人毎有吉凶嫁娶之類更須相與為禮使骨肉之意常相通骨肉日踈者只為不相見情不相接爾世人多慎於擇壻而忽於擇婦其實壻易見婦難知所繋甚重豈可忽哉籲問毎常遇事即能知操存之意無事時如何存養得熟曰古之人耳之於樂目之於禮左右起居盤盂几杖有銘有戒動息皆有所養今皆廢此獨有理義之養心耳但存此㴠養意乆則自熟矣敬以直内是㴠養意言不莊不敬則鄙詐之心生矣貌不莊不敬則怠慢之心生矣漢儒如毛萇董仲舒最得聖賢之意然見道不甚分明下此即至楊雄規模窄狹道即性也言性已錯更何所得漢䇿賢良猶是人舉之如公孫𢎞者猶強起之乃就對至如後世賢良乃自求舉耳若果有曰我心只望廷對欲直言天下事則亦可尚矣若志在富貴則得志便驕縱失志則便放曠與悲愁而已周官醫以十全為上非為十人皆愈為上若十人不幸皆死病則奈何但知可治不可治者十人皆中即為上有人勞正叔先生曰先生謹於禮四五十年應甚勞苦先生曰吾日履安地何勞何苦佗人日踐危地此乃勞苦也憂子弟之輕俊者只教以經學念書不得令作文字子弟凡百玩好皆奪志至於書札於儒者事最近然一向好著亦自䘮志如王虞顔桞輩誠為好人則有之曾見有善書者知道否平生精力一用於此非惟徒廢時日於道便有妨處足知䘮志也王弼注易元不見道但却以老莊之意解説而已吕與叔嘗言患思慮多不能驅除曰此正如破屋中禦㓂東面一人來未逐得西面又一人至矣左右前後驅逐不暇葢其四面空疎盗固易入無縁作得主定又如虚器入水水自然入若以一器實之以水置之水中水何能入來葢中有主則實實則外患不能入自然無事孔子曰其如示諸斯乎指其掌中庸便曰明乎郊社之禮禘嘗之義治國其如示諸掌乎葢有人疑孔子之語中庸又直指郊禘之義以發之曾子曰夫子之道忠恕而已矣中庸以曾子之言雖是如此又恐人尚疑忠恕未可便為道故曰忠恕違道不遠施諸已而不願亦勿施於人此又掠下教人堯夫嘗言能物物則我為物之人也不能物物則我為物之物也亦不消如此人自人物自物道理甚分明伯淳近與呉師禮談介甫之學錯處謂師禮曰為我盡達諸介甫我亦未敢自以為是如有説願徃復此天下公理無彼我果能明辨不有益於介甫則必有益於我人以料事為明便駸駸入逆詐億不信去也射中鵠舞中節御中度皆誠也古人教人以射御象勺所養之意如此凡物之名字自與音義氣理相通除其他有體質可以常論而得名者之外則天之所以為天天未名時本亦無名只是蒼蒼然也何以便有此名葢出自然之理音聲發於其氣遂有此名此字如今之聽聲之精者便知人性善卜者知人姓名理由此也籲言趙澤嘗云臨政事不合著心惟恕上合著心是否曰彼謂著心勉而行恕則可謂著心求恕則不可葢恕自有之理舉斯心加諸彼而已不待求而後得然此人之論有心為恕終必恕矣誠者合内外之道不誠無物持國曰凡人志能使氣者能定其志則氣為吾使志壹則動氣矣先生曰誠然矣志壹則動氣然亦不可不思氣壹則動志非獨趨蹶藥闕酒也亦是也然志動氣者多氣動志者少雖氣亦能動志然亦在持其志而已持國曰道家有三住心心住則氣住氣住則神住此所謂存三守一伯淳先生曰此三者人終食之頃未有不離者其要只在收放心持國常患在下者多欺伯淳先生曰欺有三有為利而欺則固可罪有畏罪而欺者在所恕事有類欺者在所察人於外物奉身者事事要好只有自家一箇身與心却不要好苟得外面物好時却不知道自家身與心却已先不好了也先生曰范景仁論性曰豈有生為此死又却為彼儘似見得後却云自有鬼神又却迷也少年時見物大食物羙後不能然者物自爾也乃人與氣有盛衰爾生之謂性性即氣氣即性生之謂也人生氣禀理有善惡然不是性中元有此兩物相對而生也有自幼而善有自幼而惡后稷之克岐克嶷于越椒始生人知其必滅若敖氏之類是氣禀有然也善固性也然惡亦不可不謂之性也葢生之謂性人生而静以上不容説才説性時便已不是性也凡人説性只是説繼之者善也孟子言人性善是也夫所謂繼之者善也者猶水流而就下也皆水也有流而至海終無所汚此何煩人力之為也有流而未遠固已漸濁有出而甚遠方有所濁有濁之多者有濁之少者清濁雖不同然不可以濁者不為水也如此則人不可以不加澄治之功故用力敏勇則疾清用力緩怠則遲清及其清也則却只是元初水也亦不是將清來換却濁亦不是取出濁來置在一隅也水之清則性善之謂也故不是善與惡在性中為兩物相對各自出來此理天命也順而循之則道也循此而修之各得其分則教也自天命以至於教我無加損焉此舜有天下而不與焉者也邢和叔言吾曹常須愛養精力精力稍不足則倦所以臨事皆勉强而無誠意接賓客語言尚可見况臨大事乎嘗與趙汝霖論為政切忌臨事著心曰此誠是也然唯恕上合著心拾遺浩然之氣天地之正氣大則無所不在剛則無所屈以直道順理而養則充塞於天地之間配義與道氣皆主於義而無不在道一置私意則餒矣是集義所生事事有理而在義也非自外襲而取之也告子外之者葢不知義也楊遵道所録伊川語中辨此一叚非明道語壹與一字同一動氣則動志一動志則動氣為養氣者而言也若成徳者志已堅定則氣不能動志北宫黝之勇在於必為孟施舎之勇在於無懼子夏篤志力行者也曾子明理守約者也必有事者主養氣而言故必主於敬勿正勿作為也心勿忘必有事也助長乃正也北方之强血氣也南方之强乃理强故聖人貴之人患乎懾怯者盖氣不充不素養故也忿􅓰怒也治怒為難治懼亦難克己可以治怒明理可以治懼侯世與云某年十五六時明道先生與某講孟子至勿正心勿忘勿助長處云二哥以必有事焉而勿正為一句心勿忘勿助長為一句亦得因舉禪語為况云事則不無擬心則差某當時言下有省二程遺書卷一
