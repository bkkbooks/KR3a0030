body:
  text: 二程遺書卷十三宋朱子編亥八月見先生於洛所聞公族有罪磬于甸人如其倫之喪無服明無罪者有服也楊墨之害甚於申韓佛老一無老字之害甚於楊墨楊氏為我疑於仁墨氏兼愛疑於義申韓則淺陋易見故孟子則闢楊墨為其惑世之甚也佛老一作氏字其言近理又非楊墨之比此所以害尤甚楊墨之害亦經孟子闢之所以廓如也禮云惟祭天地社稷為越紼而行事似亦大早雖不以卑廢尊若既葬而行之宜亦可也蓋未葬時哀戚方甚人有所不能祭爾艮其止止其所也八元有善而舉之四凶有罪而誅之各止其所也釋氏只曰止安知止乎吳本罪作惡誅作去釋氏無實釋氏説道譬之以管窺天只務直上去惟見一偏不見四旁故皆不能處事聖人之道則如在平野之中四方莫不見也釋氏本怖死生為利豈是公道唯務上達而無下學然則其上達處豈有是也元不相連屬但有間斷非道也孟子曰盡其心者知其性也彼所謂識心見性是也若存心養性一段事則無矣彼固曰出家獨善便於道體自不足一作己非矣或曰釋氏地獄之類皆是為下根之人設此怖令為善先生曰至誠貫天地人尚有不化豈有立偽教而人可化乎曽子易簣之意心是理理是心聲為律身為度也灑掃應對便是形而上者理無大小故也故君子只在慎獨知之明信之篤行之果知仁勇也若孔子所謂成人亦不出此三者臧武仲知也孟公綽仁也卞莊子勇也二程遺書卷十三
  hash: sha256:61c9ff6ec3f5ac8f222bf69fc49a7f538a77a5eface5bc2fd5d43f2d21a32d80
