body:
  text: 二程遺書卷八宋朱子編傳不習乎不習而傳與人學則不固連上説有馬者借人乗之吾力猶能補史之闕文當史之職而能闕疑以待後人是猶有馬者借人乗之也能言不怍者難君子義以為質四句只是一事以義為本可使之往不可䧟以罔君子矜而不争矜尚之矜南宫适以禹稷比孔子故夫子不答也果哉末之難矣果敢之果不知更有難事他所未曉輕議聖人孔子擊磬何嘗無心荷蕢於此知之辟世辟言辟色非有優劣只説大小次第靈公問陳孔子遂行言語不相投不占而已有吉㐫便占無常之人更不待占三代直道而行毁譽公踐迹如言循途守轍善人雖不循守舊迹亦不能入聖人之室論篤是與言篤實時與君子與色莊魯衛之政兄弟也言相近也知及仁守莊涖動禮為政始末民之於仁甚於水火不肯為仁如蹈水火致逺恐泥不可逺行先傳後倦君子教人有序先傳以小者近者而後教以大者逺者非是先傳以近小而後不教以逺大也吾其為東周乎東遷以後諸侯大夫强僭聖人豈為是乎匏瓜繫而不食匏瓜無所為之物繫而不動子樂弟子各盡其誠實不少加飾故孔子知由之不得其死性相近也生質之性小知大受不可以小知君子而可以當大事天下有道丘不與易也其誰以易之誰肯以夫子之道易已所為佛肸召欲往而不往者何也聖人示之以迹子路不諭九夷浮海之類示之一作示人堯曰予小子履少湯字周公謂魯公三句反覆説不獨不弛其親又當使大臣不怨至公不可忘私又當全故舊大德小德如大節小節雖有周親不如仁人至親不如仁賢因不失其親信本不及義恭本不及禮然信近於義者以言可復也恭近於禮者以逺恥辱也因恭信不失其所親近於禮義故亦可宗也如言禮義不可得見得見恭信者斯可矣子張子夏論交子夏子張告人各有所以初學與成德者事不同貧與賤不以其道得之不去也不以其道得去貧賤如患得之卿以下必有圭田祭祀之田也禄外之田也餘夫二十五畝一夫上父母下妻子以五口至八口為率受田百畝如有弟是餘夫也俟其成家别受田也㕓而不征市宅之地已有㕓稅更不征其物法而不㕓稅有常法不以㕓故而厚其稅㕓無夫里之布㕓自有稅無此二布國有道不變塞所守不變所行不塞廣居正位大道所居者廣所位者正所行者大天下至中至大之所配義與道浩氣已成合道與義道本也義用也集義所生者集衆義而生浩然之氣非義外襲我而取之也二程遺書卷八
