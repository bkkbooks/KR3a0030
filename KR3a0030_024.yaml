body:
  text: 二程遺書卷二十四宋朱子編鄒徳久本天下雷行物與無妄先天後天皆合於天理者也人欲則偽矣修身當學大學之序大學聖人之完書也其間先後失次者已正之矣詩言后妃之德非指人而言或謂太姒大失之矣周公作樂章欲一作歌之以感化天下其後繼以文王詩者言古之人有行之者文王是也周南天子之事故繫之周周王室也召南諸侯之事故繫之召召諸侯長也曰公者後人誤加之也夫婦道一闗雎雖后妃之事亦可歌於下至若鹿鳴以下則各主其事皇華遣使臣之類是也頌有二或羙盛德則燕饗通用之或告成功則祭祀專用之詩有六義曰風者謂風動之也曰賦者謂鋪陳其事也曰比者直比之温其如玉之類是也曰興者因物而興起闗闗雎鳩瞻彼淇澳之類是也曰雅者雅言正道天生蒸民有物有則之類是也曰頌者稱頌德羙有匪君子終不可諼兮之類是也國風大小雅三頌詩之名也六義詩之義也篇之中有備六義者有數義者一本章首云能治亂絲者可以治詩四始猶四端也十五國風各有次序㸔詩可見詩大序孔子所為其文似繫辭其義非子夏所能言也小序國史所為非後世所能知也人心私欲故危殆道心天理故精微滅私欲則天理明矣太誓書曰一月曰商歴已絶周歴未建故用人正今之正月也不書商歴已見紂自絶於天矣聖人一言一動無不合於天理如此㸔書須要見二帝三王之道如二典即求堯所以治民舜所以事君五年須暇者聖人討伐必不太早自當緩之非再駕之謂也此周公所知無顯迹可推也犬牛人知所去就其性本同但限以形故不可更如隙中日光方圓不移其光一也惟所禀各異故生之謂性告子以為一孟子以為非也庾公之斯遇子濯孺子虚發四矢甚無謂也國之安危在此舉則殺之可也舎之而無害於國權輕重可也何用虚發四矢乎堯舜性之生知也湯武身之學而知之也仁之於父子至知之於賢者謂之命者以其禀受有厚薄清濁故也然其性善可學而盡故謂之性焉禀氣有清濁故其材質有厚薄禀於天謂性感為情動為心質幹為才生之謂性與天命之謂性同乎性字不可一槩論生之謂性止訓所禀受也天命之謂性此言性之理也今人言天性柔緩天性剛急俗言天成皆生來如此此訓所禀受也若性之理也則無不善曰天者自然之理也天下言性則故而已者言性當推其元本推其元本無傷其性也伊尹受湯委寄必期天下安治而已太甲如不終惠可廢也孟子言貴戚之卿與此同然則始何不擇賢蓋外丙二嵗仲任四嵗惟太甲長耳使太甲有下愚之質初不立也苟無三人必得於宗室宗室無人必擇於湯之近戚近戚無人必擇於天下之賢者而與之伊尹不自為也劉備託孔明以嗣子不可使自為之非權數之言其利害昭然也立者非其人則劉氏必為曹氏屠戮寜使孔明為之也霍光廢昌邑不待放知其下愚不移也始之不擇則光之罪大矣若伊尹與光是大甲昌邑所用之臣而不受先王之委寄諫不用去之可也放廢之事不可為也義理自昭然先生始㸔史傳及半則掩卷而深思之度其後之成敗為之窺畫然後復取觀焉然成敗有幸不幸不可以一槩㸔㸔史必觀治亂之由及聖賢修已處事之羙孔明有王佐之心道則未盡王者如天地之無私心焉行一不義而得天下不為孔明必求有成而取劉璋聖人寜無成耳此不可為也若劉表子琮將為曹公所并取而興劉氏可也孔明不死三年可以取魏且宣王有英氣久不得伸必沮死不久也孔明庶幾禮樂孔明營五丈原宣王言無能為此偽言安一軍耳兵自高地來可勝先生嘗自觀五丈原非非一作曰言此地不可據英雄欺人不可盡信荀爽從董卓辟遜迹避禍君子亦有之然聖人明哲保身亦不至轉身不得處如揚子投閣失之也荀爽自度其材能興漢室乎起而圖之可也知不足而强圖之非也西漢儒者有風度惟董仲舒毛萇揚雄萇解經未必皆當然味其言大槩然矣東漢趙苞為邉郡守虜奪其母招以城降苞遽戰而殺其母非也以君城降而求生其母固不可然亦當求所以生母之方柰何遽戰乎不得已身降之可也王陵母在楚而使楚質以招陵陵降可也徐庶得之矣義訓宜禮訓别智訓知仁當何訓說者謂訓覺訓人皆非也當合孔孟言仁處大槩研窮之二三嵗得之未晚也先生云吾四十嵗以前讀誦五十以前研究其義六十以前反覆紬繹六十以後著書著書不得已人思如湧泉浚之愈新釋道所見偏非不窮深極微也至窮神知化則不得與矣先生在經筵時上服藥即日就醫官問動止天子方㓜建言選宫人四十以上者侍左右所以逺紛華養心性盡巳為忠盡物為信極言之則盡巳者盡己之性也盡物者盡物之性也信者無偽而已於天性有所損益則為偽矣易无妄曰天下雷行物與无妄動以天理故也其大略如此更須研究之則自有得處韓文不可漫觀晚年所見尤高在天曰命在人曰性貴賤壽夭命也仁義禮智亦命也動物有知植物無知其性自異但賦形於天地其理則一四端不言信者既有誠心為四端則信在其中矣充實而有光輝所謂脩身見於世也婚禮執鴈者取其不再偶爾非隨陽之物亞夫夜半軍擾直至帳下堅卧不動安在其持重也聖人無優劣有則非聖人也主一者謂之敬一者謂之誠主則有意在荀氏八龍豈盡賢者但得一二賢子弟相薫習皆然耳犬吠屠人世傳有物隨之非也此正如海上鷗爾二程遺書卷二十四
