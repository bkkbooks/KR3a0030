body:
  text: 二程遺書卷十七宋朱子編三王之法各是一王之法故三代損益文質隨時之宜若孔子所立之法乃通萬世不易之法孔子於他處亦不見説獨答顔囘云行夏之時乗殷之輅服周之冕樂則韶舞此是於四代中舉這一箇法式其詳細雖不可見而孔子但示其大法使後人就上修之二千年來亦無一人識者義之精者須是自求得之如此則善求義也善讀中庸者只得此一卷書終身用不盡也暌之上九離也離之為德在諸卦莫不以為明獨於暌便變為惡以陽在上則為亢以剛在上則為狠以明在上變而為察以狠以察所以為暌之極也故曰見豕負塗載鬼一車皆自任已察之所致然往而遇雨則吉遇雨者暌解也暌解有二義一是物極則必反故暌極則必通若暌極不通却終於暌而已二是所以能解暌者却是用明之功也大抵卦爻始立義既具即聖人别起義以錯綜之如春秋已前既以立例到近後來書得全别一般事便書得别有意思若依前例觀之殊失之也先生嘗說某於易傳今却已自成書但逐旋修改期以七十其書可出韓退之稱聴明不及於前時道德日負於初心然某於易傳後來所改者無幾不知如何故且更期之以十年之功看如何春秋之書待劉絢文字到却用功亦不多也今人解詩全無意思此却待出些文字中庸書却已成今農夫祁寒暑雨深耕易耨播種五穀吾得而食之今百工技藝作為器用吾得而用之甲胄之士披堅執鋭以守土宇吾得而安之却如此閑過了日月即是天地間一蠧也功澤又不及民别事又做不得惟有補緝聖人遺書庶幾有補爾陳氏方見尹子於姑蘇問中庸解尹子云先生自以為不滿意焚之矣致知在格物格物之理不若察之於身其得尤切酒者古人養老祭祀之所用今官有𣙜酤民有買撲無故輒令人聚飲亦大為民食之蠧也損民食惰民業招刑聚冦皆出於此如損節得酒課民食亦為小充分明民食却醸為水後令人飲之又不當飢飽若未能絶得買撲若且只諸縣都鄙為之亦利不細人要明理若止一物上明之亦未濟事須是集衆理然後脫然自有悟處然於物上理會也得不理㑹也得且須於學上格物不可不詣理也常見伯淳所在臨政便上下響應到了人衆後便成風成風則有所鼓動天地間只是一箇風以動之也大凢儒者未敢望深造於道且只得所存正分别善惡識廉恥如此等人多亦須漸好或問古之道如是之明後世之道如是不明其故何也曰此無他知道者多即道明知者少即道不明也知者多少亦由乎教也以魯國言之止及今之一大州然一時間所出大賢十餘人豈不是有教以致然也蓋是聖人既出故有許多賢者以後世天下之大經二千年間求如一顔閔者不可得也大抵儒者潛心正道不容有差其始甚微其終則不可救如師也過商也不及於聖人中道師只是過於厚些商只是不及些然而厚則漸至於兼愛不及則便至於爲我其過不及同出於儒者其末遂至楊墨至如楊墨亦未至於無父無君孟子推之便至於此蓋其差必至於是也孟子辨舜跖之分只在義利之間言間者謂相去不甚逺所爭毫末爾義與利只是箇公與私也纔出義便以利言也只那計較便是為有利害若無利害何用計較利害者天下之常情也人皆知趨利而避害聖人則更不論利害惟看義當為與不當為便是命在其中也傳經為難如聖人之後纔百年傳之已差聖人之學若非子思孟子則幾乎息矣道何嘗息只是人不由之道非亡也幽厲不由也人或勸先生以力禮近貴先生曰何不見責以盡禮而責之以加禮禮盡則已豈有加也聖人之語因人而變化語雖有淺近處即却無包含不盡處如樊遲於聖門最是學之淺者及其問仁曰愛人問知曰知人且看此語有甚包含不盡處他人之語語近則遺逺語逺則不知近惟聖人之言則逺近皆盡今之為學者如登山麓方其迤邐莫不濶歩及到峻處便逡巡一本無便止二字云或以峻而遂止或以難而稍緩苟能遇難而益堅聞過則改何逺弗至也先代帝王陵寢下多有閒田推其後毎處只消與田十頃與一閒官世守之至如唐狄仁傑顔杲卿之後朝廷與官一人死則却絶不若亦如此處之亦與田五七頃後世骨肉之間多至仇怨忿爭其實為爭財使之均布立之宗法官為法則無所爭後世人理全廢小失則入於夷狄大失則入於禽獸人理一作禮大几禮必須有意禮之所尊尊其義也失其義陳其數祝史之事也益長裕而不設謂固有此理而就上充長之設是撰造也撰造則為偽也人或以禮官為閒官某謂禮官之責最大朝廷一有違禮皆禮官任其責豈得為閒官陳平雖不知道亦知學如對文帝以宰相之職非知學安能如此曹參去齊以獄市為託後之為政者留意於獄者則有之矣未聞有治市者學莫大於致知養心莫大於禮義古人所養處多若聲音以養其耳舞蹈以養其血脈今人都無只是箇義理之養人又不知求或謂人莫不知和柔寛緩然臨事則反至於暴厲曰只是志不勝氣氣反動其心也學者所貴聞道執經而問但廣聞見而已然求學者不必在同人中非同人又却無學者孟子言聖而不可知之謂神非是聖上别有一等神人神即聖而不可知又曰謂聖之至妙人所未能測儒行之篇此書全無義理如後世遊説之士所為誇大之說觀孔子平日語言有如是者否陳司敗問昭公知禮乎孔子對曰知禮彼國人來問君知禮否不成説不知禮也如陳司敗數昭公失禮之事而問之則有所不答顧左右而言他及巫馬期來告正合不答然孔子答之者以陳司敗必俟其反命故須至答也或問如何學可謂之有得曰大几學問聞之知之皆不為得得者須默識心通學者欲有所得須是篤誠意燭理上知則穎悟自别其次須以義理涵養而得之古有教今無教以其無教直壊得人質如此不美今人比之古人如將一至惡物比一至美物造道深後雖聞常人語言淺近事莫非義理古者家有塾黨有庠故人未有不入學者三老坐於里門出入察其長幼揖讓之序如今所傳之詩人人諷誦莫非止於禮義之言今人雖白首未嘗知有詩至於里俗之言盡不可聞皆繫其習也以古所習安得不善以今所習安得不惡唐太宗後人只知是英主元不曽有人識其惡至如殺兄取位若以功業言不過只做得箇功臣豈可奪元良之位至如肅宗即位靈武分明是篡也革言木火相息息止息也既有止息之理亦有生息之理暌卦不見四徳蓋不容著四徳繇言小事吉者止是方暌之時猶足以致小事之吉不成終暌而已須有濟暌之道一本暌卦以下别為一章文中子言古之學者聚道不知道如何聚得凡為政須立善法後人有所變易則無可奈何雖周公亦知立法而已後人變之則無可奈何也臨言八月有凶謂至八月是遯也當其剛浸長之時便戒以陰長之意紀侯大去其國大名責在紀也非齊之罪也齊侯陳侯鄭伯遇於垂方謀伐之紀侯遂去其國齊師未加而已去故非齊之罪也春秋之文莫不一一意在示人如土功之事無小大莫不書之其意止欲人君重民之力也書大雩雩及上帝以見魯不當為與書郊者同義書公伐齊納糾糾不當立故不言子糾若書子糾則正了他當得立也凡易卦有就卦才而得其義者亦有舉兩體便得其義者隨剛來而下柔動而説隨此是就卦才而得隨之義澤中有雷隨此是就象上得隨之義也宗子之法不立則朝廷無世臣宗法須是一二巨公之家立法宗法立則人人各知來處宗子者謂宗主祭祀也禮長子不得為人後若無兄弟又繼祖之宗絶亦當繼祖禮雖不言可以義起凡大宗與小宗皆不在廟數收族之義止為相與為服祭祀相及所謂宗者以已之旁親兄弟來宗於已所以得宗之名非已宗於人也凡小宗以五世為法親盡則族散若髙祖之子尚存欲祭其父則見為宗子者雖是六世七世亦須計㑹今日之宗子然後祭其父宗子有君道祭祀須别男女之分生既不可雜坐祭豈可雜坐祭非主則無依非尸則無享今行冠禮若制古服而冠冠了又不常著却是偽也必須用時之服䘮須三年而祔若卒哭而祔則三年却都無事禮卒哭猶存朝夕哭若無主在寢一作祭於殯哭於何處物有自得天理者如蜂蟻知衞其君豺獺知祭禮亦出於人情而已祭先之禮不可得而推者無可奈何其可知者無逺近多少猶當盡祭之祖又豈可不報又豈可厭多蓋根本在彼雖逺豈得無報宗子雖七十無無主婦此謂承祭祀也然亦不當道七十只道雖老無無主婦便得禮云宗子如一作不爲殤宗子有君子道豈有殤之理喜怒哀樂未發謂之中只是言一箇中一作本體既是喜怒哀樂未發那裏有箇甚麽只可謂之中如乾體便是健及分在諸處不可皆名健然在其中矣天下事事物物皆有中發而皆中節謂之和非是謂之和便不中也言和則中在其中矣中便是含喜怒哀樂在其中矣如眼前諸人要特立獨行煞不難得只是要一箇知見難人只被這箇知見不通透人謂要力行亦只是淺近語人旣能一作有知見豈有不能行一切事皆所當為不必待著意做纔著意做便是有箇私心這一㸃意氣能得幾時了今人欲致知須要格物物不必謂事物然後謂之物也自一身之中至萬物之理但理㑹得多幾次自然豁然有覺處楊子拔一毛不為墨子又摩頂放踵為之此皆是不得中至如子莫執中欲執此二者之中不知怎麽執得識得則事事物物上皆天然有箇中在那上不待人安排也安排著則不中矣知之必好之好之必求之求之必得之古人此箇學是終身事果能顚沛造次必於是豈有不得道理立則見其參於前所見者何事顔淵問仁而孔子告之以禮仁與禮果異乎説先於樂者樂由説而後得然非樂則亦未足以語君子二程遺書卷十七
