body:
  text: 二程遺書卷三宋朱子編謝顯道記憶平日語鳶飛戾天魚躍于淵言其上下察也此一段子思喫緊為人處與必有事焉而勿正心之意同活潑潑地㑹得時活潑潑地不㑹得時只是弄精神切脈最可體仁鄭轂云當見顯道先生問此語云是某與明道切脈時坐間有此語觀雞雛此可觀仁漢成帝夢上帝敗我濯龍淵打不過問鬼神有無曰待說與賢道沒時古人却因甚如此道待說與賢道有時又却恐賢問某尋射法具而不滿者無志者也尸居却龍見淵默却雷聲須是合內外之道一天人齊上下下學而上達極髙明而道中庸既得後便須放開不然却只是守詩可以興某自再見茂叔後吟風弄月以歸有吾與㸃也之意古人互相㸃檢如今之學射者亦然鐵劒利而娼優拙此重則彼輕自舜發於畎畝之中至孫叔敖舉於海若要熟也須從這裏過萃渙皆享於帝立廟因其精神之聚而形於此為其渙散故立此以收之隘與不恭君子不由非是瑕疵夷惠之語其弊至此趙普除節度使權便是烏重𦙍之䇿以兵付逐州刺史以記誦博識為玩物喪志時以經語録作一䇿某鄭轂云嘗見顯道先生云從洛中學時録古人善行别作一冊洛中見之云是玩物喪志蓋言心中不宜容絲髮事張子厚邵堯夫善自開大者也彈琴心不在便不成聲所以謂琴者禁也禁人之邪心舞蹈本要長袖欲以舒其性情某嘗觀舞正樂其袖往必反有盈而反之意今之舞者反收拾袖子結在一處周茂叔窗前草不除去問之云與自家意思一般子厚觀驢鳴亦謂如此張子厚聞生皇子喜甚見餓莩者食便不美某寫字時甚敬非是要字好只此是學一日遊許之西湖在石壇上坐少頃腳踏處便濕舉起云便是天地升降道理一日見火邉燒湯瓶指之曰此便是隂陽消長之義鳶飛戾天向上更有天在魚躍于淵向下更有地在此兩句去作人材上說更好而鄭轂云嘗問此二句顯道先生云非是極其上下言蓋真箇見得如此此正是子思喫緊道與人處若從此解悟便可入堯舜氣象因論口將言而囁嚅若合開口時要他頭也須開口如荆軻於樊於期須是聽其言也厲舜由仁義行非行仁義也與善人處壞了人須是與不善人處方成就得人他山之石可以攻玉善下一有柔字又言不哭底孩兒誰抱不得須是就事上學蠱振民育德然有所知後方能如此何必讀書然後為學士不可以不𢎞毅任重而道遠重擔子須是硬脊梁漢方擔得詩書只說帝與天有人疑伊尹出處合於孔子可以仕則仕可以止則止不得為聖之時何也曰終是任底意思在一行豈所以名聖人至於聖則自不可見何嘗道聖人孝聖人亷太山為髙矣然太山頂上已不屬太山雖堯舜之事亦只是如太虛中一㸃浮雲過目執事須是敬又不可矜持太過孟子知言正如人在堂上方能辨堂下人曲直若自下去堂下則却辨不得勿忘勿助長之間正當處也顔子合下完具只是小要漸漸恢廓孟子合下大只是未粹索學以充之學者要學得不錯須是學顔子有凖的參也竟以魯得之默而識之不言而信存乎德行毛猶有倫入毫釐絲忽終不盡滿腔子是惻隱之心衆人安則不恭恭則不安君子以言有物而行有常邢恕日三㸃檢謂亦可哀也何時不㸃檢學射者互相㸃檢病痛朋友攸攝攝以威儀有甚你管得我有甚我管得你教人致却太平後某願為太平之民右明道先生語三王不足四無四三王之理如忠質文之所尚子丑寅之所建歲三月為一時之理秦强以亥為正畢竟不能行孔子知是理故其志不欲為一王之法欲為百王之通法如語顔淵為邦是也其法度又一寓之春秋已後别有說西北東南人材不同以律管定尺乃是以天地之氣為凖非秬黍之比也秬黍積數在先王時維此為適與度量合故可用今時則不同物之可卜者惟龜與羊髀骨可用蓋其坼可驗吉凶李覯謂若教管仲身長在宫內何妨更六人此語不然管仲時桓公之心特未蠧也若已蠧雖管仲可奈何未有心蠧尚能用管仲之理孟子言性當隨文看不以告子生之謂性為不然者此亦性也彼命受生之後謂之性爾故不同繼之以犬之性猶牛之性牛之性猶人之性歟然不害為一若乃孟子之言善者乃極本窮源之性日月之形如人有身須有目目必面前故太陽無北觀者仁則一不仁則一仁道難名惟公近之非以公便為仁禪家之言性猶太陽之下置器其間方圓小大不同特欲傾此於彼爾然在太陽幾時動又其學善遁若人語以此理必曰我無修無證先生少時多與禪客語欲觀其所學淺深後來更不問蓋察言不如觀貌言猶可以所聞強勉至於貌則不可強氣形而下者語學者以所見未到之理不惟所聞不深徹久將理低看了性不可以內外言神是極妙之語神一本無與性元不相離則其死也何合之有如禪家謂别有一物常在偷胎奪䕃之說則無是理魂謂精魂其死也魂氣歸於天消散之意某欲以金作器比性成形先生謂金可以比氣不可以比性唐人伎藝亦有精絶過今人處日月謂一日一箇亦得謂通古今只一箇亦得易言天亦不同如天道虧盈而益謙此通上下理亦如此天道之運亦如此如言天且弗違况於人乎况於鬼神乎此直謂形而上者言以鬼神為天地矣莊生形容道體之語儘有好處老氏谷神不死一章最隹禪家出世之說如閉目不見鼻然鼻自在聖人不記事所以常記得今人忘事以其記事不能記事處事不精皆出於養之不完固陳恆弒其君夫子請討當時夫子已去位矣曾為大夫人固可以前知然其理須是用則知不用則不知知不如不知之愈蓋用便近二所以釋子謂又不是野狐精也二三立則一之名亡矣感而遂通天下之故以其寂然不動小則事物之至大則無時而不感人之禀賦有無可奈何者聖人所以戒忿疾於頑釋氏處死生之際不動者有二有英明不以為事者亦有昏愚為人所誤以前路自有去處者心一作必欲窮四方上下所至且以無窮置却則得若要真得一作識須是體合有剪桐之戲則隨事針規違養生之戒則即時諫止未有不能體道而能無思者故坐忘即是坐馳有忘之心乃思也許渤與其子隔一窗而寢乃不聞其子讀書與不讀書先生謂此人持敬如此曷嘗有如此聖人伯淳在澶州日修橋少一長梁曾博求之民間後因出入見林木之佳者必起計度之心因語以戒學者心不可有一事閲機事之久機心必生蓋方其閲時心必喜既喜則如種下種子見一學者忙迫先生問其故曰欲了幾處人事曰某非不欲周旋人事者曷嘗似賢急迫忘物與纍物之弊等疑病者未有事至時先有疑端在心周羅事者先有周事之端在心皆病也較事大小其弊為枉尺直尋之病一作論忘敬而後無不敬聖人之心未嘗有在亦無不在蓋其道合內外體萬物事神易為尸難苟孝子有思親之心以至誠持之皆可以盡其道惟尸象神其所以祖考來格者以此後世巫覡立尸之遺意但其流入於妄僞豈有通幽明之理死者不可謂有知不可謂無知嘗問先生其有知之原當俱禀得先生謂不曾禀得何處交割得來又語及太虛曰亦無太虛遂指虛曰皆是理安得謂之虛天下無實於理者罪已責躬不可無然亦不當長留在心胸為悔有恐懼心亦是燭理不明亦是氣不足須知義理之悅我心猶芻豢之悅我口玩理以養心如此蓋人有小稱意事猶喜悅有淪肌浹骨如春和意思何况義一作見理然窮理亦當知用心緩急但苦勞而不知悅處豈能養心入道莫如敬未有能致知而不在敬者今人主心不定視心如冦賊而不可制不是事纍心乃是心纍事當知天下無一物是合少得者不可惡也或謂許大太虛先生謂此語便不是這裏論甚大與小大抵人有身便有自私之理宜其與道難一人之於儀形有是持養者有是修飾者人之於性猶器之受光於日日本不動之物須是識在所行之先譬如行路須得光照伯有為厲之事别是一理一隂一陽之謂道道非隂陽也所以一隂一陽道也如一闔一闢謂之變右伊川先生語拾遺許渤初起問人天氣寒溫加減衣服一加減定即終日不換許渤在潤州與范文正胡宿周茂叔遊古人立尸之意甚髙萬取千焉千取百焉齊語謂某處取某處遠近夫天未欲平治天下也如欲平治天下當今之世舍我其誰此是有所受命之語若孔子謂天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何喪乃我喪未喪乃我未喪我自做著天裏聖人之言氣象自别張橫渠謂范文正才氣老成笑指揮趙俞古人求法器禮樂只在進反之間便得性情之正孟子答公孫丑問何謂浩然之氣曰難言也只這裏便見得是孟子實有浩然之氣若他人便亂說道是如何是如何子路亦百世之師人告之以有過則喜右明道先生語先生在經筵日有二同列論武侯事業謂戰伐所喪亦多非殺一不辜而得天下不為之事先生謂二公語過矣殺一不辜而得天下不為謂殺不辜以私己武侯以天子之命討天下之賊何害漢儒近似者三人董仲舒大毛公揚雄右伊川先生語二程遺書卷三
