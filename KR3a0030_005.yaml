body:
  text: 二程遺書卷五宋朱子編理與心一而人不能會之為一仲尼元氣也顔子春生也孟子並秋殺盡見仲尼無所不包顔子示不違如愚之學於後世有自然之和氣不言而化者也孟子則露其才蓋亦時然一作焉而已仲尼天地也顔子和風慶雲也孟子泰山巖巖之氣象也觀其言皆可以見之矣仲尼無迹顔子微有迹孟子其迹著人心常要活則周流無窮而不滯於一隅老子曰無為又曰無為而無不為當有為而以無為為之是乃有為為也聖人作易未嘗言無為惟曰無思也無為也此戒夫作為也然下即曰寂然不動感而遂通天下之故是動靜之理未嘗為一偏之說矣語聖則不異事功則有異夫子賢於堯舜語事功也孔子言語句句是自然孟子言語句句是實事論學便要明理論治便須一作要識體蹇便是處蹇之道困便是處困之道道無時不可行孟子有功於道為萬世之師其才雄只見雄才便是不及孔子處人須當學顔子便入聖人氣象父子君臣天下之定理無所逃於天地之間安得天分不有私心則一本無天分不則字行一不義殺一不辜有所不為有分毫私便不是王者事訂頑立心便達得天德孔子儘是明快人顔子儘豈弟孟子儘雄辨孔子為中都宰知其不可為而為之不仁不知而為之不知豈有聖人不盡仁知責上責下而中自恕已豈可任職分一本無任字職分兩字側注萬物無一物失所便是天理時中一本無時中字公孫碩膚赤舄几几為君盡君道為臣盡臣道過此則無理坤作成物是積學處乾知大始是成德處孔子請討田恆當時得行便有舉義為周之意九二利見大人九五利見大人聖人固有在上者在下者雖公天下事若用私意為之便是私唯上智與下愚不移移則不可知上之為聖下之為狂在人一身念不念為進退耳居處恭執事敬與人忠充此便睟面盎背有諸中必形諸外觀其氣象便見得天命不已文王純於天道亦不已純則無二無雜不已則無間斷先後不能動人只是誠不至於事厭倦皆是無誠處氣直養而無害便塞乎天地之間有少私意即是氣虧無不義便是集義有私意便是餒心具天德心有不盡處便是天德處未能盡何緣知性知天盡己心則能盡人盡物與天地參贊化育贊一本無贊字則直養之而已鼓萬物而不與聖人同憂天理鼓動萬物如此聖人循天理而欲萬物同之所以有憂患章外見之物含章可貞來章有慶須要反巳敬義夾持直上達天德自此舞射便見人誠古之教人莫非使之成已自灑掃應對便上可到聖人事樂莫大焉樂亦在其中不改其樂須知所樂者何事乾坤古無此二字作易者特立此二字以明難明之道乾坤毁則無以見易須以意明之以此形容天地間事易聖人所以立道窮神則無易矣孔子為宰則為宰為陪臣則為陪臣皆能發明大道孟子必得賔師之位然後能明其道猶之有許大形象然後為太山許多水然後為海以此未及孔子夷惠有異於聖人大成處然行一不義雖得天下不為與孔子同者以其誠一也顔子作得禹稷湯武事功若德則别論詩言天命書言天存心則上帝臨汝文章成功有形象可見只是極致事業然所以成此事功者即是聖也萬物之始皆氣化既形然後以形相禪有形化形化長則氣化漸消中庸言無聲無臭勝如釋氏言非黃非白一本作黃白大小心有所存眸子先發見張兄言氣自是張兄作用立標以明道張兄一作橫渠後同乾是聖人道理坤是賢人道理易之有象猶人之守禮法待物生以時雨潤之使之自化恭而安張兄十五年學二程遺書卷五
