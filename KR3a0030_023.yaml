body:
  text: 二程遺書卷二十三宋朱子編鮑若雨録今語小人曰不違道則曰不違道然卒違道語君子曰不違道則曰不違道終不肯違道譬如牲牢之味君子曽嘗之說與君子君子須増愛說與小人小人非不道好只是無増愛心其實只是未知味守死善道人非不知終不肯為者只是知之淺信之未篤志不可不篤亦不可助長志不篤則忘廢助長於文義上也且有益若於道理上助長反不得杜預云優而柔之使自求之厭而飫之使自趣之若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也此數句煞好論語是孔門高弟所撰觀其立言直是得見聖人處如閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂不得聖人處怎生知得子樂誾誾行行侃侃亦是門人旁觀見得如子温而厲威而不猛恭而安皆是善觀聖人者夫子刪詩贊易叙書皆是載聖人之道然未見聖人之用故作春秋春秋聖人之用也如曰知我者其惟春秋乎罪我者其惟春秋乎便是聖人用處人謂盡已之謂忠盡物之謂恕盡已之謂忠固是盡物之謂恕則未盡推已之謂恕盡物之謂信問武未盡善處如何曰說者以征誅不及揖讓征誅固不及揖讓然未盡善處不獨在此其聲音節奏亦有未盡善者樂記曰有司失其傳也若非有司失其傳則武王之志荒矣孔子自衞反魯然後樂正雅頌各得其所是知既正之後不能無錯亂者小人之怒在已君子之怒在物小人之怒出於心作於氣形於身以及於物以至於無所不怒是所謂遷也若君子之怒如舜之去四凶問吾道一以貫之而曰忠恕而已矣則所謂一者便是仁否曰固是只這一字須是子細體認一還多在忠上多在恕上曰多在恕上曰不然多在忠上纔忠便是一恕即忠之用也又問令尹子文忠矣孔子不許其仁何也曰只是忠不可謂之仁若比干之忠見得時便是仁也螟蛉蜾臝本非同類為其氣同故祝則肖之又况人與聖人同類者大抵須是自强不息將來涵飬成就到聖人田地自然氣貎改變問有殺身以成仁無求生以害仁竊謂苟所利者大一身何足惜也曰但㸔生與仁孰重夫子曰朝聞道夕死可矣人莫重於生至於捨得死道須大叚好如生也曰既死矣敢問好處如何曰聖人只睹一箇是問夫子曰吾不復夢見周公聖人固嘗夢見周公乎曰不曽孔子昔嘗寤寐間思周公後不復思爾若謂夢見周公大段害事即不是聖人也又曰聖人果無夢乎曰有夫衆人日有所思夜則成夢設或不思而夢亦是舊習氣類相應若是聖人夢又别如高宗夢傅說真箇有傅說在傅嚴也問富貴貧賤夀夭固有分定君子先盡其在我者則富貴貧賤壽夭可以命言若在我者未盡則貧賤而夭理所當然富貴而夀是為徼幸不可謂之命曰雖不可謂之命然富貴貧賤壽夭是亦前定孟子曰求則得之舎則失之是求有益於得也求在我者也求之有道得之有命是求無益於得也求在外者也故君子以義安命小人以命安義中庸之說其本至於無聲無臭其用至於禮儀三百威儀三千自禮儀三百威儀三千復歸於無聲無臭此言聖人心要處與佛家之言相反儘教說無形迹無色其實不過無聲無臭必竟有甚見處大抵論語間不難見如人論黄金曰黄色此人必是不識金若是識金者更不言設或言時别自有道理張子厚嘗謂佛如大富貧子横渠論此一事甚當聖人與理為一故無過無不及中而已矣其他皆以心處這箇道理故賢者常失之過不肖者常失之不及陳恒弑其君孔子沐浴而朝請討之左氏載孔子之言謂陳恒弑其君民之不與者半以魯之衆加齊之半可克也恁地是聖人以力角勝都不問義理也孔子請伐齊以弑君之事討之當時哀公能從其請孔子必有處置須使顔囘使周子路使晉天下大計可立而遂孔子臨老有此一件事好做柰何哀公不從其請可惜問横渠言由明以至誠由誠以至明此言恐過當曰由明以至誠此句却是由誠以至明則不然誠即明也孟子曰我知言我善飬吾浩然之氣只我知言一句已盡横渠之言不能無失類若此若西銘一篇誰說得到此今以管窺天固是見北斗别處雖不得見然見北斗不可謂不是也問孔子對冉求曰其事也非政政與事何異曰閔子騫不肯為大夫曽晳不肯為陪臣皆知得此道理若季路冉求未能如此夫政出於國君冉求為季氏家臣只是家事安得為政當時季氏專政孔子因以明之或問季路冉求稍聞聖人之道何不知此曰當時陪臣執國命目見耳聞習熟為常都不知有君此言不足怪季氏問季路冉求可謂大臣與孔子曰所謂大臣者以道事君不可則止今由與求也可謂具臣矣然則從之者與曰弑父與君亦不從也除却弑父與君皆為之期月而已三年有成何也曰公孫𢎞謂三年有成臣切遲之唐文宗時李石責以宰相之職謂臣猶以為太速二者皆不是須是知得遲速之理昔嘗對哲宗說此事曰陛下若問如何措置三年有成臣即陳三年有成之事若問如何措置期月而已臣即陳期月之事當時朝廷無一人問著只李邦直但云稱職稱職亦不曾問著一句春秋書隕石隕霜何故不言石隕霜隕此便見得天人一處昔嘗對哲宗說天人之間甚可畏作善則千里之外應之作惡則千里之外違之昔子陵與漢光武同寢太史奏客星侵帝座甚急子陵匹夫天應如此况一人之尊舉措用心可不戒慎暴其民甚則身弑國亡不甚則身危國削名之曰幽厲雖孝子慈孫百世不能改也漢之君都為羙諡何似休因問桀紂是諡否曰不是天下自謂之桀紂王天下有三重三重即三王之禮三王雖隨時損益各立一箇大本無過不及此與春秋正相合先生前日教某思君子和而不同某思之數日便覺胸次廣濶其意味有不可以言述竊有一喻願留嚴聽今有人焉久寓逺方一日歸故鄉至中途適遇族兄者俱抵旅舎異居而食相視如途人彼豈知為族弟此亦豈知為族兄邪或告曰彼之子公之族兄某人也彼之子公之族弟某人也既而懽然相從無有二心向之心與今之心豈或異哉知與不知而已今學者苟知大本則視天下猶一家亦自然之理也先生曰此乃善喻也先生教某思孝弟為仁之本某竊謂人之初生受天地之中禀五行之秀方其禀受之初仁固已存乎其中及其既生也㓜而無不知愛其親長而無不知敬其兄而仁之用於是見乎外當是時唯知愛敬而已固未始有事物之累及夫情欲竇於中事物誘於外事物之心日厚愛敬之心日薄本心失而仁隨䘮矣故聖人教之曰君子務本本立而道生孝弟也者其為仁之本與蓋謂修為其仁者必本於孝弟故也先生曰能如此尋䆒甚好夫子曰敬親者不敢慢於人愛親者不敢惡於人不敢慢於人不敢惡於人便是孝弟盡得仁斯盡得孝弟盡得孝弟便是仁又問為仁先從愛物上推來如何曰不敬其親而敬他人者謂之悖禮不愛其親而愛他人者謂之悖德故君子親親而仁民仁民而愛物能親親豈不仁民能仁民豈不愛物若以愛物之心推而親親却是墨子也因問舜與曽子之孝優劣如何曰家語載耘𤓰事雖不可信却有義理曽子耘𤓰誤斬其根曽哲建大杖以擊其背曽子仆地不知人事良久而蘇欣然起進曰大人用力教參得無疾乎乃退援琴而歌使知體康孔子聞而怒曽子至孝如此亦有這些失處若是舜百事從父母只殺他不得又問如申生待烹之事如何曰此只是恭也若舜須逃也問先生曰盡其道謂之孝弟夫以一身推之則身者資父母血氣以生者也盡其道者則能敬其身敬其身者則能敬其父母矣不盡其道則不敬其身不敬其身則不敬父母其斯之謂歟曰今士大夫受職於君尚期盡其職事又况親受身於父母安可不盡其道夫民合而聽之則聖散而聽之則愚合而聽之則大同之中有箇秉彞在前是是非非無不當理故聖散而聼之則各任私意是非顛倒故愚蓋公義在私欲必不能勝也二程遺書卷二十三
