body:
  text: 二程遺書卷十宋朱子編洛陽議論子厚謂程卿夙興幹事良由人氣清則勤間不得正叔謂不可若此則是専為氣所使子厚謂此則自然也伯淳言雖自然且欲凡事皆不恤以恬養則好子厚謂此則在學者也伯淳謂天下之士亦有其志在朝廷而才不足才可以為而誠不足今日正須才與至誠合一方有濟子厚謂才與誠須二物只是一物伯淳言才而不誠猶不是也若非至誠雖有忠義功業亦出於事為浮氣幾何時而不盡也一本無只是一物四字伯淳道君實之語自謂如人參甘草病未甚時可用也病甚則非所能及觀其自處必是有救之之術正叔謂某接人治經論道者亦甚多肯言及治體者誠未有如子厚二程謂地形不必謂寬平可以畫方只可用算法折計地畝授民子厚未必先正經界經界不正則法終不定地有坳垤處不𬋩只觀四標竿中間地雖不平饒與民無害就一夫之間所爭亦不多又側峻處田亦不甚美又經界必須正南北假使地形有寬狹尖斜經界則不避山河之曲其田則就得井處為井不能就成處或五七或三四或一夫其實田數則在又或就不成一夫處亦可計百畝之數而授之無不可行者如此則經界隨山隨河皆不害於畫之也苟如此畫定雖便使暴君汙吏亦數百年壞不得經界之壞亦非專在秦時其來亦逺漸有壞矣正叔云至如魯二吾猶不足如何得至十一也子厚言百畝而徹言徹取之徹則無義是透徹之徹透徹而耕則功力均且相驅率無一家得惰者及已收穫則計畝數裒分之以裒分之數取十一之數亦可或謂井議不可輕示人恐致笑及有議論子厚謂有笑有議論則方有益也若有人聞其説取之以為己功先生云如有能者則願受一㕓而為氓亦幸也伯淳言井田今取民田使貧富均則願者衆不願者寡正叔言亦未可言民情怨怒止論可不可爾須使上下都無此怨怒方可行正叔言議法既大備却在所以行之之道子厚言豈敢某止欲成書庶有取之者正叔言不行於當時行於後世一也子厚曰徒善不足以為政徒法不能以自行須是行之之道又雖有仁心仁聞而政不行者不由先王之道也須是法先王正叔言孟子於此善為言只極目力焉能盡方圓平直須是要規矩二程問官户占田過制者如何如文曽有田極多只消與五十里采地儘多又問其他如何今之公卿非如古之公卿舊有田多者與之采地多槩與之則無以别有田者無田者正叔説堯夫對上之詞言陛下冨國強兵後待做甚以為非是此言安足諭人主如周禮豈不是冨國之術存焉子厚言堯夫抑上冨強之説正猶為漢武帝言神仙之學長年不足惜言豈可入聖賢之曉人不如此之拙如梁惠王問何以利國則説利不可言之理極言之以至不奪不饜正叔言人志於王道是天下之公議反以為私説何也子厚言只為心不大心大則做得大正叔言只是做一喜好之事為之不知只是合做伯淳言邵堯夫病革且言試與觀化一遭子厚言觀化他人便觀得自家又如何觀得化嘗觀堯夫詩意才做得識道理却無儒術未見所得正叔言蜥蝪含氷隨雨震起子厚言未必然雹儘有大者豈盡蜥蝪所致也今以蜥蝪求雨枉求他他又何道致雨正叔言伯淳守官南方長吏使往茅山請龍辭之謂祈請鬼神當使信嚮者則有應今先懷不信便非義理既到茅山嵒敕使人於水中捕得二龍持之歸並無他異復為小人玩之致死此為魚蝦之類但形狀差異如龍之狀爾此蟲廣南亦有之其形狀同只齧人有害不如茅山不害人也正叔言永叔詩笑殺潁隂常處士十年騎馬聽朝雞夙興趨朝非可笑之事不必如此説又言常秩晚為利昏元來便有在此鄉黨莫之尊也正叔言今責罪官吏殊無養士君子廉恥之道必斷言徒流杖數贖之以銅便非養士君子之意如古人責其罪皆不深指斥其惡如責不廉則曰俎豆不修有人言今日士大夫未見賢者正叔言不可謂士大夫有不賢者便為朝廷之官人不用賢也彭汝礪懇辭臺職正叔言報上之效已了邪上冒天下議論顯拔致此曽此為報上之意已足正叔言禮院者天下之事無不關此但得其人則事儘可以考古立法苟非其人只是從俗而已正叔言昏禮結髮無義欲去久矣不能言結髮為夫婦者只是指其少小也如言結髮事君李廣言結髮事胸奴只言初上頭也豈謂合髻子子厚云絶非禮義便當去之古人凡禮講修已定家家行之皆得如此今無定制每家各定此所謂家殊俗也至如朝廷之禮皆不中節正叔論安南事當初邊上不便令逐近點集應急救援其時雖將帥革兵冒涉炎瘴朝廷以赤子為憂亦有所不恤也其時不救應放令縱恣戰殺至數萬今既後時又不候至秋涼迄冬一直趨冦亦可以前食嶺北食積於嶺南般運今乃正於七月過嶺以瘴死者百數分及過境又糧不繼深至賊巢以筏渡五百人過江且砍且焚破其竹寨幾重不能得復棹其空筏續以救兵反為賊兵會合禽殺吾衆無救或死或逃遂不成功所爭者二十五里耳欲再往又無舟可渡無糧以戍此謬算未之有也猶得賊辭差順遂得有詞且承當了若使其言猶未順如何處之運糧者死八萬戰兵瘴死十一萬餘得二萬八千人生還尚多病者又先為賊戮數萬都不下三十萬口其昏謬無謀如此甚也有人言郭璞以鳩鬬占吉凶子厚言此為他誠實信之所以就而占得吉凶正叔言但有意向此便可以兆也非鳩可以占吉凶耳正叔言郭逵新貴時衆論喧然未知其人如何後聞人言欲買韓王宅更不問可知也如韓王者當代功臣一宅已致而欲有之大煞不識好惡子厚言昔年有人欲為范希文買緑野堂希文不肯識道理自不然在唐如晉公者是可尊也一旦取其物而有之如何得安在他人猶可如王維莊之類獨有晉公則不可寧使耕壞及他有力者致之已則不可取正叔言管轄人亦須有法徒嚴不濟事今帥千人能使千人依時及節得飯喫亦能有幾人嘗謂軍中夜驚亞夫堅卧不起善矣然猶夜驚何也亦是未盡善正叔謂今唱名何不使伊儒冠徐步進見何用二人把見趨走不得使殿上大臣有愧色子厚言只先出榜使之見其先後何用旋開卷呼名正叔言某見居位者百事不理會只恁箇大肚皮於子厚却願奈煩處之子厚言關中學者用禮漸成俗正叔言自是關中人剛徑敢為子後言亦是自家規矩大寬正叔言某家治喪不用浮屠在洛亦有一二人家化之自不用釋氏道場之用螺鈸蓋胡人之樂也今用之死者之側是以其樂臨死者也天竺之人重僧見僧必飯之因使作樂於前今乃以為之於死者之前至如慶禱亦雜用之是甚義理如此事被他欺謾千百年無一人理會者正叔謂何以謂之君子何以謂之小人君子則所見者大小人則所見者小且近君子之志所慮者豈止其一身直慮及天下千萬世小人之慮一朝之忿曽不遑恤其身伯淳謂才與誠一物則周天下之治子厚因謂此何事於仁必也聖乎吕進伯老而好學理會直是到底正叔謂老喜學者尤可愛人少壯則自當勉至於老矣志力須倦又慮學之不能及又年數之不多不曰朝聞道夕死可矣乎學不多年數之不足不猶愈於終不聞乎子厚言十詩之作止是欲驗天心於語默間耳正叔謂若有他言語又烏得已也子厚言十篇次敘固自有先後正叔言成周恐只是統名雒邑是都也成周猶今言西京也雒邑猶今言河南府孔安國以成周為下邑非也豈有以師保治於下邑白馬寺之所恐是遷頑民之處洛州有言中州南州之名恐是作邑分為九州後始言成周恐是舊城壞而復城之或是其始為邑不為城牆故後始城二程解窮理盡性以至於命只窮理便是至於命子厚謂亦是失於大快此義儘有次序須是窮理便能盡得已之性則推類又盡人之性既盡得人之性須是并萬物之性一齊盡得如此然後至於天道也其間煞有事豈有當下理會了學者須是窮理為先如此則方有學今言知命與至於命儘有近逺豈可以知便謂之至也正叔謂洛俗恐難化於秦人子厚謂秦俗之化亦先自和叔有力焉亦是士人敦厚東方亦恐難肯向風正叔辨周都言榖洛鬬毁王宫今榖洛相合處在七里店南既言毁王宫則周室亦恐不逺於今之宫闕也子厚謂昔嘗謂伯淳優於正叔今見之果然其救世之志甚誠切亦於今日天下之事儘記得熟子厚言今日之往來俱無益不如間居與學者講論資養後生却成得事正叔言何必然義當來則來當往則往爾二程言人不易知子厚言人誠知之為艱然至於伎術能否人情善惡便可知惟以秦武陽殺人於市見秦始皇懼此則不可知二程遺書卷十
