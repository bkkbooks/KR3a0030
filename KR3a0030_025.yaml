body:
  text: 二程遺書卷二十五宋朱子編暢濳道本胡氏註云識者疑其間多非先生語大學曰物有本末事有終始知所先後則近道矣人之學莫大於知本末終始致知在格物則所謂本也始也治天下國家則所謂末也終也治天下國家必本諸身其身不正而能治天下國家者無之格猶窮也物猶理也猶曰窮其理而已也窮其理然後足以致之不窮則不能致也格物者適道之始欲思格物則固已近道矣是何也以收其心而不放也知者吾之所固有然不致則不能得之而致知必有道故曰致知在格物大學論誠意已下皆窮其意而明之獨格物則曰物格而後知至蓋可以意得而不可以言傳也自格物而充之然後可以至聖人不知格物而先欲意誠心正修身者未有能中於理者致知在格物非由外鑠我也我固有之也因物有遷迷而不知則天理滅矣故聖人欲格之隨事觀理而天下之理得矣天下之理得然後可以至於聖人君子之學將以反躬而已矣反躬在致知致知在格物學貴於自得得非外也故曰自得學莫大於平心平莫大於正正莫大於誠君子之學在於意必固我既亡之後而復於喜怒哀樂未發之前則學之至也心至重鷄犬至輕鷄犬放則知求之心放則不知求豈愛其至輕而忘其至重哉弗思而已矣今世之人樂其所不當樂不樂其所當樂慕其所不當慕不慕其所當慕皆由不思輕重之分也顔淵歎孔子曰仰之彌高鑚之彌堅瞻之在前忽焉在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已此顔子所以善學孔子而深知孔子者也有學不至而言至者循其言亦可以入道荀子曰真積力久則入杜預曰優而柔之使自求之厭而飫之使自趨之管子曰思之思之又重思之思之而不通鬼神將通之非鬼神之力也精神之極也此三者循其言皆可以入道而荀子管子杜預初不能及此自其外者學之而得於内者謂之明自其内者得之而兼於外者謂之誠誠與明一也聞見之知非德性之知物交物則知之非内也今之所謂博物多能者是也徳性之知不假見聞君子不以天下為重而身為輕亦不以身為重而天下為輕凡盡其所當為者如可以仕則仕入則孝之類是也此孔子之道也蔽焉而有執者楊墨之道也能盡飲食言語之道則可以盡去就之道能盡去就之道則可以盡死生之道飲食言語去就死生小大之勢一也故君子之學自微而顯自小而章易曰閑邪存其誠閑邪則誠自存而閑其邪者乃在於言語飲食進退與人交接之際而已矣人皆可以至聖人而君子之學必至於聖人而後已不至於聖人而後已者皆自棄也孝其所當孝弟其所當弟自是而推之則亦聖人而已矣多權者害誠好功者害義取名者賊心君貴明不貴察臣貴正不貴權稱性之善謂之道道與性一也以性之善如此故謂之性善性之本謂之命性之自然者謂之天自性之有形者謂之心自性之有動者謂之情凡此數者皆一也聖人因事以制名故不同若此而後之學者隨文析義求竒異之說而去聖人之意逺矣自性而行皆善也聖人因其善也則為仁義禮智信以名之以其施之不同也故為五者以别之合而言之皆道别而言之亦皆道也舎此而行是悖其性也是悖其道也而世人皆言性也道也與五者異其亦弗學歟其亦未體其性也歟其亦不知道之所存歟道孰為大性為大千里之遠數千嵗之日其所動静起居隨若亡矣然時而思之則千里之遠在於目前數千嵗之久無異數日之近人之性則亦大矣噫人之自小者亦可哀也已人之性一也而世之人皆曰吾何能為聖人是不自信也其亦不察乎自得者所守固而自信者所行不疑學貴信信在誠誠則信矣信則誠矣不信不立不誠不行或問周公勲業人不可為也已曰不然聖人之所為人所當為也盡其所當為則吾之勲業亦周公之勲業也凡人之弗能為者聖人弗為君子之學要其所歸而已矣民可明也不可愚也民可教也不可威也民可順也不可强也民可使也不可欺也孔子曰棖也慾焉得剛甚矣慾之害人也人之為不善欲誘之也誘之而弗知則至於天理滅而不知反故目則欲色耳則欲聲以至鼻則欲香口則欲味體則欲安此皆有以使之也然則何以窒其欲曰思而已矣學莫貴於思唯思為能窒欲曽子之三省室欲之道也好勝者滅理肆欲者亂常可以仕則仕可以止則止可以久則久可以速則速此皆時也未嘗不合中故曰君子而時中喜怒哀樂之未發謂之中中也者言寂然不動者也故曰天下之大本發而皆中節謂之和和也者言感而遂通者也故曰天下之逹道學也者使人求於内也不求於内而求於外非聖人之學也何謂不求於内而求於外以文為主者是也學也者使人求於本也不求於本而求於末非聖人之學也何謂不求於本而求於末考詳略採同異者是也是二者皆無益於身君子弗學墨子之德至矣而君子弗學也以其舎正道而之他也相如太史遷之才至矣而君子弗貴也以所謂學者非學也莊子叛聖人者也而世之人皆曰矯時之弊矯時之弊固若是乎伯夷桞下惠矯時之弊者也其有異於聖人乎抑無異乎莊周老聃其與伯夷桞下惠類乎不類乎子夏曰雖小道必有可觀者焉致遠恐泥子曰攻乎異端斯害也已此言異端有可取而非道之正也君子以識為本行次之今有人焉力能行之而識不足以知之則有異端者出彼將流宕而不知反内不知好惡外不知是非雖有尾生之信曽參之孝吾弗貴矣學莫貴於知言道莫貴於識時事莫貴於知要所聞者所見者外也不可以動吾心孟子曰其為氣也至大至剛以直養而無害此蓋言浩然之氣至大至剛且直也能養之則無害矣伊尹之耕於有莘傅說之築於傅巖天下之事非一一而學之天下之賢才非一一而知之明其在巳而已矣君子不欲才過德不欲名過實不欲文過質才過德者不祥名過實者有殃文過實者莫之與長或問顔子在陋巷而不改其樂與貧賤而在陋巷者何以異乎曰貧賤而在陋巷者處富貴則失乎本心顔子在陋巷猶是處富貴猶是通乎晝夜之道而知晝夜死生之道也知生之道則知死之道盡事人之道則盡事鬼之道死生人鬼一而二二而一者也孔子曰有德者必有言何也和順積於中英華發於外也故言則成文動則成章學不貴博貴於正而已矣言不貴多貴於當而已矣政不貴詳貴於順而已矣意必固我既亡之後必有事焉此學者所宜盡心也夜氣之所存者良知也良能也荀擴而充之化旦晝之所害為夜氣之所存然後可以至於聖人孟子曰盡其心者知其性也知其性則知天矣心也性也天也非有異也人皆有是道唯君子為能體而用之不能體而用之者皆自棄也故孟子曰苟能充之足以保四海苟不能充之不足以事父母夫充與不充皆在我而已德盛者物不能擾而形不能病形不能病以物不能擾也故善學者臨死生而色不變疾痛慘戚而心不動由養之有素也非一朝一夕之力也心之躁者不熱而煩不寒而慄無所惡而怒無所恱而喜無所取而起君子莫大於正其氣欲正其氣莫若正其志其志既正則雖熱不煩雖寒不慄無所怒無所喜無所取去就猶是死生猶是夫是之謂不動心志順者氣不逆氣順志將自正志順而氣正浩然之氣也然則養浩然之氣也乃在於持其志無暴其氣耳中庸曰道不可須臾離也可離非道也又曰道不遠人此特聖人為始學者言之耳論其極豈有可離與不可離而逺與近之說哉學為易知之為難知之非難也體而得之為難致曲者就其曲而致之也人人有貴於已者此其所以人皆可以為堯舜學者當以論語孟子為本論語孟子既治則六經可不治而明矣讀書者當觀聖人所以作經之意與聖人所以用心與聖人所以至聖人而吾之所以未至者所以未得者句句而求之晝誦而味之中夜而思之平其心易其氣闕其疑則聖人之意見矣人之生也小則好馳騁弋獵大則好建立功名此皆血氣之盛使之然耳故其衰也則有不足之色其病也則有可憐之言夫人之性至大矣而為形氣之所役使而不自知哀哉吾未見嗇於財而能為善者也吾未見不誠而能為善者也君子之學也使先知覺後知使先覺覺後覺而老子以為非以明民將以愚之其亦自賊其性矣有求為聖人之志然後可與共學學而善思然後可與適道思而有所得則可與立立而化之則可與權非禮勿視非禮勿聽非禮勿言非禮勿動視聽言動一於禮之謂仁仁之於禮非有異也孔子告仲弓曰出門如見大賓使民如承大祭已所不欲勿施於人夫君子能如是用心能如是存心則惡有不仁者乎而其本可以一言而蔽之曰思無邪無好學之志則雖有聖人復出亦無益矣然聖人在上而民多善者以涵泳其教化深且逺也習聞之久也禮記除中庸大學唯樂記為最近道學者深思自求之禮記之表記其亦近道矣乎其言正學者必求其師記問文章不足以為人師以所學者外也故求師不可不慎所謂師者何也曰理也義也少成若天性習慣成自然雖聖人復出不易此言孔子曰性相近也習相逺也唯上智與下愚不移下愚非性也不能盡其才也君子所以異於禽獸者以有仁義之性也苟縱其心而不知反則亦禽獸而已形易則性易性非易也氣使之然也禮儀三百威儀三千非絶民之欲而强人以不能也所以防其欲戒其侈而使之入道也多識於鳥獸草木之名所以明理也至顯者莫如事至微者莫如理而事理一致微顯一源古之君子所謂善學者以其能通於此而已君子之學貴乎一一則明明則有功盛德者言傳文盛者言亦傳名數之學君子學之而不以為本也言語有序君子知之而不以為始也孔子之道發而為行如鄉黨之所載者自誠而明也由鄉黨之所載而學之以至於孔子者自明而誠也及其至焉一也聞善言則拜禹所以為聖人也以能問不能以多問寡顔子所以為大賢也後之學者有一善而自足哀哉為學之道必本於思思則得之不思則不得也故書曰思曰睿睿作聖思所以睿睿所以聖也學以知為本取友次之行次之言次之信不足以盡誠猶愛不足以盡仁董仲舒曰正其誼不謀其利明其道不計其功此董子所以度越諸子堯舜之為善與桀跖之為惡其自信一也老子曰失道而後德失德而後仁失仁而後義失義而後禮則道德仁義禮分而為五也聖人無優劣堯舜之讓禹之功湯武之征伐伯夷之清桞下惠之和伊尹之任周公在上而道行孔子在下而道不行其道一也不深思則不能造於道不深思而得者其得易失然而學者有無思無慮而得者何也曰以無思無慮而得者乃所以深思而得之也以無思無慮為不思而自以為得者未之有也原始則足以知其終反終則足以知其始死生之說如是而已矣故以春為始而原之其必有冬以冬為終而反之其必有春死生者其與是類也其次致曲者學而後知之也而其成也與生而知之者不異焉故君子莫大於學莫害於畫莫病於自足莫罪於自棄學而不止此湯武所以聖也古之學者為巳其終至於成物今之學者為物其終至於䘮已杞桞荀子之說也湍水楊子之說也聖人所知宜無不至也聖人所行宜無不盡也然而書稱堯舜不曰刑必當罪賞必當功而曰罪疑惟輕功疑惟重與其殺不辜寜失不經異乎後世刻核之論矣自夸者近刑自喜者不進自大者去道遠君子之學必日新日新者日進也不日新者必日退未有不進而不退者唯聖人之道無所進退以其所造者極也事上之道莫如忠待下之道莫若怒中庸之書學者之至也而其始則曰戒慎乎其所不睹恐懼乎其所不聞蓋言學者始於誠也揚子無自得者也故其言蔓衍而不斷優柔而不决其論性則曰人之性也善惡混修其善則為善人修其惡則為惡人荀子悖聖人者也故列孟子於十二子而謂人之性惡性果惡邪聖人何能反其性以至於斯邪聖人之言逺如天近如地其遠也若不可得而及其近也亦可得而行揚子曰聖人之言逺如天賢人之言近如地非也或問賈誼曰誼之言曰非有孔子墨翟之賢孔與墨一言之其識末矣其亦不善學矣必井田必封建必肉刑非聖人之道也善治者放井田而行之而民不病放封建而使之而民不勞放肉刑而用之而民不怨故善學者得聖人之意而不取其迹也迹也者聖人因其一時之利而制之也夫人㓜而學之將欲成之也既成矣將以行之也學而不能成其學成而不能行其學則烏足貴哉待人有道不疑而已使夫人有心害我邪雖疑不足以化其心使夫人無心害我邪疑則已德内損人怨外生故不疑則兩得之矣疑則兩失之矣而未有多疑能為君子者也昔者聖人立人之道曰仁曰義孔子曰仁者人也親親為大義者宜也尊賢為大唯能親親故老吾老以及人之老㓜吾㓜以及人之㓜唯能尊賢故賢者在位能者在職唯仁與義盡人之道盡人之道則謂之聖人學者不可以不誠不誠無以為善不誠無以為君子修學不以誠則學雜為事不以誠則事敗自謀不以誠則是欺其心而自棄其志與人不以誠則是䘮其德而増人之怨今小道異端亦必誠而後得而况欲為君子者乎故曰學者不可以不誠雖然誠者在知道本而誠之耳古者卜筮將以决疑也今之卜筮則不然計其命之窮通校其身之達否而已矣噫亦惑矣不思故有惑不求故無得不問故不知世之服食欲壽者其亦大愚矣夫命者受之於天不可増損加益而欲服食而壽悲哉見攝生者而問長生謂之大愚見卜者而問吉凶謂之大惑或問性曰順之則吉逆之則凶孔子沒曽子之道日益光大孔子沒傳孔子之道者曽子而已曽子傳之子思子思傳之孟子孟子死不得其傳至孟子而聖人之道益尊孟子曰可以仕則仕可以止則止可以久則久可以速則速孔子也孔子聖之時者也故知易者莫若孟子孟子曰王者之迹熄而詩亡詩亡然後春秋作春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也故知春秋者莫若孟子禮之本岀於民之情聖人因而道之耳禮之器出於民之俗聖人因而節文之耳聖人復出必因今之衣服器用而為之節文其所謂貴本而親用者亦在時王斟酌損益之爾二程遺書卷二十五
