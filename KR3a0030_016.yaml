body:
  text: 二程遺書卷十六宋朱子編己巳冬所聞問孔子稱伯夷叔齊曰不念舊惡怨是用希何也曰以夷齊之隘若念舊惡將不能處世矣問子貢曰博施於民而能濟衆可謂仁乎子曰何事於仁必也聖乎仁聖何以相别曰此子貢未識仁故測度而設問也惟聖人為能盡仁然仁在事不可以為聖又問堯舜其猶病諸果乎曰誠然也聖人惟恐所及不逺不廣四海之治也孰若兼四海之外亦治乎身嘗以為病也博施濟衆事大故仁不足以名之趙景平問子罕言利與命與仁所謂利者何利曰不獨財利之利凡有利心便不可如作一事須尋自家穩便處皆利心也聖人以義為利義安處便為利如釋氏之學皆本於利故便不是趙景平問未見蹈仁而死者何謂蹈仁而死曰赴水火而死者有矣殺身成仁者未之有也二程遺書卷十六
  hash: sha256:9f9fad9f1671345aa3858b505c5daed5c384dc633a7f6afc1b72d7b2cec434e2
