body:
  text: 二程遺書卷二十宋朱子編周伯忱本問左氏言子路助衞輙觀其學已升堂肯如是否曰子路非助輙只為孔悝陷於不義欲救之耳蓋蒯聵不用君父之命而入立强盟孔悝孔悝不合從之故也曰子路當時可以免難否曰不可免問左傳可信否曰不可全信信其可信者耳某年貳拾時㸔春秋黄聲隅問某如何㸔答之曰有兩句法云以傳考經之事迹以經别傳之真偽又問公榖如何曰又次於左氏左氏即是丘明否曰傳中無丘明字不可考問此之謂自慊與吾何慊乎哉之慊同否曰慊字則一也不足謂之慊動於中亦謂之慊㸔用處如何二程遺書卷二十
  hash: sha256:1867c25d3941ac35db5d942d68acc2af0eab1d2b34d6dbe4f582c61f0cc02425
