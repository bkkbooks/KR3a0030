body:
  text: 二程遺書卷十九宋朱子編楊遵道録問格物是外物是性分中物曰不拘凡眼前無非是物物皆有理如火之所以熱水之所以寒至於君臣父子間皆是理又問只窮一物見此一物還便見得諸理否曰須是徧求雖顔子赤只能聞一知十若到後來達理了雖億萬亦可通又問如荆公窮物一部字解多是推五行生成如今窮理亦只如此著工夫如何曰荆公舊年說話煞得後來却自以為不是晩年盡支離了問古之學者為己不知初設心時是要為己是要為人曰須先為己方能及人初學只是為己鄭宏中云學者先須要仁仁所以愛人正是顛倒說却新民以明德新民問日新有進意抑只是無弊意曰有進意學者求有益須是日新問有所忿􅓰恐懼憂患心不得其正是要無此數者心乃正乎曰非是謂無只是不以此動一本作累其心學者未到不動處須是執持其志師出以律否臧凶律有二義有出師不以義者有行師而無號令節制者皆失律也師出當以律不然雖臧亦凶今人用師惟務勝而已弟子輿尸貞凶帥師以長子今以弟子衆主之亦是失律故雖貞亦凶也豶豕之牙豕牙最能嚙害人只制其牙如何制得今人為惡却只就他惡禁之便無由禁之此見聖人機㑹處䘮羊于易羊羣行而觸物大壯衆陽並進六五以隂居位惟和易然後可以䘮羊易非難易之易乃和易樂易之易易有百餘家難為徧觀如素未讀不曉文義且須㸔王弼胡先生荆公三家理㑹得文義且要熟讀然後却有用心處讀易須先識卦體如乾有元亨利貞四德缺却一箇便不是乾須要認得反復道也言終日乾乾徃來皆由於道也三位在二體之中可進而上可退而下故言反復知至至之如今學者且先知有至處便從此至之是可與幾也非知幾者安能先識至處知終終之知學之終處而終之然後可與守義王荆公云九三知九五之位可至而至之大煞害事使人臣常懐此心大亂之道亦自不識湯武知至至之只是至其道也荆公言用九只在上九一爻非也六爻皆用九故曰見羣龍无首吉用九便是行徤處天德不可為首言乾以至剛徤又安可更為物先為物先則有祸所謂不敢為天下先乾順時而動不過處便是不為首六爻皆同問胡先生解九四作太子恐不是卦義先生云亦不妨只㸔如何用當儲貳則做儲貳使九四近君便作儲貳亦不害但不要拘一若執一事則三百八十四爻只作得三百八十四件事便休也㸔易且要知時凡六爻人人有用聖人自有聖人用賢人自有賢人用衆人自有衆人用學者自有學者用君有君用臣有臣用無所不通因問坤卦是臣之事人君有用處否先生曰是何無用如厚德載物人君安可不用隂為小人利為不善不可一槩論夫隂助陽以成物者君子也其害陽者小人也夫利和義者善也其害義者不善也利貞者性情也言利貞便是乾之性情因問利與以利為本之利同否先生曰凡字只有一箇用有不同只㸔如何用凡順理無害處便是利君子未嘗不欲利然孟子言何必曰利者葢只以利為心則有害如上下交征利而國危便是有害未有仁而遺其親未有義而後其君不遺其親不後其君便是利仁義未嘗不利謝師直為長安漕明道為鄠縣簿論易及春秋明道云運使春秋猶有所長易則全理㑹不得師直一日說與先生先生答曰據某所見二公皆深知易者師直曰何故先生曰以運使能屈節問一主簿以一主簿敢言運使不知易非深知易道者不能雲行雨施是乾之亨處乾六爻如欲見聖人曽履處當以舜可見在側陋便是潛陶漁時便是見升聞時便是乾乾納于大麓時便是躍介甫以武王觀兵為九四大無義理兼觀兵之說亦自無此事如今日天命絶則今日便是獨夫豈容更留之三年今日天命未絶便是君也為人臣子豈可以兵脅其君安有此義又紂鷙狠若此太史公謂有七十萬衆未知是否然書亦自云紂之衆若林三年之中豈肯容武王如此便休得也只是太誓一篇前序云十有一年後面正經便說惟十有三年先儒誤妄遂轉為觀兵之說先王無觀兵之事不是前序一字錯却便是後面正經三字錯却先儒以六為老隂八為少隂固不是介甫以為進君子而退小人則是聖人旋安排義理也此且定隂陽之數豈便說得義理九六只是取純隂純陽惟六為純隂只取河圖數見之過六則一陽生至八便不是純隂或以小畜為臣畜君以大畜為君畜臣先生云不必如此大畜只是所畜者大小畜只是所畜者小不必指定一件事便是君畜臣臣畜君皆是這箇道理随大小用陳瑩中答吴國華書天在山中說云便是芥子納須彌之義先生謂正南北說却須彌無體芥子無量問瑩中嘗愛文中子或問學易子曰終日乾乾可也此語最盡文王所以聖亦只是箇不已先生曰凡說經義如只管節節推上去可知是盡夫終日乾乾未盡得易據此一句只做得九三使若謂乾乾是不巳不已又是道漸漸推去則自然是盡只是理不如此子在川上曰逝者如斯夫言道之體一作徃如此這裏須是自見得張繹曰此便是無窮先生曰固是道無窮然怎生一箇無窮便了得他一作便道了却他問括囊事還做得在位使否先生曰六四位是在上然坤之六四却是重隂故云賢人隱便做不得在位又問恐後人縁此謂有朝隱者先生曰安有此理向林希嘗有此說謂揚雄為禄隱揚雄後人只為見他著書便須要做他是怎生做得是因問如劇秦文莫不當作先生云或云非是羙之乃譏之也然王莽將來族誅之亦未足道又何足譏譏之濟得甚事或云且以免死然己自不知明哲煌煌之義何足以保身作太𤣥本要明易却尤晦如易其實無益真屋下架屋牀上疊牀他只是於易中得一數為之於歴法雖有合只是無益今更於易中推出來做一百般太𤣥亦得要尤難明亦得只是不濟事大明終始人能大明乾之終始便知六位時成却時乘六龍以當天事先迷後得是一句主利是一句蓋坤道惟是主利文言後得主而有常處脫却一利字介甫解直方大云因物之性而生之直也成物之形而不可易方也人見似好只是不識理如此是物先有箇性坤因而生之是甚義理全不識也至大至剛以直此三者不可闕一闕一便不是浩然之氣如坤所謂直方大是也但坤卦不可言剛言剛則害坤體然孔子於文言又曰坤至柔而動也剛方即剛也因問見李籲録明道語中却與先生說别解至剛處云剛則不屈則是於至剛巳帶却直意又曰以直道順理而養之則是以直字連下句在學者著工夫處說却先生曰先兄無此言便不講論到此舊嘗令學者不要如此編録纔聽得轉動便别舊曽㸔只有李籲一本無錯編者他人多只依說時不敢改動或脫忘一兩字便大别李籲却得其意不拘言語徃徃録得都是不知尚有此語只剛則不屈亦未穩當孔子教人各因其材有以政事入者有以言語入者有以德行入者性出於天才出於氣氣清則才清氣濁則才濁譬猶木焉曲直者性也可以為棟梁可以為榱桷者才也才則有善與不善性則無不善惟上智與下愚不移非謂不可移也而有不移之理所以不移者只有兩般為自暴自棄不肯學也使其肯學不自暴自棄安不可移哉揚雄韓愈說性正說著才也韓退之說叔向之母聞楊食我之生知其必滅宗此無足怪其始便禀得惡氣便有滅宗之理所以聞其聲而知之也使其能學以勝其氣復其性可無此患性相近也此言所禀之性不是言性之本孟子所言便正言性之本問先生云性無不善才有善不善揚雄韓愈皆說著才然觀孟子意却似才亦無有不善及言所以不善處只是云舎則失之不肯言初禀時有不善之才如云非天之降才爾殊是不善不在才但以遇凶嵗䧟溺之耳又觀牛山之木人見其濯濯也以為未嘗有才焉此豈山之性是山之性未嘗無才只為斧斤牛羊害之耳又云人見其禽獸也以為未嘗有才焉是豈人之情也哉所以無才者只為旦晝之所為又梏亡之耳又云乃若其情則可以為善矣乃所謂善若夫為不善非才之罪也則是以情觀之而才未嘗不善觀此數處切疑才是一箇為善之資譬如作一器械須是有器械材料方可為也如云惻隱之心仁也云云故曰求則得之舎則失之或相倍蓰而無算者不能盡其才也則四端者便是為善之才所以不善者以不能盡此四端之才也觀孟子意似言性情才三者皆無不善亦不肯於所禀處說不善今謂才有善不善何也或云善之地便是性欲為善便是情能為善便是才如何先生云上智下愚便是才以堯為君而有象以瞽叟為父而有舜亦是才然孟子只云非才之罪者蓋公都子正問性善孟子且答他正意不暇一一辨之又恐失其本意如萬章問象殺舜事夫堯巳妻之二女迭為賓主當是時已自近君豈復有完廩浚井之事象欲使二嫂治棲當是時堯在上象還自度得道殺却舜後取其二女堯便了得否必無此事然孟子未暇與辨且答這下意生而知之學而知之亦是才問生而知之要學否先生曰生而知之固不待學然聖人必須學先生每與司馬君實說話不曽放過如范堯夫十件事只爭得三四件便己先生曰君實只為能受盡言儘人忤逆終不怒便是好處君實嘗問先生云欲除一人給事中誰可為者願為光說一人先生曰相公何為若此言也如當初泛論人才却可今既如此某雖有其人何可言君實曰出於公口入於光耳又何害先生終不言一本云先生曰某斷不說先進後進如今人說前軰後軰先進於禮樂謂舊時前軰之人於禮樂在今觀之以為朴也後進於禮樂謂今晩進之人於禮樂在今觀之以為君子君子者文質彬彬之名蓋周末文盛故以前人為野而自以當時為君子不知其過於文也故孔子曰則吾從先進孔子弟子善問直窮到底如問鄉人皆好之何如曰未可也便又問鄉人皆惡之何如又說足食足兵民信之矣便問必不得已而去於斯三者何先纔說去兵便問不得已而去於斯二者何先自非聖人不能答便云去食自古皆有死民無信不立不是孔子弟子不能如此問不是聖人不能如此答禮記儒行經解全不是因舉呂與叔解亦云儒行誇大之語非孔子之言然亦不害義理先生曰煞害義理恰恨易便只潔淨精㣲了却詩便只温柔敦原了却皆不是也祭法如夏后氏郊鯀一片皆未可據問聖人有為貧而仕者否曰孔子為乘田委吏是也又問或云乘田委吏非為貧為之兆也先生曰乘田委吏却不是為兆為魯司寇便是為兆一本此下有十六字云有人云先生除國子監之命不受是固也先生因言近煞有人以此相勉某答云待饑餓不能出門户時當别相度荀揚性已不識更說甚道鄧文孚問孟子還可為聖人否曰未敢便道他是聖人然學已到至處又問孟子書中有不是處否曰只是門人録時錯一兩字如說大人則藐之夫君子無不敬如有心去藐他人便不是也更說夷惠處云皆古聖人須錯字若以夷惠為聖之清聖之和則可便以為聖人則不可㸔孟子意必不以夷惠為聖人如伊尹又别初在畎畝湯使人問之曰我何以湯之幣聘為哉是不肯仕也及湯盡禮然後翻然而從之亦是聖之時如五就湯五就桀自是後來事蓋已出了則當以湯之心為心所以五就桀不得不如此荆公嘗與明道論事不合因謂明道曰公之學如上壁言難行也明道曰參政之學如捉風及後來逐不附已者獨不怨明道且曰此人雖未知道亦忠信人也張戩嘗於政事堂與介甫爭辨事因舉經語引證介甫乃曰安石却不㑹讀書賢却㑹讀書戩不能答先生因云却不向道只這箇便是不㑹讀書佛家有印證之說極好笑豈有我曉得這箇道理後因他人道是了方是他人道不是便不是又五祖令六祖三更時來傳法如期去便傳得安有此理謝良佐與張繹說某到山林中靜處便有喜意覺著此不是先生曰人每至神廟佛殿處便敬何也只是每常不敬見彼乃敬若還常敬則到佛殿廟宇亦只如此不知在閙處時此物安在直到静處乃覺繹言伊云只有這些子已覺先生曰這回比舊時煞長進這些子已覺固是若謂只有這些子却未敢信胡云本註朱子權親見謝先生云某未嘗如此說恐傳録之悮也屢空兼兩意惟其能虚中所以能屢空貨殖便生計較纔計較便是不受命不受命者不能順受正命也呂與叔解作如貨殖先生云傳記中言子貢貨殖處亦多此子貢始時事萬物皆有良能如每常禽鳥中做得窩子極有巧妙處是他良能不待學也人初生只有喫乳一事不是學其他皆是學人只為智多害之也人心私欲也道心正心也危言不安微言精微惟其如此所以要精一惟精惟一者專要精一之也精之一之始能允執厥中中是極至處或云介甫說以一守以中行只為要事事分作兩處詩小序便是當時國史作如當時不作雖孔子亦不能知况子夏乎如大序則非聖人不能作用之鄉人焉用之邦國焉如二南之詩及大雅小雅是當時通上下皆用底詩蓋是修身治家底事闗雎樂得淑女以配君子淑女郎后妃也故言配荇菜以興后妃之柔順左右流之左右者随水之貎左右采之者順水而采之左右芼之者順水而芼之皆是言荇菜柔順之貎以興后妃之德琴瑟友之鍾鼓樂之言后妃之配君子和樂如此也憂在進賢不滛其色哀窈窕思賢才而無傷善之心焉自是闗雎之義如此非謂后妃也此一行甚分明人自錯解却口目耳鼻四支之欲性也然有分焉不可謂我須要得是有命也仁義禮智天道在人賦於命有厚薄是命也然有性焉可以學故君子不謂命則以學文便是讀書人生便知有父子兄弟須是先盡得孝弟然後讀書非謂已前不可讀書禮勝則離故禮之用和為貴先王之道斯為羙小大由之樂勝則流故有所不行知和而和不以禮節之亦不可行禮以和為貴故先王之道以此為羙而小大由之然却有所不行者以知和而和不以禮節之故亦不可行也望道而未之見言文王視民如傷以紂在上望天下有道而未之見湯執中武王不泄邇非謂武王不能執中湯却泄邇蓋各因一件事言之人謂各舉其最盛者非也聖人亦無不盛魯得用天子禮樂使周公在必不肯受故孔子曰周公之衰乎孔子以此為周公之衰是成王之失也介甫謂周公有人臣不能為之功故得用人臣所不得用之禮非也臣子身上沒分外過當底事凡言舜言曽子為孝不可謂曽子舜過於孝也克明峻德只是說能明峻德之人凡為天下國家有九經曰修身也尊賢也親親也蓋先尊賢然後能親親夫親親固所當先然不先尊賢則不能知親親之道禮記言克明峻德顧諟天之明命皆自明也者皆由於明也平章百姓百姓只是民凡言百姓處皆只是民百官族姓巳前無此說陳平只是幸而成功當時順却諸吕亦只是畏死漢之君臣當恁時豈有樸素頭為社稷者使後來少主在事變却時他也則隨却如令周勃先入北軍陳平亦不是推功讓能底人只是占便宜令周勃先試難也其謀甚拙其後成功亦幸如人臣之義當以王陵為正周勃當時初入北軍亦甚拙何事令左袒則甚忽然當時皆右袒後還如何當時已料得必左袒又何必更號令如未料得豈不生變只合驅之以義管它從與不從韓信初亡蕭何追之高祖如失左右手却兩日不追及蕭何反問之曰何亡也曰臣非亡乃追亡者也當時高祖豈不知此二人乃肯放與項羽兩日不追邪乃是蕭何與高帝二人商量做來欲致韓信之死爾當時史官已被高祖瞞過後人又被史官瞞惜乎韓信與項羽諸葛亮與司馬仲達不曽合戰更得這兩箇戰得幾陣不妨有可觀先生每讀史到一半便掩卷思量料其成敗然後却㸔有不合處又更精思其間多有幸而成不幸而敗今人只見成者便以為是敗者便以為非不知成者煞有不是敗者煞有是底讀史須見聖賢所存治亂之機賢人君子出處進退便是格物今人只將他見成底事便做是使不知煞有誤人處先生在講筵嘗典錢使諸公因問必是俸給大段不足後乃知到任不曽請俸諸公遂牒户部問不支俸錢户部索前任歴子先生云某起自草萊無前任歴子舊例初入京官時用下狀出給料錢歴其意謂朝廷起我便當廪人繼粟庖人繼肉也遂令户部自為出劵歴户部只欲與折支諸公又理㑹舘閣尚請見錢豈有經筵官只請折支又檢例已無崇政殿說書多時戸部遂定巳前未請者只與折支自後為始支見錢先生後自涪陵歸復官半年不曽請俸粮料院吏人忽來索請劵狀子先生云自來不㑹寫狀子受事人不去只令子弟録與受官月日先生在經筵時與趙侍郎范純甫同在後省行見曉示至節令命婦進表賀太皇及太后太妃趙范更問備辦因問先生先生云某家無命婦二公愕然問何不叙封先生曰某當時起自草萊三辭然後受命豈有今日乃為妻求封之理其夫人至今無封號問今人陳乞恩例義當然否人皆以為本分者不一作不以為害先生曰只為而今士大夫道得箇乞字慣却動不動又是乞也因問陳乞封父祖如何先生曰此事體又别再三請益但云其說甚長待别時說范堯夫為蜀漕成都帥死堯夫權府是時先生隨侍過成都堯夫出送先生已行二里急遣人追及之回至門頭僧寺相見堯夫因問先生在此有何所聞先生曰聞公嘗言當使三軍之士知事帥君如事父母不知有此語否堯夫愕然疑其言非是先生曰公果有此語一國之福也堯夫方喜先生却云恐公未能使人如此堯夫再三問之先生曰只如前日公權府前帥方死便使他臣子張樂大排此事當時莫可罷堯夫云便是純仁當時不就席只令通判伴坐先生曰此尤不是堯夫驚愕即應聲曰悔當初只合打散便是先生曰又更不是夫小人心中只得些物事時便喜不得便不足他既不得物事却歸去思量因甚不得此物元來是為帥君小人須是切巳乃知思量若只與他物事他自歸去豈更知有思量堯夫乃嗟歎曰今日不出安得聞此言先生云韓持國服義最不可得一日某與持國范夷叟泛舟于頴昌西湖須臾客將去有一官員上書謁見大資某將謂有甚急切公事乃是求知己某云大資居位却不求人乃使人到來求已是甚道理夷叟云只為正叔一作姨夫太執求薦章常事也某云不然只為曽有不求者不與來求者與之遂致人如此持國便服先生初受命便在假欲迤邐尋醫既而供職門人尹焞深難之謂供職非是先生曰新君即位首蒙大恩自二千里放回亦無道理不受某在先朝則知某者也當時執政大臣皆相知故不當如此受今則皆無相知朝廷之意只是怜其貧不使饑餓於我土地某須領他朝廷厚意與受一月料錢然官則某必做不得既已受他誥却不供職是與不受同且畧與供職數日承順他朝廷善意了然後惟吾所欲先生因言今日供職只第一件便做他底不得吏人押申轉運司狀某不曽簽國子監自係臺省臺省係朝廷官外司有事合行申狀豈有臺省倒申外司之理只為從前人只計較利害不計較事體直得恁地須㸔聖人欲正名處見得道名不正時便至禮樂不興自然住不得夫禮樂豈玉帛之交錯鍾鼓之鏗鏘哉今日第一件便如此人不知一似好做作只這些子某便做他官不得若做他底時須一一與理㑹謝某曽問涪州之行知其由來乃族子與故人耳族子謂程公孫故人謂邢恕先生答云族子至愚不足責故人至一作情厚不敢疑孟子既知一作繫之天安用尤臧氏因問邢七雖為惡然必不到更傾先生也先生曰然邢七亦有書到某云屢於權宰處言之不知身為言官却說此話未知傾與不傾只合救與不救便在其間又問邢七久從先生想都無知識後來極狼狽先生曰謂之全無知則不可只是義理不能勝利欲之心便至如此也先生云某自十七八讀論語當時已曉文義讀之愈久但覺意味深長論語有讀了後全無事者有讀了後其中得一兩句喜者有讀了後知好之者有讀了後不知手之舞之足之蹈之者今人不㑹讀書如誦詩三百授之以政不達使於四方不能專對雖多亦奚以為須是未讀詩時授以政不達使四方不能專對既讀詩後便達於政能專對四方始是讀詩人而不為周南召南其猶正墻面而立須是未讀周南召南一似面墻到讀了後便不面墻方是有驗大抵讀書只此便是法如讀論語舊時未讀是這箇人及讀了後又只是這箇人便是不曽讀也大率上一爻皆是師保之任足以當此一爻也若要不學佛須是見得他小便自然不學文中子本是一隱君子世人往往得其議論附㑹成書其間極有格言荀揚道不到處又有一件事半截好半截不好如魏徴問聖人有憂乎曰天下皆憂吾獨得不憂問疑曰天下皆疑吾獨得不疑徴退謂董常曰樂天知命吾何憂窮理盡性吾何疑此言及好下半截却云徴所問者迹也吾告汝者心也心迹之判久矣便亂道文中子言封禪之費非古也其秦漢之侈心乎此言極好古者封禪非謂誇治平乃依本分祭天地後世便把來做一件矜誇底事如周頌告成功乃是陳先王功德非謂誇自己功德文中子續經甚謬恐無此如續書始於漢自漢已來制誥又何足記續詩之備六伐如晉宋後魏北齊後周隋之詩又何足采韓退之言孟子醇乎醇此言極好非見得孟子意亦道不到其言荀揚大醇小疵則非也荀子極偏駮只一句性惡大本已失揚子雖少過然己自不識性更說甚道韓退之言博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎己無待於外之謂德此言却好只云仁與義為定名道與德為虚位便亂說只如原道一篇極好退之每有一兩處直是搏得親切直似知道然却只是博也問文中子謂諸葛亮無死禮樂其有興乎諸葛亮可以當此否先生曰禮樂則未敢望他只說諸葛已近王佐又問如取劉璋事如何先生曰只是這一事大不是便是計較利害當時只為不得此則無以為資然豈有人特地出迎他却於坐上執之大叚害事只是箇為利君子則不然只一箇義不可便休豈可苟為又問如湯兼弱攻昧如何先生曰弱者兼之非謂并兼取他只為助他與之相兼也昧者乃攻亂者乃取亡者乃侮張良亦是箇儒者進退間極有道理人道漢高祖能用張良却不知是張良能用高祖良計謀不妄發發必中如後來立太子事皆是能使高祖必從使之左便左使之右便右豈不是良用高祖乎良本不事高祖常言為韓王送沛公觀良心只是為天下且與成就却事後來與赤松子遊只是箇不肯事高祖如此五德之運却有這道理凡事皆有此五般自小至大不可勝數一日言之便自有一日隂陽一時言之便自有一時隂陽一嵗言之便自有一嵗隂陽一紀言之便自有一紀隂陽氣運不息如王者一代又是一箇大隂陽也唐是土德便少河患本朝火德多水一作火災蓋亦有此理只是須於這上有道理如闗朗卜百年事最好其間須言如此處之則吉不如此處之則凶每事如此蓋雖是天命可以人奪也如仙家養形以奪既衰之年聖人有道以延已衰之命只為有這道理或云尋常觀人出辭氣便可知人先生曰亦安可盡昔横渠嘗以此觀人未嘗不中然某不與他如此後來其弟戩亦學他如此觀人皆不中此安可學觀素問文字氣象只是戰國時人作謂之三墳書則非也道理却總是想當時亦須有來歴其間只是氣運使不得錯不錯未說就使其法不錯亦用不得除是堯舜時十日一風五日一雨始用得且如說潦旱今年氣運當潦然有河北潦江南旱時此且做各有方氣不同又却有一州一縣之中潦旱不同者怎生定得學佛者多要忘是非是非安可忘得自有許多道理何事忘為夫事外無心心外無事世人只被為物所役便覺苦事多若物各付物便役物也世人只為一齊在那昏惑迷暗海中拘滯執泥坑裏便事事轉動不得沒著身處莊子齊物夫物本齊安俟汝齊凡物如此多般若要齊時别去甚處下脚手不過得推一箇理一也物未嘗不齊只是你自家不齊不干物不齊也先生在經筵聞禁中下後苑作坊取金水桶貳隻因見潞公問之潞公言無彥博曽入禁中見只是朱紅無金為者某遂令取文字示潞公潞公始驚怪某當時便令問欲理㑹却聞得長樂宮遂己當時恐是皇帝閣中某須理㑹先生舊在講筵說論語南容三復白圭處内臣貼却容字因問之内臣云是上舊名先生講罷因說適來臣講書見内臣貼却容字夫人主處天下之尊居億兆之上只嫌怕人尊奉過當便生驕心皆是左右近習之人養成之也嘗觀仁宗時宫嬪謂正月為始月蒸餅為炊餅皆此類請自後只諱正名不諱嫌名及舊名纔說了次日孫莘老講論語讀子畏於匡為正先生云且著箇地名也得子畏於正是甚義理又講君祭先飯處因說古人飲食必祭食糓必思始耕者食菜必思始圃者先王無德不報如此夫爲人臣者居其位食其禄必思何所得爵禄來處乃得於君也必思所以報其君凡勤勤盡忠者為報君也如人主所以有崇高之位者蓋得之於天與天下之人共戴也必思所以報民古之人君視民如傷若保赤子皆是報民也每講一處有以開導人主之心處便說始初内臣宫嬪門皆攜筆在後抄録後來見說著佞人之類皆惡之吕微仲使人言今後且刻可傷觸人范堯夫云但不道著名字儘說不妨又講君祭以下甫田本添或問横渠言聖人無知因問有知先生曰纔說無知便不堪是聖人當人不問時只與木石同也先生云吕與叔守横渠學甚固每横渠無說處皆相從纔有說了便不肯回蘇昞録横渠語云和叔言香聲横渠云香與聲猶是有形隨風徃來可以斷續猶為粗耳不如清水今以清冷水置之銀器中隔外便見水珠曽何漏隙之可通此至清之神也先生云此亦見不盡却不說此是水之清銀之清若云是水因甚置甆椀中不如此二程遺書卷十九
