body:
  text: 二程遺書卷四宋朱子編遊定夫所録善言治天下者不患法度之不立而患人材之不成善修身一作善言人材者不患器質之不美而患師學之不明人材不成雖有良法美意孰與行之師學不明雖有受道之質孰與成之行之失莫甚於惡則亦改之而已矣事之失莫甚於亂則亦治之而已矣苟非自暴自棄者孰不可與為君子人有習他經既而舍之習戴記問其故曰决科之利也先生曰汝之是心已不可入於堯舜之道矣夫子貢之髙識曷嘗規規於貨利哉特於豐約之間不能無留情耳且貧富有命彼乃留情於其間多見其不信道也故聖人謂之不受命有志於道者要當去此心而後可語也一本云明道知扶溝縣事伊川侍行謝顯道將歸應舉伊川曰何不止試於太學顯道對曰蔡人鮮習禮記决科之利也先生云云顯道乃止是歲登第注云尹子言其詳如此先生不好佛語或曰佛之道是也其迹非也曰所謂迹者果不出於道乎然吾所攻其迹耳其道則吾不知也使其道不合於先王固不願學也如其合於先王則求之六經足矣奚必佛漢儒之中吾必以揚子為賢然於出處之際不能無過也其言曰明哲煌煌旁燭無疆孫于不虞以保天命孫于不虞則有之旁燭無疆則未也光武之興使雄不死能免誅乎觀於朱泚之事可見矣古之所謂言遜者迫不得已如劇秦美新之類非得已者乎天下之習皆緣世變秦以棄儒術而亡不旋踵故漢興頗知尊顯經術而天下厭之故有東晉之放曠人有語導氣者問先生曰君亦有術乎曰吾嘗夏葛而冬裘饑食而渴飲節嗜欲定心氣如斯而已矣世有以讀書為文為藝者曰為文謂之藝猶之可也讀書謂之藝則求諸書者淺矣萬物本乎天人本乎祖故冬至祭天而祖配之以冬至者氣至之始故也萬物成形於地而人成形於父故以季秋享帝而父配之以季秋者物成之時故也世之信道篤而不惑異端者洛之堯夫秦之子厚而已孟子之時去先王為未遠其學比後世為尤詳又載籍未經秦火然而班爵祿之制已不聞其詳今之禮書皆掇拾於煨燼之餘而多出於漢儒一時之傳會奈何欲盡信而句為之解乎然則其事固不可一二追復矣明道人必有仁義之心然後仁與義之氣睟然達於外故不得於心勿求於氣可也明道君子之教人或引之或拒之各因其所虧者成之而已孟子之不受曹交以交未嘗知道固在我而不在人也故使歸而求之孟子論三代之學其名與王制所記不同恐漢儒所記未必是也象憂亦憂象喜亦喜蓋天理人情於是為至舜之於象周公之於管叔其用心一也夫管叔未嘗有惡也使周公逆知其將畔果何心哉惟其管叔之畔非周公所能知也則其過有所不免矣故孟子曰周公之過不亦宜乎孟子言舜完廩浚井之說恐未必有此事論其理而已堯在上而使百官事舜於畎畝之中豈容象得以殺兄而使二嫂治其棲乎學孟子者以意逆志可也或謂佛之理比孔子為徑曰天下果有徑理則仲尼豈欲使學者迂遠而難至乎故外仲尼之道而由徑則是冒險阻犯荆棘而已侍講窮經將以致用也如誦詩三百授之以政不達使於四方不能専對雖多亦奚以為今世之號為窮經者果能達於政事専對之間乎則其所謂窮經者章句之末耳此學者之大患也問我於辭命則不能恐非孟子語蓋自謂不能辭命則以善言德行自居矣恐君子或不然曰然孔子兼之而自謂不能者使學者務本而已明道孟子曰事親若曾子可也吾以謂事君若周公可也蓋子之事父臣之事君聞有自知其不足者矣未聞其為有餘也周公之功固大矣然臣子之分所當為也安得獨用天子之禮乎其因襲之弊遂使季氏僭八佾三家僭雍徹故仲尼論而非之以謂周公其衰矣侍講師保之任古人難之故召公不說者不敢安於保也周公作書以勉之以為在昔人君所以致治者皆賴其臣而使召公謀所以裕已也復子明辟如稱告嗣天子王矣工尹商陽自謂朝不坐宴不與殺三人足以反命慢君莫甚焉安在為有禮夫君子立乎人之本朝則當引其君於道志於仁而後已彼商陽者士卒耳惟當致力於君命而乃行私情於其間孔子蓋不與也所謂殺人之中又有禮焉者疑記者謬盟可用也要之則不可故孔子與蒲人盟而適衛者特行其本情耳蓋與之盟與未嘗盟同故孔子適衛無疑使要盟而可用與賣國背君亦可要矣不知天則於人之愚智賢否有所不能知雖知之有所不盡故思知人不可以不知天不知人則所親者或非其人所由者或非其道而辱身危親者有之故思事親不可不知人故堯之親九族亦明俊德之人為先蓋有天下者以知人為難以親賢為急二南之詩蓋聖人取之以為天下國家之法使邦家鄉人皆得歌咏之也有天下國家者未有不自齊家始先言后妃次言夫人又次言大夫妻而古之人有能修之身以化在位者文王是也故繼之以文王之詩關雎詩所謂窈窕淑女即后妃也故序以為配君子所謂樂而不淫哀而不傷蓋關雎之義如此非謂后妃之心為然也安定之門人往往知稽古愛民矣則於為政也何有古者鄉田同井而民之出入相友故無爭鬬之獄今之郡邑之訟往往出於愚民以戾氣相搆善為政者勿聽焉可也又時取強暴而好譏侮者痛懲之則柔良者安鬬訟可息矣昭遠本連上二段君子之遇事無巨細一於敬而已簡細故以自崇非敬也飾私智以為竒非敬也要之無敢慢而已語曰居處恭執事敬雖之夷狄不可棄也然則執事敬者固為仁之端也推是心而成之則篤恭而天下平矣士之所難者在有諸己而已能有諸己則居之安資之深而美且大可以馴致矣徒知可欲之善而若存若亡而已則能不受變於俗者鮮矣馮道更相數主皆其讐也安定以為當五代之季生民不至於肝腦塗地者道有力焉雖事讐無傷也荀彧佐曹操誅伐而卒死於操君實以為東漢之衰彧與攸視天下無足與安劉氏者惟操為可依故俯首從之方是時未知操有他志也君子曰在道為不忠在彧為不智如以為事固有輕重之權吾方以天下為心未暇恤人議已也則枉己者未有能直人者也世之議子雲者多疑其投閣之事以法言觀之蓋未必有又天祿閣世傳以為髙百尺宜不可投然子雲之罪特不在此黽勉於莽賢之間畏死而不敢去是安得為大丈夫哉公山弗擾以費叛不以召畔人逆黨而召孔子則其志欲遷善悔過而未知其術耳使孔子而不欲往是沮人為善也何足以為孔子道之外無物物之外無道是天地之間無適而非道也即父子而父子在所親即君臣而君臣在所嚴一作敬以至為夫婦為長幼為朋友無所為而非道此道所以不可須臾離也然則毁人倫去四大者其分於道也逺矣故君子之於天下也無適也無莫也義之與比若有適有莫則於道為有間非天地之全也彼釋氏之學於敬以直內則有之矣義以方外則未之有也故滯固者入於枯槁疏通者歸於肆恣一作放肆此佛之教所以為隘也吾道則不然率性而已斯理也聖人於易備言之乾聖人之分也可欲之善屬焉坤學者之分也有諸己之信屬焉仲尼言仁未嘗兼義獨於易曰立人之道曰仁與義而孟子言仁必以義配蓋仁者體也義者用也知義之為用而不外焉可與語道矣世之所論於義者多外之不然則混而無别非知仁義之說者也門人有曰吾與人居視其有過而不告則於心有所不安告之而不受則奈何曰與之處而不告其過非忠也要使誠意之交通在於未言之前則言出而人信矣剛毅木訥質之近乎仁也力行學之近乎仁也若夫至仁則天地為一身而天地之間品物萬形為四肢百體夫人豈有視四肢百體而不愛者哉聖人仁之至也獨能體是心而已曷嘗支離多端而求之自外乎故能近取譬者仲尼所以示子貢以為仁之方也醫書有以手足風頑謂之四體不仁為其疾痛不以纍其心故也夫手足在我而疾痛不與知焉非不仁而何世之忍心無恩者其自棄亦若是而已一物不該非中也一事不為非中也一息不存非中也何哉為其偏而已矣故曰道也者不可須臾離也可離非道也修此道者戒慎乎其所不睹恐懼乎其所不聞而已由是而不息焉則上天之載無聲無臭可以馴致也君子之於中庸也無適而不中則其心與中庸無異體矣小人之於中庸無所忌憚則與戒慎恐懼者異矣是其所以反中庸也責善之道要使誠有餘而言不足則於人有益而在我者無辱矣二程遺書卷四
