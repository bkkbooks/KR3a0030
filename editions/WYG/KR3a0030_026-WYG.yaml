body:
  text: 二程遺書附録宋朱子編明道先生行狀見伊川先生文集門人朋友叙述序見伊川先生文集河間劉立之曰先生㓜集有而字有竒一作異質明慧驚人年數嵗即有成人之度嘗賦酌貪泉詩曰中心如自固外物豈能遷當世先達許其志操及長豪勇自奮不溺於流俗從汝南周茂叔問學窮性命之理率性㑹道體道成徳出處孔孟從容不勉踰冠應書京師聲望藹然老儒宿學皆自以為不及莫不造門願交釋褐主永興軍鄠縣簿永興帥府其出守皆禁宻大臣待先生莫不盡禮為令晉城其俗朴陋民不知學中間幾百年無登科者先生擇其秀異為置學舎糧具聚而教之朝夕督厲誘進學者風靡日盛熙寜元豐間應書者至數百登科者十餘人先生為政集無為政二字條教精宻而主之以誠心晉城之民被服先生之化暴桀子弟至有恥不犯迄先生去三年間編户數萬衆罪入極典者纔一人然鄉閭猶以不遵教令集無令字為深恥熙寜七年立之得官晉城距先生去已十餘年見民有聚口衆而不析異者問其所以云守程公之化集有者字也其誠心感人如此薦為御史神宗召對問所以為御史對曰使臣拾遺補闕裨賛朝廷則可使臣掇拾臣下短長以沽直名則不能神宗歎賞以為得御史體神宗厲精求治王荆公執政議法改令言者攻之甚力至有發憤肆罵無所不至者先生獨以至誠開納君相疏入輙削藁不以示子姪常曰揚已矜衆吾所不為嘗被㫖赴中堂議事荆公方怒言者厲色待之先生徐曰天下之事非一家私議願公平氣以聼荆公為之愧屈善談太中公得請領崇福先生求折資監當以便養歸洛從容親庭日以讀書勸學為事先生經術通明義理精微樂告不倦士大夫從之講學者日夕盈門虚徃實歸人得所欲先生在御史有南士游執政門者方自南還未至集無未至二字而附㑹之說先布都下且其人素議虧闕先生奏言其行後先生被命判武學其人已位通顯懼先生復進乃抗章言先生新法之初集作行首為異論先生笑曰是豈誣我邪復以便親乞汝州監局先生髙才遠業淪屈卑宂人為先生歎息而先生處之恪勤匪懈曰執事安得不謹今皇帝即位以宗正丞召朝廷方且用之未赴闕得疾以終先生有天下重望士民以其出處卜時隆污聞訃之日識與不識莫不隕涕自孟軻沒聖學失傳學者穿鑿妄作不知入徳先生傑然自立於千載之後芟闢榛穢開示夲原聖人之庭户曉然可入學士大夫始知所向然髙才世希集作希世能集作得造其藩閾集作閫者蓋集無蓋字鮮况堂奥乎先生徳性充完粹和之氣盎於面背樂易多恕終日怡悦立之從先生三十年未嘗見其一有有字忿厲之容接人温然無賢不肖皆使之集無之字欵曲自盡聞人一善咨嗟奬勞惟恐其不篤人有不及開導誘掖惟恐其不至故雖桀傲不恭見先生莫不感悅而化服風格髙邁不事標飾而自有畦畛望其容色聼其教言則放心邪氣不復萌於胷中太中公告老而歸家素清窶僦居洛城先生以禄養族大食衆菽粟僅足而老㓜各盡其歡中外㓜孤窮無託者皆收養之撫育誨導期於成人嫁女娶婦皆先孤遺而後及已子食無重肉衣無兼副女長過期至無貲以遣先生達於從政以仁愛為本故所至民戴之如父母立之嘗問先生以臨民曰使民集作人各得輸其情集有又嘗二字問御史曰正已以集無以字格物雖愚不肖佩服先生之訓不敢忘怠集作忽先生抱􅀴濟大器有開物成務之才雖不用於時然至誠在天下惟恐一物不得其所見民疾苦如在諸已聞朝廷興作小失則憂形顔色嘗論所以致君堯舜措俗成康之意其言感激動人千五百年一生斯人時命不㑹如此美志不行利澤不施惜哉立之家集無家字與先生有累世之舊先人髙爽有竒操集無此上五字與先生集有情字好尤宻先人早世立之方數嵗先生兄弟取以歸教養視子姪卒立其門戸末世俗薄朋友道衰聞先生之風宜有愧恥集無此上四十三字立之從先生最久聞先生教最多得先生行事為最集無此最字詳先生終繫官朔陲不得與於行服之列哭泣之哀承訃悲號摧裂肝膈集無此上二十七字先生大節高誼天下莫不聞至於集作乎委曲纖細集作悉一言一行足以垂法來世而人所不及知者大懼堙沒不傳以為門人羞輙書所知以備採摭沛國朱光度曰鳴呼道之不明不行也久矣自子思筆之於書其後孟軻倡之軻死而不得其傳退之之言信矣大抵先生之學以誠為本仰觀乎天清明穹窿日月之運行隂陽之變化所以然者誠而已俯察乎地廣博持載山川之融結草木之蕃殖所以然者誠而已人居天地之中參合無間純亦不已者其在兹乎蓋誠者天徳也聖人自誠而明其静也淵停其動也神速天地之所以位萬物之所以育何莫由斯道也先生得聖人之誠者也自始學至於成徳雖天資穎徹絶出等夷然卓然之見一本於誠故推而事親則誠孝事君則誠忠友於兄弟則綽綽有裕信於朋友則久要不忘修身慎行則不愧於集無於字屋漏臨政愛民則如保乎集無乎字赤子非得夫聖人之誠孰能與於斯才周萬物而不自以為高學際三才而不自以為足行貫神明而不自以為異識照古今而不自以為得至於六經之奥義百家之異說研窮搜抉判然胷中天下之事雖萬變交於前而燭之不失毫釐權之不失輕重凡貧賤富貴死生皆不足以動其心真可謂大丈夫者集有與字非所得之深所養之厚能至於是歟嗚呼天之生斯人使之平治天下功徳豈小補哉方當聖政日新賢者彚進殆將以斯道覺斯民而天奪之速可謂不幸之甚矣孔子曰朝聞道夕死可矣自孟軻以來千有餘嵗先王大道得先生而後傳其補助天地之功可謂盛矣雖不得高位以澤天下然而以斯道倡之於人亦已較著其間見而知之尚能似之先生為不亡矣河間邢氏恕曰先生德性絶人外和内剛眉目清峻語聲鏗然恕早從先生之弟學初見先生於磁州其氣貎清明夷粹其接人和以有容其斷義剛而不犯其思索集有微字妙造精義其言近而測之益遠恕蓋始恍然自失而知天下有成德君子所謂完人者若先生是已先生為澶州幕官嵗餘罷歸恕後過澶州問村民莫不稱先生咨嗟歎息蓋先生之從政其視民如子憂公如家其誠心感人雖為郡僚佐又止嵗餘而去至使田父野人皆知其姓名又稱歎其賢使先生為一郡又何如㢤使先生行乎天下又如何㢤既不用於朝廷而以奉親之故禄仕於筦庫以為養居洛幾十年玩心於道徳性命之際有以自養其渾浩冲融而集無而字必合集作由乎䂓矩準繩蓋直顔氏之流黄憲劉迅之徒不足道也洛實别都乃士人之區藪在仕者皆慕化之從之質疑解惑閭里士大夫皆高仰之樂從之游學士皆宗師之講道勸義行李之徃來過洛者苟知名有識必造其門虚而徃實而歸莫不心醉歛袵而誠服於是先生身益退位益卑而名益高於天下今皇帝即位太皇太后同聼斷凡集無凡字政事之利者存害者去復起司馬公君實以為門下侍郎用呂公晦叔為尚書左丞而先生亦以宗正丞召執政日須其來將大集作白用之訃至京師諸公人人歎嗟為朝廷惜士大夫下至布衣諸生聞之莫不相弔以為哲人云亡也嗚呼惟先生以直道言事不合去國十有七年今太母制政下令不出房闥天下固已晏然方大講求政事之得失救偏矯枉資人材以成治功之時如先生之材大小左右内外用之無不宜蓋其所知上極堯舜三代帝王之治其所以包涵愽大悠遠纖悉上下與天地同流其化之如時雨者先生固已黙而識之至於興造禮樂制度文為下至行師用兵戰陣之法無所不講皆造其極外之夷狄情狀山川道路之險易邉鄙防戍城寨斥堠控帶之要靡不䆒知其吏事操决文法簿書又皆精宻詳練若先生可謂通儒全才矣而所有不試其萬一又不䆒於高年此有志之士所以慟哭而流涕也成都范祖禹曰先生為人清明端潔内直外方其學本於誠意正心以聖賢之學可以必至勇於力行不為空文其在朝廷與道行止主於忠信不崇虚名其為政視民如子慘怛教愛出於至誠建利除害所欲必得故先生所至民賴之如父母去久集無久字而思之不忘先生嘗言縣之政可達於天下一邑者天下之式也先生以親老求為閒官居洛陽殆十餘集無餘字年與弟伊川先生講學於家化行鄉黨家貧疏食或不繼而事親務養其志賙贍族人必盡其力士之從學者不絶於舘有不逺千里而至者先生於􅀴不務觧析為枝詞要其用在已而明於知天其教人曰非孔子之道不可學也蓋自孟子没而中庸之學不傳後世之士不循其本而用心於末故不可與入堯舜之道先生以獨智自得去聖人千有餘嵗發其闗鍵直睹堂奥一天地之理盡事物之變故其貎肅而氣和志定而言厲望之可畏即之可親叩之者無窮從容以應之其出愈新真學者之師也成就人才於時為多雖久去朝廷而人常以其出處為時之通塞既除宗正丞天下日望先生入朝以為且大用及聞其亡上自公卿下至閭巷士民莫不哀之曰時不幸也其命矣夫書行狀後游酢建安游酢曰先生道徳之高致經綸之遠圖進退之大節伊川季先生與門人高弟既論其實矣酢復何言謹拾其遺事備採録云先生生而有妙質聞道甚早年逾冠明誠夫子張子厚友而師之子厚少時自喜其才謂提騎卒數萬可橫行匈奴視叛羌為易與耳故從之㳺者多能道邉事既而得聞先生論議乃歸謝其徒盡棄其舊學以從事於道其視先生雖外兄弟之子而虚心求益之意懇懇如不及逮先生之官猶以書抵扈以定性未能不動致問先生為破其疑使内外動静道通為一讀其書可考而知也其後子厚學成徳尊識者謂與孟子比然猶秘其學不多為人講之其意若曰雖復多聞不務畜徳徒善口耳而已故不屑與之言先生謂之曰道之不明於天下久矣人善其所習自謂至足必欲如孔門不憤不啓不悱不發則師資勢隔而先王之道或幾乎熄矣趣今之時且當隨其資而誘之雖識有暗明志有淺深亦各有得焉而堯舜之道庶可馴致子厚用其言故闗中學者躬行之多與洛人並推其所自先生發之也擢為御史睿眷甚渥亟承德音所獻納必據􅀴術事常辨於早而戒於漸一日神宗縱言及於辭命先生曰人主之學唯當務為急辭命非所先也神宗為之動顔㑹同天節宫嬪争獻竒功為天子壽先生既言於朝又顧謂執政戒之執政曰宫嬪實為非上意也庸何傷先生曰作滛巧以蕩上心所傷多矣公之言非是執政辭遂屈是時有同在臺列者志未必同然心慕其為人嘗語人曰他人之賢者猶可得而議也乃若伯淳則如羙玉然反復視之表裏洞徹莫見疵瑕先生平生與人交無隱情雖僮僕必託以忠信故人亦不忍欺之嘗自澶淵遣奴持金詣京師貿用物計金之數可當二百千奴無父母妻子同列聞之莫不駭且誚既而奴持物如期而歸衆始歎服蓋誠心發於中暢於四支見之者信慕事之者革心大抵類此先生少長親闈視之如傷又氣象清越灑然如在塵外宜不能勞苦及遇事則每與賤者同起居飲食人不堪其難而先生處之裕如也嘗董役雖祁寒烈日不擁裘不御蓋時所廵行衆莫測其至故人自致力常先期畢事異時夫伍中夜多譁一夫或怖萬夫競起姦人乘虚為盗者不可勝數先生以師律處之遂訖去無譁者及役罷夫散部伍猶肅整如常初至鄠有監酒稅者以賄播聞然怙力文身自號能殺人衆皆憚之雖監司州將未敢發先生至將與之同事其人心不自安輙為言曰外人謂某自盗官錢新主簿將發之某勢窮必殺人言未訖先生笑曰人之為言一至於此足下食君之禄詎肯為盗萬一有之將救死不暇安能殺人其人黙不敢言後亦私償其所盗卒以善去州從事有既孤而遭祖母䘮者身為嫡孫未果承重先生為推典法意告之甚悉其人從之至今遂為定令而天下縉紳始習為常蓋先生御小人使不麗於法助君子使必成其羙又大抵類此先生雖不用而未嘗一日忘朝廷然久幽之操確乎如石胸中之氣冲如也所至士大夫多棄官從之學朝見而夕歸飲其和茹其實既久而不能去其徒有貧者以單衣御冬累年而志不變身不屈蓋先生之教要出於為已而士之游其門者所學皆心到自得無求於外以故甚貧者忘饑寒已仕者忘爵禄魯重者敏謹細者裕强者無拂理愿者有立志可以修身可以齊家可以治國平天下非若世之士妄意空無追詠昔人之糟粕而身不與焉及措之事業則倀然無據而已也方朝廷圖任真儒以惠天下天下有識者謂先生行且大用矣不幸而先生卒嗚呼道之行與廢果非人力所能為也悲夫哭而為之賛曰天地之心其太一之體歟天地之化其太和之運歟確然高明萬物覆焉隤然愽厚萬物載焉非以其一歟陽自此舒隂自此凝消息滿虚莫見其形非以其和歟夫子之徳其融心滌慮黙契於此歟不然何穆穆不已渾渾無涯而能言之士莫足以頌其羙歟嗟乎孰謂此道未施此民未覺而先覺者逝歟百世之下有想見夫子而不可得者亦能觀諸天地之際歟哀詞呂大臨嗚呼去聖遠矣斯文䘮矣先王之流風善政泯沒而不可見明師賢弟子傳授之學斷絶而不得聞以章句訓詁為能窮遺經以儀章度數為能盡儒術使聖人之道玩於腐儒諷誦之餘隱於百姓日用之末反求諸已則罔然無得施之於天下則若不可行異端爭衡猶不與此先生負特立之才知大學之要博聞强識躬行力䆒察倫明物極其所止渙然心釋洞見道體其造於約也雖事變之感不一知應以是心而不窮雖天下之理至衆知反之吾身而自足其致於一也異端並立而不能移聖人復起而不與易其養之成也和氣充浹見於聲容然望之崇深不可漫也遇事優為從容不廹然誠心懇惻弗之措也其自任之重也寜學聖人而未至不欲以一善成名寕以一物不被澤為已病不欲以一時之利為已功其自信之篤也吾志可行不苟潔其去就吾義所安雖小官有所不屑夫位天地育萬物者道也傳斯道者斯文也振已墜之文達未行之道者先生也使學不卒傳志不卒行至於此極者天也先生之徳可形容者猶可道也其獨智自得合乎天契乎先聖者不可得而道也元豐八年六月明道先生卒門人學者皆以所自得者名先生之徳先生之徳未易名也亦各伸其志爾汲郡呂大臨書明道先生墓表見伊川先生文集伊川先生年譜先生名頤字正叔明道先生之弟也明道生於明道元年壬申伊川生於明道二年癸酉㓜有髙識非禮不動見語録年十四五與明道同受業於舂陵周茂叔先生見哲宗徽宗實録皇祐二年年十八上書闕下勸仁宗以王道為心生靈為念黜世俗之論期非常之功且乞召對靣陳所學不報間游大學時海陵胡翼之先生方主教導嘗以顔子所好何學論試諸生得先生所試大驚即延見處以學職見文集吕希哲原明與先生鄰齋首以師禮事焉既而四方之士從游者日益衆見呂氏童䝉訓舉進士嘉祐四年廷試報罷遂不復試太中公屢當得任子恩輙推與族人見涪陵記善録治平熙寜間近臣屢薦自以為學不足不願仕也見文集又按呂申公家傳云公判大學命衆博士即先生之居敦請為太學正先生固辭公即命駕過之又雜記治平三年九月公知蔡州将行言曰伏見南省進士程頤年三十四有特立之操出羣之資嘉祐四年已與殿試自後絶意進取往來太學諸生願得以為師臣方領國子監親徃敦請卒不能屈臣嘗與之語洞明經術通古今治亂之要實有經世濟物之才非同拘士曲儒徒有偏長使在朝廷必為國器伏望特以不决旌用明道行狀云神宗嘗使推擇人材先生所薦數十人以父表弟張載暨弟頤為稱首元豐八年哲宗嗣位門下侍郎司馬公光尚書左丞呂公公著及西京留守韓公絳上其行義於朝見哲宗徽宗實錄按温公集與呂申公同薦劄子曰臣等切見河南處士程頤力學好古安貧守節言必忠信動遵禮義年逾五十不求仕進真儒者之高蹈聖世之逸民伏望特加召命擢以不次足以矜式士類禆益風化又按明文定公文集勁云是時諫官朱光庭又言頤道德純備學問淵博材質正有中立不倚之風識慮明徹至知幾其神之妙言行相顧而無擇仁義在躬而不矜若用斯人俾當勸講必能輔養聖徳啟道天聰一正君心為天下福又謂頤䆒先王之蘊達當世之務乃天民之先覺聖代之真儒俾之日侍􅀴筵足以發揚聖訓兼掌學校足以丕變斯文又論祖宗時起陳搏种放髙風素節聞於天下揆頤之賢搏放未必能過之頤之道則有搏放所不及知者觀其所學真得聖人之傅致思力行非一日之積有􅀴天緯地之才有制禮作樂之具乞訪問其至言至論所以平治天下之道又謂頤以言乎道則貫徹三才而無一毫之或間以言乎徳則并包衆羙而無一善之或遺以言乎學則博通古今而無一物之不知以言乎才則開物成務而無一理之不總是以聖人之道至此而傳况當天子進學之初若俾真儒得專􅀴席豈不盛哉十一月丁巳授汝州團練推官西京國子監教授見實錄先生再辭尋召赴闕元祐元年三月至京師王巖叟奏云伏見程頤學極聖人之精微行至君子之純粹早與其兄顥俱以徳名顯於時陛下復起頤而用之頤趣召以來待詔闕下四方俊人莫不翹首向風以觀朝廷所以待之者如何處之者當否而將議焉則陛下此舉繫天下之心臣願陛下加所以待之之禮擇所以處之之方而使高賢得為陛下盡其用則所得不獨頤一人而已四海潛光隱徳之士皆將相招而為朝廷出矣除宣徳郎秘書省校書郎先生辭曰神宗時布衣被召自有故事今臣未得入見未敢祗命王巖叟奏云臣伏聞聖恩特除程頤京官仍與校書郎足以見陛下優禮高賢而使天下之人歸心於盛徳也然臣區區之誠尚有以為陛下言者願陛下一召見之試以一言問為國之要陛下至明遂可自觀其人臣以頤抱道養德之日久而潛神積慮之功深静而閲天下之義理者多必有嘉言以新聖聽此臣所以區區而進頤然非為頤也欲成陛下之美耳陛下一見而後命之以官則頤當之而無愧陛下與之而不悔授受之間兩得之矣於是召對太皇太后面喻將以為崇政殿說書先生辭不獲始受西監之命且上奏論􅀴筵三事其一以上富於春秋輔養為急宜選賢德以備講官因使陪侍宿直陳說道義所以涵養氣質薫陶徳性其二請上左右内侍宫人皆選老成厚重之人不使侈靡之物淺俗之言接於耳目仍置􅀴筵祗應内臣十人使伺上在宫中動息以語講官其或小有違失得以随事䂓諫其三請令講官坐講以養人主尊儒重道之心寅畏祗懼之德而曰若言可行敢不就職如不可用願聽其辭劄子三道見文集又按劉忠肅公文集有章疏論先生辭卑居尊未被命而先論事為非是蓋不知先生出處語黙之際其義固已精矣既而命下以通直郎充崇政殿說書見實錄先生再辭而後受命四月例以暑熱罷講先生奏言輔導少主不宜踈略如此乞令講官以六參日上殿問起居因得從容納誨以輔上徳見文集五月差同孫覺顧臨及國子監長貳看詳國子監條制見實録先生所定大槩以為學校禮義相先之地而月使之爭殊非教養之道請改試為課有所未至則學官召而教之更不考定高下制尊賢堂以延天下道徳之士鐫解額以去利誘省繁文以專委任勵行檢以厚風教及置待賓吏師齋立觀光法如是者亦數十條見文集舊實録云禮部尚書胡宗愈謂先帝聚士以學教人以􅀴三舍科條固已精宻宜一切仍舊因是深詆先生謂不宜使在朝廷六月上疏太皇太后言今日至大至急為宗社生靈長久之計惟是輔養上德而輔養之道非徒渉書史覽古今而已要使跬歩不離正人乃可以涵養薫陶成就聖德今間日一講解釋數行為益既少又自四月罷講直至中秋不接儒臣殆非古人旦夕承弼之意謂俟初秋即令講官輪日入侍陳說義理仍選臣僚家十一二嵗子弟三人侍上習業且以邇英廹隘暑熱恐於上體非宜而講日宰臣史官皆入使上不得舒泰悅懌請自今一月再講於崇政殿然後宰臣史官入侍餘日講於延和殿則後楹垂簾而太皇太后時一臨之不惟省察主上進業其於后徳未必無補且使講官欲有所言易以上達所繫尤大又講讀官例兼他職請亦罷之使得積誠意以感上心皆不報八月差兼判登聞鼔院先生引前說且言入談道德出領訴訟非用人之體再辭不受見文集楊時曰事道與禄仕不同常夷甫以布衣入朝神宗欲優其禄令兼數局如鼓院染院之類夷甫一切受之及伊川先生為講官朝廷亦欲使兼他職則固辭蓋前日所以不仕者為道也則今日之仕須其官足以行道乃可受不然是苟禄也然後世道學不明君子辭受取舍人鮮知之故常公之受人不以為非而先生之辭人亦不以為是也二年又上疏論延和講讀垂簾事且乞時召講官至簾前問上進學次第又奏邇英暑熱乞就崇政延和殿或他寛凉處講讀給事中顧臨以殿上講讀為不可有㫖修展邇英閣先生復上疏以為修展邇英則臣所請遂矣然祖宗以來並是殿上坐講自仁宗始就邇英而講官立侍蓋從一時之便耳非若臨之意也今臨之意不過以尊君為說而不知尊君之道若以其言為是則誤主上知見臣職當輔導不得不辨先生在經筵每當進講必宿齋預戒潛思存誠冀以感動上意見文集而其為說常於文義之外反復推明歸之人主一日當講顔子不改其樂章門人或疑此章非有人君事也將何以為說及講既畢文義乃復言曰陋巷之士仁義在躬忘其貧賤人主崇高奉養備極苟不知學安能不為富貴所移且顔子王佐之才也而簞食瓢飲季氏魯國之蠧也而富於周公魯君用捨如此非後世之監乎聞者歎服見胡氏論語詳說而哲宗亦常首肯之見文集不知者或誚其委曲已甚先生曰不於此盡心竭力而於何所乎上或服藥即日就醫官問起居見語錄然入侍之際容貎極莊時文潞公以太師平章重事或侍立終日不懈上雖喻以少休不去也人或以問先生曰君之嚴視潞公之恭孰為得失先生曰潞公四朝大臣事㓜主不得不恭吾以布衣職輔導亦不敢不自重也見邵氏見聞錄嘗聞上在宫中起行潄水必避螻蟻因請之曰有是乎上曰然誠恐傷之耳先生曰願陛下推此心以及四海則天下幸甚見語録一日講罷未退上忽起凴檻戲析桞枝先生進曰方春發生不可無故摧折上不恱見馬永鄉所編劉諌議語録且云温公聞之亦不恱或曰恐無此事所講書有容字中人以黄覆之曰上藩邸嫌名也先生講罷進言曰人主之勢不患不尊患臣下尊之過甚而驕心生爾此皆近習輩養成之不可以不戒請自今舊名嫌名皆勿復避見語錄時神宗之䘮未除而百官以冬至賀表先生言節序變遷時思方切請改賀為慰及除䘮有司又將以開樂致宴先生又奏請罷宴曰除䘮而用吉禮則因事用樂可矣今特設宴是喜之也見文集嘗聞後苑以金製水桶問之曰崇慶宫物也先生曰若上所御則吾不敢不諌在職累月不言禄吏亦弗致既而諸公知之俾戸部特給焉又不為妻求邑封或問之先生曰某起於草萊三辭不獲而後受命今日乃為妻求封乎見語録􅀴筵承受張茂則嘗招諸講官啜茶觀畫先生曰吾平生不啜茶亦不識畫竟不往見龜山語録或云恐無此事文潞公嘗與呂范諸公入侍􅀴筵聞先生講說退相與歎曰真侍講也一時人士歸其門者甚盛而先生亦以天下自任論議褒貶無所顧避由是同朝之士有以文章名世者疾之如讐與其黨類巧為詆謗見龜山語錄王公繫年録吕申公家傳及先生之子端中所撰集序又按蘇軾奏狀亦自云臣素疾程某之姦未嘗假以辭色又按侍御史吕陶言明堂降赦臣僚稱賀訖而兩省官欲往奠司馬先是時程頤言曰子於是日哭則不歌豈可賀赦才了却往弔䘮坐客有難之曰子於日哭則不歌即不言歌則不哭今已賀赦了却徃弔䘮於禮無害蘇軾遂以鄙語戲程頤衆皆大笑結怨之端蓋自此始又語錄云國忌行香伊川令供素饌子瞻詰之曰正叔不好佛胡為食素先生曰禮居䘮不飲酒不食肉忌日䘮之餘也子瞻令具肉食曰為劉氏者左袒於是范醇夫輩食素秦黄輩食肉又鮮於綽傳信錄云舊例行香齋筵兩制以上及臺諌官並設蔬饌然以粗糲遂輪為食㑹皆用肉食矣元祐初崇政殿說書程正叔以食肉為非是議為素食衆多不從一日門人范醇夫當排食遂具蔬饌内翰蘇子瞻因以鄙語戲正叔正叔門人朱公掞輩銜之遂立敵矣是後蔬饌亦不行又語錄云時吕申公為相凡事有疑必質於伊川進退人才二蘇疑伊川有力故極詆之又曰朝廷欲以游酢為某官蘇右丞沮止毁及伊川宰相蘓子容曰公未可如此頌觀過其門者無不肅也又按劉諫議盡言集亦有異論劉非蘇黨蓋不相知耳一日赴講㑹上瘡疹不坐已累日先生退詣宰臣問上不御殿知否曰不知先生曰二聖臨朝上不御殿太皇太后不當獨坐且人主有疾而大臣不知可乎翌日宰臣以先生言奏請問疾由是大臣亦多不悅而諫議大夫孔文仲因奏先生汙下憸巧素無鄉行􅀴筵陳說僭橫忘分遍謁貴臣歴造臺諫騰口間亂以償恩讐致市井目為五鬼之魁請放還田里以示典刑八月差管勾西京國子監見舊實錄又文仲傳載吕申公之言曰文仲為蘇軾所誘脇其論事皆用軾意又吕申公家傳亦載其與吕大防劉摯王存同駁文仲所論朱光庭事語甚激切且云文仲本以抗直稱然惷不曉事為浮薄輩所使以害善良晚乃自知為小人所紿憤鬱嘔血而死按舊録固多妄然此類亦不為無據新録皆刪之失其實矣又范太史家傳云元祐九年奏曰臣伏見元祐之初陛下召程頤對便殿自布衣除崇政殿說書天下之士皆謂得人實為稀􅦎之羙事而纔及嵗餘即以人言罷之頤之􅀴術行誼天下共知司馬光吕公著皆與頤相知二十餘年然後舉之此二人者非為欺罔以誤聖聰也頤在􅀴筵切於皇帝陛下進學故其講說語常繁多草茅之人一旦入朝與人相接不為闗防未習朝廷事體而言者謂頤大侫大邪貪黷請求奔走交結又謂頤欲以故舊傾大臣以意氣役臺諫其言皆誣罔非實也盖當時臺諫官王巖叟朱光庭賈易皆素推服頤之經術故不知者指以為頤黨陛下慎擇經筵之官如頤之賢乃足以輔導聖學至如臣輩叨備講職實非敢望頤也臣久欲為頤一言懐之累年猶豫不果使頤受誣罔之謗於公正之朝臣每思之不無愧也今臣已乞去職若復召頤勸講必有補於聖明臣雖終老在外無所憾矣先生既就職再上奏乞歸田里曰臣本布衣因說書得朝官今以罪罷則所授官不當得三年又請皆不報乃乞致仕至再又不報五年正月丁太中公憂去官七年服除除直秘閣判西京國子監王公繫年錄云元祐七年三月四日延和奏事三省進呈程頤服除欲與舘職判檢院簾中以其不靖令只與西監遂除直秘閣判西京國子監初頤在經筵歸其門者甚盛而蘇軾在翰林亦多附之者遂有洛黨蜀黨之論二黨道不同互相非毁頤竟為蜀黨所擠今又適軾弟轍執政纔進禀便云但恐不肯靖簾中入其說故頤不復得召先生再辭極論儒者進退之道見文集而監察御史董敦逸奏以為有怨望輕躁語五月改授管勾崇福宫見舊錄未拜以疾尋醫元祐九年哲宗初親政申秘閣西監之命先生再辭不就見文集紹聖間以黨論放歸田里四年十一月送涪州編管見實錄門人謝良佐曰是行也良佐知之乃族子公孫與邢恕之為爾先生曰族子至愚不足責故人情厚不敢疑孟子既知天焉用尤臧氏見語錄元符二年正月易傳成而序之三年正月徽宗即位移峽州四月以赦復宣徳郎任便居住制見曲阜集還洛記善錄云先生歸自涪州氣貎容色髭髪皆勝平昔十月復通直郎權判西京國子監先生既受命即謁告欲遷延為尋醫計既而供職門人尹焞深疑之先生曰上初即位首被大恩不如是則何以仰承徳意然吾之不能仕蓋已决矣受一月之俸焉然後唯吾所欲爾見文集語録又劉忠肅公家私記云此除乃李邦直范彞叟之意建中靖國二年五月追所復官依舊致仕前此未嘗致仕而云依舊致仕疑西監供職不久即嘗致仕也未詳崇寜二年四月言者論其本因姦黨論薦得官雖嘗明正罪罰而敘復過優已追所復官又云叙復過優亦未詳今復著書非毁朝政於是有㫖追毁出身以來文字其所著書令監司覺察語録云范致虚言程某以邪說詖行惑亂衆聽而尹焞張繹為之羽翼事下河南府體究盡逐學徒復𨽻黨籍先生於是遷居龍門之南止四方學者曰尊所聞行所知可矣不必及吾門也見語録五年復宣義郎致仕見實録時易傳成書已久學者莫得傳授或以為請先生曰自量精力未衰尚覬有少進耳其後寢疾始以授尹焞張繹尹焞曰先生踐履盡易其作傳只是因而寫成熟讀詳味即可見矣又云先生平生用意惟在易傳求先生之學觀此足矣語録之類出於學者所記所見有深淺故所記有工拙蓋未能無失也見語録大觀元年九月庚午卒於家年七十有五見實錄於疾革門人進曰先生平日所學正今日要用先生力疾微視曰道著用便不是其人未出寢門而先生没見語錄一作門人郭忠孝尹子云非也忠孝自黨事起不與先生往來及卒亦不致奠初明道先生嘗謂先生曰異日能使人尊嚴師道者吾弟也若接引後學随人材而成就之則予不得讓焉見語錄侯仲良曰朱公掞見明道於汝州踰月而歸告人曰光庭在春風中坐了一月游定夫楊中立來見伊川一日先生坐而瞑目二子立侍不敢去久之先生乃顧曰二子猶在此乎日暮矣姑就舎二子者退則門外雪深尺餘矣其嚴厲如此晚年接學者乃更平易蓋其學已到至處但於聖人氣象差少從容爾明道則已從容惜其早死不及用也使及用於元祐間則不至有今日事矣先生既沒昔之門人高弟多已先亡無有能形容其德羙者然先生嘗謂張繹曰我昔狀明道先生之行我之道蓋與明道同異時欲知我者求之於此文可也見集序尹焞曰先生之學本於至誠其見於言動事為之間處中有常疏通簡易不為矯異不為狷介寛猛合宜莊重有體或說匍匐以弔䘮誦孝經以追薦皆無此事衣雖紬素冠襟必整食雖簡儉蔬飯必潔太中年老左右致養無違以家事自任悉力營辦細事必親贍給内外親族八十餘口又曰先生於書無所不讀於事無所不能謝良佐曰伊川才大以之處大事必不動聲色指顧而集矣或曰人謂伊川守正則盡通變不足子之言若是何也謝子曰陜右錢以鐵舊矣有議更以銅者已而㑹所鑄子不踰母謂無利也遂止之伊川聞之曰此乃國家之大利也利多費省私鑄者衆費多利少盗鑄者息民不敢盗鑄則權歸公上非國家之大利乎又有議増解鹽之直者伊川曰價卑則鹽易洩人人得食無積而不售者嵗入必倍矣増價則反是已而果然司馬公既相薦伊川而起之伊川曰將累人矣使韓富當國時吾猶可以有行也及司馬公大變熙豐復祖宗之舊伊川曰役法當討論未可輕改也公不然之既而數年紛紛不能定由是觀之亦可以見其梗槩矣祭文張繹嗚呼利害生於身禮義根於心伊此心䘮於利害而禮義以為虚也故先生踽踽獨行斯世一作於世而衆乃以為迂也惟尚徳者以為卓絶之行而忠信者以為孚也立義者以為不可犯而達權者以為不可拘也在吾先生曽何有意心與道合一作道㑹泯然無際無欲可以繫覊兮自克者知其難也不立意以為言兮知言者識其要也徳猶如毛毛猶有倫無聲無臭夫何可親嗚呼先生之道不可得而名也一作某等不得而名也伊言者反以為病兮此心終不得而形也惟泰山惟一作維以為高兮日月以為明也春風以為和兮嚴霜以為清也在昔諸儒各行其志或得於數或觀於禮學者趣之一作趨之世濟其羙獨吾先生淡乎無味得味之真死其乃已自某之見一作某等受教七年於兹含孕化育以蕃以滋天地其容我兮父母其生之君親其臨我兮夫子其成之欲報之心何日忘之先生有言一本上有昔字見於文字者有七分之心繪於丹青者有七分之儀七分之儀固不可益七分之心猶或可推而今而後將築室於伊雒之濱望先生之墓以畢吾此生也一無吾字嗚呼夫子沒而微言絶則固不可得而聞也一本上有某等字然天不言而四時行地不言而百物生惟與二三子一本無此五字有一當字洗心去智格物去意期黙契斯道在先生為未亡也嗚呼二三子之志一作某等之志不待物而後見先生之行不待誄而後徴然而山頺梁壊何以寄情凄風一奠敬祀於庭百年之恨併此以傾尹子曰先生之𦵏洛人畏入黨無敢送者故祭文惟張繹范域孟厚及焞四人乙夜有素衣白馬至者視之邵溥也乃附名焉蓋溥亦有所畏而薄暮出城是以後又按語録云先生以易傳授門人曰只說得七分學者更須自體究故祭文有七分之語云奏狀節畧胡安國伏見元祐之初宰臣司馬光吕公著秉政當國急於得人首薦河南處士程頤乞加召命擢以不次遂起韋布超居講筵自司勸講不為辨辭觧釋文義所以積其誠意感通聖心者固不可得而聞也及當官而行舉動必由乎禮奉身而去進退必合乎義其修身行法䂓矩準繩獨出諸儒之表門人高弟莫獲繼焉雖崇寜間曲加防禁學者向之私相傳習不可遏也其後頤之門人如楊時劉安節許景衡馬伸吴給等稍稍進用於是士大夫爭相淬礪而其間志於利禄者託其說以自售學者莫能别其真偽而河洛之學幾絶矣壬子年臣嘗至行闕有仲并者言伊川之學近日盛行臣語之曰伊川之學不絶如綫可謂孤立而以為盛行何也豈以其說滿門人人傳寫耳納口出而以為盛乎自是服儒冠者以伊川門人妄自標榜無以屈服士人之心故衆論􅍅􅍅深加詆誚夫有為伊洛之學者皆欲屏絶其徒而乃上及於伊川臣竊以為過矣夫聖人之道所以垂訓萬世無非中庸非有甚高難行之說此誠不可易之至論也然中庸之義不明久矣自頤兄弟始發明之然後其義可思而得不然則或謂高明所以處已中庸所以接物本末上下析為二途而其義愈不明矣士大夫之學宜以孔孟為師庶幾言行相稱可濟時用此亦不可易之至論也然孔孟之道不傳久矣自頤兄弟始發明之而後其道可學而至也不然則或以六經語孟之書資口耳取世資而甘利禄愈不得其門而入矣今欲使學者蹈中庸師孔孟而禁使不得從頤之學是入室而不由戸也不亦誤乎夫頤之文於易則因理以明象而知體用之一源於春秋則見諸行事而知聖人之大用於諸經語孟則發明其㫖而知求仁之方入德之序然則狂言怪語滛說鄙論豈其文也哉頤之行其行已接物則忠誠動於州里其事親從兄則孝弟顯於家庭其辭受取捨非其道義則一介不以取與諸人雖禄之千鍾有必不顧也其餘則亦與人同爾然則幅巾大袖高視濶歩豈其行也哉昔者伯夷桞下惠之賢微仲尼則西山之餓夫魯國之黜臣爾本朝自嘉祐以來西都有邵雍程顥及弟頤闗中有張載此四人者皆道學德行名於當世㑹王安石當路重以蔡京得政曲加排抑故有西山東國之阨其道不行深可惜也今雍所著有皇極􅀴世書載有正䝉書頤有易春秋傳顥雖未及著述而門弟子質疑請益答問之語存於世者甚多又有書疏銘詩並行於世而傳者多失其真臣愚伏望陛下特降指揮下禮官討論故事以此四人加之封號載在祀典以見聖世雖當禁暴誅亂奉詞伐罪之時猶有崇儒重道尊徳樂義之意仍詔舘閣裒集四人之遺書委官校正取㫖施行便於學者傳習羽翼六經以推尊仲尼孟子之道使邪說者不得乗間而作而天下之道術定豈曰小補之哉二程遺書附録
