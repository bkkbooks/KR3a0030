body:
  text: 二程遺書卷十八宋朱子編劉元承手編問仁曰此在諸公自思之將聖賢所言仁處類聚觀之體認出來孟子曰惻隱之心仁也後人遂以愛為仁惻隱固是愛也愛自是情仁自是性豈可專以愛為仁孟子言惻隱為仁蓋為前已言惻隱之心仁之端仁既曰仁之端則不可便謂之仁退之言博愛之謂仁非也仁者固博愛然便以博愛為仁則不可又問仁與聖何以異曰人只見孔子言何事於仁必也聖乎便謂仁小而聖大殊不知此言是孔子見子貢問博施濟衆問得來事大故曰何止於仁必也聖乎蓋仁可以通上下言之聖則其極也聖人人倫之至倫理也既通人理之極更不可以有加若今人或一事是仁亦可謂之仁至於盡仁道亦謂之仁此通上下言之也如曰若聖與仁則吾豈敢此又却仁與聖俱大也大抵盡仁道者即是聖人非聖人則不能盡得仁道問曰人有言盡人道謂之仁道天道謂之聖此語何如曰此語固無病然措意未是安有知人道而不知天道者乎道一也豈人道自是人道天道自是天道中庸言盡已之性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育此言可見矣揚子曰通天地人曰儒通天地而不通人曰伎此亦不知道之言豈有通天地而不通人者哉如止云通天之文與地之理雖不能此何害於儒天地人只一道也纔通其一則餘皆通如後人解易言乾天道坤地道也便是亂論論其體則天尊地卑如論其道豈有異哉問孝弟為仁之本此是由孝弟可以至仁否曰非也謂行仁自孝弟始蓋孝弟是仁之一事謂之行仁之本則可謂之是仁之本則不可蓋仁是性一作木也孝弟是用也性中只有仁義禮智四者幾曽有孝弟來趙本作幾曽有許多般數來仁主於愛愛孰大於愛親故曰孝弟也者其為仁之本歟孔子未嘗許人以仁或曰稱管仲如其仁何也曰聖人闡幽明微之道只為子路以子糾之死管仲不死為未仁此甚小却管仲故孔子言其有仁之功此聖人言語抑揚處當自理㑹得問克伐怨欲不行可以為仁曰人無克伐怨欲四者便是仁也只為原憲著一箇不行不免有此心但不行也故孔子謂可以為難此孔子著意告原憲處欲他有所啓發他承當不得不能再發問也孔門如子貢者便能曉得聖人意且如曰女以予為多學而識之歟對曰然便復問曰非歟孔子告之曰非也予一以貫之原憲則不能也問仁與心何異曰心是所主處仁是就事言曰若是則仁是心之用否曰固是若説仁者心之用則不可心譬如身四端如四支四支固是身所用只可謂身之四支四端固具於心然亦未可便謂之心之用或曰譬如五穀之種必待陽氣而生曰非是陽氣發處却是情也心譬如穀種生之性便是仁也問四端不及信何也曰性中只有四端却無信為有不信故有信字且如今東者自東西者自西何用信字只為有不信故有信字又問莫在四端之間曰不如此説若如此説時只説一箇義字亦得問忠恕可貫道否曰忠恕固可以貫道但子思恐人難曉故復於中庸降一等言之曰忠恕違道不逺忠恕只是體用須要理㑹得又問恕字學者可用功否曰恕字甚大然恕不可獨用須得忠以為體不忠何以能恕看忠恕兩字自見相為用處孔子曰君子之道四丘未能一焉恕字甚難孔子曰有一言可以終身行之者其恕乎問人有以君子敬而無失與人為一句是否曰不可敬是持已恭是接人與人恭而有禮言接人當如此也近世淺薄以相懽狎爲相與以無圭角為相懽愛如此者安能久若要久須是恭敬君臣朋友皆當以敬爲主也比之上六曰比之旡首凶象曰比之无首旡所終也比之有首尚懼无終既旡首安得有終故曰旡所終也比之道須當有首或曰君子淡以成小人甘以壊曰是也豈有甘而不壞者問出門如見大賓使民如承大祭方其未出門未使民時如何曰此儼若思之時也當出門時其敬如此未出門時可知也且見乎外者出乎中者也使民出門者事也非因是事上方有此敬蓋素敬也如人接物以誠人皆曰誠人蓋是素來誠非因接物而始有此誠也儼然正其衣冠尊其瞻視其中自有箇敬處雖曰無狀敬自可見問人有専務敬以直内不務方外何如曰有諸中者必形諸外惟恐不直内内直則外必方敬是閑邪之道閑邪存其誠雖是兩事然亦只是一事閑邪則誠自存矣天下有一箇善一箇惡去善即是惡去惡即是善譬如門不出便入豈出入外更别有一事也義還因事而見否曰非也性中自有或曰無狀可見曰説有便是見但人自不見昭昭然在天地之中也且如性何須待有物方指為性性自在也賢所言見者事某所言見者理如曰不見而章是也人多説某不教人習舉業某何嘗不教人習舉業也人若不習舉業而望及第却是責天理而不修人事但舉業既可以及第即已若更去上面盡力求必得之道是惑也人注擬差遣欲就主簿者間其故則曰責輕於尉某曰却是尉責輕尉只是補盜不能使民不為盜簿佐令以治一邑使民不為盜簿之責也豈得為輕或問簿佐令者也簿所欲為令或不從奈何曰當以誠意動之今令與簿不和只是爭私意令是邑之長若能以事父兄之道事之過則歸已善則惟恐不歸於令積此誠意豈有不動得人問授司理如何曰甚善若能充其職可使一郡無寃民也幙官言事不合如之何曰必不得已有去而已須權量事之大小事大於去則當去事小於去亦不須去也事大於爭則當爭事小於爭則不須爭也今人只被以官為業如何去得人有實無學而氣蓋人者其氣一作稟有剛柔也故强猛者當仰之畏縮者當充養之古人佩韋絃之戒正為此耳然剛者易仰如子路初雖聖人亦被他陵後來既知學便却移其剛來克己甚易畏縮者氣本柔須索勉强也藻鑑人物自是人才有通悟處學不得也張子厚善鑑裁其弟天祺學之便錯問學何以有至覺悟處曰莫先致知能致知則思一日愈明一日久而後有覺也學而無覺則何益矣又奚學為思曰睿睿作聖纔思便睿以至作聖亦是一箇思故曰勉强學問則聞見博而智益明又問莫致知與力行兼否曰為常人言纔知得非禮不可為須用勉强至於知穿窬不可為則不待勉强是知亦有㴱淺也古人言樂循理之謂君子若勉强只是知循理非是樂也纔到樂時便是循理為樂不循理為不樂何苦而不循理自不須勉强也若夫聖人不勉而中不思而得此又上一等事張張旭學草書見擔夫與公主爭道又公孫大娘舞劔而後悟筆法莫是心常思念至此而感發否曰然須是思方有感悟處若不思怎生得如此然可惜張旭留心於書若移此心於道何所不至思曰睿思慮久後睿自然生若於一事上思未得且别換一事思之不可專守著這一事蓋人之知識於這裏蔽著雖强思亦不通也一本此下云或問思一事或汎及佗事莫是心不專否曰心若專怎生解及别事與學者語正如扶醉人東邊扶起却倒向西邊西邊扶起却倒向東邊終邊能得佗卓立中途古之學者一今之學者三異端不與焉一曰文章之學二曰訓詁之學三曰儒者之學欲趨道舎儒者之學不可今之學者有三弊一溺於文章二牽於訓詀三惑於異端苟無此三者則將何歸必趨於道矣或曰人問某以學者當先識道之大本道之大本如何求某告之君君臣父子夫婦兄弟朋友於此五者上行樂處便是曰此固是然怎生地樂勉强樂不得須是知得了方能樂得故人力行先須要知非特行難知亦難也書曰知之非艱行之惟艱此固是也然知之亦自艱譬如人欲往京師必知是出那門行那路然後可往如不知雖有欲往之心其將何之自古非無美材能力行者然鮮能明道以此見知之亦難矣問忠信進德之事固可勉强然致知甚難曰子以誠敬為可勉强且恁他説到底須是知了方行得若不知只是覷却堯學他行事無堯許多聰明睿知怎生得如他動容周旋中禮有諸心必形諸外徳容安可妄學如子所言是篤信而固守之非固有之也且如中庸九經修身也尊賢也親親也堯典克明峻德以親九族親親本合在尊賢上何故却在下須是知所以親親之道方得未致知便欲誠意是躐等也學者固當勉强然不致知怎生行得勉强行者安能持久除非燭理明自然樂循理性本善循理而行是順理事本亦不難但為人不知旋安排著便道難也知有多少般數然有深淺向親見一人曽為虎所傷因言及虎神色便變傍有數人見佗説虎非不知虎之猛可畏然不如佗説了有畏懼之色蓋眞知虎者也學者深知亦如此且如膾炙貴公子與野人莫不皆知其美然貴人聞著便有欲嗜膾炙之色野人則不然學者須是眞知纔知得是便泰然行將去也某年二十時解釋經義與今無異然思今日覺得意味與少時自别信有二般有信人者有自信者如七十子於仲尼得佗言説便終身守之然未必知道這箇怎生是怎生非也此信於人者也學者須要自信既自信怎生奪亦不得或問進修之術何先曰莫先於正心誠意誠意在致知致知在格物格至也如祖考來格之格凡一物上有一理須是窮致其理窮理亦多端或讀書講明義理或論古今人物别其是非或應事接物而處其當皆窮理也或問格物須物物格之還只格一物而萬理皆知曰怎生便㑹該通若只格一物便通衆理雖顔子亦不敢如此道須是今日格一件明日又格一件積習既多然後脫然自有貫通處涵養須用敬進學則在致知問人有志於學然智識蔽痼力量不至則如之何曰只是致知若致知則智識當自漸明不曽見人有一件事終思不到也智識明則力量自進問曰何以致知曰在明理或多識前言往行識之多則理明然人全在勉强也士之於學也猶農夫之耕農夫不耕則無所食無所食則不得生士之於學也其可一日舍哉學者言入乎耳必須著乎心見乎行事如只聽佗人言却似説他人事已無所與也問學者須志於大如何曰志無大小且莫説道將第一等讓與别人且做第二等才如此説便是自棄雖與不能居仁由義者差等不同其自小一也言學便以道為志言人便以聖為志自謂不能者自賊者也謂其君不能者賊其君者也或問人有恥不能之心如何曰人恥其不能而為之可也恥其不能而揜藏之不可也問技藝之事恥已之不能如何曰技藝不能安足恥為士者當知道已不知道可恥也為士者當博學已不博學一本無知道已下至此十九字但云博學守約已不能之則可恥也恥之如何亦曰勉之而已又安可嫉人之能而諱已之不能也學欲速不得然亦不可怠纔有欲速之心便不是學學是至廣大的事豈可以迫切之心為之問敬還用意否曰其始安得不用意若能不用意却是都無事了又問敬莫是靜否曰纔説靜便入於釋氏之説也不用靜字只用敬字纔説著靜字便是忘也孟子曰必有事焉而勿正心勿忘勿助長也必有事焉便是心勿忘勿正便是勿助長問至誠可以蹈水火有此理否曰有之曰列子言商丘開之事有乎曰此是聖人之道不明後莊列之徒各以私智探測至理而言也曰巫師亦能如此誠邪欺邪曰此輩往往有術常懐一箇欺人之心更那裏得誠來或問獨處一室或行闇中多有驚懼何也曰只是燭理不明若能燭理則知所懼者妄又何懼焉有人雖如此然不免懼心者只是氣不充須是涵養久則氣充自然物動不得然有懼心亦是敬不足問世言鬼神之事雖知其無然不能無疑懼何也曰此只是自疑爾曰如何可以曉悟其理曰理㑹得精氣為物遊魂爲變與原始要終之説便能知也須是於原字上用工夫或曰遊魂為變是變化之變否曰既是變則存者亡堅者腐更無物也鬼神之道只恁説與賢雖㑹得亦信不過須是自得也或曰何以得無恐懼曰須是氣定自然不惑氣未充要强不得因説與長老游山事人語言𦂳急莫是氣不定否曰此亦當習習到言語自然緩時便是氣質變也學至氣質變方是有功人只是一箇習今觀儒臣自有一般氣象武臣自有一般氣象貴戚自有一般氣象不成生來便如此只是習也某舊嘗進説於主上及太母欲令上於一日之中親賢士大夫之時多親宦官宫人之時少所以涵養氣質薫陶德性或問人或倦怠豈志不立乎曰若是氣體勞後須倦若是志怎生倦得人只為氣勝志故多為氣所使如人少而勇老而怯少而廉老而貪此為氣所使者也若是志勝氣時志既一定更不可易如曾子易簀之際其氣之微可知只為他志已定故雖死生許大事亦動他不得蓋有一絲髪氣在則志猶在也問人之燕居形體怠惰心不慢可否曰安有箕踞而心不慢者昔吕與叔六月中來緱氏閒居中某嘗窺之必見其儼然危坐可謂敦篤矣學者須恭敬但不可令拘迫拘迫則難久矣尹子曰嘗親聞此乃謂劉質夫也昔吕與叔嘗問為思慮紛擾某答以但為心無主若主於敬則自然不紛擾譬如以一壺水投於水中壺中既實雖江湖之水不能入矣曰若思慮果出於正亦無害否曰且如在宗廟則主敬朝廷主莊軍旅主嚴此是也如發不以時紛然無度雖正亦邪問游宣徳云人能戒愼恐懼於不覩不聞之時則無聲無臭之道可以馴致此説如何曰馴致漸進也然此亦大綱説固是自小以致大自修身可以至於盡性至命然其間有多少般數其所以至之之道當如何苟子曰始乎為士終乎為聖人今人學者須讀書纔讀書便望為聖賢然中間至之之方更有多少荀子雖能如此説却以禮義為偽性為不善佗自情性尚理㑹不得怎生到得聖人大抵以堯所行者欲力行之以多聞多見取之其所學者皆外也問人有日誦萬言或妙絶技藝此可學否曰不可大凢所受之才難加勉强止可少進而鈍者不可使利也惟理可進除是積久既久能變得氣質則愚必明柔必强蓋大賢以下即論才大賢以上更不論才聖人與天地合徳日月合明六尺之軀能有多少技藝人有身須用才聖人忘已更不論才也問人於議論多欲已直無含容之氣是氣不平否曰固是氣不平亦是量狹人量隨識長亦有人識高而量不長者是識實未至也大凡别事人都强得惟識量不可强今人有斗筲之量有釜斛之量有鍾鼎之量有江河之量江河之量亦大矣然有涯有涯亦有時而滿惟天地之量則無滿故聖人者天地之量也聖人之量道也常人之有量者天資也天資有量者須有限大抵六尺之軀力量只如此雖欲不滿不可得且如人有得一薦而滿者有得一官而滿者有改京官而滿者有入兩府而滿者滿雖有先後然卒不免譬如器盛物初滿時尚可以蔽䕶更滿則必出此天資之量非知道者也昔王隨甚有器量仁廟賜飛白書曰王隨徳行李淑文章當時以徳行稱名望甚重及為相有一人求作三路轉運使王薄之出鄙言當時人皆驚怪到這裏位高後便動了人之量只如此古人亦有如此者多如鄧艾位三公年七十處得甚好及因下蜀有功便動了言姜維云云謝安聞謝𤣥破符堅對客圍棋報至不喜及歸折屐齒强終不得也更如人大醉後益恭謹者只益恭便是動了雖與放肆者不同其為酒所動一也又如貴公子位益髙益卑謙只卑謙便是動了雖與驕傲者不同其為位所動一也然惟知道者量自然宏大不勉强而成今人有所見卑下者無佗亦是識量不足也人纔有意於為公便是私心昔有人典選其子弟係磨勘皆不為理此乃是私心人多言古時用直不避嫌得後世用此不得自是無人豈是無時因言少師典舉明道薦才事聖人作事甚宏裕今人不知義理者更不須説纔知義理便迫窄若聖人則綽綽有餘裕問觀物察已還因見物反求諸身否曰不必如此説物我一理纔明彼即曉此合内外之道也語其大至天地之髙厚語其小至一物之所以然學者皆當理會又問致知先求之四端如何曰求之性情固是切於身然一草一木皆有理須察觀物理以察已既能燭理則無往而不識天下物皆可以理照有物必有則一物須有一理窮理盡性至命只是一事纔窮理便盡性纔盡性便至命聲色臭味四字虛實一般凡物有形必有此四者意言象數亦然為人處世間得見事無可疑處多少快活問學者不必同如仁義忠信之類只於一字上求之可否曰且如六經則各有有箇蹊轍及其造道一也仁義忠信只是一體事若於一事上得之其佗皆通也然仁是本問人之學有覺其難而有退志則何之何曰有兩般有思慮苦而志氣倦怠者有憚其難而止者向嘗為之説今人之學如登山麓方其易處莫不濶步及到難處便止人情是如此山髙難登是有定形實難登也聖人之道不可形象非實難然也人弗為耳顔子言仰之彌髙鑽之彌堅此非是言聖人髙逺實不可及堅固實不可入也此只是譬喻却無事大意却是在瞻之在前忽焉在後上又問人少有得而遂安者如何曰此實無所得也譬如以管窺天乍見星斗燦爛便謂有所見喜不自勝此終無所得若有大志者不以管見為得也問家貧親老應舉求仕不免有得失之累何修可以免此曰此只是志不勝氣若志勝自無此累家貧親老須用禄仕然得之不得為有命曰在已固可為親奈何曰為已為親也只是一事若不得其如命何孔子曰不知命無以為君子人苟不知命見患難必避遇得䘮必動見利必趨其何以為君子然聖人言命蓋為中人以上者設非為上知者言也中人以上於得䘮之祭不能不惑故有命之説然後能安若上智之人更不言命惟安於義借使求則得之然非義則不求此樂天者之事也上智之人安於義中人以上安於命乃若聞命而不能安之者又其毎下者也孟子曰求之有道得之有命求之須有道奈何得之須有命問前世所謂隱者或守一節或敦一行然不知有知道否曰若知道則不肯守一節一行也如此等人鮮明理多取古人一節事專行之孟子曰服堯之服行堯之行古人而殺一不義雖得天下不為則我亦殺一不義雖得天下不為古人有高尚隱逸不肯就仕則我亦髙尚隱逸不仕如此等則放效前人所為耳於道鮮自得也是以東漢尚名節有雖殺身不悔者只為不知道也問方外之士有人來看他能先知者有諸因問王子真事陳本注云伊川一日入嵩山王佺己候於松下問何以知之曰去年已有消息來矣蓋先生前一年嘗欲往以事而止曰有之向見嵩山董五經能如此問何以能爾曰只是心靜靜而後能照又問聖人肯為否曰何必聖賢使釋氏稍近道理者便不肯為釋氏嘗言菴中坐却見菴外事莫是野狐精釋子猶不肯為况聖人乎問神仙之説有諸曰不知如何若説白日飛昇之類則無若言居山林間保形鍊氣以延年益壽則有之譬如一爐火置之風中則易過置之密室則難過有此理也又問揚子言聖人不師仙厥術義也聖人能為此等事否曰此是天地間一賊若非竊造化之機安能延年使聖人肯為周孔為之久矣問惡外物如何曰是不知道者也物安可惡釋氏之學便如此釋氏要屏事不問這事是合有邪合無邪若是合有又安可屏若是合無自然無了更屏什麽彼方外者苟且務靜乃逺迹山林之間蓋非理明者也世方以為高惑矣釋氏有出家出世之説家本不可出却為他不父其父不母其母自逃去固可也至於世則怎生出得既道出世除是不戴皇天不履后土始得然又却渴飲而飢食戴天而履地問某嘗讀華嚴經第一真空絶相觀第二事理無礙觀第三事事無礙觀譬如鏡燈之類包含萬象無有窮盡此理如何曰只為釋氏要周遮一言以蔽之不過曰萬理歸於一理也又問未知所以破佗處曰亦未得道他不是百家諸子箇箇談仁談義只為他歸宿處不是只是箇自私為輪囘生死却為釋氏之辭善遁纔窮著他便道我不為這箇到了寫在策子上怎生遁且指他淺近處只燒一文香便道我有無窮福利懷却這箇心怎生事神明釋氏言成住壊空便是不知道只有成壞無住空且如草木初生既成生盡便枯壊也他以謂如木之生生長既足却自住然後却漸漸毁壊天下之物無有住者嬰兒一生長一日便是減一日何甞得住然氣體日漸長大長的自長減的自減自不相干也問釋氏理障之説曰釋氏有此説謂既明此理而又執持是理故為障此錯看了理字也天下只有一箇理既明此理夫復何障若以理為障則是己與理為二今之學禪者平居髙談性命之際至於世事往往直有都不曉者此只是實無所得也問釋氏有一宿覺言下覺之説如何曰何必浮圖孟子嘗言覺字矣曰以先知覺後知以先覺覺後覺知是知此事覺是覺於理古人云共君一夜話勝讀十年書若於言下即悟何啻讀十年書問明道先生云昔之惑人也乗其迷暗今之入人也因其高明既曰髙明又何惑乎曰今之學釋氏者往往皆髙明之人所謂知者過之也然所謂髙明非中庸所謂極高明如知者過之若是聖人之知豈更有過問世之學者多入於禪何也曰今人不學則己如學焉未有不歸於禪也却為佗求道未有所得思索既窮乍見寛廣處其心便安於此曰是可反否曰深固者難反問西銘何如曰此横渠文之粹者也曰充得盡時如何曰聖人也横渠能充盡否曰言有多端有有徳之言有造道之言有徳之言説自已事如聖人言聖人事也造道之言則知足以知此如賢人説聖人事也横渠道儘髙言儘醇自孟子後儒者都無佗見識問横渠之書有迫切處否曰子厚謹嚴纔謹嚴便有迫切氣象無寛舒之氣孟子却寛舒只是中間有些英氣纔有英氣便有圭角英氣甚害事如顔子便渾厚不同顔子去聖人只毫髪之間孟子大賢亞聖之次也或問氣象於甚處見曰但以孔子之言比之便見如水與水精非不光比之玉自是有温潤含蓄氣象無許多光耀也問邵堯夫能推數見物壽長短始終有此理否曰固有之人問或言人但壽得一百二十數是否曰固是此亦是大綱數不必如此馬牛得六十按皇極經世當作三十猫犬得十二燕雀得六年之類蓋亦有過不及又問還察形色還以生下日數推考曰形色亦可察須精方驗邵堯夫數法出於李挺之至堯夫推數方及理邵堯夫臨終時只是諧謔須㬰而去以聖人觀之此亦未是蓋猶有意也比之常人甚懸絶矣他疾甚革某往視之因譬之曰堯夫平日所學今日無事否他氣微不能答次日見之却有聲如絲髪來大答云你道生姜樹上生我亦只得依你説是時諸公都在㕔上議後事各欲遷葬城中堯夫己自為塋佗在房間便聞得令人喚大郎來云不得遷𦵏衆議始定又諸公恐喧他盡出外説話佗皆聞得一人云有新報云云堯夫問有甚事曰有某事堯夫曰我將為收却幽州也以他人觀之便以為怪此只是心虛而明故聽得問曰堯夫未病時不如此何也曰此只是病後氣將絶心無念慮不昏便如此又問釋氏臨終亦先知死何也曰只是一箇不動心釋氏平生只學這箇事將這箇做一件大事學者不必學他但燭理明自能之只如邵堯夫事佗自如此亦豈嘗學也孔子曰未知生焉知死人多言孔子不告子路此乃深告之也又曰原始要終故知死生之説人能原始知得生理一作所以生更能要終知得死理一作所以死若不明得便雖萬般安排著亦不濟事張子厚罷禮官歸過洛陽相見某問云在禮院有甚職事曰多爲禮房檢正所奪只定得數箇諡并龍女衣冠問如何定龍女衣冠曰請依品秩曰若依某當是事必不如此處置曰如之何曰某當辨云大河之塞天地之靈宗廟之祐社稷之福與吏士之功不當歸功水獸龍獸也不可衣人衣冠子厚以為然問荆公可謂得君乎曰後世謂之得君可也然荆公之智識亦自能知得如表云忠不足以信上故事必待於自明智不足以破姦故人與之為敵智不破姦此則未然若君臣深相知何待事事使之辨明也舉此一事便可見曰荆公勿使上知之語信乎曰須看他當時因甚事説此話且如作此事當如何更須詳審未要令上知之又如説一事未甚切當更須如何商量體察今且勿令上知若此類不成是欺君也凡事未見始末更切子細反復推究方可人之有寤寐猶天之有晝夜陰陽動靜闔闢之理也如寤寐須順陰陽始得問人之寐何也曰人寐時血氣皆聚於内如血歸肝之類今人不睡者多損肝問魂魄何也曰魂只是陽魄只是陰魂氣歸於天體魄歸於地是也如道家三魂七魄之説妄爾或曰傳記有言太古之時人有牛首蛇身者莫無此理否曰固是既謂之人安有此等事但有人形似鳥喙或牛首者耳荀子中自説問太古之時人還與物同生否曰同莫是絶氣為人繁氣為蟲否曰然人乃五行之秀氣此是天地清明純粹氣所生也或曰人初生時還以氣化否曰此必燭理當徐論之且如海上忽露出一沙島便有草木生有土而生草木不足怪既有草木自然禽獸生焉或曰先生語録中云焉知海島上無氣化之人如何曰是近人處固無須是極逺處有亦不可知曰今天下未有無父母之人古有氣化今無氣化何也曰有兩般有全是氣化而生者若腐草化螢是也既是氣化到合化時自化有氣化生之後而種生者且如人身上著新衣服過幾日便有蟣蝨生其間此氣化也氣既化後更不化便以種生去此理甚明或問宋齊丘化書云有無情而化為有情者有有情而化為無情者無情而化為有情者若楓樹化為老人是也有情而化為無情者如望夫化為石是也此語如何曰莫無此理楓木為老人形如老人也豈便變為老人川中有蟬化為花蚯蚓化為百合如石蟹石燕石人之類有之固有此理某在南中時聞有採石人因採石石䧟遂在石中幸不死飢甚只取石膏食之不如幾年後因别人復來採石見此人在石中引之出漸覺身硬纔出風便化為石此無可怪蓋有此理也若望夫石只是臨江山有石如人形者今天下凡江邊有石立者皆呼為望夫石如呼馬鞍牛頭之類同天下同之問上古人多壽後世不及古何也莫是氣否曰氣便是命也曰今人不若古人壽是盛衰之理歟曰盛衰之運卒難理㑹且以歴代言之二帝三王為盛後世為衰一代言之文武成康為盛幽厲平桓為衰以一君言之開元為盛天寳為衰以一歲則春夏為盛秋冬為衰以一月則上旬為盛下旬為衰以一日則寅卯為盛戌亥為衰一時亦然如人生百年五十以前為盛五十以後為衰然有衰而復盛者有衰而不復反者若舉大運而言則三王不如五帝之盛兩漢不如三王之盛又其下不如漢之盛至其中間又有多少盛衰如三代衰而漢盛漢衰而魏盛此是衰而復盛之理譬如月既晦則再生四時往復來也若論天地之大運舉其大體而言則有日衰削之理如人生百年雖赤子才生一日便是減一日也形體日自長而數日自減不相害也天下有多少才只為道不明於天下故不得有所成就且古者興於詩立於禮成於樂如今人怎生㑹得古人於詩如今人歌曲一般雖閭巷童稚皆習聞其説而曉其義故能興起於詩後世老師宿儒尚不能曉其義怎生責得學者是不得興於詩也古禮既廢人倫不明以至治家皆無法度是不得立於禮也古人有歌咏以養其性情聲音以養其耳舞蹈以養其血脈今皆無之是不得成於樂也古之成材也易今之成材也難今習俗如此不美然人却不至大故薄惡者只是為善在人心者不可忘也魏鄭公言使民澆漓不復返朴今當為鬼為魅此言甚是只為秉彝在人雖俗甚惡亦滅不得蘇季明問中之道與喜怒哀樂未發謂之中同否曰非也喜怒哀樂未發是言在中之義只一箇中字但用不同或曰喜怒哀樂未發之前求中可否曰不可既思於喜怒哀樂未發之前求之又却是思也既思即是已發思與喜怒哀樂一般纔發便謂之和不可謂之中也又問吕學士言當求於喜怒哀樂未發之前信斯言也恐無著模如之何而可曰看此語如何地下若言存養於喜怒哀樂未發之時則可若言求中於喜怒哀樂未發之前則不可又問學者於喜怒哀樂發時固當勉强裁抑於未發之前當如何用功曰於喜怒哀樂未發之時更怎生求只平日涵養便是涵養久則喜怒哀樂發自中節或曰有未發之中有既發之中曰非也既發時便是和矣發而中節固是得中時中之類只為將中和來分説便是和也季明問先生説喜怒哀樂未發謂之中是在中之義不識何意曰只喜怒哀樂不發便是中也曰中莫無形體只是箇言道之題目否曰非也中有甚形體然既謂之中也須有箇形象曰當中之時耳無聞目無見否曰雖耳無聞目無見然見聞之理在始得曰中是有時而中否曰何時而不中以事言之則有時而中以道言之何時而不中曰固是所為皆中然而觀於四者未發之時靜時自有一般氣象及至接事時又自别何也曰善觀者不如此却於喜怒哀樂已發之際觀之賢且説靜時如何曰謂之無物則不可然自有知覺處曰既有知覺却是動也怎生言静人説復其見天地之心皆以謂至靜能見天地之心非也復之卦下面一畫便是動也安得謂之靜自古儒者皆言靜見天地之心唯某言動而見天地之心或曰莫是於動上求靜否曰固是然最難釋氏多言定聖人便言止且如物之好須道是好物之惡須道是惡物自好惡關我這裏甚事若説道我只是定更無所為然物之好惡亦自在裏故聖人只言止所謂止如人君止於仁人臣止於敬之類是也易之艮言止之義曰艮其止止其所也言隨其所止而止之人多不能止蓋人萬物皆備遇事時各因其心之所重者更互而出纔見得這事重便有這事出若能物各付物便自不出來也或曰先生於喜怒哀樂未發之前下動字下靜字曰謂之靜則可然靜中須有物始得這裏便一作最是難處學者莫若且先理㑹得敬能敬則自知此矣或曰敬何以用功曰莫若主一季明曰昞常患思慮不定或思一事未了佗事如麻又生如何曰不可此不誠之本也須是習習能専一時便好不拘思慮與應事皆要求一或曰當靜坐時物之過乎前者還見不見曰看事如何若是大事如祭祀前旒蔽明黈纊充耳凡物之過者不見不聞也若無事時目須見耳須聞或曰當敬時雖見聞莫過焉而不留否曰不説道非禮勿視勿聽勿者禁止之辭纔説弗字便不得也問雜説中以赤子之心為己發是否曰已發而去道未逺也曰大人不失赤子之心若何曰取其純一近道也曰赤子之心與聖人之心若何曰聖人之心如鏡如止水問日中所不欲為之事夜多見於夢此何故也曰只是心不定今人所夢見事豈特一日之間所有之事亦有數十年前之事夢見之者只為心中舊有此事平日忽有事與此事相感或氣相感然後發出來故雖白日所憎惡者亦有時見於夢也譬如水為風激而成浪風既息浪猶洶湧未己也若存養久底人自不如此聖賢則無這箇夢只有朕兆便形於夢也人有氣清無夢者亦有氣昏無夢者聖人無夢氣清也若人困甚時更無夢只是昏氣蔽隔夢不得也若孔子夢周公之事與常人夢别人於夢寐間亦可以卜自家所學之淺深如夢寐顚倒即是心志不定操存不固如楊子江宿浪問人心所繫著之事則夜見於夢所著事善夜夢見之者莫不害否曰雖是善事心亦是動凡事有朕兆入夢者却無害捨此皆是妄動或曰孔子嘗夢見周公當如何曰此聖人存誠處也聖人欲行周公之道故雖一夢寐不忘周公及既衰知道之不可行故不復夢也然所謂夢見周公豈是夜夜與周公語也人心雖要定使佗思時方思乃是今人都由心曰心誰使之曰以心使心則可人心自由便放去也政也者蒲蘆也言化之易也螟與與果蠃自是二物但氣類相似然祝之久便能肖政之祝人宜甚於蒲蘆矣然蒲蘆二物形質不同尚祝之可化人與聖人形質無異豈學之不可至耶誠者自成如至誠事親則成人子至誠事君則成人臣不誠無物誠者物之終始猶俗説徹頭徹尾不誠更有甚物也其次致曲曲偏曲之謂非大道也曲能有誠就一事中用志不分亦能有誠且如技藝上可見養由基射之類是也誠則形誠後便有物如立則見其參於前在輿則見其倚於衡如有所立卓爾皆若有物方見如無形是見何也也形則著又著見也著則明是有光輝之時也明則動誠能動人也君子所過者化豈非動乎或曰變與化何别曰變如物方變而未化化則更無舊迹自然之謂也莊子言變大於化非也問命與遇何異張横渠云行同報異猶難語命語遇可也先生曰人遇不遇即是命也曰長平之戰四十萬人死豈命一乎曰是亦命也只遇著白起便是命當如此又况趙卒皆一國之人使是五湖四海之人同時而死亦是常事又問或當形而王或為相而餓死或先貴後賤或先賤後貴此之類皆命乎曰莫非命也既曰命便有此不同不足怪也問人之形體有限量心有限量否曰論心之形則安得無限量又問心之妙用有限量否曰自是人有限量以有限之形有限之氣苟不通一作用之以道安得無限量孟子曰盡其心知其性心即性也在天為命在人為性論其所主為心其實只是一箇道苟能通之以道又豈有限量天下更無性外之物若云有限量除是性外有物始得問心有善惡否曰在天為命在義為理在人為性主於身為心其實一也心本善發於思慮則有善有不善若既發則可謂之情不可謂之心譬如水只謂之水至於流而為派或行於東或行於西却謂之流也問喜怒出於性否曰固是纔有生識便有性有性便有情無性安得情又問喜怒出於外如何曰非出於外感於外而發於中也問性之有喜怒猶水之有波否曰然湛然平靜如鏡者水之性也及遇沙石或地勢不平便有湍激或風行其上便為波濤洶湧此豈水之性也哉人性中只有四端又豈有許多不善底事然無水安得波浪無性安得情也問人性本明因何有蔽曰此須索理㑹也孟子言人性善是也雖荀楊亦不知性孟子所以獨出諸儒者以能明性也性無不善而有不善者才也性即是理理則自堯舜至於途人一也才稟於氣氣有清濁稟其清者為賢稟其濁者為愚又問愚可變否曰可孔子謂上智與下愚不移然亦有可移之理惟自暴自棄者則不移也曰下愚所以自暴棄者才乎曰固是也然却道佗不可移不得性只一般豈不可移却被他自暴自棄不肯去學故移不得使肯學時亦有可移之理凡解文字但易其心自見理理只是人理甚分明如一條平坦底道路詩曰周道如砥其直如矢此之謂也且如隨卦言君子向晦入宴息解者多作遵養時晦之晦或問作甚晦字曰此只是隨時之大者向晦則宴息也更别有甚義或曰聖人之言恐不可以淺近看佗曰聖人之言自有近處自有深逺處如近處怎生强要鑿教深逺得楊子曰聖人之言逺如天賢人之言近如地某與改之曰聖人之言其逺如天其近如地學者不泥文義者又全背却逺去理㑹文義者又滯泥不通如子濯孺子為將之事孟子只取其不背師之意人須就上面理㑹事君之道如何也又如萬章問舜完廩浚井事孟子只答佗大意人須要理㑹浚井如何出得來完廩又怎生下得來若此之學徒費心力問聖人之經㫖如何能窮得曰以理義去推索可也學者先須讀論孟窮得論孟自有箇要約處以此觀他經甚省力論孟如丈尺權衡相似以此去量度事物自然見得長短輕重某嘗語學者必先看論語孟子今人雖善問未必如當時人借使問如當時人聖人所答不過如此今人看論孟之書亦如見孔孟何異孟子養氣一篇諸君宜潛心玩索須是實識得方可勿忘勿助長只是養氣之法如不識怎生養有物始言養無物又養箇甚麽浩然之氣須見是一箇物如顔子言如有所立卓爾孟子言躍如也卓爾躍如分明見得方可不得於言勿求於心不可此觀人之法心之精微言有不得者不可便謂不知此告子淺近處持其志無暴其氣内外交相養也配義與道謂以義理養成此氣合義與道方其未養則氣自是氣義自是義及其義成浩然之氣則氣與義合矣本不可言合為未養時言也如言道則是一箇道都了若以人而言則人自是人道自是道須是以人行道始得言義又言道道體也義用也就事上便言義北宫黝之勇必行孟施舍無懼子夏之勇本不可知却因北宫黝而可見子夏是篤信聖人而力行曽子是明理問必有事焉當用敬否曰敬只是涵養一事必有事焉須當集義只知用敬不知集義却是都無事也又問義莫是中理否曰中理在事義在心内苟不主義浩然之氣從何而生理只是發而見於外者且如恭敬幣之未將也恭敬雖因幣帛威儀而後發見於外然須心有此恭敬然後著見若心無恭敬何以能爾所謂徳者得也須是得於己然後謂之德也幣之未將之時已有恭敬非因幣帛而後有恭敬也問敬義何别曰敬只是持己之道義便知有是有非順理而行是無義也若只守一箇敬不知集義却是都無事也且如欲為孝不成只守著一箇孝字須是知所以為孝之道所以侍奉當如何温凊當如何然後能盡孝道也又問義只在事上如何曰内外一理豈特事上求合義也問人敬以直内氣便能充塞天地否曰氣須是養集義所生積集既久方能生浩然氣象人但看所養如何養得一分便有一分養得二分便有二分只將敬安能便到充塞天地處且氣自是氣體所充自是一件事敬自是敬怎生便合得如曰其為氣配義與道若説氣與義時自别怎生便能使氣與義合性相近也習相逺也性一也何以言相近曰此只是言氣質之性如俗言性急性緩之類性安有緩急此言性者生之謂性也又問上智下愚不移是性否曰此是才須理㑹得性與才所以分處又問中人以上可以語上中人以下不可以語上是否否曰固是然此只是大綱説言中人以上可以與之説近上話中人以下不可以與説近上話也生之謂性凡言性處須看他立意如何且如言人性善性之本也生之謂性論其所稟也孔子言性相近若論其本豈可言相近只論其所稟也告子所云固是為孟子問佗他説便不是也乃若其情則可以為善若夫為不善非才之罪此言人䧟溺其心者非關才事才猶言材料曲可以為輪直可以為梁棟若是毁鑿壊了豈關才事下面不是説人皆有四者之心或曰人材有美惡豈可言非才之罪曰才有美惡者是舉天下之言也若説一人之才如因富歲而賴因凶歲而暴豈才質之本然邪問捨則亡心有亡何也曰否此只是説心無形體纔主著事時先生以目視地便在這裏纔過了便不見如出入無時莫知其鄉此句亦須要人理㑹心豈有出入亦以操捨而言也放心謂心本善而流於不善是放也問盡己之謂忠莫是盡誠否既盡己安有不誠盡己則無所不盡如孟子所謂盡心曰盡心莫是我有惻隱羞惡如此之心能盡得便能知性否曰何必如此數只是盡心便了纔數著便不盡如數一百少却一便為不盡也大抵稟於天曰性而所主在心纔盡心即是知性知性即是知天矣羅本以為吕與叔問問出辭氣莫是於言語上用工夫否曰須是養乎中自然言語順理今人熟底事説得便分明若是生事便説得蹇澁須是涵養久便得自然若是慎言語不妄發此却可著力孔子教人不憤不啓不悱不發蓋不待憤悱而發則自知之不固待憤悱而後發則沛然矣學者須是深思之思而不得然後為佗説便好初學者須是且為佗説不然非獨佗不曉亦止人好問之心也孔子既知宋桓魋不能害己又却微服過宋舜既見象之將殺已而又象憂亦憂象喜亦喜國祚長短自有命數人君何用汲汲求治禹稷救飢溺者過門不入非不知飢溺而死者自有命又却救之如此其急數者之事何故如此須思量到道並行而不相悖處可也今且説聖人非不知命然於人事不得不盡此説未是問聖人與天道何異曰無異聖人可殺否曰聖人智足以周身安可殺也只如今有智慮人己害他不得况於聖人曰昔瞽瞍使舜完廩浚井舜知其欲殺已而逃之乎曰本無此事此是萬章所傳聞孟子更不能理㑹這下事只且説舜心也如下文言琴朕干戈朕二嫂使治朕棲堯為天子安有是事問加我數年五十以學易可以無大過矣不知聖人何以因學易後始能無過曰先儒謂孔子學易後可以無過此大段失却文意聖人何嘗有過如待學易後無大過却是未學易前嘗有大過也此聖人如未嘗學易何以知其可以無過蓋孔子時學易者支離易道不明仲尼既修佗經惟易未嘗發明故謂弟子曰加我數年五十以學易期之五十然後贊易則學易者可以無大過差若所謂贊易道而黜八索是也前此學易者甚衆其説多過聖人使弟子俟其贊而後學之其過鮮也問博我以文約我以禮曰此是顔子稱聖人最切當處聖人教人只是如此既博之以文而後約之以禮所謂博學而詳説之將以反説約也博與約相對聖人教人只此兩字博是博學多識多聞多見之謂約只是使之知要也又問君子博學於文約之以禮亦可以弗畔矣夫與此同乎曰這箇只是淺近説言多聞見而約束以禮雖未能知道庶幾可以弗畔於道此言善人君子多識前言往行而能不犯非禮者爾非顔子所以學於孔子之謂也又問此莫是小成否曰亦未是小成去知道甚逺如曰多聞擇其善者而從之多見而識之知之次也聞見與知之甚異此只是聞之者也又曰聖人之道知之莫甚難曰聖人之道安可以難易言聖人未嘗言易以驕人之志亦未嘗言難以阻人之進仲尼但曰未之思也夫何逺之有此言極有涵畜意思孟子言夫道若大路然豈難知哉只下這一箇豈字便露筋骨聖人之言不如此如下面説人病不求耳子歸而求之有餘師這數句却説得好孔孟言有異處亦須自識得或問子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死然設使孔子遇難顔淵有可死之理否曰無可死之理除非是鬭死然鬭死非顔子之事若云遇害又不當言敢不敢也又問使孔子遇害顔子死之否乎曰豈特顔子之於孔子也若二人同行遇難固可相死也又問親在則如之何曰且譬如二人捕虎一人力盡一人須當同去用力如執干戈衛社稷到急處便遁逃去之言我有親是大不義也當此時豈問有親無親但當預先謂吾有親不可行則止豈到臨時却自規避也且如常人為不可獨行也須結伴而出至如親在為親圖養須出去亦須結伴同去便有患難相死之道昔有二人同在嵩山同出就店飲酒一人大醉卧在地上夜深歸不得一人又無力扶持尋常曠野中有虎豹盜賊此人遂只在傍直守到曉不成不顧了自歸也此義理所當然者也禮言親在不許友以死者此言亦在人用得蓋有親在可許友以死者有親不在不可許友以死者可許友以死如二人同行之類是也不可許友以死如戰國游俠為親不在乃為人復讐甚非理也問不遷怒不貳過何也語録有怒甲不遷乙之説是否曰是曰若此則甚易何待顔氏而後能曰只被説得粗了諸君便道易此莫是最難須是理㑹得因何不遷怒如舜之誅四凶怒在四凶舜何與焉蓋因是人有可怒之事而怒之聖人之心本無怒也譬如明鏡好物來時便見是好惡物來時便見是惡鏡何嘗有好惡也世之人固有怒於室而色於市且如怒一人對那人説話能無怒色否有能怒一人而不怒别人者能忍得如此已是煞知義理若聖人因物而未嘗有怒此莫是甚難君子役物小人役於物今人見有可喜可怒之事自家著一分陪奉他此亦勞矣聖人心如止水問顔子勇乎曰孰勇於顔子觀其言曰舜何人也予何人也有為者亦若是孰勇於顔子如有若無實若虚犯而不校之類抑可謂大勇者矣曾子傳聖人道一作學只是一箇誠篤語曰參也魯如聖人之門子游子夏之言語子貢子張之才辨聰明者甚多卒傳聖人之道者乃質魯之人人只要一箇誠實聖人説忠信處甚多曽子孔子在時甚少後來所學不可測且易簀之事非大賢以上作不得曾子之後有子思便可見曾子執親之䘮水漿不入口者七日不合禮何也曰曾子者過於厚者也聖人大中之道賢者必俯而就不肖者必跂而及若曾子之過過於厚者也若衆人必當就禮法自大賢以上則看佗如何不可以禮法拘也且守社稷者國君之職也太王則委而去之守宗廟者天子之職也堯舜則以天下與人如三聖賢則無害佗人便不可然聖人所以教人之道大抵使之循禮法而已金聲而玉振之此孟子為學者言終始之義也樂之作始以金奏而以玉聲終之詩曰依我磬聲是也始於致知智之事也行所知而至其極聖之事也易曰知至至之知終終之是也惟聖人然後踐形言聖人盡得人道也人得天地之正氣而生與萬物不同既為人須盡得人理衆人有之而不知賢人踐之而未盡能踐形者唯聖人也佚道使民謂本欲佚之也故雖勞而不怨生道殺民謂本欲生之也且如救水火是求所以生之也或有焚溺而死者却雖死不怨仁言謂以仁厚之言加於民仁聲如仁聞謂風聲足以感動人也此尤見仁徳之昭著也問行之而不著習矣而不察曰此言大道如此而人由之不知也行之而不著謂人行之而不明曉也習矣而不察謂人習之而不省察也曰先生有言雖孔門弟子亦有此病何也曰在衆人習而不察者只是饑食渴飲之類由之而不自知也如孔門弟子却是聞聖人之化入於善而不自知也衆者言衆多也問可以取可以無取天下有兩可之事乎曰有之如朋友之饋是可取也然己自可足是不可取也纔取之便傷廉矣曰取傷廉固不可然與傷惠何害曰是有害於惠也可以與然却可以不與若與之時財或不瞻却於合當與者無可與之且博施濟衆固聖人所欲然却五十者方衣帛七十者方食肉如使四十者衣帛五十者食肉豈不更好然力不可以給合當衣帛食肉者便不足也此所以傷惠問人有不為然後可以有為曰此只是有所擇之人能擇其可為不可為也纔有所不為便可以有為若無所不為豈能有為邪問非禮之禮非義之義何謂也曰恭本為禮過恭是非禮之禮也以物與人為義過與是非義之義也曰此事何止大人不為曰過恭過與是細人之事猶言婦人之仁也只為佗小了大人豈肯如此問天民天吏大人何以别曰順天行道者天民也順天為政者天吏也大人者又在二者之上孟子曰充實而有光輝之謂大聖人豈不為天民天吏如文王伊尹是也大而化之之謂聖聖而不可知之之謂神非是聖人上别有一等神人但聖人有不可知處便是神也化與變化之化同若到聖人更無差等也或曰堯舜禹湯文武如何曰孔子嘗論堯舜矣如曰惟天爲大惟堯則之如此等事甚大惟堯舜可稱也若湯武雖是事不同不知是聖人不是聖人或曰可以湯武之心求之否曰觀其心如行一不義殺一不辜雖得天下不為此等事大賢以上人方一作言爲得若非聖人亦是亞聖一等人也若文王則分明是大聖人也禹又分明如湯武觀舜稱其不矜不伐與孔子言無間然之事又却别有一箇氣象大抵生而知之與學而知之及其成功一也舜季明問舜執其兩端注以為過不及之兩端是乎曰是曰既過不及又何執乎曰執猶今之所謂執持使不得行也舜執持過不及使民不得行而用其中使民行之也又問此執與湯執中何如曰執是一箇執舜執兩端是執持而不用湯執中而不失將以用之也若子莫執中却是子莫見楊墨過不及遂於過不及二者之間執之却不知有當摩頂放踵利天下時有當拔一毛利天下不為時執中而不通變與執一無異季明問君子時中莫是隨時否曰是也中字最難識須是黙識心通且試言一㕔則中央為中一家則㕔中非中而堂為中言一國則堂非中而國之中為中推此類可見矣且如初寒時則薄裘為中如在盛寒而用初寒之裘則非中也更如三過其門不入在禹稷之世為中若居陋巷則不中矣居陋巷在顔子之時為中若三過其門不入則非中也或曰男女不授受之類皆然曰是也男女不授受中也在䘮祭則不如此矣問堯舜湯武事迹雖不同其心德有間否曰無間曰孟子言堯舜性之湯武身之湯武豈不性之邪曰堯舜生知湯武學而知之及其成功一也身之言履之也反之言歸於正也或問夫子賢於堯舜信諸曰堯舜豈可賢也但問人推尊夫子之道以謂仲尼垂法萬世故云爾然三子之論聖人皆非善稱聖人者如顔子便不如此道但言仲之彌髙鑽之彌堅而已後來如曾子善形容聖人氣象曰子温而厲威而不猛恭而安又郷黨一篇形容得聖人動容注措甚好使學者宛如見聖人觀水有術必觀其瀾瀾湍急處於此便見源之無窮今人以波對瀾非也下文日月有明容光必照以言其容光無不照故知日月之明無窮也問孟子曰人之所以異於禽獸者幾希庶民去之君子存之且人與禽獸甚懸絶矣孟子言此言莫是只在去之存之上有不同處曰固是人只有箇天理却不能存得更做甚人也泰山孫明復有詩云人亦天地一物爾飢食渴飲無休時若非道義充其腹何異鳥獸安鬚眉上面説人與萬物皆生於天地意思下面二句如此或曰退之雜説有云人有貌如牛首蛇形鳥喙而心不同焉可謂之非人乎即有顔如渥丹者其貌則人其心則禽獸又惡可謂之人乎此意如何曰某不盡記其文然人只要存一箇天理問守身如何曰守身守之本既不能守身更説甚道義曰人説命者多不守身何也曰便是不知命孟子曰知命者不立巖墻之下或曰不説命者又不敢有為曰非特不敢為又有多少畏恐然二者皆不知命也莫之為而為莫之致而致便是天理司馬遷以私意妄窺天道而論伯夷曰天道無親常與善人若伯夷者可謂善人非邪天道之大安可以一人之故妄意窺測如曰顔何為而殀跖何為而壽皆指一人計較天理非知天也問桎梏而死者非正命也然亦是命否曰聖人只教人順受其正不説命或曰桎梏死者非命乎曰孟子自説了莫非命也然聖人不説是命故者以利為本故是本如此也纔不利便害性利只是順天下只是一箇利孟子言周易所言一般只為後人趨著利便有弊故孟子拔本塞源不肯言利其不信孟子者却道不合非利李覯是也其信者又直道不得近利人無利只是生不得安得無利且譬如椅子人坐此便安是利也如求安不已又要褥子以求温暖無所不為然後奪之於君奪之於父此其趨利之弊也利只是一箇利只為人用得别博弈小數不專心致志猶不可得况學道而悠悠安可得也仲尼言吾嘗終日不食終夜不寢以思無益不如學也又問朝聞道夕死可矣不知聖人有甚事來迫切了底死地如此文意不難㑹須是求其所以如此何故始得聖人固是生知猶如此説所以教人也學如不及猶恐失之纔説姑待來日便不可也子之燕居申申夭夭如何曰申申是和樂中有中正氣象夭夭是舒泰氣象此皆弟子善形容聖人處也為申申字説不盡故更著夭夭字今人不怠惰放肆必太嚴厲嚴厲時則著此四字不得放肆時亦著此四字不得除非是聖人便自有中和之氣問務民之義敬鬼神而逺之何以為知曰只此兩句説知亦盡且人多敬鬼神者只是惑逺者又不能敬能敬能逺可謂知矣又問莫是知鬼神之道然後能敬能逺否曰亦未説到如此深逺處且大綱説當敬不惑也問今人奉佛莫是惑否曰是也敬佛者不惑不敬者只是孟浪不信又問佛當敬否曰佛亦是胡人之賢智者安可慢也至如隂陽卜筮擇日之事今人信者必惑不信者亦是孟浪不信如出行忌太白之類太白在西不可西行有人在東方居不成都不得西行又却初行日忌次日便不忌次日不成不衝太白也如使太白為一人為之則鬼神亦勞矣如行遇風雨之類則凡在行者皆遇之也大抵人多記其偶中耳問伯夷不念舊惡何也曰此清者之量伯夷之清若推其所為須不容於世必負石赴河乃已然却為他不念舊惡氣象甚宏裕此聖人深知伯夷處問伯夷叩馬諫武王義不食周粟有諸曰叩馬則不可知非武王誠有之也只此便是佗隘處君尊臣卑天下之常理也伯夷知守常理而不知聖人之變故隘不食周粟只是不食其禄非餓而不食也至如史記所載諫詞皆非也武王伐商即位已十一一作二年矣安得父死不葬之語問伐國不問仁人如何曰不知怎生地伐國如武王伐紂都是仁人如柳下惠之時則不可當時諸侯以土地之故糜爛其民皆不義之伐宜仁人不忍言也問宋襄公不鼓不成列如何曰此愚也既與他戰又却不鼓不成列必待成列圖箇甚問羊祜陸抗之事如何曰如送絹償禾之事甚好至抗飲祜藥則不可羊祜雖不是酖人底人然兩軍相向其所餉藥自不當飲問用兵掩其不備出其不意之意使王者之師當如此否曰固是用兵須要勝不成要敗既要勝須識所以勝之之道但湯武之兵自不煩如此罔有敵于我師自可見然湯亦嘗升自陑陑亦間道且如兩軍相向必擇地可攻處攻之右實則攻左左實則攻右不成道我不用計也且如漢楚既約分鴻溝乃復還襲之此則不可如韓信囊沙壅水之類何害他師衆非我敵决水使他一半不得渡自合如此有甚不得處又問問諜之事如何曰這箇不可也問冉子為子華請粟而與之少原思為之宰則與之多其意如何曰原思為宰宰必受禄禄自有常數故不得而辭子華使於齊師使弟子不當有所請冉子請之自不是故聖人與之少佗理㑹不得又請益再與之亦少聖人寛容不欲直拒他冉子終不喻也問子使漆雕開仕對曰吾斯之未能信漆雕開未可仕孔子使之仕何也曰據佗説這一句言語自是仕有餘兼孔子道可以仕必是實也如由也志欲為千乗之國孔子止曰可使治其賦求也欲為小邦孔子止曰可使為之宰之類由求之徒豈止如此聖人如此言便是優為之也問丘也幸苟有過人必知之注言諱君之惡是否曰是何以歸過於己曰非是歸過於己此事却是陳司敗欲使巫馬期以娶同姓之事去問是知禮不知禮却須要囘報言語也聖人只有一箇不言而已若説道我為諱君之惡不可也又不成却以娶同姓為禮亦不可也只可道丘也幸苟有過人必知之問行不由徑徑是小路否曰只是不正當處如履田疇之類不必不由小路昔有一人因送葬回不覺被僕者引自他道歸行數里方覺不是却須要回就大路上若此非中理若使小路便於往來由之何害問古者何以不修墓曰所以不修墓者欲初為墓時必使至堅固故須必誠必敬若不誠敬安能至久曰孔子為墓何以速崩如此邪曰非孔子也孔子先反修虞事使弟子治之弟子誠敬不至纔雨而墓崩其為之不堅固可知然修之亦何害聖人言不修者所以深責弟子也問先進於禮樂野人也後進於禮樂君子也孔子何以不從君子而從野人曰請諸君細思之曰先儒有變文從質之説是否曰固是然君子野人者據當時謂之君子野人也當時謂之野人是言文質相稱者也當時謂之君子則過乎文者也是以不從後進而從先進也蓋當時文弊已甚故仲尼欲救之云爾我不欲人之加諸我也我亦欲無加諸人中庸曰施諸己而不願亦勿施於人正解此兩句然此兩句甚難行故孔子曰賜也非爾所及也問質直而好義察言而觀色慮以下人何以為達曰此正是達也只好義與下人已是達了人所以不下人者只為不達達則只是明達察言而觀色非明達而何又問子張之問達如何曰子張之意以人知為達纔達則人自知矣此更不須理㑹子張之意専在人知故孔子痛抑之又曰夫聞也者色取仁而行違居之不疑也學者須是務是不要近名方是有意近名則大本已失更學何事為名而學則是偽也今之學者大抵爲名為名與為利清濁雖不同然其利心則一也今市井閭巷之人却不為名為名而學者志於名而足矣然其心猶恐人之不知韓退之直是㑹道言語曰内不足者急於人知沛然有餘厥聞四馳大抵為名者只是内不足内足者自是無意於名如孔子言疾没世而名不稱此一句人多錯理㑹此只是言君子惟患無善之可稱當汲汲為善非是使人求名也問在邦無怨在家無怨不知怨在己在人曰在己曰既在己舜何以有怨曰怨只是一箇怨但其用處不同舜自是怨如舜不怨却不是也學須是通不得如此執泥如言仁者不憂又却言作易者其有憂患須要知用處各别也天下只有一箇憂字一箇怨字既有此二字聖人安得無之如王通之言甚好但為後人附㑹亂却如魏徴問聖人有憂乎曰天下皆憂吾獨得無憂問疑曰天下皆疑吾獨得無疑謂董常曰樂天知命吾何憂窮理盡性吾何疑如此自不相害説得極好至下面數句言心迹之判便不是此皆人人附㑹適所以為贅也問民可使由之不可使知之是聖人不使知之邪是民自不可知也曰聖人非不欲民知之也蓋聖人設教非不欲家喻戶曉比屋皆可封也蓋聖人但能使天下由之耳安能使人人盡知之此是聖人不能故曰不可使知之若曰聖人不使民知豈聖人之心是後世朝三暮四之術也某嘗與謝景温説此一句他爭道朝三暮四之術亦不可無聖人亦時有之此大故無義理説聖人順人情處亦有之豈有為朝三暮四之術哉謝景温一作趙景平問為政遲速曰仲尼嘗言之矣苟有用我者朞月而已可也三年有成仲尼言有成者蓋欲立致治之功業如堯舜之時夫是之謂有成此聖人之事佗人不可及某嘗言後世之論治者皆不中理漢公孫丞相言三年而化臣𢎞尚切遲之唐李石謂十年責治太迫此二者皆率爾而言聖人之言自有次序所謂朞月而已可也者謂紀綱布也三年有成治功成也聖人之事後世雖不敢望如此然二帝之治惟聖人能之三王以下事業大賢可為也又問孔子言用我者三年有成言王者則曰必世而後仁何也曰所謂仁者風移俗易民歸於仁天下變化之時此非積久何以能致其曰必世理之然也有成者謂法度紀綱有成而化行也如欲民仁非必世安可問大則不驕化則不吝此語何如曰若以大而化之解此則未是然大則不驕此句却有意思只為小便驕也化則不吝化煞高不吝未足以言之驕與吝兩字正相對驕是氣盈吝是氣歉曰吝何如則是曰吝是吝嗇也且於嗇上看便見得吝嗇止是一事且人若吝時於財上亦不足於事上亦不足凡百事皆不足必有歉歉之色也曰有周公之才之義使驕且吝其餘不足觀也已此莫是甚言驕吝之不可否曰是也若言周公之徳則不可下吝驕字此言雖才如周公驕吝亦不可也仲尼當周衰㣲轍環天下顔子何以不仕曰此仲尼之任也使孔子得行其道顔子不仕可矣然孔子既當此任則顔子足可閉戶為學也孟子有功於聖人不可言如仲尼只説一箇仁字立人之道曰仁與義孟子開口便説仁義仲尼只説一箇志孟子便説許多養氣出來只此二字其功甚多未知道者如醉人方其醉時無所不至及至醒也莫不愧恥人之未知學者自視以為無缺及既知學反思前日所為則駭且懼矣聖人六經皆不得已而作如耒耜陶冶一不制則生人之用熄後世之言無之不為缺有之徒為贅雖多何益也聖人言雖約無有包含不盡處言貴簡言愈多於道未必明杜元凱却有此語云言高則㫖逺辭約則義微大率言語須是含蓄而有餘意所謂書不盡言言不盡意也中庸之書其味無窮極索玩味問坎之六四樽酒簋貳用缶納約自牖何義也曰坎險之時也此時聖人論大臣處險難之法樽酒簋貳用缶謂當險難之時更用甚得無非是用至誠也納約自牖言欲納約於君當自明處牖者開明之處也欲開悟於君若於君所蔽處何由入得如漢高帝欲易太子他人皆爭以嫡庶之分夫嫡庶之分髙祖豈不知得分明直知不是了犯之此正是髙祖所蔽處更豈能曉之獨留侯招致四皓此正髙祖所明處蓋髙祖自匹夫有天下皆豪傑之力故憚之留侯以四皓輔太子髙祖知天下豪傑歸心於惠帝故更不易也昔秦伐魏欲以長安君為質太后不可左師觸龍請見云云遂以長安君為質焉夫太后只知愛子更不察利害故左師以愛子之利害開悟之也易八卦之位元不曽有人説先儒以謂乾位西北坤位西南然乾坤任六子而自處於無為之地此大故無義理風雷山澤之類便是天地之用豈天地外别有六子如人生六子則有各任以事而父母自閒風雷之類於天地間如人生之有耳目手足便是人之用也豈可謂手足耳目皆用而身無為乎因見賣兔者曰聖人見河圖洛書而畫八卦然何必圖書只看此兔亦可作八卦數便此中可起古聖人只取神物之至著者耳只如樹木亦可見數兔何以無尾有血無脂只是為陰物大抵陽物尾長陽盛者尾愈長如雉是盛陽之物故尾極長又其身文明今之行車者多植尾於車上以候雨晴如天將雨則尾先垂向下纔晴便直立或問劉牧言上經言形器以上事下經言形器以下事曰非也上經言雲雷屯雲雷豈無形也曰牧又謂上經是天地生萬物下經是男女生萬物曰天地中只是一箇生人之生於男女即是天地之生安得為異曰牧又謂乾坤與坎離男女同生曰非也譬如父母生男女豈男女與父母同生既有乾坤方三索而得六子若曰乾坤生時六子生理同有則有此理謂乾坤坎離同生豈有此事既是同生則何言六子耶或曰凡物之生各隨氣勝處化曰何以見曰如木之生根既長大却無處去曰克也曰既尅則是土化為木矣曰不是化只是克五行只古人説迭王字説盡了只是箇盛衰自然之理也人多言五行無土不得木得土方能生火火得土方能生金故土寄王於四時某以為不然木生火火生土土生金金生水水生木只是迭盛也問劉牧以坎離得正性艮㢲得偏性如何曰非也佗據方位如此説如居中位便言得中氣其餘豈不得中氣也或曰五行是一氣曰人以為一物某道是五物既謂之五行豈不是五物也五物備然後能生且如五常誰不知是一箇道既謂之五常安得混而為一也問劉牧以下經四卦相交如何曰怎生地交若論相交豈特四卦如屯䝉師比皆是相交一顚一劄卦之序皆有義理有相反者有相生者爻變則義變也下來却似義起然亦是以爻也爻變則義變劉牧言兩卦相比上經二陰二陽相交下經四陽四陰相交是否曰八卦已相交了及重卦只取二象相交為義豈又於卦畫相交也易須是黙識心通只如此窮文義徒費力問莫見乎隱莫顯乎微何也曰人只以耳目所見聞者為顯見所不見聞者為隱微然不知理却甚顯也且如昔人彈琴見螳蜋捕蟬而聞者以為有殺聲殺在心而人聞其琴而知之豈非顯乎人有不善自謂人不知之然天地之理甚著不可欺也曰如楊震四知然否曰亦是然而若説人與我固分得若説天地只是一箇知也且如水旱亦有所致如虐虐之政所感此人所共見者固是也然有不善之心積之多者亦足以動天地之氣如疾疫之氣亦如此不可道事至目前可見然後為見也更如堯舜之民何故仁壽桀紂之民何故鄙夭纔仁便壽纔鄙便夭壽夭乃是善惡之氣所致仁則善氣也所感者亦善善氣所生安得不壽鄙則惡氣也所感者亦惡惡氣所生安得不夭問天地明察神明彰矣曰事天地之義事天地之誠既明察昭著則神明自彰矣問神明感格否曰感格固在其中矣孝弟之至通於神明神明孝弟不是兩般事只孝弟便是神明之理又問王祥孝感事是通明明否曰此亦是通神明一事此感格便是王祥誠中來非王祥孝於此而物來於彼也問行狀云盡性至命必本於孝弟不識孝弟何以能盡性至命也曰後人便將性命别作一般事説了性命孝弟只是一統底事就孝弟中便可盡性至命至如洒掃應對與盡性至命亦是一統底事無有本末無有精粗却被後來人言性命者别作一般高逺説故舉孝弟是於人切近者言之然今時非無孝弟之人而不能盡性至命者由之而不知也問窮神知化由通於禮樂何也曰此句須自家體認一作玩索人往往見禮壞樂崩便謂禮樂亡然不知禮樂未嘗亡也如國家一日存時尚有一日之禮樂蓋由有上下尊卑之别也除是禮樂亡盡然後國家始亡雖盜賊至所為不道者然亦有禮樂蓋必有總屬必相聽順乃能為盜不然則叛亂無統不能一日相聚而為盜也禮樂無處無之學者要須識得問明則有禮樂幽則有鬼神何也曰鬼神只是一箇造化天尊地卑乾坤定矣鼓之以雷霆潤之以風雨是也禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉此固有禮樂不在玉帛鍾鼓先儒解者多引安上治下莫善於禮移風易俗莫善於樂此固是禮樂之大用也然推本而言禮只是一箇序樂只是一箇和只此兩字含畜多少義理又問禮莫是天地之序樂莫是天地之和曰固是天下無一物無禮樂且置兩隻椅子纔不正便是無序無序便乖乖便不和又問如此則禮樂却只是一事曰不然如天地陰陽其勢髙下甚相背然必相須而為用也有陰便有陽有陽便有陰有一便有二纔有一二便有一二之間便是三已往更無窮老子亦言三生萬物此是生生之謂易理自然如此維天之命於穆不已自是理自相續不已非是人為之如使可為雖使百萬般安排也須有息時只為無為故不息中庸言不見而彰不動而變無為而成天地之道可一言而盡也使釋氏千章萬句説得許大無限説話亦不能逃此三句只為聖人説得要故包含無盡釋氏空周遮説爾只是許多問及其至也聖人有所不能不知聖人亦何有不能不知也曰天下之理聖人豈有不盡者蓋於事有所不徧知不徧能也至纎悉委曲處如農圃百工之事孔子亦豈能知哉或曰至之言極也何以言事曰固是極至之至如至微至細上文言夫婦之愚可以與知愚無知者也猶且能之乃若㣲細之事豈可責聖人盡能聖人固有所不能也君子之道費而隱費日用處時措之宜言隨時之義若溥博淵泉而時出之王天下有三重言三王所重之事上焉者三王以上三皇已逺之事故無證下焉者非三王之道如諸侯霸者之事故民不尊思曰睿睿作聖致思如掘井初有渾水久後稍引動得清者出來人思慮始皆溷濁久自明快問召公何以疑周公曰召公何嘗疑周公曰書稱召公不説何也請觀君奭一篇周公曾道召公疑他來否古今人不知書之甚書中分明説召公為保周公為師相成王為左右召分不説周公作君奭此已上是孔子説也且召公初陞為太保與周公並列其心不安故不説爾但看此一篇盡是周公留召公之意豈有召公之賢而不知周公者乎詩中言周大夫刺朝廷之不知豈特周公夫當時之人雖甚愚者亦知周公刺朝廷之不知者為成王爾成王煞是中才如天大雷霆以風而啟金縢之書成王無事而啓金縢之書作甚蓋二公道之如此欲成王悟周公爾近人亦錯看却作詩云荀子書猶非孟子召公心未説周公甚非也又問金縢之書非周公欲以悟成王乎何既禱之後藏其文於金縢也曰近世祝文或焚或埋必是古人未有焚埋之禮欲敬其事故藏之金縢也然則周公不知命乎曰周公誠心只是欲代其兄更豈問命耶或問人有謂周公營洛則成王既遷矣或言平王東遷非也周公雖聖其能逆知數百載下有犬戎之禍乎是説然否曰詩中自言王居鎬京將不能以自樂何更疑也周公只是為犬戎與鎬京相逼知其後必有患故營洛也問高宗得傅説於夢文王得太公於卜古之聖賢相遇多矣何不盡形於夢卜乎曰此是得賢之一事豈必盡然蓋髙宗至誠思得賢相寤寐不忘故朕兆先見於夢如常人夢寐間事有先見者多矣亦不足怪至於卜筮亦然今有人懐誠心求卜有禱輒應此理之常然又問髙宗夢往求傅説耶傅説來入高宗夢耶曰髙宗只是思得賢人如有賢人自然應他感亦非此往亦非彼來譬如懸鏡於此有物必照非鏡往照物亦非物來入鏡也大抵人心虚明善則必先知之不善必先知之有所感必有所應自然之理也又問或言髙宗於傅説文王於太公蓋已素知之矣恐羣臣未信故託夢卜以神之曰此偽也聖人豈偽乎問舜能化瞽象使不格姦何為不能化商均曰所謂不格姦者但能使之不害己與不至大惡也若商均則不然舜以天下授人欲得如己者商均非能如已爾亦未嘗有大惡大抵五帝官天下故擇一人賢於天下者而授之三王家天下遂以與子論其至理治天下者當得天下最賢者一人加諸衆人之上則是至公之法後世既難得人而爭奪興故以與子與子雖是私亦天下之公法但守法者有私心耳問四凶堯不誅而舜誅之何也曰四凶皆大才也在堯之時未嘗為惡堯安得而誅之及舉舜加其上然後始有不平之心而肆其惡故舜誅之耳曰堯不知四凶乎曰惟堯知之知其惡而不去何也曰在堯之時非特不為惡亦賴以為用納於大麓麓足也百物所聚故麓有大録萬幾之意若司馬遷謂納舜于山麓豈有試人而納於山麓耶此只是歴試舜也放勲非堯號蓋史稱堯之道也謂三皇而上以神道設教不言而化至堯方見於事功也後人以放勲為堯號故記孟子者遂以堯曰為放勲曰也若以堯號放勲則臯陶當號允迪禹曰文命下言敷於四海有甚義問詩如何學曰只在大序中求詩之大序分明是聖人作此以教學者後人往往不知是聖人作自仲尼後一作漢以來更無人理㑹得詩如言后妃之德皆以為文王之后妃文王諸侯也豈有后妃又如樂得淑女以配君子憂在進賢不淫其色以為后妃之德如此配惟后妃可稱后妃自是配了更何别求淑女以為配淫其色乃男子事后妃怎生㑹淫其色此不難曉但將大序看數遍則可見矣或曰關雎是后妃之徳當如此否樂得淑女之類是作關雎詩人之意否曰是也大序言是以關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也只著箇是以字便自有意思曰如言又當輔佐君子則可以歸安父母言能逮下之類皆為其徳當如此否曰是也問詩小序何人作曰但看大序即可見矣曰莫是國史作否曰序中分明言國史明乎得失之迹蓋國史得詩於採詩之官故知其得失之迹如非國史則何以知其所美所刺之人使當時無小序雖聖人亦辨不得曰聖人刪詩時曾刪改小序否曰有害義理處也須刪改今之詩序却煞錯亂有後人附之者曰關雎之詩是何人所作曰周公作周公作此以風教天下故曰用之郷人焉用之邦國焉上以風化下下以風刺上蓋自天子至於庶人正家之道當如此也二南之詩多是周公所作如小雅六月所序之詩亦是周公作後人多言二南為文王之詩蓋其中有文王事也曰非也附文王詩於中者猶言古人有行之者文王是也問關雎樂而不淫哀而不傷何謂也曰大凡樂必失之淫哀必失之傷淫傷則入於邪矣若關雎則止乎禮義故如哀窈窕思賢才言哀之則思之甚切以常人言之直入於邪始得然關雎却止乎禮義故不至乎傷則其思也其亦異乎常人之思也矣唐棣乃今郁李看此便可以見詩人興兄弟之意執柯伐柯其則不逺人猶以為逺君子之道本諸身發諸心豈逺乎哉問周禮有復讐事何也曰此非治世事然人情有不免者如親被人殺其子見之不及告官遂逐殺之此復讐而義者可以無罪其親既被人殺不自訴官而他自謀殺之此則正其専殺之罪可也問避讐之法如何曰此因赦罪而濩免便使之避也問周禮之書有訛缺否曰甚多周公致治之大法亦在其中須知道者觀之可决是多也又問司盟有詛萬民之不信者治世亦有此乎曰盛治之世固無此事然人情亦有此事為政者因人情而用之問嚴父配天稱周公其人何不稱武王曰大抵周公制作皆周公為之故言禮者必歸之周公焉趙盾弑君之事聖人不書趙穿何也曰此春秋之大也趙穿手弑其君人誰不知若盾之罪非春秋書之更無人知也仲尼曰惜哉越境乃免此語要人㑹得若出境而反又不討賊也則不免除出境遂不反乃可免也紀侯大去其國如梁亡鄭棄其師齊師殲干遂郭亡之類郭事實不明如上四者是一類事也國君守社稷雖死守之可也齊侯衛侯方遇於垂紀侯遂去其國豈齊之罪哉故聖人不言齊滅之者罪紀侯輕去其國也紀侯大名也問王通曰隱德君子也當時有些言語後來被人傅㑹不可謂全書若論其粹處殆非荀揚所及也若續經之類皆非其作揚雄去就不足觀如言明哲煌煌旁燭無疆此甚悔恨不能先知遜于不虞以保天命則是只欲全身也若聖人先知必不至於此必不可奈何天命亦何足保耶問太𤣥之作如何曰此亦贅矣必欲撰𤣥不如明易邵堯夫之數似𤣥而不同數只是一般一作數無窮但看人如何用之雖作十𤣥亦可况一𤣥乎荀卿才髙其過多揚雄才短其過少韓子稱其大醇非也若二子可謂大駁矣然韓子責人甚恕韓退之頌伯夷甚好然只説得伯夷介處要知伯夷之心須是聖人語曰不念舊惡怨是用希此甚説得伯夷心也問退之讀墨篇如何曰此篇意亦甚好但言不謹嚴便有不是處且孟子言墨子愛其兄之子猶鄰之子墨子書中何嘗有如此等言但孟子拔本塞源知其流必至於此大凡儒者學道差之毫釐繆以千里楊朱本是學義墨子本是學仁但所學者稍偏故其流遂至於無父無君孟子欲正其本故推至此退之樂取人善之心可謂忠恕然持教不知謹嚴故失之至若言孔子尚同兼愛與墨子同則甚不可也後之學者又不及楊墨楊墨本學仁義後人乃不學仁義但楊墨之過被孟子指出後人無人指出故不見其過也韓退之作羑里操云臣罪當誅兮天王聖明道得文王心出來此文王至徳處也退之晚來為文所得處甚多學本是修德有德然後有言退之却倒學了因學文日求所未至遂有所得如曰軻之死不得其傳似此言語非是蹈襲前人又非鑿空撰得出必有所見若無所見不知言所傳者何事原性等文皆少時作退之正在好名中退之言漢儒補綴千瘡百孔漢儒所壊者不少安能補也凡讀史不徒要記事跡須要識治亂安危興廢存亡之理且如讀髙帝一紀便須識得漢家四百年終始治亂當如何是亦學也問漢儒至有白首不能通一經者何也曰漢之經術安用只是以章句訓詁為事且如解堯典二字至三萬餘言是不知要也東漢則又不足道也東漢士人尚名節只為不明理若使明理却皆是大賢也自漢以來惟有三人近儒者氣象大毛公董仲舒掦雄本朝經術最盛只近二三十年來議論専一使人更不致思問陳平當王諸吕時何不極諌曰王陵爭之不從乃引去如陳平復諍未必不激吕氏之怒矣且髙祖與羣臣只是以力相勝力强者居上非至誠樂願為之臣也如王諸吕時責他死節他豈肯死周勃入北軍問曰為劉氏左袒為吕氏右袒既知為劉氏又何必問若不知而問設或右袒當如之何已為將乃問士卒豈不謬哉當誅諸吕時非陳平為之謀亦不克成及近文帝至霸橋曰願請間此豈請間時邪至於罷相就國每河東守行縣至綘必合家人被甲執兵而見此欲何為可謂至無能之人矣王介甫詠張良詩最好曰漢業存亡俯仰中留侯當此毎從容人言髙祖用張良非也張良用髙祖爾秦滅韓張良為韓報仇故送髙祖入關既滅秦矣故辭去及髙祖興義師誅項王則髙祖之勢可以平天下故張良助之良豈願為髙祖臣哉無其勢不及天下既平乃從赤松子遊是不願為其臣可知矣張良才識儘髙若鴻溝既分而勸漢王背約追之則無行也或問張良欲以鐵鎚擊殺秦王其計不巳疎乎曰欲報君仇之急使當時若得以鎚擊殺之亦足矣何暇自為謀耶王通言諸葛無死禮樂其有興信乎曰諸葛近王佐才禮樂興不興則未可知問曰亮果王佐才何為僻守一蜀而不能有為於天下曰孔明固言明年欲取魏幾年定天下其不及而死則命也某嘗謂孫覺曰諸葛武侯有儒者氣象孫覺曰不然聖人行一不義殺一不辜雖得天下不為武侯區區保完一國不知殺了多少人耶某謂之曰行一不義殺一不辜以利一已則不可若以天下之力誅天下之賊殺戮雖多亦何害陳恒弑君孔子請討孔子豈保得討陳恒時不殺一人耶蓋誅天下之賊則有所不得顧爾曰三國之興孰為正曰蜀志在興復漢室則正也漢文帝殺薄昭李徳裕以為殺之不當温公以為殺之當說皆未是據史不見他所以殺之故故須是權事勢輕重論之不知當時薄昭有罪漢使人治之因殺漢使也還是薄昭與漢使飲酒因忿怒而致殺之也漢文帝殺薄昭而太后不安奈何既殺之太后不食而死奈何若漢治其罪而殺漢使太后雖不食不可免也須權佗那箇輕那箇重然後論他殺得當與不當也論事須著用權古今多錯用權字纔説權便是變詐或權術不知權只是經所不及者權量輕重使之合義纔合義便是經也今人説權不是經便是經也權只是稱錘稱量輕重孔子曰可與立未可與權問第五倫視其子之疾與兄子之疾不同自謂之私如何曰不特安寢與不安寢只是不起與十起便是私也父子之愛本是公才著些心做便是私也又問視已子與兄子有間否曰聖人立法曰兄弟之子猶子也是欲視之猶子也又問天性自有輕重疑若有間然曰只為今人以私心看了孔子曰父子之道天性也此只是孝上説故言父子天性若君臣兄弟賓主朋友之類亦豈不是天性只為今人小看却不推其本所由來故爾已之子與兄之子所爭幾何是同出於父者也只為兄弟異形故以兄弟為手足人多以異形故親已之子異於兄弟之子甚不是也又問孔子以公冶長不及南容故以兄之子妻南容以已之子妻公冶長何也曰此亦以已之私心看聖人也凡人避嫌者皆内不足也聖人自是至公何更避嫌凡嫁女必量其才而求配或兄之子不甚美必擇其相稱者為之配已之子美必擇其才美者為之配豈更避嫌耶若孔子事或是年不相若或時有先後皆不可知以孔子為避嫌則大不是如避嫌事雖賢者且不為况聖人乎素問書出於戰國之末氣象可見若是三皇五帝典墳文章自别其氣運處絶淺近如將二十四氣移換名目便做千百樣亦得陰符經非商末則周末人為之若是先王之時聖道既明人不敢為異説及周室下衰道不明於天下才智之士甚衆既不知道所趨向故各自以私智窺測天地盜竊天地之機分明是大盜故用此以簧鼓天下故云天有五賊見之者昌云云豈非盜天地乎問老子書若何曰老子書其言自不相入處如氷炭其初意欲談道之極𤣥妙處後來却入做權詐者上去如將欲取之必固與之之類然老子之後有申韓看申韓與老子然甚懸絶然其原乃自老子來蘇秦張儀則更是取道逺初秦儀學於鬼谷其術先揣摩其如何然後捭闔捭闔既動然後用鈎鉗鈎其端然後鉗制之其學既成辭鬼谷去鬼谷試之為張儀説所動如入菴中説令出之然其學甚不近道人不甚惑之孟子時已有置而不足論也問世傳成王幼周公攝政荀卿亦曰履天下之籍聽天下之斷周公果踐天子之位行天子之事乎曰非也周公位冡宰百官總已以聽之而已安得踐天子之位又問君薨百官聽於冡宰者三年爾周公至於七年何也曰三年謂嗣王居憂之時也七年謂成王幼故也又問賜周公以天子之禮樂當否曰始亂周公之法度者是賜也人臣安得用天子之禮樂哉成王之賜伯禽之受皆不能無過一作罪記曰魯郊非禮也其周公之衰乎聖人嘗譏之矣説者乃云周公有人臣不能為之功業因賜以人臣所不得用之禮樂則妄也人臣豈有不能為之功業有借使功業有大於周公亦是人臣所當為爾人臣而不當為其誰為之豈不言孟子言事親若曽子可也曽子之孝亦大矣孟子纔言可也蓋曰子之事父其孝雖過於曽子畢竟是以父母之身做出來豈是分外事若曽子者僅可以免責爾臣之於君猶子之於父也臣之能立功業者以君之人民也以君之勢位也假如功業大於周公亦是以君之人民勢位做出來而謂人臣所不能為可乎使人臣恃功而懐怏怏之心者必此言矣若唐髙祖賜平陽公主葬以鼓吹則可蓋征戰之事實非婦人之所能為也故賜以婦人所不得用之禮樂若太宗却不知此太宗佐父平天下論其功不過做得一功臣豈可奪元良之位太子之與功臣自不相干唐之紀綱自太宗亂之終唐之世無三綱者自太宗始也李光弼郭子儀之徒議者謂有人臣不能為之功非也秦以暴虐焚詩書而亡漢興鑑其弊必尚寛德崇經術之士故儒者多儒者多雖未知聖人之學然宗經師古識義理者衆故王莽之亂多守節之士世祖繼起不得不褒尚名節故東漢之士多名節知名節而不知節之以禮遂至於苦節故當時名節之士有視死如歸者苦節既極故魏晉之士變而為曠蕩尚浮虚而亡禮法禮法既亡與夷狄無異故五胡亂華夷狄之亂已甚必有英雄出而平之故隋唐混一天下隋不可謂有天下第能驅除爾唐有天下如貞觀開元間雖號治平然亦有夷狄之風三綱不正無父子君臣夫婦其原始於太宗也故其後世子弟皆不可使𤣥宗纔使肅宗便簒肅宗纔使永王璘便反君不君臣不臣故藩鎭不賓權臣跋扈陵夷有五代之亂漢之治過於唐漢大綱正唐萬目舉本朝大綱甚正然萬目亦未盡舉因問十世可知遂推此數端洪水滔天堯時亦無許多大洪水宜更思之漢武帝問禹湯水旱厥咎何由公孫𢎞對堯遭洪水使禹治之不聞禹之有水也更不答其所由公孫𢎞大是姦人問東海殺孝婦而旱豈國人寃之所致耶曰國人寃固是然一人之意自足以感動得天地不道道殺孝婦不能致旱也或曰殺姑而雨是衆人怨釋否曰固是衆人寃釋然孝婦寃亦釋也其人雖亡然寃之之意自在不可道殺姑不能釋寃而致雨也問人有不善霹靂震死莫是人懐不善之心聞霹靂震懼而死否曰不然是雷震之也如使雷震之還有使之者否曰不然人之作惡有惡氣與天地之惡氣相擊搏遂以震死霹靂天地之怒氣也如人之怒固自有正然怒時必為之作惡是怒亦惡氣也怒氣與惡氣相感故爾且如今人種蕎麥自有畦隴霜降時殺麥或隔一畦麥有不殺者豈是此處無霜蓋氣就相合處去也曰雷所擊處必有火何也曰雷自有火如鑽木取火如使木中有火豈不燒了木蓋是動極則陽生自然之理不必木只如兩石相戛亦有火出惟鐵無火然戛之久必熱此亦是陽生也鑽木取火人謂火生於木非也兩木相戛用力極則陽生今以石相軋便有火出非特木也蓋天地間無一物無陰陽雨水氷上温而下冷隕霜不殺草上冷而下温天火曰災人火曰火人火為害者亦曰災問日月有定形還自氣散别自聚否曰此理甚難曉究其極則此二説歸於一也問月有定魄而日逺於月月受日光以人所見為有盈虧然否曰日月一也豈有日髙於月之理月若無盈虧何以成歲蓋月一分光則是魄虧一分也霜與露不同霜金氣星月之氣露亦星月之氣看感得甚氣即為露甚氣即為霜如言露結為霜非也雹是陰陽相搏之氣乃是沴氣聖人在上無雹雖有不為災雖不為災沴氣自在問鳯鳥不至河不出圖不知符瑞之事果有之否曰有之國家將興必有禎祥人有喜事氣見面目聖人不貴祥瑞者蓋因災異而修徳則無損因祥瑞而自恃則有害也問五代多祥瑞何也曰亦有此理譬如盛冬時發出一朶花相似和氣致祥乖氣致異此常理也然出不以時則是異也如麟是太平和氣所生然後世有以麟駕車者却是怪也譬如水中物生於陸陸中物生於水豈非異手又問漢文多災異漢宣多祥瑞何也曰且譬如小人多行不義人却不説至君子未有一事便生議論此是一理也至白者易汙此是一理也詩中幽王大惡為小惡宣王小惡為大惡此是一理也又問日食有常數何治世少而亂世多豈人事乎曰理㑹此到極處煞燭理明也天人之際甚微宜更思索曰莫是天數人事看那邊勝否曰似之然未易言也又問魚躍于王舟火覆於王屋流為烏有之否曰魚與火則不可知若兆朕之先應亦有之問十月何以謂之陽月曰十月謂之陽月者陽盡恐疑於無陽也故謂之陽月也然何時無陽如日有光之類蓋陰陽之氣有常存而不移者有消長而無窮者問作文害道否曰害也凡為文不専意則不工若専意則志局於此又安能與天地同其大也書云玩物䘮志為文亦玩物也吕與叔有詩云學如元凱方成癖文似相如始類俳獨立孔門無一事只輸一作惟傳顔氏得心齋此詩甚好古之學者惟務養性情其佗則不學今為文者専務章句悦人耳目既務悦人非俳優而何曰古者學為文否曰人見六經便以為聖人亦作文不知聖人亦一作只攄發胸中所藴自成文耳一作章所謂有徳者必有言也曰游夏稱文學何也曰游夏亦何嘗秉筆學為詞章也且如觀乎天文以察時變觀乎人文以化成天下此豈詞章之文也或問詩可學否曰既學時須是用功方合詩人格既用功甚妨事古人詩云吟成五箇字用破一生心又謂可惜一生心用在五字上此言甚當先生嘗説王子眞㑹寄藥來某無以答他某素不作詩亦非是禁止不作但不欲為此閒言語且如今言能詩無如杜甫如云穿花蛺蝶深深見㸃水蜻蜓欵欵飛如此閒言語道出做甚某所以不嘗作詩今寄謝王子眞詩云至誠通化藥通神逺寄衰翁濟病身我亦有丹君信否用時還解壽斯民子眞所學只是獨善雖至誠潔行然大抵只是為長生久視之術正濟一身因有是句問先生曽定六禮今已成未曰舊日作此已成七分後來被召入朝既在朝廷則當行之朝廷不當為私書既而遭憂又疾病數年今始無事更一二年可成也曰聞有五經解已成否曰惟易須親撰諸經則關中諸公分去以某説撰成之禮之名數陜西諸公刪定已送與吕與叔與叔今死矣不知其書安在也然所定只禮之名數若禮之文亦非親作不可也禮記之文亦刪定未了蓋其中有聖人格言亦有俗儒乖謬之説乖謬之説本不能混格言只為學者不能辨别如珠玉之在泥沙泥沙豈能混珠玉只為無人識則不知孰為泥沙孰為珠玉也聖人文章自深與學為文者不同如繫辭之文後人决學不得譬之化工生物且如生出一枝花或有剪裁為之者或有繪畫為之者看時雖似相類然終不若化工所生自有一般生意冠婚䘮祭禮之大者今人都不以為事某舊嘗修六禮冠婚喪祭卿相見將就後被召遂罷今更一二年可成家間多戀河北舊俗未能遽更易然大率漸使知義理一二年書成可皆如法禮從宜使從俗有大故害義理者須當去每月朔必薦新如仲春薦含桃之類四時祭用仲月用仲月物成也古者天子諸侯於孟月者為首時也時祭之外更有三祭冬至祭始祖厥初生民之祖立春祭先祖季秋祭禰他則不祭冬至陽之始也立春者生物之始一作初也季秋者成物之始一作也也祭始祖無主用祝以妣配於廟中正位事之祭只一位者夫婦同享也祭先祖亦無主先祖者自始祖而下髙祖之上非一人也故設二位祖妣異位一云二位異所者舅婦不同享也常祭止於髙祖而下自父而推至於三而止者縁人情也旁觀有後者自為祭無後者祭之别位為叔伯父之後也如殤亦各祭凡配止以正妻一人如諸侯用元妃是也或奉祀之人是再娶所生者即以所生母配如葬亦惟元配同穴後世或再取皆同穴而葬甚瀆禮經但於左右附葬可也忌日必遷主出祭於正寢今正寢正堂也蓋廟中尊者所據又同室難以獨享也於正寢可以盡思慕之意家必有廟古者庶人祭於寢士大夫祭於廟庶人無廟可立影堂廟中異位祖居中左右以昭穆次序皆夫婦自相配為位舅婦不同坐也廟必有主既祧當埋於所葬處如奉祀人之髙祖而上既當祧也其大略如此且如豺獺皆知報本今士大夫家多忽此厚於奉養而薄於祖先甚不可也凡事死之理當厚於奉生者至於嘗新必薦享後方可薦數則瀆必因告朔而薦乃合宜人家能存得此等事數件雖幼者漸可使知禮義几物知母而不知父走獸是也知父而不知祖飛鳥是也惟人則能知祖若不嚴於祭祀殆與鳥獸無異矣問祭酒用幾奠曰家中尋常用三奠祭法中却用九奠以禮有九獻樂有九奏也又問既奠之酒何以置之曰古者灌以降神故以茅縮酌謂求神於陰陽有無之間故酒必灌於地若謂奠酒則安置在此今人以澆在地上甚非也既獻則徹去可也傾在他器或問今拜埽之禮何據曰此禮古無但縁習俗然不害義理古人直是誠質專一也葬只是藏體魄而神則必歸於廟既葬則設木主既除几筵則木主安於廟故古人惟專精祀於廟今亦用拜掃之禮但簡於四時之祭也木主必以栗何也曰周用栗土所産之木取其堅也今用栗從周制也若四方無栗亦不必用但取其木之堅者可也凡祭必致齊齊之日思其居處思其笑語此孝子平日思親之心非齊也齊不容有思有思則非齊齊三日必見其所為齊者此非聖人之語齊者湛然純一方能與鬼神接然能事鬼神已是上一等人古者男為男尸女為女尸自周以來女無可以為尸者故無女尸後世遂無尸能為尸者亦非尋常人今無宗子法故朝廷無世臣若立宗子法則人知尊祖重本人既重本則朝廷之勢自尊古者子弟從父兄今父兄從子弟子弟為强由不知本也且如漢髙祖欲下沛時只是以帛書與沛父老其父老便能率子弟從之又如相如使蜀亦遺書責父老然後子弟皆聽其命而從之只有一節尊卑上下之分然後順從而不亂也若無法以聨屬之安可且立宗子法亦是天理譬如木必從根直上一榦如大宗亦必有旁枝又如水雖逺必有正源亦必有分派處自然之勢也然又有旁枝達而為榦者故曰古者天子建國諸侯奪宗云凡言宗者以祭祀為主言人宗於此而祭祀也别子為祖上不敢宗諸侯故不祭下亦無人宗之此無宗亦莫之宗也别子之嫡子即繼祖為大宗此有大宗無小宗也别子之諸子祭其别子别子雖是諸然是諸子之禰繼禰者為小宗此有小宗而無大宗也有小宗而無大宗此句極難理㑹蓋本是大宗之祖别子之諸子稱之却是禰也今人多不知兄弟之愛且如閭閻小人得一食必先以食父母夫何故以父母之口重於已之口也得一衣必先以衣父母夫何故以父母之體重於己之體也至於犬馬亦然待父母之犬馬必異乎已之犬馬也獨愛父母之子却輕於已之子甚者至若讐敵舉世皆如此惑之甚矣伯叔父之兄弟伯是長叔是少今人乃呼伯父叔父為伯叔大無義理呼為伯父叔父者言事之之理與父同也或曰事兄盡禮不得兄之懽心奈何曰但當起敬起孝盡至誠不求伸已可也曰接弟之道如何曰盡友愛之道而已問妻可出乎曰妻不賢出之何害如子思亦嘗出妻今世俗乃以出妻為醜行遂不敢為古人不如此妻有不善便當出也只為今人將此作一件大事隱忍不敢發或有隱惡為其陰持之以至縱恣養成不善豈不害事人修身刑家最急纔修身便到刑家上也又問古人出妻有以對姑叱狗蔾蒸不熟者亦無甚惡而遽出之何也曰此古人忠厚之道也古之人絶交不出惡聲君子不忍以大惡出其妻而以微罪去之以此見其忠厚之至也且如叱狗於親前者亦有甚大故不是處只為他平日有故因此一事出之爾或曰彼以此細故見逐安能無辭兼他人不知是與不是則如之何曰彼必自知其罪但自己理直可矣何必更求他人知然有識者當自知之也如必待彰暴其妻之不善使他人知之是亦淺丈夫而已君子不如此大凡人説話多欲令彼曲我直若君子自有一箇含容意思或曰古語有之出妻令其可嫁絶友令其可交乃此意否曰是也問士未仕而昏用命服禮乎曰昏姻重禮重其禮者當盛其服况古亦有是士乗墨車之類今律亦許假借曰無此服而服之恐偽曰不然今之命服乃古之下士之服古者有其徳則仕士未仕者也服之其宜也若農商則不可非其類也或曰不必用可否曰不得不可以為悦今得用而用之何害過期非也昏禮不用樂幽陰之義此説非是昏禮豈是幽陰但古人重此大禮嚴肅其事不用樂也昏禮不賀人之序也此説却是婦質明而見舅姑成婦也三日而後宴樂禮畢也宴不以夜禮也問臣拜君必於堂下子拜父母如之何對曰君臣以義合有貴賤故拜於堂下父子主恩有尊卑無貴賤故拜於堂上若婦與舅姑亦是義合有貴賤故拜於堂下禮也問嫂叔古無服今有之何也曰禮記曰推而逺之也此説不是嫂與叔且逺嫌姑與嫂何嫌之有古之所以無服者只為無屬其夫屬於父道者妻皆母道也其夫屬乎子道者妻皆婦道也今上有父有母下有子有婦叔父伯父父之屬也故叔母伯母之服與叔父伯父同兄弟之子子之屬也故兄弟之子之婦服與兄弟之子同若兄弟則已之屬也難以妻道屬其妻此古者所以無服以義理推不行也今之有服亦是豈有同居之親而無服者又問既是同居之親古却無服豈有兄弟之妻死而已恝然無事乎曰古者雖無服若哀戚之心自在且如鄰里之䘮尚舂不相不巷歌匍匐救之况至親乎服有正有義有從有報古者婦䘮舅姑以期今以三年於義亦可但名未正此亦謂之從服從夫也蓋與夫同奉几筵而已不可獨無服報服若姑之子為舅之子服是也異姓之服只推得一重若為母而推則及舅而止若為姑而推則可以及其子故舅之子無服却為既與姑之子為服姑之子須當報之也故姑之子舅之子其服同八歲為下殤十四為中殤十九為上殤七歲以下為無服之殤無服之殤更不祭下殤之祭父母主之終父母之身中殤之祭兄弟主之終兄弟之身上殤之祭兄弟之子主之終兄弟之子之身若成人而無後者兄弟之孫主之亦終其身凡此皆以義起也問女既嫁而為父母服三年可乎曰不可既歸夫家事佗舅姑安得伸已之私問人子事親學毉如何曰最是大事今有璞玉於此必使玉人彫琢之蓋百工之事不可使一人兼之故使玉人彫琢之也若更有珍寶物須是自看却必不肯任其自為也今人視父母疾乃一任毉者之手豈不害事必須識毉藥之道理别病是如何藥當如何故可任毉者也或曰己未能盡毉者之術或偏見不到適足害事奈何曰且如識圖畫人未必畫得如畫工然他却識别得工拙如自己曾學令毉者説道理便自見得或已有所見亦可説與他商量陳本止此以下八段别本所増上古之時自伏羲堯舜歴夏商以至於周或文或質因襲損益其變既極其法既詳於是孔子參酌其宜以為百王法度之中制此其所以春秋作也孫明復主以無王而作亦非是但顔淵問為邦聖人對之以行夏之時乗殷之輅服周之冕樂則韶舞則是大抵聖人以道不得用故考古驗今參取百王之中制斷之以義也禘者魯僭天下之大祭也灌者祭之始也以其僭王之祭故自灌以往不欲觀之凡觀書不可以相類泥其義不爾則字字相梗當觀其文勢上下之意如充實之謂美與詩之美不同學者後來多耽莊子若謹禮者不透則是佗須看莊子為佗極有膠固纒縛則須求一放曠之説以自適譬之有人於此久困纒縛則須覓一箇出身處如東漢之末尚節行尚節行太甚須有東晉放曠其勢必然冬至書雲亦有此理如周禮觀祲之義古太史既有此職必有此事又如太史書不知周公一一曽與不曽看過但甚害義理則必去之矣如今靈臺之書須十去八九乃可行也今厯法甚好其佗禁忌之書如葬理昏嫁之類極有害論論問同而答異者至多或因人材性或觀人之所問意思而言及所到地位極髙明道中庸所以為民極極之為物中而能髙者也君子不成章不達易曰美在其中暢於四肢成章之謂也予官吉之永豊簿㳂檄至臨川劉元承之子縣丞誠問其父所録伊川先生説䝉示以元承手編伏讀歎仰因乞傳以歸建炎元年十月晦日菴山陳淵謹書二程遺書卷十八
