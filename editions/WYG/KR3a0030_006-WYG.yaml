body:
  text: 二程遺書卷六宋朱子編此卷間有不可曉處今悉存之不刪去質夫沛然擇之茫然未知所得季明安兄厚臨終過西郊却相疑平生不相疑郊一作洛兄指明道叔不排釋老叔指伊川惟善變通便是聖人聖人於天下事自不合與只順得天理茂對時育萬物堯舜共鯀臯陶時與孔子異陶一作䕫正名養老荀文若利魏鄭公正當辨學原於思仁人此義宜此事親仁之實從兄義之實須去一道中别出孔子言仁只説出門如見大賓使民如承大祭看其氣象便須心廣體胖動容周旋中禮自然惟慎獨便是守之之法聖人脩已以敬以安百姓篤恭而天下平惟上下一於恭敬則天地自位萬物自育氣無不和四靈何有不至此體信逹順之道聰明睿智皆由是出以此事天饗帝故中庸言鬼神之徳盛而終之以㣲之顯誠之不可掩如此一本聖人脩已以下别為一章博施濟衆非聖不能何曽干仁事故特曰夫仁者逹人立人取譬可謂仁之方而已使人求之自反便見得也雖然聖人未有不盡仁然教人不得如此指殺一本此下云繞墖説相輪不如便入墖登之始登時雖不見及上到頂則相輪為我有四體不仁鬼是往而不反之義天人本無二不必言合儼然即之温言厲佗人温則不厲儼然則不温惟孔子全之大圭黄鍾全冲和氣李宏中力田養親節嗜慾定心氣即是天氣下降地氣上騰便和無疾看一部華嚴經不如看一艮卦經只言一止觀論性不論氣不備論氣不論性不明一本此下云二之則不是人自孩提聖人之質已完只先於偏勝處發或仁或義或孝或弟覺悟便是信自幼子常視無誑以上便是教以聖人事人之知思因神以發成已須是仁推成已之道成物便是智怒驚皆是主心不定不遷怒非禮不視聴言動積習儘有功禮在何處去氣偏處發便是致曲去性上脩便是直養然同歸於誠一此章連人自孩提章下為一章不有躬無攸利不立已後雖向好事猶為化物不得以天下萬物撓己巳立後自能了當得天下萬物地不改闢民不改聚只脩治便了飢食渇飲冬裘夏葛若致些私吝心在便是廢天職忠信進徳修辭立其誠所以居業脩立在人日月隂陽發見盛處月受日光父子龍敏撾鼓鼓動萬物聖人之神知則不可名凡物參和交感則生不和分散則死凡有氣莫非天凡有形莫非地氣有偏勝處勝一作盛二氣五行剛柔萬殊聖人所由惟一理人須要復其初元氣㑹則生聖賢理自生天只主施成之者地也須要有所止止於仁止於孝止於大分有形總是氣無形只是道咸六四言貞吉悔亡言感之不可以心也不得只恁地看過更留心存養熟後泰然行將去便有進艮卦只明使萬物各有止止分便定艮其背不獲其身不見其人曽子疾病只要以正不慮死與武王殺一不辜行一不義得天下不為同心百官萬務金革百萬之衆飲水曲肱樂在其中萬變皆在人其實無一事蜀山人不起念十年便能前知只是一個誠天地萬物鬼神本無二清明在躬志氣如神貴熟且一作乆熟觀天地生物氣象周茂叔看在帝左右帝指何帝卜筮在精誠疑則不應一本注云疑心㣲生便是不應楊子江依憑事是此理懈意一生便是自棄自暴勿忘勿助長必有事焉只中道上行忠信而入忠信而出油火上竿禁蜈蚣涵養著落處養心便到清明高逺處一作意天下之悦不可極惟朋友講習雖過悦無害兑澤有相滋益處一本注云兑澤有自相滋益之意凝然不動便是聖人多驚多怒多憂只去一事所偏處自克克得一件其餘自正一作止人少長須激昻自進中年已後自至成徳者事方可自安致知在格物物來則知起物各付物不役其知則意誠不動意誠自定則心正始學之事也齋戒以神明其徳明徳新民豈分人我是成徳者事天無形地有形一作體虚心實腹静後見萬物自然皆有春意天之生物無窮物之所成却有别致曲不要説來大和平依磬聲玉磬聲之最和平者養心羊頭山老子説一稃二米秬黍直是天地和氣十分豊熟山上便有山下亦或有之八十四聲清者極吹盡清濁者盡吹極濁就其中以中聲上生下生以一作考霜露星之氣異乎雨雪密雲不雨尚往則氣散先隂變風氣隨風散苔木氣為水土始發始一作所草類竹節可見黄鍾牛鳴意言象數邵堯夫胎怠氣此三字一本在牛鳴下周茂叔窮禪客明善在明守善在誠復卦非天地之心復則見天地之心聖人無復故未嘗見其心無一作未嘗管攝天下人心收宗族厚風俗使人不忘本須是明譜系世族與立宗子法一年有一年功夫忿欲忍與不忍便見有徳無徳周南召南如乾坤今之祭祀無樂今之樂又不可用然又却不見得緩急之節叔一生不曽看莊列非禮勿動勿視出於天與從幼小有如是才識夷惠其道隘與不恭乃心無罪無一作何孔子所遇而安無所擇自子路觀孔子孔子為不恭自孔子觀吾輩便隘惟其與萬物同流便能與夭地同流去健羡毋意義之與比親於其身為不善直是不入山林之士只是意欲不出重主道也士大夫得有一作設重應當有主既埋重不可一日無主故設苴及其巳作主即不用苴有廟即當有主技擊不足以當節制節制不足以當仁義使人人有子弟衛父兄之心則制梃以撻秦楚之兵矣不應為總是罪過詩興起人志意小人小丈夫不合小了他本不是惡語黙猶晝夜晝夜猶生死生死猶古今消息慎終追逺不止為䘮祭鉛鐵性殊㸃化為金則不辨鉛鐵之性民須仁之物則愛之聖人縁人情以制禮事則以義制之息止也生也止則便生不止則不生艮始終萬物不常其徳則所勝來復正常其理則所勝同化素問曽㸃漆雕已見大意故聖人與之顔子所言不及孔子無伐善勿施勞是他顔子性分上事孔子言安之信之懷之是天理上事大抵有題目事易合心風人力倍平常將死者識能預知只是他不著别事雜亂兼無昏氣人須致一如此孔子之時事雖有不可為孔子任道豈有不可為魯君齊君孔孟豈不知其不足與有為人雖睡著其識知自完只是人與喚覺便是他自然理會得誠則自然無累不誠便有累貧子寳珠君實篤厚晦叔謹嚴堯夫放曠根本須是先培壅然後可立趨向也趨向既正一作立所造有淺深則由勉與不勉也正人多昏其心聖賢則去其昏以冨貴為賢者不欲却反人情聞見如登九層之臺中説有後人綴緝之觀兩漢已前文章凡為文者皆似楊子之學實韓子之學華華則涉道淺祭而立尸只是古人質顔子簞瓢非樂也忘也孟子知言則便是知道夷惠聖人傳者之誤不念舊惡此清者之量思與鄉人處此孟子拔本塞源庾公之斯取其不背學而已楊墨皆學仁義而流者也墨子似子張楊子似子夏伊尹不可一本無此字言蔽亦是聖之時伯夷不蔽於為己只是隘孔子免匡人之圍亦苟脱也四端不言信信本無在在易則是至理在孟子則是氣子産語子太叔因其才而教之序卦非易之藴此不合道韓康伯注仰之彌高見其高而未能至也鑽之彌堅測其堅而未能達也此顔子知聖人之學而善形容者也義之精者須是自求得之如此則善求義也讀論語孟子而不知道所謂雖多亦奚以為湯既勝夏欲遷其社不可聖人所欲不踰矩既欲遷社而又以為不可欲遷是則不可為非矣不可是則欲遷為非矣然則聖人亦有過乎曰非也聖人無過夫亡國之社遷之禮也湯存之以為後世戒故曰欲遷則不可也記曰䘮國之社屋之不受天陽也又曰亳社北牖使陰明也春秋書亳社災然則皆自湯之不遷始也五畝之宅田二畝半郭二畝半耕則居田休則居郭三易再易不易三易三百畝三嵗一耕再易二百畝二嵗一耕不易嵗嵗耕之此地之肥瘠不同也古者百步為畝百畝當今之四十一畝也古以今之四十一畝之田八口之家可以無飢今以古之二百五十畝猶不足農之勤惰相懸乃如此古之時民居少人各就高而居中國雖有水亦未為害也及堯之時人漸多漸就平廣而居水泛濫乃始為害當是時龍門未闢伊闕未拆砥柱未鑿堯乃因水之流濫而治之以為天下後世無窮之利非堯時水特為害也蓋已乆矣上世人少就高而居則不為害後世人多就下而處則為害也四凶之才皆可用堯之時聖人在上皆以其才任大位而不敢露其不善之心堯非不知其不善也伏則聖人亦不得而誅之及堯舉舜於匹夫之中而禪之位則是四人者始懷憤怨不平之心而顯其惡故舜得以因其迹而誅竄之也人無父母生日當倍悲痛更安忍置酒張樂以為樂若具慶者可矣今人以影祭或畫工所傳一髭髮不當則所祭已是别人大不便今之稅實輕於什一但斂之無法與不均耳有一物而相離者如形無影不害其成形水無波不害其為水有兩物而必相須者如心無目則不能視目無心則不能見古者八十絲為一升斬衰三年則是二百四十絲於今之布為已細絲麻十五升則是千有二百絲今蓋無有矣古之學者為已今之學者為人古之仕者為人今之仕者為已古之强有力者將以行禮今之强有力者將以為亂方今有古之所無者二兵與釋老也言而不行是欺也君子欺乎哉不欺也汎乎其思不若約之可守也思則來捨則去思之不熟也二經簡編後分者不是詩大率後人追作馬遷非聖人於憂勞中其心則安静安静中却有至憂聖人之言逺如天賢者小如地天之付與之謂命禀之在我之謂性見於事業一作物也之謂理事君有犯無隱事親有隱無犯有時而可分治必有為治之因亂必有為亂之因受命之符不足怪射則觀其至誠而已學行之上也名譽以崇之皆楊子之失由之瑟奚為於丘之門言其聲之不和與已不同視其所以觀人之大槩察其所安心之所安也子絶四毋自任私意毋必為毋固執毋有已居是邦也不非其大夫此理最好出入可也出須是同歸博施濟衆仁者無窮意知和而和執辭時不完無欲速心速七年理速養親之心則無極外事極時須為之極莫若極貴貴之義莫若極尊賢之冝發於外者謂之恭有諸中者謂之敬誠然後能敬未及誠時却須敬而後能誠無妄之謂誠不欺其次矣一本云李邦直云不欺之謂誠便以不欺為誠徐仲車云不息之謂誠中庸言至誠無息非以無息能誠也或以問先生先生曰云云贊馬遷巷伯之倫此班固㣲詞石奢不當死然縱法當固辭乞罪不罪他時可以堅情出踐更錢此最義一作最沒義易爻應則有時而應又逺近相感而悔吝生王通家人卦是易傳言明内齊外非取象意疑此是字上脫一不字也詩序必是同時一作國史所作然亦有後人添者如白華只是刺幽王其下更解不行緜蠻序不肯飲食教載之只見詩中云飲之食之教之誨之命彼後車謂之載之便云教載絶不成言語也又如高子曰靈星之尸也分明是高子言更何疑文王望至治之道而未之見若曰民雖使至治止由之而已安知聖人二南以天子在上諸侯善化及民安得謂之至其有不合周公之心固無此設若有不合者周公之心必如是勤勞五世依約君子小人在上為政其流澤三四世不已五世而後斬當時門人只知闢楊墨為孟子之功故孟子發此一説以推尊孔子之道言予未得為孔子徒也孔子流澤至此未五世其澤尚在於人予則私善於人而已邪説則終不能勝正道人有秉彞然亦惡亂人之心無恥之恥注是行之不著如此人多若至論雖孔門中亦有由而不知者又更有不知則不能由送死天下之至重人心苟能竭力盡此一事則可以當天下之大事養生人之常此相對而言若舜曽子養生其心如此又安得不能當大事人未有自致必也親䘮乎王者之詩亡雅亡政教號令不及於天下仁言為政者道其所為仁聲民所稱道不得於言勿求於心不可養氣以心為主若言失中心不動亦不妨一言而可以折獄者其由也與言由之見信如此刑法國人尚可信其他可知若臧武仲之知又公綽之不欲卞莊子之勇冉求之藝合此四人之偏文之以禮樂方成聖人則盡之矣先進於禮樂質也後進於禮樂文也文質彬彬然後君子其下則史孔子從之矯枉欲救文之弊然而吾從周此止文一事又有不從處乗商之輅中庸首先言本人之情性次言學次便言三王酌損成王道餘外更無意三王下到今更無聖人若有時須當作四王王者制作時用先代之宜世者今也法當用周禮自漢以來用有愛人之心然而使民亦有不時處此則至淺言當時治千乗之國若如此時亦可以治矣聖人之言雖至近上下皆通此三句若推其極堯舜之治亦不過此若常人之言近時便即是淺近去齊經管仲覇政之後風俗尚權詐急衣食魯之風俗不如此又仲尼居之當時風俗亦甚美到漢尚言齊魯之學天性只説風俗若謂聖賢則周公自不之魯太公亦未可知又謂齊經田常弑君無君臣上下之分也不然色難形下面有事服勞而言服勞更淺若謂諭父母於道能養志使父母説却與此辭不相合然推其極時養志如曽子大舜可也曽元是曽子之子尚不能在邦而已心無怨孔子發明仲弓使知仁字然舜在家亦怨周公狼跋亦怨又引文中子不有祝鮀之佞與宋朝之美才辨難免世之害矣當孔子時傳易者支離故言五十以學易言學者謙辭學易可以無大過差易之道惟孔子無大過詩書統言執禮人所執守賢者能逺照故能避一世事其次避地不居亂邦不愧屋漏則心安而體舒子曰君子博學於文約之以禮亦可以弗畔矣夫此非自得也勉而能守也多聞擇其善者而從之多見而識之知之次也以勉中人之學也經所以載道也器所以適用也學經而不知道治器而不適用奚益哉一本云經者載道之器須明其用如誦詩須逹於從政能専對也今之學者岐而為三能文者謂之文士談經者泥為講師惟知道者乃儒學也夫内之得有淺深外之來有輕重内重則可以勝外之輕得深則可以見誘之小二程遺書卷六
