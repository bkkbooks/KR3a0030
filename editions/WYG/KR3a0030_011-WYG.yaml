body:
  text: 二程遺書卷十一宋朱子編師訓毋不敬儼若思安定辭安民哉君德也君德即天德也思無邪敬以直内義以方外敬義立而德不孤德不孤與物同故不孤也夫子之道忠恕而已矣聖人以此齋戒以神明其德夫天命之謂性率性之謂道脩道之謂教孟子曰我善養吾浩然之氣其為氣也至大至剛以直養而無害則塞乎天地之間其為氣也配義與道無是餒也是集義所生者非義襲而取之也天位乎上地位乎下人位乎中無人則無以見天地書曰惟天地萬物父母惟人萬物之靈易曰天地設位而易行乎其中乾坤毁則無以見易易不可見則乾坤或幾乎息矣道一本也或謂以心包誠不若以誠包心以至誠參天地不若以至誠體萬物是二本也知不二本便是篤恭而天下平之道形而上者謂之道形而下者謂之器若如或者以清虚一大為天道則一作此乃以器言而非道也範圍天地之化而不過者模範出一天地爾非在外也如此曲成萬物豈有遺哉天地設位而易行其中何不言人行其中蓋人亦物也若言神行乎其中則人只於鬼神上求矣若言理言誠亦可也而特言易者欲使人黙識而自得之也繫辭曰形而上者謂之道形而下者謂之器又曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰一隂一陽之謂道隂陽亦形而下者也而曰道者惟此語截得上下最分明元來只此是道要在人黙而識之也立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才一之也而兩之不兩則無用天地設位而易行乎其中只是敬也敬則無間斷體物而不可遺者誠敬而已矣不誠則無物也詩曰維天之命於穆不已於乎不顯文王之德之純純亦不已純則無間斷毋不敬儼若思安定辭安民哉君道也君道即天道也出門如見大賓使民如承大祭此仲弓之問仁而仲尼所以告之者以仲弓為可以事斯語也雍也可使南面有君之徳也毋不敬可以對越上帝祭如在祭神如神在敬以直内義以方外合内外之道也釋氏内外之道不備者也克勤小物最難自下而達上者惟造次必於是顚沛必於是鼓萬物而不與聖人同憂聖人人也故不能無憂天則不為堯存不為桀亡者也咸恒體用也體用無先後易窮則變變則通通則乆天則不言而信神則不怒而威顔子黙識曽子篤信得聖人之道者二人也曽子曰吾得正而斃焉斯已矣天地之正氣恭作肅肅便雍也理則極髙明行之只是中庸也中庸言誠便是神天人無間斷耳目能視聴而不能逺者氣有限耳心則無逺近也學在誠知誠養學要信與熟正已而物正大人之事學須如此敬勝百邪萬物皆備於我矣反身而誠樂莫大焉欲當大任須是篤實大人者與天地合其德與日月合其明非在外也失之毫釐繆以千里深可戒慎平康正直已欲立而立人已欲達而達人能近取譬者可謂仁之方也已博施而能濟衆固仁者而仁不足以盡之故曰必也聖乎孟子曰仁也者人也合而言之道也中庸所謂率性之謂道是也仁者人此者也敬以直内義以方外仁也若以敬直内則便不直矣行仁義豈有直乎必有事焉而勿正則直也夫能敬以直内義以方外則與物同矣故曰敬義立而徳不孤是以仁者無對放之東海而準放之西海而準放之南海而準放之北海而準醫家言四體不仁最能體仁之名也一本醫字下别為一章天地之大德曰生天地絪緼萬物化醇生之謂性告子此言是而謂犬之性猶牛之性牛之性猶犬之性則非也萬物之生意最可觀此元者善之長也斯所謂仁也人與天地一物也而人特自小之何耶人賢不肖國家治亂不可以言命至誠可以贊化育者可以囘造化惟神也故不疾而速不行而至神無速亦無至須如此言者不如是不足以形容故也天地萬物之理無獨必有對皆自然而然非有安排也每中夜以思不知手之舞之足之蹈之也老子之言竊弄闔闢者也冬寒夏暑隂陽也所以運動變化者神也神無方故易無體若如或者别立一天謂人不可以包天則有方矣是二本也窮神知化化之妙者神也窮理盡性以至於命一物也天地只是設位易行乎其中者神也氣外無神神外無氣或者謂清者神則濁者非神乎大抵學不言而自得者乃自得也有安排布置者皆非自得也言有無則多有字言無無則多無字有無與動静同如冬至之前天地閉可謂静矣而日月星辰亦自運行而不息謂之無動可乎但人不識有無動静爾正名聲氣名理形名理名實相須一事苟則其餘皆苟矣忠信者以人言之要之則實理也天下雷行物與旡妄天下雷行付與旡妄天性豈有妄耶聖人以茂對時育萬物各使得其性也無妄則一毫不可加安可往也往則妄矣無妄震下乾上動以天安有妄乎動以人則有妄矣犯而不校校則私非樂天者也犯有當報者則是循理而已意者任意必者必行固者固執我者私已綏之斯來動之斯和聖人之神化上下與天地同流者也禮云後世雖有作者虞帝弗可及已如鳯凰來儀百獸率舞之事三代以降無此也泰誓武成稱一月者商正已絶周正未建故只言一月中之理至矣獨隂不生獨陽不生偏則為禽獸為夷狄中則為人中則不偏常則不易惟中不足以盡之故中庸隂陽盈縮不齊不能無差故厯家有歲差法日月薄蝕而旋復者不能奪其常也古今異宜不惟人有所不便至於風氣亦自别也日月星辰皆氣也亦自别時者聖人所不能違然人之智愚世之治亂聖人必示可易之道豈徒為教哉蓋亦有其理故也學要在自得古人教人唯指其非故曰舉一隅不以三隅反則不復也言三隅舉其近若夫告諸往而知來者則其知己逺矣佛氏言印證者豈自得也其自得者雖甚人言亦不動待人之言為是何自得之有行夏之時乗殷之輅服周之冕與從周之文不悖從先進則為時之弊言之彼各有當也臧武仲之知公綽之不欲卞莊子之勇冉求之藝備此數者而文之以禮樂亦可以為成人矣又曰今之成人者何必然見利思義見危授命乆要不忘平生之言亦可以為成人矣者只是言忠信也忠信者實也禮樂者文也語成人之名自非聖人誰能當之孟子曰唯聖人然後可以踐形如此方足以稱成人之名詩曰天生烝民有物有則民之秉彞好是懿德故有物必有則民之秉彞也故好是懿德萬物皆有理順之則易逆之則難各循其理何勞於己力哉人心莫不有知惟蔽於人欲則忘天德一作理也皆實理也人知而信者為難孔子曰朝聞道夕死可矣死生亦大矣非誠知道則豈以夕死為可乎萬物莫不有對一隂一陽一善一惡陽長則隂消善増則惡减斯理也推之其逺乎人只要知此耳言寡尤行寡悔禄在其中矣此孔子所言告子張者也若顔閔則無此問孔子告之亦不如此或疑如此亦有不得禄者孔子蓋曰耕也餒在其中矣唯理可為者為之而已矣孔子聞衛亂曰柴也其來乎由也其死矣二者蓋皆適於義孔悝受命立輙若納蒯聵則失職與輙拒父則不義如輙避位則拒蒯聵可也如輙拒父則奉身而退可也故子路欲勸孔悝無與於此忠於所事也而孔悝既被脅矣此子路不得不死耳然燔臺之事則過於勇暴也公子郢志可嘉然當立而不立以致衛亂亦聖人所當罪也而春秋不書事可疑耳事君數斯辱矣朋友數斯疏矣數者煩數也以己及物仁也推己及物恕也違道不逺是也忠恕一以貫之忠者天理恕者人道忠者無妄恕者可以行乎忠也忠者體恕者用大本達道也此與違道不逺異者動以天爾必有事焉而勿正事者事事之事心勿忘勿助長養氣之道當如此志動氣者十九氣動志者十一祖考來格者惟至誠為有感必通動容周旋中禮者盛德之至君子行法以俟命朝聞道夕死之意也大凡出義則入利出利則入義天下之事惟義利而已湯武反之身之者學而復者也視其所以以用也所為也觀其所由由所從之道也察其所安志意所安也所存也北宫黝要之以必為孟施舍推之以不懼北宫黝或未能無懼故黝不如施舍之守約也子夏信道曽子明理故二子各有所似公孫丑謂夫子加齊之卿相得行道焉如此則能無畏懼而動心乎故孟子曰否我四十不動心人心不得有所繫剛者强而不屈毅者有所發木者質樸訥者遲鈍禮者理也文也理者實也本也文者華也末也理是一物文是一物文過則奢實過則儉奢自文所生儉自實所出故林放問禮之本子曰禮與其奢也寧儉言儉近本也此與形影類矣推此理則甚有事也以物待物不以己待物則無我也聖人制行不以己言則是矣而理似未盡於此言夫天之生物也有長有短有大有小君子得其大矣一作者安可使小者亦大乎天理如此豈可逆哉以天下之大萬物之多用一心而處之必得其要斯可矣然則古人處事豈不優乎志可克氣氣勝一有志字則憒亂矣今之人以恐懼而勝氣者多矣而以義理勝氣者鮮矣樂天知命通上下之言也聖人樂天則不須言知命知命者知有命而信之者爾不知命無以為君子是矣命者所以輔義一循於義則何庸斷之以命哉若夫聖人之知天命則異於此仁者不憂樂天者也孝弟也者其為仁之本與言為仁之本非仁之本也仁者不憂知者不惑勇者不懼德之序也知者不惑仁者不憂勇者不懼學之序也知以知之仁以守之勇以行之言天之自然者謂之天道言天之付與萬物者謂之天命德性者言性之可貴與言性善其實一也性之德者言性之所有如卦之德乃卦之韞也肫肫其仁盡言厚也自明而誠雖多由致曲然亦有自大體中便誠者雖亦是自明而誠謂之致曲則不可體羣臣者體察也心誠求之則無不察矣忠厚之至也故曰忠信重禄所以勸士言盡其忠信而厚其禄食此所以勸士也敬鬼神而逺之所以不黷也知之事也先難後獲先事後得之義也仁之事也若智者利仁乃先得後事之義也人心惟危人欲也道心惟㣲天理也惟精惟一所以至之允執厥中所以行之用也仁者其言也訒難其出也治道在於立志責任求賢知仁勇三者天下之達德學之要也操約者敬而已矣顔子不動聲氣孟子則動聲氣矣旡妄震下乾上聖人之動以天賢人之動以人若顔子之有不善豈如衆人哉惟只在於此間爾蓋猶有己焉至於無我則聖人也顔子切於聖人未達一息爾不遷怒不貳過無伐善無施勞三月不違仁者此意也子曰語之而不惰者其囘也與顔子之不惰者敬也誠者天之道敬者人事之本敬者用也敬則誠敬以直内則義以方外義以為質則禮以行之孫以出之信以成之孫順也不止於言聖人言忠信者多矣人道只在忠信不誠則無物且出入無時莫知其鄉者人心也若無忠信豈復有物乎和順於道德而理於義者體用也學者須識聖賢之體聖人化工也賢人巧也有有德之言有造道之言孟子言己志者有德之言也言聖人之事造道之言也學至於樂則成矣篤信好學未如自得之為樂造道者也好之者如游佗人園圃樂之者則己物爾然人只能信道亦是人之難能也三代之治順理者也兩漢以下皆把持天下者也服牛乗馬皆因其性而為之胡不乗牛而服馬乎理之所不可祭者所以盡誠或者以禮為一事人器與鬼器等則非所以盡誠而失其本矣禮者因人情者也人情之所宜則義也三年之服禮之至義之盡也致知養氣克己最難中庸曰天下國家可均也爵禄可辭也白刄可蹈也中庸不可能也生生之謂易生生之用則神也子貢之知亞於顔子知至而未至之也先甲三日以窮其所以然而處其事後甲三日以究其將然而為之防甲者事之始也庚者有所革也自甲乙至於戊巳春夏生物之氣已備庚者秋冬成物之氣也故有所革别一般氣隨之上六才與位皆隂柔隨之極也故曰拘繫之乃從維之又從而維之王用亨于岐山唯太王之事民心固結而不可解者也其佗皆不可如是之固也學之興起莫先於詩詩有美刺歌誦之以知善惡治亂廢興禮者所以立也不學禮無以立樂者所以成德樂則生矣生則惡可己也惡可已則不知手之舞之足之蹈之也若夫樂則安安則乆乆則天天則神天則不言而信神則不怒而威至於如此則又非手舞足蹈之事也緑衣衛莊姜傷已無德以致之行有不得者反求諸己而已矣故曰緑兮絲兮女所治兮我思古人俾無訧兮綌兮絺兮凄其以風我思古人實獲我心絲之緑由女之染治以成言有所自也綌絺所以來風也螽斯惟言不妬忌若芣苢則更和平婦人樂有子謂妾御皆無所恐懼而樂有子矣居仁由義守禮寡欲君子上達小人下達下學而上達意在言表也有實則有名名實一物也若夫好名者則狥名為虚矣如君子疾沒世而名不稱謂無善可稱耳非狥名也萬物皆備於我矣反身而誠樂莫大焉不誠則逆於物而不順也乾陽一有物字也不動則不剛其静也專專一其動也直直遂不專一則不能直遂坤隂一有物字也不静則不柔不柔一作歸其静也翕翕聚其動也闢發散不翕聚則不能發散致知在格物格至也或以格為止物是二本矣人須知自慊之道乾元者始而亨者也利貞者性情也性情猶言資質體段亭毒化育皆利也不有其功常乆而不已者貞也詩曰維天之命於穆不己者貞也天地日月一般月受日光而日不為之虧然月之光乃日之光也地氣不上騰則天氣不下降天氣降而至於地地中生物者皆天氣也惟無成而代有終者地之道也識變知化為難古今風氣不同故器用亦異宜是以聖人通其變使民不倦各隨其時而已矣後世雖有作者虞帝為不可及己蓋當是時風氣未開而虞帝之德又如此故後世莫可及也若三代之治後世决可復不以三代為治者終苟道也動乎血氣者其怒必遷若鑑之照物妍媸在彼隨物以應之怒不在此何遷之有聖人之言冲一作中和之氣也貫徹上下人須學顔子有顔子之德則孟子之事功自有一作立孟子者禹稷之事功也中庸之言放之則彌六合卷之則退藏於密孔子謂顔淵曰用之則行舍之則藏惟我與爾有是夫君子所性雖大行不加焉雖窮居不損焉不為堯存不為桀亡者也用之則行舍之則藏皆不累於己爾囘也非助我者也於吾言無所不悦與聖人同爾人須知自慊之道自慊者無不足也若有所不足則張子厚所謂有外之心不足以合天心者也文王陟降在帝左右不識不知順帝之則不作聰明順天理也狼跋其胡載㚄其尾公孫碩膚赤舄几几取狼為興者狼前後停興周公之德終始一也稱公孫云者言其積德之厚赤舄几几盛德之容也詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟歎之嗟歎之不足故咏歌之咏歌之不足不知手之舞之足之蹈之也有節故有餘止乎禮義者節也月不受日光故食不受日光者月正相當隂盛亢陽也鼓者所以助陽然則日月之眚皆可鼓也月不下日與日正相對故食季冬行春令命之曰逆者子尅母也太𤣥中首中陽氣潛萌於黄宫信無不在乎中養首一藏心於淵美厥靈根測曰藏心於淵神不外也楊子雲之學蓋嘗至此地位也顔子短命之類以一人言之謂不幸可也以大目觀之天地之間無損益無進退譬如一家之事有子五人焉三人富貴而二人貧賤以二人言之則不足以父母一家言之則有餘矣若孔子之至德又處盛位則是化工之全爾以孔顔言之於一人有所不足以堯舜禹湯文武周公羣聖人言之則天地之間亦富有餘一作亦云富有也惠廸吉從逆凶常行之理也視聴思慮動作皆天也人但於其中要識得眞與妄爾東周之亂無君臣上下故孔子曰如有用我者吾其為東周乎言不為東周也素履者雅素之履也初九剛陽素履已定但行其志爾故曰獨行願也視履考祥居履之終反觀吉凶之祥周至則善吉也故曰其旋元吉比之無首凶比之始不善則凶豶豕之牙吉不去其牙而豶其勢則自善矣治民者不止其争而教之讓之類是也介于石理素定也理素定故見幾而作何俟終日哉豫者備豫也逸豫也事豫故逸樂其義一也謙者治盈之道故曰裒多益寡稱物平施凡為人言者理勝則事明氣勝則招怫感慨殺身者易從容就義者為難成性存存道義之門道無體義有方也中者天下之大本天地之間亭亭當當直上直下之正理出則不是唯敬而無失最盡孟子謂必有事焉而勿正心勿忘勿助長正是著意忘則無物天者理也神者妙萬物而為言者也帝者以主宰事而名易要玩索齋戒以神明其德夫學只要鞭辟一作約近裏著己而已故切問而近思則仁在其中矣言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前在與則見其倚於衡夫然後行只此是學質美者明得盡查渣便渾化却與天地同體其次惟莊敬持養及其至則一也人最可畏者是便做要在燭理一本以下云子路有聞未之能行惟恐有聞宰予晝寢以其質惡因是而言顔子屢空空中一作心受道子貢不受天命而貨殖億則屢中役一作億聰明億度而知此子貢始時事至於言夫子之言性與天道不可得聞乃後來事其言如此則必不至於不受命而貨殖也天生德於予及文王既沒文不在兹乎此聖人極斷制以理文不在兹言文未嘗忘唱道在孔子聖人以為己任詩書執禮皆雅言雅素所言也至於性與天道則子貢亦不可得而聞蓋要在黙而識之也君子坦蕩蕩心廣體胖盡己之謂忠以實之謂信發已自盡為忠循物無違謂信表裏之義也理義體用也理義之説我心居之以正行之以和艮其止止其所也各止其所父子止於恩君臣止於義之謂艮其背止於所不見也至誠可以贊天地之化育則可以與天地參贊者參贊之義先天而天弗違後天而奉天時之謂也非謂贊助只有一箇誠何助之有知至則便意誠若有知而不誠者皆知未至爾知至而至之者知至而往至之乃吉之先見故曰可與幾也知終而終之則可與存義也知至至之主知知終終之主終忠信所以進德脩辭立其誠所以居業者乾道也敬以直内義以方外者坤道也脩辭立其誠文質之義天下皆憂吾獨得不憂天下皆疑吾獨得不疑與樂天知命吾何憂窮理盡性吾何疑皆心也自分心迹以下一段皆非息訓為生者蓋息則生矣一事息則一事生中無間斷碩果不食則便為復也寒往則暑來暑往則寒來寒暑相推而歲成焉日新之謂盛德生生之謂易隂陽不測之謂神要思而得之為政須要有綱紀文章先有司鄉官讀法平價謹權量皆不可闕也人各親其親然後能不獨親其親仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸便見仲弓與聖人用心之大小推此義則一心可以䘮邦一心可以興邦只在公私之間爾子夏問政子曰無欲速無見小利子夏之病常在近小子張問政子曰居之無倦行之以忠子張常過高而未仁故以切己之事答之其為氣也配義與道道有冲漠之氣象聖人以此洗心退藏於密聖人以此齋戒以神明其德夫二程遺書卷十一
