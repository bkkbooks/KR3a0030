body:
  text: 二程遺書卷九宋朱子編少日所聞諸師友説仁者公也人此者也義者宜也權量輕重之極禮者别也定分知者知也信者有此者也萬物皆有信此五常性也若夫惻隱之類皆情也凡動者謂之情性者自然完具信只是有此因不信然後見故四端不言性先生曰孔子曰仁者已欲立而立人已欲達而達人能近取譬可謂仁之方也已嘗謂孔子之語仁以教人者唯此為盡要之不出於公也孟子曰天民者達可行於天下而後行之者也大人者正已而物正者也曰天民者能盡天民之道者也踐形者是也如伊尹可當之矣民之名則是不得位者必達可行於天下而後行之者也大人者則如乾之九二利見大人天下文明者也天民大人亦繫乎時與不時爾君子不重則不威學則不固言君子不重則不威嚴而學則亦不能堅固也信非義也以其言可復故曰近義恭非禮也以其逺恥辱故曰近禮因其事而不失其所親亦可宗也况於盡禮義者乎思無邪誠也十有五而志於學三十而立四十而不惑明善之徹矣聖人不言誠之一節者言不惑則自誠矣五十而知天命思而知之也六十而耳順者在人之最末者也至耳而順則是不思而得也然猶滯於迹焉至於七十從心所欲不踰矩則聖人之道終矣此教之序也對孟懿子問孝告衆人者也對孟武伯者以武伯多可憂之事也子游能養而或失於敬子夏能直義而或少温潤之色各因其人材高下與其所失而教之也黙而識之乃所謂學也惟顔子能之故孔子曰吾與囘言終日不違如愚退而省其私者言顔子退而省其在己者亦足以發此固仲尼知其不愚可謂善學者也夷狄之有君不如諸夏之亡也此孔子言天下當世大亂無君之甚若曰夷狄猶有君不若諸夏之亡君也君子無所争必也射乎故曰揖讓而升下而飲其争也君子言不争也若曰其争也是君子乎子曰禘自既灌而往者吾不欲觀之矣禘者魯僭天子之大祭也灌者祭之始也以其僭上之祭故聖人自灌以往不欲觀之矣或問禘之説子曰不知也者不欲斥言也知其説者之於天下也其如視諸斯乎指其掌此聖人言知此理者其於治天下如指其掌甚易明也蓋名分正則天下定矣子貢之器如宗廟之中可觀之貴器故曰瑚璉也或問辯曰或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞苟仁矣則口無擇言言滿天下無口過佞何害哉若不知其仁則佞焉用也子曰由也好勇過我無所取材材與裁同言由但好勇過孔子而不能裁度適於義也子路曰願車馬衣輕裘與朋友共敝之而無憾此勇於義者觀其志豈可以勢利拘之哉蓋亞於浴沂者也顔淵願無伐善無施勞此仁矣然未免於有為蓋滯迹於此不得不爾也子曰老者安之朋友信之少者懷之此聖人之事也顔子大賢之事也子路有志者之事也子曰中人以上可以語上也中人以下不可以語上也此謂才也然則中人以下者終於此而已乎曰亦有可進之道也子曰齊一變至於魯魯一變至於道言魯國雖衰而君臣父子之大倫猶在愈於齊國故可一變而至於道子曰志於道凡物皆有理精㣲要妙無窮當志之耳德者得也在已者可以據依於仁者凡所行必依著於仁兼内外而言之也子在齊聞韶三月不知肉味曰不圖為樂之至於斯也曰聖人不凝滯於物安有聞韶雖美直至三月不知肉味者乎三月字誤當作音字此聖人聞韶音之美當食不知肉味乃歎曰不圖為樂之至於斯也門人因以記之子所雅言詩書執禮皆雅言也雅雅素之雅禮當時所執行而非書也詩書執禮皆孔子素所常言也人有斗筲之量者有鍾鼎之量者有江河之量者有天地之量者斗筲之量者固不足算若鍾鼎江河者亦已大矣然滿則溢也唯天地之量無得而損益苟非聖人孰能當之子曰吾未見剛者或曰申棖子曰棖也慾焉得剛凡人有慾則無剛至大至剛之氣在養之可以至焉孟子曰我知言孟子不欲自言我知道耳孟子常自尊其道而人不尊孔子益自卑而人益尊之聖賢固有間矣董仲舒謂正其義不謀其利明其道不計其功孫思邈曰膽欲大而心欲小智欲圓而行欲方可以法矣今人皆反之者也如臨㴱淵如履薄氷謂小心也糾糾武夫公侯干城謂大膽也不為利囘不為義疚行之方也見幾而作不俟終日知之圓也此言極有理舍己從人最為難事己者我之所有雖痛舍之猶懼守己者固而從人者輕也參也魯然顔子沒後終得聖人之道者曽子也觀其啟手足之時之言可見矣所傳者子思孟子皆其學也毋意者不妄意也毋我者循理不守己也子曰先進於禮樂野人也言其質勝文也後進於禮樂君子也言其文質彬彬也如用之則吾從先進言若用振時救文之弊則吾從先進小過之義也麻冕禮也今也純儉吾從衆奢則不遜儉則固與其不遜也寧固此之謂也不必惑從周之説子曰賜不受命而貨殖焉命謂爵命也言不受爵命而貨殖者以見其私於利之㴱而足以明顔子屢空之賢也子曰論篤是與君子者乎色莊者乎不可以言取人今以論篤而與之是謂君子者乎徒能色莊者乎仲弓之仁安已而敬人故曰雍也可使南面對樊遲之問亦是仁之目也然樊遲失於麤俗聖人勉使為仁曰雖之夷狄不可棄也司馬牛多言而躁故但告以其言也訒克伐怨欲不行焉可以為仁矣若無克伐怨欲固為仁已唯顔子而上乃能之如有而不行焉則亦可以為難而未足以為仁也孔子蓋欲憲疑而再問之而憲未之能問也管仲之仁仁之功也二程遺書卷九
