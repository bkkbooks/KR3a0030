body:
  text: 二程遺書卷十二宋朱子編戊冬見伯淳先生洛中所聞純亦不已天德也造次必於是顚沛必於是三月不違仁之氣象也又其次則日月至焉者矣一隂一陽之謂道自然之道也繼之者善也出道則有用元者善之長也成之者却只是性各正性命者也故曰仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣如此則亦無始亦無終亦無因甚有亦無因甚無亦無有處有亦無無處無民受天地之中以生天命之謂性也人之生也直意亦如此若以生為生養之生却是修道之謂教也至下文始自云不能者敗以取禍則乃是教也且喚做中若以四方之中為中則四邊無中乎若以中外之中為中則外面無中乎如生生之謂易天地設位而易行乎其中豈可只以今之易書為易乎中者且謂之中不可捉一箇中來為中顔子在陋巷人不堪其憂囘也不改其樂簞瓢陋巷非可樂葢自有其樂耳其字當玩味自有深意大學之道在明明德明此理也在止於至善反己守約是也楊子出處使人難説孟子必不肯為楊子事孔子與㸃葢與聖人之志同便是堯舜氣象也誠異三子者之撰特行有不揜焉者眞所謂狂矣子路等所見者小子路只為不達為國以禮道理所以為夫子笑若知為國以禮之道便却是這氣象也人之學當以大人為標垜然上面更有化爾人當學顔子之學一作事窮理盡性矣曰以至於命則全無著力處如成於樂樂則生矣之意同子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也子貢葢於是始有所得而歎之以子貢之才從夫子如此之乆方歎不可得而聞亦可謂之鈍矣觀其孔子沒築室於場六年然後歸則子貢之志亦可見矣他人如子貢之才六年中待作多少事豈肯如此生生之謂易天地設位而易行乎其中乾坤毁則無以見易易不可見乾坤或幾乎息矣易畢竟是甚又指而言曰聖人以此洗心退藏於密聖人示人之意至此深且明矣終無人理㑹易也此也宻也是甚物人能至此㴱思當自得之喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉致與位字非聖人不能言子思葢特傳之耳顔子曰仰之彌高鑽之彌堅則是㴱知道之無窮也瞻之在前忽焉在後他人見孔子甚逺顔子瞻之只在前後但只未在中間爾若孔子乃在其中焉此未逹一間也成性存存便是道義之門凡人才學便須知著力處既學便須知得力處二程遺書卷十二
