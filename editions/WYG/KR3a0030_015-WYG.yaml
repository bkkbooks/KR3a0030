body:
  text: 二程遺書卷十五宋朱子編入關語録或云明道先生語志氣之帥不可小觀知知仁守勇决涵養吾一主一無適敬以直内便有浩然之氣浩然須要實識得他剛大直不習無不利敬即便是禮無己可克大而化則已與理一一則無已致知則有知有知則能擇安有識得易後不知退藏於宻宻是甚六經之言在涵畜中黙識心通精義為本道無精粗言無高下物則一作即事也凡事上窮極其理則無不通有主則虛無主則實必有所事知不專為藏往易言知來藏往主蓍卦而言物形便有大小精粗神則無精粗神則是神不必言作用三十輻共一轂則為車若無轂輻何以見車之用人患事繫累思慮蔽固只是不得其要要在明善明善在乎格物窮理窮至於物理則漸乆後天下之物皆能窮只是一理人多思慮不能自寧只是做他心主不定要作得心主定惟是止於事為人君止於仁之類如舜之誅四凶四凶己一作他作惡舜從而誅之舜何與焉人不止於事只是攬他事不能使物各付物物各付物則是役物為物所役則是役於物有物必有則須是止於事視聽言動非理不為即是禮禮即是理也不是天理便是私欲人雖有意於為善亦是非禮無人欲即皆天理公則一私則萬殊至當歸一精義無二人心不同如面只是私心人不能袪思慮只是吝吝故無浩然之氣所過者化身之所經歴處所存者神存主處便是神如立之斯立道之斯行綏之斯來動之斯和固非小補伯者是小補而已孔子教人常俯就不俯就則門人不親孟子教人常高致不高致則門人一作道不尊古之學者優柔厭飫有先後次序今之學者却只做一場話説務高而已常愛杜元凱語若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也今之學者往往以游夏為小不足學然游夏一言一事却總是實如子路公西赤言志如此聖人許之亦以此自是實事後之學者好高如人游心於千里之外然自身却只在此人皆稱栁下惠為聖人只是因循前人之語非自見假如人言孔子為聖人也須直待己實見聖處方可信合而聽之則聖公則自同若有私心便不同同即是天心曽子傳聖人學其德後來不可測安知其不至聖人如言吾得正而斃且休理㑹文字只看他氣象極好被它所見處大後人雖有好言語被氣象卑終不類道聞之知之得之有之耳剽臆度養心莫善於寡欲不欲則不惑所欲不必沈溺只有所向便是欲人惡多事或人憫一作欲簡之世事雖多盡是人事人事不教人做更責誰何要息思慮便是不息思慮聖人盡道以其身所存率天下是欲天下皆至於聖人佛以其所賤者教天下是誤天下也人才愈明往往所陷溺愈㴱小德川流大德敦化只是言孔子川流是日用處大德是存主處敦如俗言敦禮義敦本之意或曰正叔所定婚儀復有壻往謝之禮何謂也曰如此乃是與時稱今將一古鼎古敦音隊用之自是人情不稱兼亦與天地風氣不宜禮時為大須當損益夏商周所因損益可知則能繼周者亦必有所損益如云行夏之時乗殷之輅服周之冕樂則韶舞是夏時之類可從則從之葢古人今人自是年之壽夭形之大小不同古之被衣冠者魁偉質厚氣象自别若使今人衣古冠冕情性自不相稱葢自是氣有淳漓正如春氣盛時生得物如何春氣衰時生得物如何必然别今之始開荒田初歲種之可得數倍及其乆則一歲薄於一歲此乃常理觀三代之時生多少聖人後世至今何故寂寥未聞蓋氣自是有盛則必有衰衰則終必復盛若冬不春夜不晝則氣化息矣聖人主化如禹之治水順則當順之治則須治之古之伏羲豈不能垂衣裳必待堯舜然後垂衣裳據如此事只是一箇聖人都做得了然必須數世然後成亦因時而已所謂溥博淵泉而時出之也須是先有溥博淵泉也方始能時出自無溥博淵泉豈能時出之大抵氣化在天在人一般聖人其中只有功用放勲曰勞之來之匡之直之輔之翼之正須如此狥流俗非隨時知事正可嚴毅獨立乃是隨時也舉禮文却只是一時事要所補大可以風後世却只是明道孟子言五百年必有王者興其間必有名世者大數則是然不消催促他冠禮廢則天下無成人或人欲如魯公十二而冠此不可冠所以責成人十二年非可責之時既冠矣且不責以成人事則終其身不以成人望他也徒行此節文何益雖天子諸侯亦必二十而冠信而後諌唯能信便發得人志龍女衣冠不可定龍獸也衣冠人所被豈有禽獸可以被人衣冠若以為一龍不當立數十廟若以為數十龍不當同為善濟夫人也大抵决塞莫非天地之祐社稷之福謀臣之功兵卒之力不知在此彼龍何能為人苟有朝聞道夕死可矣之志則不可一日安於所不安也何止一日須臾不能如曽子易簀須要如此乃安人不能若此者只為不見實理實理者實見得是實見得非凡實理得之於心自别若耳聞口道者心實不見若見得必不肯安於所不安人之一身儘有所不肯為及至他事又不然若士者雖殺一作敎之使為穿窬必不為其他事未必然至如執卷者莫不知説禮義又如王公大人皆能言軒冕外物及其臨利害則不知就義理却就富貴如此者只是説得不實見及其蹈水火則人皆避之是實見得須是有見不善如探湯之心則自然别昔若經傷於虎者他人語虎則雖三尺童子皆知虎之可畏終不似曽經傷者神色懾懼至誠畏之是實見得也得之於心是謂有德不待勉强然學者則須勉强古人有損軀隕命者若不實見得則烏能如此須是實見得生不重於義一作義重於生生不安於死也故有殺成仁者只是成就一箇是而已學者患心慮紛亂不能寧静此則天下公病學者只要立箇心此上頭儘有商量得之於心謂之有德自然睟然見於面盎於背施於四體四體不言而喻豈待勉强也葬埋所慮者水與蟲耳晉郭文舉為王導所致及其病乞還山欲枕石而死貴人留之曰㴱山為虎狼食不其酷哉曰㴱山為虎狼食貴人為螻蟻食一也故𦵏者鮮不被蟲者雖極㴱亦有土蟲故思木之不壞者得栢心為乆後又見松脂錮之又益乆故用松脂􅂗棺語高則㫖逺言約則義㣲大率六經之言涵滀無有精粗欲言精㣲言多則愈粗凡物有本末不可分本末為兩段事灑埽慮對是其然必有所以然浩然之氣既言氣則己是大段有形體之物如言志有甚迹然亦儘有形象浩然之氣是集義所生者既生得此氣語其體則與道合語其用則莫不是義譬之以金為器及其器成方命得此是金器若謂既返之氣復將為方伸之氣必資於此則殊與天地之化不相似天地之化自然生生不窮更何復資於既斃之形既返之氣以為造化近取諸身其開闔往來見之鼻息然不必須一本無此四字有豈字假吸復入以為呼氣則自然生人氣之生生一作人之氣生於真元天之氣亦自然生生不窮至如海水因陽盛而涸及隂盛而生亦不是將一作必是已涸之氣却生水自然能生往來屈伸只是理也盛則便有衰晝則便有夜往則便有來天地中如洪鑪何物不銷鑠了範圍天地之化天本廓然無窮但人以目力所及見其寒暑之序日月之行立此規模以窺測他天地之化不是天地之化其體有如城廓之類都盛其氣假使言日升降於三萬里不可道三萬里外更無物又如言天地升降於八萬里中不可道八萬里外天地盡學者要黙體天地之化如此言之甚與天地不相似其卒必有窒礙有人言無西海便使無西海亦須是有山無隂陽處便無日月閑邪則誠自存不是外面捉一箇誠將來存著今人外面役役於不善於不善中尋箇善來存著如此則豈有入善之理只是閑邪則誠自存故孟子言性善皆由内出只為誠便存閑邪更著甚工夫但惟是動容貌整思一作心慮則自然生敬敬只是主一也主一則既不之東又不之西如是則只是中既不之此又不之彼如是則只是内存此則自然天理明學者須是將一本無此字敬以直内涵養此意直内是本天地之化雖廓然無窮然而隂陽之度日月寒暑晝夜之變莫不有常此道之所以為中庸道則自然生萬物今夫春生夏長了一番皆是道之生後來生長不可道却將既生之氣後來却要生長道則自然生生不息釋氏之學更不消對聖人之學比較要之必不同便可置之今窮其説未必能窮得他比至窮得自家已化而為釋氏矣今且以迹上觀之佛逃父出家便絶人倫只為自家獨處於山林人鄉裏豈容有此物大率以所賤所輕施於人此不惟非聖人之心亦不可為君子之心釋氏自己不為君臣父子夫婦之道而謂他人不能如是容人為之而已不為别做一等人若以此率人是絶類也至如言理性亦只是為死生其情本怖死愛生是利也敬以直内有主於内則虛自然無非僻之心如是則安得不虛必有事焉須把敬來做件事著此道最是簡最是易又省工夫為此語雖近似常人所論然持之一本有乆字必别天子七廟亦恐只是一日行禮考之古則戊辰同祀文武考之今則宗廟之祀亦是一日祭無大小其所以交於神明接鬼神之義一也必齋不齋則何以交神明厯象之法大抵主於日日一事正則其他皆可推洛下閎作厯言數百年後當差一日其差理必然何承天以其差遂立歲差法其法以所差分數攤在所厯之年看一歲差著幾分其差後亦不定獨邵堯夫立差法冠絶古今却於日月交感之際以隂陽虧盈求之遂不差大抵隂常虧陽常盈故只於這一作漲裏差了厯上若是通理所通為多堯夫之學大抵似揚雄然亦不盡如之常窮味有二萬八千六百此非人所合和是自然也色有二萬八千六百又非人所染畫得亦是自然也獨聲之數只得一半數不行葢聲陽也只是於日出地上數得到日入地下遂數不行此皆有理譬之有形斯有影不可謂今日之影却收以為來日之影據皇極經世色味皆一萬七千二十四疑此記者之誤君子宜獲祐然而有貧悴短夭以至無繼者天意何如氣鍾於賢者固有所不周也閑邪則固一有主字一矣然一作能主一則不消言閑邪有以一為難見不可下工夫如何一作行一者無他只是整齊一作莊整嚴肅則心便一一則自是無非僻之奸此意但涵養乆則天理自然明必有事焉有事於此一作敬也勿正者若思此而曰善然後為之是正也勿忘則是必有事也勿助長則是勿正也後言之漸重須黙識取主一之意修養之所以引年國祚之所以祈天永命常人之至於聖賢皆工夫到這裏則有此應宗子法壞則人不自知來處以至流轉四方往往親未絶不相識今且試以一二巨公之家行之其術要得拘守得須是且如唐時立廟院仍不得分割了祖業使一人主之釋氏尊宿者自言覺悟是既已達道又却須要印證則是未知也得他人道是然後無疑則是信人言語不可言自信若果自信則雖甚人言語亦不聴學者之流必談禪者只是為無處撈摸故須入此大德敦化於化育處敦本也小德川流日用處也此言仲尼與天地同德有言未感時知如何所寓曰操則存舍則亡出入無時莫知其鄉更怎生尋所寓只是有操而已操之之道敬以直内也剛毅木訥何求而曰一作以近仁只為輕浮巧利於仁甚逺故以此為近仁此正與巧言令色相反有土地要之耕而種粟以養人乃宜今以種果實只做果子喫了種糯使之化為水飲之皆不濟事不穩當顔孟之於聖人其知之㴱淺同只是顔子尤温淳淵懿於道得之更淵一作㴱粹近聖人氣象率氣者在志養志者在直内率性之謂道率循也若言道不消先立下名義則茫茫地何處下手何處著心文字上一有雖字無閒暇終是一無二字少工夫然思慮則儘不廢於外事雖奔廹然思慮儘悠悠釋氏之學又不可道他不知亦儘極一作及乎高㴱然要之卒歸乎自私自利之規模何以言之天地之間有生便有死有樂便有哀釋氏所在便須覓一箇纎姦打訛處言免死生齊煩惱卒歸乎自私老氏之學更挾些權詐若言與之乃意在取之張之乃意在翕之又大意在愚其民而自智然則秦之愚黔首其術葢亦出於此天地之間只有一箇感與應而已更有甚事老子言甚雜如隂符經却不雜然皆窺測天道之未盡者也人於天地間並無窒礙處大小大快活生知者只是他自生知義理不待學而知縱使孔子是生知亦何害於學如問禮於老聃訪官名於郯子何害於孔子禮文官名既欲知舊物又不可鑿空撰得出須是問他先知者始得蕭何大營宫室其心便不好只是要得斂怨自安謝安之營宫室却是隨時之宜以東晉之㣲寓於江表其氣奄奄欲盡且以慰安人心高祖其勢可以守關不放入項王然而須放他入來者有三事一是有未坑二十萬秦子弟在外恐内有父兄為變二是漢王父母妻子在楚三是有懷王聖人之道更無精粗從灑埽慮對至精義入神通貫只一理雖灑埽應對只看所以然者如何切要之道無如敬以直内立人達人為仁之方强恕求仁莫近言得不濟事亦須實見得近處其理固不出乎公平公平固在用意更有淺㴱只要自家各自體認得冲漠無朕萬象森然已具未應不是先已應不是後如百尺之木自根本至枝葉皆是一貫不可道上面一段事無形無兆却待人旋安排引入來教入塗轍既是塗轍却只是一箇塗轍安安下字為義安其所安也安安是義也原始反終故知死生之説但窮得則自知死生之説不須將死生便做一箇道理求道二仁與不仁而已自然理如此道無無對有隂則有陽有善則有惡有是則有非無一亦無三故易曰三人行則損一人一人行則得其友只是二也曽子言夫子之道忠恕果可以一貫若使他人言之便未足信或未盡忠恕之道曽子言之必是盡仍是一作得也又於中庸特舉此二義言忠恕違道不逺恐人不喻故指而示之近欲以喻人又如禘嘗之義如視諸掌中庸亦指而示之近皆是恐人不喻故特語之詳然則中庸之書决是傳聖人之學不雜子思恐傳授漸失故著此一卷書忠恕所以公平造德則自忠恕其致則公平仁之道要之只消道一公字公只是仁之理不可將公便唤做仁一本有將字公而以人體之故為仁只為公則物我兼照故仁所以能恕所以能愛恕則仁之施愛則仁之用也出門如見大賓使民如承大祭只是敬也敬則是不私之説也才不敬便私欲萬端害於仁聖人之言依本分至大至妙事語之若尋常此所以味長釋氏之説纔見些便驚天動地言語走作却是味短只為乍見不似聖人見慣如中庸言道只消道無聲無臭四字總括了多少釋氏言非黄非白非鹹非苦費多少言語寂然不動萬物森然已具在感而遂通感則只是自内感不是外面將一件物來感於此也有人旁邊作事已不見面只聞人説善言者為敬其心也故視而不見聴而不聞主於一也主於内則外不入敬便心虚故也必有事焉不忘不要施之重便不好敬其心乃至不接視聴此學者之事也始學豈可不自此去至聖人則自是從心所欲不踰矩孔子自十五至七十進德直有許多節次聖人未必然然亦是一作且為學者立下一法盈科而後進須是成章乃達自古元不曽有人解仁字之義須於道中與他分别出五常若只是兼體却只有四也且譬一身仁頭也其他四端手足也至如易雖言元者善之長然亦須通四德以言之至如八卦易之大義在乎此亦無人曽解來乾健坤順之類亦不曽果然體認得登山難為言以言聖人之道大觀瀾必照因又言其道之無窮瀾水之動處苟非源之無窮則無以為瀾非日月之明無窮則無以容光必照其下又言其篤實而有光輝也一作篤實而不窮成章者篤實而有光輝也今以瓦礫積之雖如山嶽亦無由有光輝若使積珠玉小積則有小光輝大積則有大光輝天下之言性則故而已矣則語助也故者本如是者也今言天下萬物之性必求其故者只是欲順而不害之也故曰以利為本本欲利之也此章皆為知而發行其所無事是不鑿也日至可坐而致亦只是不鑿也不席地而倚卓不手飯而匕筯此聖人必隨時若未有當且作之矣昔謂異教中疑有達者或是無歸且安於此再嘗考之卒不達若達則於其前日所處不能一朝居也觀曽子臨死易簣之意便知其不達朝聞道夕死可矣豈能安其未所安如毁其人形絶其倫類無君臣父子之道若達則不安也只夷言左衽尚可言隨其國俗至若人道豈容有異受祥内彈琴恐不是聖人舉動使其哀未忘則子於是日哭則不歌不飲酒食肉以全哀况彈琴可乎使其哀己忘則何必彈琴學者為氣所勝習所奪只可責志釋氏之説若欲窮其説而去取之則其説未能窮固已化而為佛矣只且於迹上考之其設教如是則其心果如何固難為取其心不取其迹有是心則有是迹王通言心迹之判便是亂説不若且如迹上斷定不與聖人合其言有合處則吾道固己有有不合者固所不取如是立定却省易一作力儒者其卒必一作多入異教其志非願也其勢自然如此葢智窮力屈欲休來又知得未安穩休不得故見人有一道理其勢須從之譬之行一大道坦然無阻則更不由徑只為前面逢著山逢著水行不得有窒礙則見一邪徑欣然從之儒者之所以必有窒礙者何也只為不致知知至至之則自無事可奪今夫有人處於異鄉元無安處則言某處安某處不安須就安處若已有家人言他人家為安己必不肯就彼故儒者而卒歸異教者只為於己道實無所得雖曰聞道終不曽實有之佛莊之説大抵畧見道體乍見不似聖人慣見故其説走作時所以有古今風氣人物之異者何也氣有淳漓自然之理有盛則必有衰有終則必有始有晝則必有夜譬之一片地始開荒田則其牧榖倍及其乆也一歲薄於一歲氣亦盛衰故也至於東西漢人才文章已來皆别所尚異也尚所以異亦由心所為心所以然者只為生得來如此至如春夏秋冬所生之物各異其栽培澆灌之宜亦須各以其時不可一也須隨時只如均是春生之物春初生得又别春中又别春盡時所生又别禮之隨時處宜只是正得當時事所謂時者必明道以貽後人有謂因苦學而至失心者學本是治心豈有反為心害某氣本不盛然而能不病無倦怠者只是一箇慎生不恣意其於外事思慮儘悠悠合而言之道也仁固是道道却是總名大而化之只是謂理與己一其未化者如人操尺度量物用之尚不免有差若至於化者則已便是尺度尺度便是己顔子正在此若化則便是仲尼也在前是不及在後是過之此過不及甚㣲惟顔子自知他人不與卓爾是聖人立處顔子見之但未至爾格物窮理非是要盡窮天下之物但於一事上窮盡其他可以類推至如言孝其所以為孝者如何窮理一無此二字如一事上窮不得且别窮一事或先其易者或先其難者各隨人㴱淺如千蹊萬徑皆可適國但得一道入得便可所以能窮者只為萬物皆是一理至如一物一事雖小皆有是理敬則自虚静不可把虚静喚做敬居敬則自然行簡若居簡而行簡却是不簡只是所居者已剰一簡字退藏於宻宻是用之源聖人之妙處聖人之道如河圖洛書其始止於畫上便出義後之人既重卦又繫辭求之未必得其理至如春秋是其所是非其所非不過只是當年數人而已學者不觀他書只觀春秋亦可盡道物理須是要窮若言天地之所以高㴱鬼神之所以幽顯若只言天只是高地只是㴱只是已辭更有甚敬則無已可克一有學者之事始則須絶四一有去字人之身有形體未必能為主若有人為繫虜將去隨其所處已有不得與也唯心則三軍之衆不可奪也若并心做主不得則更有甚夷惠之行未必如此且如孔子言不念舊惡怨是用希則伯夷之度量可知若使伯夷之清既如此又使念舊惡則除是抱石沈河孟子所言只是推而言之未必至如此然聖人於道防其始不得不如是之嚴如此而防猶有流者夷惠之行不已其流必至於孟子所論夷是聖人極清處惠是聖人極和處聖人則兼之而時出之清和何止於偏其流則必有害墨子之道雖有尚同兼愛之説然觀其書亦不至於視鄰之子猶兄之子葢其流必至於此至如言伊尹始在􅅵畝五就湯五就桀三聘翻然而從豈不是時然後來見其以天下自任故以為聖人之任聲數由經窮理不勉而中不思而得與勉而中思而得何止有差等直是相去懸絶不勉而中即常中不思而得即常得所謂從容中道者指他人所見而言之若不勉不思者自在道上行又何必言中不中不勉不思亦有大小㴱淺至於曲藝亦有不勉不思者所謂日月至焉與乆而不息者所見規模雖畧相似其意味氣象逈别須潛心黙識玩索乆之庶幾自得學者不學聖人則已欲學之須熟玩味一無味字聖人之一無之字氣象不可只於名上理會如此只是講論文字贊天地之化育自人而言之從盡其性至盡物之性然後可以贊天地之化育可以與天地參矣言人盡性所造如此若只是至誠更不須論所謂人者天地之心及天聰明自我民聰明止謂只是一理而天人所為各自有分浩然之氣所養各有漸所以至於充塞天地必積而後至行不慊於心止是防患之術須是集義乃能生不可一朝居者孟子之時大倫亂若君聴於臣父聴於子動則弑君弑父須著變是不可一朝居也然魯有三桓無以異齊何以魯一變至於道魯只是不修周公之法齊既壞太公之法後來立法已是苟且及其末世并其法又壞亂甚於魯故其弑亦先於魯孔子之仕於魯所一作欲以為之兆得可為處便為如陳恒弑其君孔子請討一事正則百事自己不得傳言以魯之衆加齊之半此非孔子請討之計一作意如此則孔子只待去角力借使言行亦上有天子下有方伯須謀而後行禮我戰則克祭則受福葢得其道此語至常淺孔子固能如此但觀其氣象不似聖人之言嘗觀自三代而後本朝有超越古今者五事如百年無内亂四聖百年受命之日市不易肆百年未嘗誅殺大臣至誠以待夷狄此皆大抵以忠厚㢘恥為之綱紀故能如此葢睿主開基規模自别大綱不正萬目即紊唐之治道付之尚書省近似六官但法不具也後世無如宇文周其官名法度小有可觀隋文之法雖小有善處然皆出於臆斷惟能如是故維持得數十年隕石於宋自空凝結而隕六鷁退飛倒逆飛也倒逆飛必有氣軀之也如此等皆是異事也故書之大抵春秋所書災異皆天人響應有致之之道如石隕於宋而言隕石夷伯之廟震而言震夷伯之廟此天應之也但人以淺狹之見以為無應其實皆應之然漢儒言災易皆牽合不足信儒者見此因盡廢之麟乃和氣所致然春秋之時有者何以為應天之氣豈可如此間别聖人之生亦天地交感五行之秀乃生聖人當戰國之際生孔子何足怪况生麟聖人為其出非其時故有感如聖人生不得時孔子感麟而作春秋或謂不然如何曰春秋不害感麟而作然麟不出春秋豈不作孔子之意葢亦有素因此一事乃作故其書之成復以此終大抵須有發端處如畫八卦因見河圖洛書果無河圖洛書八卦亦須作一隂一陽之謂道此理固㴱説則無可説所以隂陽者道既曰氣則便是一作有二言開闔已一作便是感既二則便有感所以開闔者道開闔便是隂陽老氏言虚而生氣非也隂陽開闔本無先後不可道今日有隂明日有陽如人有形影盖形影一時不可言今日有形明日有影有便齊有寂然不動感而遂通此已言人分上事若論道則萬理皆具更不説感與未感中和若只於人分上言之則喜怒哀樂未發既發之謂也若致中和則是達天理便見得天尊地卑萬物化育之道只是致知也素隱行怪是過者也半塗而廢是不及也不見知不悔是中者也中者只是不偏偏則不是中庸中只是常猶言中者是大中也庸者是定理也定理者天下不易之理也是經也孟子只言反經中在其間中庸之書是孔門傳授成於子思孟子其書雖是雜記更不分精粗一衮説了今之語道多説高便遺却卑説本便遺却末小人之中庸小人而無忌憚也小人更有甚中庸脱一反字小人不主於義理則無忌憚無忌憚所以反中庸也亦有其心畏謹而不中亦是反中庸語惡有淺㴱則可謂之中庸則不可知天命是達天理也必受命是得其應也命者是天之所賦與如命令之命天之報應皆如影響得其報者是常理也不得其報者非常理也然而細推之則須有報應但人以挾淺之見求之便謂差且天命不可易也然有可易者惟有德者能之如修養之永年世祚之祈天永命常人之至於聖賢皆此道也夢説之事是傅説之感高宗高宗感傅説高宗只思得聖賢之人須是聖賢之人方始應其感若傅説非聖賢自不相感如今人卜筮蓍在手事在未來吉凶在書䇿其卒三者必合矣使書䇿之言不合於理則自不驗隕石無種種於氣麟亦無種亦氣化厥初生民亦如是至如海濱露出沙灘便有百蟲禽獸草木無種而生此猶是人所見若海中島嶼稍大人不及者安知其無種之人不生於其間若已有人類則必無氣化之人匹夫至誠感天地固有此理如鄒衍之説太甚只是盛夏感而寒慄則有之理外之事則無如變夏為冬降霜雪則無此理配義與道即是體用道是體義是用配者合也氣儘是有形體故言合氣者是積義所生者却言配義如以金為器既成則目為金器可也天地之間皆有對有隂則有陽有善則有惡君子小人之氣常停不可都生君子但六分君子則治六分小人則亂七分君子則大治七分小人則大亂如是一無此二字作雖字堯舜之世不能無小人葢堯舜之世只是以禮樂法度驅而之善盡其道而已然言比屋可封者以其有教雖欲為惡不能成其惡雖堯舜之世然於其家乖戾之氣亦生朱均在朝則有四凶乆而不去離了隂陽更無道所以隂陽者是道也隂陽氣也氣是形而下者道是形而上者形而上者則是宻也絪緼隂陽之感志氣之帥若論浩然之氣則何者為志志為之主乃能生浩然之氣志至焉氣次焉自有先後醫者不詣理則處方論藥不盡其性只知逐物所治不知和合之後其性又如何假如訶子黄白礬白合之而成黑黑見則黄白皆亡又如一二合而為三三見則一二亡離而為一二則三亡既成三又求一與二既成黒又求黄與白則是不知物性一作理古之人窮盡物理則食其味嗅其臭辨其色知其某物合某則成何性天有五氣故凡生物莫不具有五性居其一而有其四至如草木也其黄者得土之性多其白者得金之性多宗子法廢後世譜牒尚有遺風譜牒又廢人家不知來處無百年之家骨肉無統雖至親恩亦薄古人為學易自八歲入小學十五入大學舞勺舞象有絃歌以養其耳舞干羽以養其氣血有禮義以養其心又且急則佩韋緩則佩絃出入閭巷耳目視聴及政事之施如是則非僻之心無自而入今之學者只有義理以養其心河北只見鯀隄無禹隄鯀堙洪水故無功禹則導之而已五祀恐非先王之典皆後世巫祝之一作誣祀無之字誣又作滛言報則遺其重者井人所重行宁廊也其功幾何雖庶人必祭及高祖比至天子諸侯止有疏數耳凡物之散其氣遂盡無復歸本原之理天地間如洪鑪雖生物銷鑠亦盡况既散之氣豈有復在天地造化又焉用此既散之氣其造化者自是生氣至如海水潮日出則水涸是潮退也其涸者已無也月出則潮水生也非却是將已涸之水為潮此是氣之終始開闔便是易一闔一闢謂之變傳錄言語得其言未得其心必有害雖孔門亦有是患如言昭公之禮巫馬期告時孔子正可一作合不答其問必更有語言具巫馬期欲反命之意孔子方言苟有過人必知之葢孔子答巫馬期亦知之陳司敗亦知之矣又如言伯夷栁下惠皆古聖人也若不言清和便以夷惠為聖人豈不有害又如孟子言放勲曰只當言堯曰傳者乗放勲為堯號乃稱放勲曰又如言聞斯行之若不因公西赤有問及仲由為比便信此一句豈不有害又如孟子齊王欲養弟子以萬鍾此事欲國人矜式孟子何不可處但時子以利誘孟子孟子故曰如使予欲富辭十萬而受萬是為欲富乎若觀其文只是孟子不肯為國人矜式須知不可以利誘之意舜不告而娶須識得舜意若使舜便不告而娶固不可以其父頑過時不為娶堯去治之堯命瞽使舜娶舜雖不告堯固告之矣堯之告之也以君治之而已今之官府治人之私亦多然而象欲以殺舜為事堯奚為不治葢象之殺舜無可見之迹發人隱慝而治之非堯也學春秋亦善一句是一事是非便見於此此亦窮理之要然他經豈不可以窮但他經論其義春秋因其行事是非較著故窮理為要嘗語學者且先讀論語孟子更讀一經然後看春秋先識得箇義理方可看春秋以何為準無如中庸欲知中庸無如權須是時而為中若以手足胼胝閉戸不出二者之間取中便不是中若當手足胼胝則於此為中當閉戸不出則於此為中權之為言秤錘之義也何物為權義也然也只是説得到義義以上更難説在人自看如何格物亦須積累涵養如始學詩者其始未必善到悠乆須差精人則只是舊人其見則别知至則當至之知終則當遂一無遂字終之須以知為本知之㴱則行之必至無有知之而不能行者知而不能行只是知得淺飢而不食烏喙人不蹈水火只是知人為不善只為不知知至而至之知幾之事故可與幾知終而終之故可與存義知至是致知博學明辨審問慎思皆致知知至之事篤行便是終之如始條理終條理因其始條理故能終條理猶知至即能終之春秋傳為案經為斷古之學者先由經以識義理葢始學時盡是傳授後之學者却先須識義理方始看得經如易繫辭所以解易今人須看了易方始看得繫辭一本云古之人得其師傳故因經以明道後世失其師傳故非明道不能以知經至大至剛以直不言至直此是文勢如治世之音安以樂怨以怒粗以厲噍以殺皆此類解義理若一向靠書冊何由得居之安資之㴱不惟自失兼亦誤人治道亦有從本而言亦有從事而言從本而言惟從格君心之非正心以正朝廷正朝廷以正百官若從事而言不救則已若須救之必須變大變則大益小變則小益學者好語高正如貧人説金説黄色説堅軟道他不是又不可只是好笑不曽見富人説如此仲尼於論語中未嘗説神字只於易中不得已言數處而已有主則虚無主則實必有所事以物待物不可以已待物古所謂支子不祭者惟使宗子立廟主之而已支子雖不得祭至於齊戒致其誠意則與主祭者不異可與則以身執事不可與則以物助但不别立廟為位行事而已後世如欲立宗子當從此義雖不祭情亦可安若不立宗子徒欲廢祭適是長惰慢之志不若使之祭猶愈於已也真元之氣氣之所由生不與外氣相雜但以外氣涵養而已若魚在水魚之性命非是水為之但必以水涵養魚乃得生爾人居天地氣中與魚在水無異至於飲食之養皆是外氣涵養之道出入之息者闔闢之機而已所出之息非所入之氣但真元自能生氣所入之氣止當闔時隨之而入非假此氣以助真元也古者八歲入小學十五入大學擇其才可教者聚之不肖者復之田畝葢士農不易業既入學則不治農然後士農判在學之養若士大夫之子則不慮無養雖庶人之子既入學則亦必有養古之士者自十五入學至四十方仕中間自有二十五年學又無利可趨則所至可知須去趨善便自此成徳後之人自童稚間已有汲汲趨利之意何由得向善故古人必使四十而仕然後志定只營衣食却無害惟利禄之誘最害人人有養便方定志於學做官奪人志星辰若以日月之次為辰則辰上恐不容二十八舍若謂五星則不可稱辰或恐只是言北辰皆星也何貴乎北辰北辰自是不動只不動便是為氣之主故為星之最尊者尊一作宗先主之樂必須律以考其聲今律既不可求人耳又不可全信正惟此為難求中聲須得律律不得則中聲無由見律者自然之數至如今度量權衡亦非正也今之法且以為準則可非如古法也此等物雖出於自然一有之數字亦須人為之但古人為之得其自然至於一作如規矩則極盡天下之方圓律厯之法今亦麤存但人用之小耳律之遺則如三命是也其法只用五行支幹納音之類厯之遺則是星算人生數一作處然皆有此理苟無此理却推不行素問之書必出於戰國之末觀其氣象知之天之氣運只如此但繫看者如何設如定四方分五行各配與一方是一般絡角而看之又一般分而為二十四又一般規模大則大規模小則小然善言亦多如言善言天者必有驗於人善言古者必有驗於今善觀人者必有見於已近取諸身百理皆具屈伸往來之義只於鼻息之間見之屈伸往來只是理不必將既屈之氣復為方伸之氣生生之理自然不息如復言七日來復其間元不斷續陽已復生物極必反其理須如此有生便有死有始便有終守身為大其事固有大者正惟養疾亦是守身之一齊戰疾聖人之所愼自天子至於庶人五服未嘗有異皆至高祖服既如是祭祀亦須如是其疏數之節未有可考但其理必如此七廟五廟亦只是祭及高祖大夫士雖或三廟二廟一廟或祭寢廟則雖異亦不害祭及高祖若止祭禰只為知母而不知父禽獸道也祭禰而不及一有高字祖非人道也天子曰禘諸侯曰祫其理皆是合祭之義禘從帝禘其祖之所自出之帝以所出之帝為東向之尊其餘合食於其前是為禘也諸侯無所出之帝只是於太祖廟一有以字羣廟之主合食是為祫魯所以有禘者只為得用天子禮樂故於春秋之中不見言祫只言禘言大事者即是祫言大事於太廟躋僖公即是合食閔僖二公之義若時祭一有即字當言有事吉禘於莊公只是禘祭言吉者以其行之太早也四時之祭有禘之名只是禮文交錯郊祀配天宗廟配上帝天與上帝一也在郊言天以其冬至生物之始故祭於圜丘而配以祖陶匏稿鞂埽地而祭宗祀言上帝以季秋成物之時故祭於明堂而配以父其禮必以宗廟之禮享之此義甚彰灼但孝經之文有可疑處周公祭祀當推成王為主人則當推武王以配上帝不當言文王配若文王配則周公自當祭祀矣周公必不如此仁義禮智信於性上要言此五事須要分别出若仁則固一一所以為仁惻隱則屬愛乃情也非性也恕者入仁之門而恕非仁也因其惻隱之心知其有仁惟四者有端而信無端只有不信更無一作更有信如東西南北已有定體更不可言信若以東為西以南為北則是有不信如東即東西即西則無一有不字信説書必非古意轉使人薄學者須是潛心積慮優游涵養使之自得今一日説盡只是教得薄至如漢時説下帷講誦猶未必説書聖狂聖不必是睿聖狂不必是狂狷只是智通者便言聖如聖義忠和豈必是聖人尸如配位時男男尸女女尸祭事主嚴雖同時共室亦無嫌與䘮祭執事不嫌同義執事且爾况今日事之便如國之先君與夫人如合祭之時考妣當各異位葢人情亦無舅婦同坐之禮如特祭其廟之時則不害夫婦並祭學者先務固在心志有謂欲屏去聞見知思則是絶聖棄智有欲屏去思慮患其紛亂則是須坐禪入定如明鑑在此萬物畢照是鑑之常難為使之不照人心不能不交感萬物亦難為使之不思慮若欲免此一本無此四字唯是心一作在人有主如何為主敬而已矣有主則虚虚謂邪不能入無主則實實謂物來奪之今夫瓶甖有水實内則雖海江之浸無所能入安得不虚無水於内則停注之水不可勝注安得不實大凢人心不可二用用於一事則他事更不能入者事為之主也事為之主尚無思慮紛擾之患若主於敬所謂一者無適之謂一且欲涵泳主一之義一則無二三矣一作不一則二三矣言敬無如聖人之言一無聖人之言四字易所謂敬以直内義以方外須是直内乃是主一之義至於不敢欺不敢慢尚不愧於屋漏皆是敬之事也但存此涵養乆之自然天理明閑邪存誠閑邪則誠自存如人有室垣墻不修不能防冦冦從東來逐之則復有自西入逐得一人一人復至不如修其垣牆則冦自不至故欲閑邪也學禪者常謂天下之忙者無如市井之人答以市井之人雖日營利然猶有休息之時至忙者無如禪客何以言之禪者之行住坐卧無不在道存無不在道之心此便是常忙論語有二處堯舜其猶病諸博施濟衆豈非聖人之所欲然五十乃衣帛七十乃食肉聖人之心非不欲少者亦衣帛食肉然所養有所不贍此病其施之不博也聖人所治不過九州四海然九州四海之外聖人亦非不欲兼濟然所治有所不及此病不能濟衆也推此以求脩己以安百姓則為病可知苟以為吾治已足則便不是聖人脩已以安百姓須有所施為乃能安人此則自我所生學至堯舜則自有堯舜之事言孝者必言曽子不可謂曽子之孝己甚集義所生非義襲而取之也集義是積義所生如集大成若累土為山須是積土乃成山非是山已成形乃名為義一作山一作土浩然之氣難識須要認得當行不慊於心之時自然有此氣象然亦未盡須是見至大至剛以直之三德方始見浩然之氣若要見時且看取地道坤六二直方大不習無不利方便是剛大便是大直便是直於坤不言剛而言方者言剛則害於地道故下一作不復云至柔而動也剛以其先言柔而後云剛無害大只是對小而言是大也剛只是對柔而言是剛也直只是對曲而言是直也如此自然不習無不利坤之六二只為已是地道又是二又是六地道之精純者至如六五便不同欲得學且只看取地道坤雖是學者之事然亦有聖人之道乾九二是聖人之事坤六二是學者之事聖賢之道其發無二但至一作只有㴱淺大小嚴威儼恪非敬之道但致敬須自此入止於至善不明乎善此言善者義理之精㣲無可得名且以至善目之繼之者善此言善却言得輕但謂繼斯道者莫非善也不可謂惡舜孳孳為善若未接物如何為善只是主於敬便是為善也以此觀之聖人之道不是但嘿然無言一作為顔子擇中庸得善拳拳中庸如何擇如博學之又審問之又明辨之所以能擇中庸也雖然學問而辨亦何所據乃識中庸此則成乎致知致知者此則在學者自加功也大凡於道擇之則在乎智守之則在乎仁斷之則在乎勇人之於道只是患在不能守不能斷必有事焉謂必有所事是敬也勿正正之為言輕勿忘是敬也正之之甚遂至於助長編闢整續終自正和叔未知終自得否墨子之書未至大有兼愛之意及孟子之時其流浸逺乃至若是之差楊子為我亦是義墨子兼愛則是仁惟差之毫釐繆以千里直至無父無君如此之甚世人之學博聞强識者豈少其終無有不入禪學者就其間特立不惑無如子厚堯夫然其説之流恐未免此敝楊子似出於子張墨子似出於子夏其中更有過不及豈是師商不學於聖人之門一本張作夏夏作張約敬是與叔季明以知思聞見為患某甚喜此論邂逅却正語及至要處世之學者大敝正在此若得他折難堅叩能終其説直須要明辨康仲一作拯問人之學非願有差只為不知之故遂流於不同不知如何持守先生言且未説到持守持守甚事須先在致知致知盡知也窮理格物便是致知禮孰為大時為大亦須隨時當隨則隨當治則治當其時作其事便是能隨時隨時之義大矣哉㝷常人言隨時為且和同只是流狥耳不可謂和和則已是和於義故學者患在不能識時時出之亦須有􅄎博淵泉方能出之今之人自是與古之人别其風氣使之至如壽考形貌皆異古人皆不減百餘歲今豈有此人觀古人形象被冠冕之類今人豈有此等人故籩豆簠簋自是不可施於今人自時不相稱時不同也時上盡窮得理孟子言五百年必有王者興其間必有名世者以其時考之則可矣他嘿識得此體用大約是如此豈可催促得他堯之於民匡直輔翼聖賢於此間見些功用舉此數端可以常乆者示人殷因於夏周因於殷損益可知嘿觀得者須知三王之禮與物不必同自畫卦垂衣裳至周文方備只為時也若不是隨時則一聖人出百事皆做了後來者沒事又非聖人智慮所不及只是時不可也只歸之自然則無可觀更無可玩賾之一作箇雲從龍風從虎龍隂物也出來有濕氣烝然自出如濕物在日中氣亦自出雖木石之㣲感隂氣尚亦有氣則龍之興雲不足怪虎行處則風自生龍只是獸茅山華陽洞曽跳出其狀殊可愛亦有時乾處能行其行步如虎茅山者則不嚙人北五臺者則傷人又有曽於鐵狗廟下穿得一龍卵後寄於金山寺龍能壅水上寺門取卵不得龍所以知者許大物亦自靈也龍以卵生者亦非神更一等龍必須胎生極無適而不為中二程遺書卷十五
