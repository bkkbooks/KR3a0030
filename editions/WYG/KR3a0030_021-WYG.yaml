body:
  text: 二程遺書卷二十一上宋朱子編師說宣仁山陵程子往赴吕汲公為使時朝廷以舘職授子子固辭公謂子曰仲尼亦不如是程子對曰公何言哉某何人而敢比仲尼雖然某學仲尼者於仲尼之道固不敢異公以謂仲尼不如是何也公曰陳恒弑其君請討之魯不用則亦已矣子未及對㑹殿帥苖公至子辟之幕府見公壻王讜讜曰先生不亦甚乎欲朝廷如何處先生也子曰且如朝廷議北郊所議不合禮取笑天下後世豈不知有一程某亦嘗學禮何為而不問也讜曰北郊如何曰此朝廷事朝廷不問而子問之非可言之所也其後有問汲公所言陳恒之事是歟曰於傳仲尼是時已不為大夫公誤言也吕汲公以百縑遺子子辭之時子族兄子公孫在旁謂子曰勿為己甚姑受之子曰公之所以遺某者以某貧也公位宰相能進天下之賢隨才而任之則天下受其賜也何獨某貧也天下賢者亦衆矣公帛固多恐公不能周也殿帥苖公問程子曰朝廷處先生如何則可程子對曰且如山陵事苟得專處雖永安尉可也程子曰古之學者易今之學者難古人自八嵗入小學十五入大學有文采以養其目聲音以養其耳威儀以養其四體歌舞以養其心今則俱亡矣惟義理以養其心爾可不勉哉范公堯夫攝帥成都程子將告歸别焉公曰願少留某將别子曰既别矣何必復勞輿衞遂行公使人要於路曰願一見也既見曰先生何以教我子曰公嘗言為將帥當使士卒視己如父母然後可用然乎公曰如何子曰公言是也然公為政不若是何也公曰可得聞歟子曰舊帥新亡而公張樂大饗將校於府門是教之視帥如父母乎曰亦疑其不可故使屬官攝主之也子曰是尤不可也公與舊帥同僚也失同僚之義其過小屬官於主帥其義重曰廢饗而頒之酒食如何曰無頒也武夫視酒食為重事弗頒則必思其所以而知事帥之義乃因事而教也公曰若從先生言而不來則不聞此矣其喜聞義如此程子在講筵執政有欲用之為諫官者子聞以書謝曰公知射乎有人執弓於此發而多中人皆以為善射矣一日使羿立於其傍道之以彀率之法不從羿且怒而去矣從之則戾其故習而失多中之功一作巧故不若處羿於無事之地則羿得盡其言而用舎羿不恤也某才非羿也然聞羿之道矣慮其害公之多中也謝湜自蜀之京師過洛而見程子子曰爾將何之曰將試教官子弗答湜曰何如子曰吾嘗買婢欲試之其母怒而弗許曰吾女非可試者也今爾求為人師而試之必為此媪笑也湜遂不行一本云湜不能用又云謝湜求見者三不許因陳經正以請先生曰聞其來問易遂為說以獻貴人註云獻蔡卞如用說桎梏之類謝愔見程子子留語因請曰今日將沐子曰豈無他日曰今日吉也子曰豈為士而惑此也邪曰愔固無疑矣在已庸何恤第云不利父母子曰有人呼於市者曰毁瓦畫墁則利父母也否則不利於父母子亦將毁瓦畫墁乎曰此狂人之言也何可信然則子所信者亦狂言爾先生謂繹曰吾受氣甚薄三十而浸盛四十五十而後完今生七十二年矣校其筋骨於盛年無損也又曰人待老而求保生是猶貧而厚蓄積雖勤亦無補矣繹曰先生豈以受氣之薄而後為保生邪夫子黙然曰吾以忘生狥欲為深恥程子與客語為政程子曰甚矣小人之無行也牛壯食其力老則屠之客曰不得不然也牛老不可用屠之猶得半牛之價復稱貸以買壯者不爾則廢耕矣且安得芻粟養無用之牛乎子曰爾之言知計利而不知義者也為政之本莫大於使民興行民俗善而衣食不足者未之有也水旱螟蟲之災皆不善之致也邵堯夫謂程子曰子雖聰明然天下之事亦衆矣子能盡知邪子曰天下之事某所不知者固多然堯夫所謂不知者何事是時適雷起堯夫曰子知雷起處乎子曰某知之堯夫不知也堯夫愕然曰何謂也子曰既知之安用數推也以其不知故待推而後知堯夫曰子以為起於何處子曰起於起處堯夫瞿然稱善張子厚罷太常禮院歸闗中過洛而見程子子曰比太常禮院所議可得聞乎子原曰大事皆為禮房檢正所奪所議惟小事爾子曰小事謂何子厚曰如定謚及龍女衣冠子曰龍女衣冠如何子厚曰當依夫人品秩蓋龍女本封善濟夫人子曰某則不能既曰龍則不當被人衣冠矧大河之塞本上天降祐宗廟之靈朝廷之德而吏士之勞也龍何功之有又聞龍有五十三廟皆曰三娘子一龍邪五十三龍邪一龍則不當有五十三廟五十三龍則不應盡為三娘子也子厚黙然韓持國帥許程子往見謂公曰適市中聚浮圖何也公曰為民祈福也子曰福斯民者不在公乎韓公持國使掾為亭成而蓮已生其前蓋掾盆植而置之公甚喜程子曰斯可惡也使之為亭而更為此以說公非端人也公曰柰何人見之則喜韓公持國與范公彞叟程子為泛舟之遊典謁白有士人堅欲見公程子曰是必有故亟見之頃之遽還程子問客何為者曰上書子曰言何事曰求薦爾子曰如斯人者公缺一字無薦夫為國薦賢自當求人豈可使人求也公曰子不亦甚乎范公亦以子不為通子曰大底今之大臣好人求已故人求之如不好人豈欲求怒邪韓公遂以為然韓持國罷門下侍郎出帥南陽已出國門程子往見之子時在講筵公驚曰子來見我乎子亦危矣程子曰只知履安地不知其危坐頃之公不言子曰公有不豫色何也公曰在維固無足道所慮者貽兄姊之憂耳子曰領帥南陽兄姊何所憂公悟曰正為定力不固耳謝公師直與程子論易程子未之許也公曰昔與伯淳亦謂景温於春秋則可易則未也程子曰以某觀之二公皆深於易者也公曰何謂也子曰以監司論學而主簿敢以為非為監司者不怒為主簿者敢言非深於易而何張閎中以書問易傳不傳及曰易之義本起於數程子答曰易傳未傳自量精力未衰尚冀有少進爾然亦不必直待身後覺老耄則傳矣書雖未出學未嘗不傳也第患無受之者爾來書云易之義本起於數謂義起於數則非也有理而後有象有象而後有數易因象以知數得其義則象數在其中矣必欲窮象之隱微盡數之毫忽乃尋流逐末術家之所尚非儒者之所務也管輅郭璞之學是也又曰理無形也故因象以明理理見乎辭矣則可由辭以觀象故曰得其義則象數在其中矣子言范公堯夫之寛大也昔余過成都公時攝帥有言公於朝者朝廷遣中使降香峨眉實察之也公一日訪予欵語予問曰聞中使在此公何暇也公曰不爾則拘束已而中使果怒以鞭傷傳言者耳屬官喜謂公曰此一事足以塞其謗請聞於朝公既不折言者之為非又不奏中使之過也其有量如此程子過成都時轉運判官韓宗道議減役至三大戸亦減一人焉子曰只聞有三大戸不聞兩也宗道曰三亦可兩亦可三之名不從天降地出也子曰乃從天降地出也古者朝有三公國有三老三人占則從二人之言三人行則必得我師焉若止二大戸則一人以為是一人以為非何從而决三則從二人之言矣雖然近年諸縣有使之分治者亦失此意也繹曰鄒浩以極諫得罪世疑其賣直也先生曰君子之於人也當於有過中求無過不當於無過中求有過程子之􅉦厔時樞宻趙公瞻持䘮居邑中杜門謝客使侯隲語子以釋氏之學子曰禍莫大於無類釋氏使人無類可乎隲以告趙公公曰天下知道者少不知道者衆自相生養何患乎無類也若天下盡為君子則君子將誰使侯子以告程子曰豈不欲人人盡為君子哉病不能耳非利其為使也若然則人類之存不賴於聖賢而賴於下愚也趙公聞之笑曰程子未知佛道𢎞大耳程子曰釋氏之道誠𢎞大吾聞傳者以佛逃父入山終能成佛若儒者之道則當逃父時已誅之矣豈能俟其成佛也韓公持國與程子語歎曰今日又暮矣程子對曰此常理從來如是何歎為公曰老者行去矣曰公勿去可也公曰如何能勿去子曰不能則去可也二程遺書卷二十一上欽定四庫全書二程遺書卷二十一下宋朱子編附師說後幽王失道始則萬物不得其性而後恩衰於諸侯以及其九族其甚也至於視民如禽獸魚藻之什其序如此孔子之時諸侯甚强大然皆周所封建也周之典禮雖甚廢壊然未泯絶也故齊晉之霸非挾尊王之義則不能自立至孟子時則異矣天下之大國七非周所命者四先王之政絶而澤竭矣夫王者天下之義主也民以為王則謂之天王天子民不以為王則獨夫而已矣二周之君雖無大惡見絶於天下然獨夫也故孟子勉齊梁以王者與孔子之所以告諸侯不同君子之救世時行而已矣不動心有二有造道而不動者有以義制心而不動者此義也此不義也義吾所當取不義吾所當捨此以義制心者也義在我由而行之從容自中非有所制也此不動之異凡有血氣之類皆具五常但不知充而已矣勇者所以敵彼者也苟為造道而心不動焉則所以敵物者不賴勇而裕如矣理也性也命也三者未嘗有異窮理則盡性盡性則知天命矣天命猶天道也以其用而言之則謂之命命者造化之謂書言天叙天秩天有是理聖人循而行之所謂道也聖人本天釋氏本心忠者無妄之謂也忠天道也恕人事也忠為體恕為用忠恕違道不逺非一以貫之之忠恕也真近誠誠者無妄之謂氣有善不善性則無不善也人之所以不知善者氣昏而塞之耳孟子所以養氣者養之至斯清明純全而昏塞之患去矣或曰養心或曰養氣何也曰養心則勿害而已養氣則志有所帥也賤妾得進御於君是其僭恣可行而分限得踰之時也乃能謹於抱衾與裯而知命之不猶則教化至矣心生道也有是心斯具是形以生惻隱之心人之生道也雖桀跖不能無是以生但戕賊之以滅天耳始則不知愛物俄而至於忍安之以至於殺充之以至於好殺豈人理也哉有欲亂之人而無與亂者則雖有强力弗能為也今有刼人以殺人者則先治刼者而殺者次之將以垂訓於後世則先殺者而後刼者春秋書鄭公子歸生殺其君夷是也諸葛瑾使蜀其弟亮與瑾非公㑹不覿亮之處瑾為得矣使吳之知瑾如備之遇亮復何嫌而不得悉兄弟之懽也春秋䘮昏無譏蓋日月自見不必譏也唯哀姜以􅎭中納幣則重疊譏之曰逆婦曰夫人至恐後世不以為非也他皆曰逆女此獨云婦而又不曰夫人蓋已納幣則為婦違禮而昏則不可謂之夫人貞而不諒猶大信不約也智出於人之性人之為智或入於巧偽而老莊之徒遂欲棄知是豈性之罪也哉善乎孟子之言所惡於知者為其鑿也孔子之時道雖不明而異端之害未甚故其論伯夷也以德孟子之時道亦不明異端之害滋深故其論伯夷也以學道未盡乎聖人則推而行之必有害矣故孟子推其學術而言之也夫闢邪說以明先王之道非㧞本塞源不能也青蠅詩言樊棘榛言二人四國自樊而觀之則樊為近而棘榛為遠自二人而觀之則二人為小而四國為大讒人之情常欲汗白以為黒也而其言不可以直逹故必營營往來或自近以至於遠或自小而至於大然後其說得行矣文王之德正與天合明明於下者乃赫赫於上者也孟子曰強恕而行求仁莫近焉有忠矣而行之以恕則以無我為體以恕為用所謂强恕而行者知以已之所好惡處人而己未至於無我也故已欲立而立人已欲達而達人所以為仁之方也富文忠公辭疾歸第以其俸劵還府府受之先生曰受其納劵者固無足議然納者亦未為得也留之而無請可矣名分正則天下定人心惟危道心惟微心道之所在微道之體也心與道渾然一也對放其良心者言之則謂之道心放其良心則危矣惟精惟一所以行道也伊川先生病革門人郭忠孝徃視之子瞑目而卧忠孝曰夫子平生所學正要此時用子曰道著用便不是忠孝未出寢門而子卒一本作或人仍載尹子之言曰非忠孝也忠孝自黨事起不與先生往來先生卒亦不致奠二程遺書卷二十一下
