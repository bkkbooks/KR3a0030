body:
  text: 二程遺書卷十四宋朱子編亥九月過汝所聞絢問先生相别求所以教曰人之相愛者相告戒必曰凡事當善處然只在仗忠信只不忠信便是不善處也有人治園圃役知力甚勞先生曰蠱之象君子以振民育德君子之事惟有此二者餘無他為二者為己為人之道也為己為人呉本作治己治人博學而篤志切問而近思何以言仁在其中矣學者要思得之了此便是徹上徹下之道曽子曰士不可以不𢎞毅任重而道逺先生曰𢎞而不毅則難立毅而不𢎞則無以居之西銘言𢎞之道讀書要玩味中庸始言一理中散為萬事末復合為一理中庸曰大哉聖人之道洋洋乎發育萬物峻極于天優優大哉禮儀三百威儀三千待其人而後行故曰苟不至德至道不凝焉皆是一貫持國曰若有人便明得了者伯淳信乎曰若有人則豈不信葢必有生知者然未見之也凡云為學者皆為此以下論孟子曰盡其心者知其性也知性則知天矣存其心養其性所以事天便是至言佛氏不識隂陽晝夜死生古今安得謂形而上者與聖人同乎佛言前後際斷純亦不已是也彼安知此哉子在川上曰逝者如斯夫不舍晝夜自漢以來儒者皆不識此義此見聖人之心純亦不已也詩曰維天之命於穆不已葢曰天之所以為天也於乎不顯文王之德之純葢曰文王之所以為文也純亦不已此乃天德也有天德便可語王道其要只在慎獨學要在敬也誠也中間便一作更有箇仁博學而篤志切問而近思仁在其中矣之意敬主事人之學不進只是不勇或問繫辭自天道言中庸自人事言似不同曰同繫辭雖始從天理隂陽鬼神言之然卒曰黙而成之不言而信存乎德行中庸亦曰鬼神之為德莫盛矣乎視之而不見聽之而不聞體物而不可遺使天下之人齋明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫㣲之顯誠之不可揜如此夫是豈不同人多言廣心浩大然未見其人也樂則行之憂則違之樂與憂皆道也非己之私也聖人致公心盡天地萬物之理各當其分佛氏總為一己之私安得同乎聖人循理故平直而易行異端造作大小大費力非自然也故失之逺易中只是言反覆往來上下伊尹曰天之生斯民也使先知覺後知使先覺覺後覺予天民之先覺者也予將以斯道覺斯民也釋氏之云覺甚底是覺斯道甚底是覺斯民二程遺書卷十四
